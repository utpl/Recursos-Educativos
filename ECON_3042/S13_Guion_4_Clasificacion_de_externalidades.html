<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación de Externalidades | Microeconomía Aplicada</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap');
        :root {
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --surface2: #EEF3FA;
            --neg: #FF6B6B;
            --neg-light: #FFF0F0;
            --pos: #20B2AA;
            --pos-light: #E6FFFE;
            --prod: #F39C12;
            --prod-light: #FFF8E1;
            --cons: #8B5CF6;
            --cons-light: #F3EFFE;
            --none: #718096;
            --none-light: #F7F8FA;
            --accent: #00BFFF;
            --text: #1A2332;
            --text2: #4A5568;
            --text3: #718096;
            --border: #E2E8F0;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-drag: 0 12px 40px rgba(0, 191, 255, 0.25);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: white;
            color: var(--text);
        }
        .container {
            width: 800px;
            height: 800px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }
        /* ─── HEADER ─── */
        .header {
            background: linear-gradient(135deg, #0D1B2A 0%, #1B3A5C 60%, #0A3050 100%);
            padding: 16px 24px 14px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,191,255,0.12), transparent 70%);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -40px; left: 20%;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(32,178,170,0.10), transparent 70%);
        }
        .htag {
            font-family: 'Syne', sans-serif;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }
        .header-sub {
            color: rgba(255,255,255,0.6);
            font-size: 11.5px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }
        /* ─── PROGRESS ─── */
        .progress-wrap {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 6px 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-label {
            font-family: 'Syne', sans-serif;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
            white-space: nowrap;
        }
        .progress-score {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
        }
        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: var(--surface2);
            border-radius: 9px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 9px;
            background: linear-gradient(90deg, var(--accent), var(--pos));
            width: 0%;
            transition: width 0.7s cubic-bezier(.4,0,.2,1);
        }
        /* ─── MAIN LAYOUT ─── */
        .main-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        /* ─── LEFT COL: ARTÍCULOS ─── */
        .left-col {
            width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }
        /* ─── RIGHT COL: CATEGORÍAS + BOTONES ─── */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* ─── SECTION TITLE ─── */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 9.5px;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 7px 14px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        /* ─── ARTÍCULOS LIST ─── */
        .items-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .items-list::-webkit-scrollbar { width: 4px; }
        .items-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .drag-item {
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            padding: 9px 11px;
            cursor: grab;
            user-select: none;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, opacity 0.2s;
        }
        .drag-item:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }
        .drag-item.dragging { opacity: 0.45; cursor: grabbing; }
        .drag-item.placed {
            opacity: 0.5;
            cursor: default;
            background: var(--surface2);
        }
        .drag-item.placed:hover { transform: none; box-shadow: none; border-color: var(--border); }
        .drag-item-num {
            font-family: 'Syne', sans-serif;
            font-size: 9.5px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }
        .drag-item-text {
            font-size: 11px;
            color: var(--text2);
            line-height: 1.45;
        }
        .drag-item-emoji {
            font-size: 16px;
            margin-bottom: 4px;
            display: block;
        }
        .drag-item-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 5px;
        }
        .badge {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 7px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }
        .badge-A { background: var(--neg-light); color: var(--neg); border: 1px solid var(--neg); }
        .badge-B { background: var(--pos-light); color: var(--pos); border: 1px solid var(--pos); }
        .badge-C { background: var(--prod-light); color: var(--prod); border: 1px solid var(--prod); }
        .badge-D { background: var(--cons-light); color: var(--cons); border: 1px solid var(--cons); }
        .badge-E { background: var(--none-light); color: var(--none); border: 1px solid var(--none); }
        /* ─── CATEGORÍAS / DROP ZONES ─── */
        .cats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .cats-list::-webkit-scrollbar { width: 4px; }
        .cats-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .cat-zone {
            border-radius: var(--radius-sm);
            padding: 9px 10px 8px;
            border: 2px dashed transparent;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }
        .cat-zone.cat-A { background: var(--neg-light); border-color: rgba(255,107,107,0.35); }
        .cat-zone.cat-B { background: var(--pos-light); border-color: rgba(32,178,170,0.35); }
        .cat-zone.cat-C { background: var(--prod-light); border-color: rgba(243,156,18,0.35); }
        .cat-zone.cat-D { background: var(--cons-light); border-color: rgba(139,92,246,0.35); }
        .cat-zone.cat-E { background: var(--none-light); border-color: rgba(113,128,150,0.35); }
        .cat-zone.drag-over { transform: scale(1.015); border-style: solid; }
        .cat-zone.cat-A.drag-over { border-color: var(--neg); background: #FFE5E5; }
        .cat-zone.cat-B.drag-over { border-color: var(--pos); background: #D0F7F5; }
        .cat-zone.cat-C.drag-over { border-color: var(--prod); background: #FDECC8; }
        .cat-zone.cat-D.drag-over { border-color: var(--cons); background: #EDE0FF; }
        .cat-zone.cat-E.drag-over { border-color: var(--none); background: #EBEBEB; }
        .cat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }
        .cat-letter {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cat-A .cat-letter { background: var(--neg); color: #fff; }
        .cat-B .cat-letter { background: var(--pos); color: #fff; }
        .cat-C .cat-letter { background: var(--prod); color: #fff; }
        .cat-D .cat-letter { background: var(--cons); color: #fff; }
        .cat-E .cat-letter { background: var(--none); color: #fff; }
        .cat-name {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.2;
        }
        .cat-A .cat-name { color: #C0392B; }
        .cat-B .cat-name { color: #006661; }
        .cat-C .cat-name { color: #B7770D; }
        .cat-D .cat-name { color: #5B21B6; }
        .cat-E .cat-name { color: var(--none); }
        .cat-desc {
            font-size: 9.5px;
            color: var(--text3);
            margin-top: 1px;
            line-height: 1.3;
        }
        .cat-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 22px;
        }
        .cat-item-chip {
            background: rgba(255,255,255,0.75);
            border-radius: 7px;
            padding: 5px 8px;
            font-size: 10.5px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            animation: popIn 0.25s cubic-bezier(.4,0,.2,1);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0 } to { transform: scale(1); opacity: 1 } }
        .cat-item-chip .chip-num {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            flex-shrink: 0;
        }
        .cat-item-chip .chip-remove {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text3);
            font-size: 12px;
            line-height: 1;
            padding: 2px;
            flex-shrink: 0;
            transition: color 0.15s;
        }
        .cat-item-chip .chip-remove:hover { color: var(--neg); }
        .cat-item-chip.correct-chip { background: rgba(144,238,144,0.35); border-color: #4CAF50; }
        .cat-item-chip.wrong-chip { background: rgba(255,107,107,0.25); border-color: var(--neg); }
        .drop-hint {
            font-size: 10.5px;
            color: var(--text3);
            text-align: center;
            padding: 6px 0;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        /* ─── BOTONES ─── */
        .btn-row {
            display: flex;
            gap: 10px;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .btn {
            font-family: 'Syne', sans-serif;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 9px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--pos));
            color: #fff;
            box-shadow: 0 4px 14px rgba(0,191,255,0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0,191,255,0.45);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text2);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        /* ─── RESULT OVERLAY ─── */
        .result-overlay {
            position: absolute;
            inset: 0;
            background: rgba(13,27,42,0.88);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .result-overlay.open { display: flex; }
        .result-box {
            background: #fff;
            border-radius: var(--radius);
            width: 100%;
            max-width: 700px;
            max-height: 740px;
            overflow-y: auto;
            padding: 24px 28px;
        }
        .result-box::-webkit-scrollbar { width: 5px; }
        .result-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        .result-header {
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .result-emoji { font-size: 44px; margin-bottom: 8px; display: block; }
        .result-title {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 5px;
        }
        .result-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }
        .score-chips {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .score-chip {
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            text-align: center;
            min-width: 80px;
        }
        .sc-correct { background: #E8FFF0; border: 1.5px solid #4CAF50; color: #1B5E20; }
        .sc-wrong   { background: #FFF0F0; border: 1.5px solid var(--neg); color: #8B0000; }
        .sc-total   { background: #E8F4FF; border: 1.5px solid var(--accent); color: #004A7C; }
        .score-chip .sc-num {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            display: block;
        }
        .score-chip .sc-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; }
        .result-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
        .result-table th {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 8px 10px;
            background: #0D1B2A;
            color: #fff;
            text-align: left;
        }
        .result-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
        .result-table tr:hover td { background: var(--surface2); }
        .status-ok   { color: var(--pos); font-weight: 700; }
        .status-fail { color: var(--neg); font-weight: 700; }
        .explain-text { font-size: 11.5px; color: var(--text2); line-height: 1.5; }
        .feedback-congrats {
            background: linear-gradient(135deg, #E8FFF0, #E6FFFE);
            border: 1px solid #A5D6A7;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-top: 14px;
            font-size: 12.5px;
            color: #1B5E20;
            line-height: 1.65;
        }
        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #0D1B2A;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
            opacity: 0;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            pointer-events: none;
            white-space: nowrap;
            max-width: 90vw;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
        .fade-up { animation: fadeUp 0.5s ease both; }
    </style>
</head>
<body>
<div class="container" style="position:relative;">

    <!-- HEADER -->
    <div class="header fade-up">
        <div class="htag">📡 Microeconomía Aplicada</div>
        <h1>Clasificación de Externalidades</h1>
        <p class="header-sub">Arrastra y suelta cada artículo en la categoría de externalidad que le corresponda. ¡Un artículo puede pertenecer a más de una categoría!</p>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap fade-up">
        <span class="progress-label">📊 Artículos clasificados</span>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span class="progress-score" id="scoreLabel">0 / 7</span>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">

        <!-- IZQUIERDA: ARTÍCULOS -->
        <div class="left-col">
            <div class="section-title">✋ Artículos para clasificar</div>
            <div class="items-list" id="itemsGrid"></div>
        </div>

        <!-- DERECHA: CATEGORÍAS + BOTONES -->
        <div class="right-col">
            <div class="section-title">📂 Zonas de clasificación</div>
            <div class="cats-list" id="catsGrid"></div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnVerify" onclick="verify()">✅ Verificar Respuestas</button>
                <button class="btn btn-outline" id="btnReset" onclick="resetGame()">🔄 Reiniciar</button>
            </div>
        </div>
    </div>

    <!-- RESULT OVERLAY -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box" id="resultInner"></div>
    </div>
</div>

<div id="toast"></div>

<script>
    const ITEMS = [
        { id: 1, emoji: '✈️', text: 'Aviones que despegan del Aeropuerto La Guardia durante el torneo de tenis Abierto de Estados Unidos, que se lleva a cabo cerca de allí.', correct: ['A', 'C'] },
        { id: 2, emoji: '🌅', text: 'Una puesta de sol en el Océano Pacífico.', correct: ['E'] },
        { id: 3, emoji: '🎓', text: 'Un aumento del número de personas que estudian un posgrado.', correct: ['B', 'D'] },
        { id: 4, emoji: '🌸', text: 'Una persona que usa perfume al asistir a un concierto.', correct: ['A', 'D'] },
        { id: 5, emoji: '🌷', text: 'El dueño de una casa que planta un bonito jardín frente a su propiedad.', correct: ['B', 'D'] },
        { id: 6, emoji: '🚗', text: 'Una persona que conduce en estado de ebriedad.', correct: ['A', 'D'] },
        { id: 7, emoji: '🍞', text: 'Una panadería que hornea pan.', correct: ['B', 'C'] },
    ];
    const CATS = [
        { id: 'A', name: 'Externalidad Negativa', desc: 'Efecto perjudicial sobre terceros sin compensación.' },
        { id: 'B', name: 'Externalidad Positiva', desc: 'Beneficio para terceros sin que paguen por él.' },
        { id: 'C', name: 'Externalidad de Producción', desc: 'Surge durante el proceso de producción de bienes.' },
        { id: 'D', name: 'Externalidad de Consumo', desc: 'Surge durante el consumo de un bien o servicio.' },
        { id: 'E', name: 'Ninguna Externalidad', desc: 'No genera efectos externos sobre terceros.' },
    ];
    const EXPLAINS = {
        1: 'Los aviones generan ruido que perturba el torneo — efecto negativo externo de una actividad de producción (transporte aéreo).',
        2: 'Una puesta de sol es un fenómeno natural, no tiene relación con actividades económicas ni genera externalidades.',
        3: 'Más personas con posgrado elevan la productividad y el conocimiento social — externalidad positiva generada por el consumo del bien "educación".',
        4: 'El perfume puede molestar a quienes tienen alergias u olfato sensible — externalidad negativa por consumo de perfume.',
        5: 'El jardín embellece el vecindario y aumenta el valor de propiedades cercanas — externalidad positiva por el consumo del espacio doméstico.',
        6: 'Conducir ebrio pone en riesgo la vida de otros — externalidad negativa derivada del consumo de alcohol.',
        7: 'El aroma del pan recién horneado genera bienestar a quienes pasan cerca — externalidad positiva emanada del proceso de producción.',
    };

    let placements = {};
    CATS.forEach(c => { placements[c.id] = []; });
    let dragItemId = null, verified = false, placedCount = 0;

    function render() { renderItems(); renderCats(); updateProgress(); }

    function renderItems() {
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = '';
        ITEMS.forEach(item => {
            const placed = isItemPlaced(item.id);
            const div = document.createElement('div');
            div.className = 'drag-item' + (placed ? ' placed' : '');
            div.id = 'item-' + item.id;
            div.draggable = !placed && !verified;
            div.innerHTML = `
                <span class="drag-item-emoji">${item.emoji}</span>
                <div class="drag-item-num">Artículo ${item.id}</div>
                <div class="drag-item-text">${item.text}</div>
                ${placed ? renderItemBadges(item.id) : ''}
            `;
            if (!placed && !verified) {
                div.addEventListener('dragstart', e => {
                    dragItemId = item.id;
                    div.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', item.id);
                });
                div.addEventListener('dragend', () => div.classList.remove('dragging'));
            }
            grid.appendChild(div);
        });
    }

    function renderItemBadges(itemId) {
        const cats = getCatsForItem(itemId);
        if (!cats.length) return '';
        return '<div class="drag-item-badges">' + cats.map(c => `<span class="badge badge-${c}">${c}</span>`).join('') + '</div>';
    }
    function getCatsForItem(itemId) {
        return Object.entries(placements).filter(([, ids]) => ids.includes(itemId)).map(([catId]) => catId);
    }
    function isItemPlaced(itemId) {
        return Object.values(placements).some(ids => ids.includes(itemId));
    }

    function renderCats() {
        const grid = document.getElementById('catsGrid');
        grid.innerHTML = '';
        CATS.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'cat-zone cat-' + cat.id;
            div.id = 'cat-' + cat.id;
            const chipsHtml = placements[cat.id].map(itemId => {
                const item = ITEMS.find(i => i.id === itemId);
                let extraClass = '';
                if (verified) {
                    const itemCorrect = ITEMS.find(i => i.id === itemId).correct;
                    extraClass = itemCorrect.includes(cat.id) ? ' correct-chip' : ' wrong-chip';
                }
                return `<div class="cat-item-chip${extraClass}">
                    <span class="chip-num">${item.emoji} ${item.id}</span>
                    <span style="font-size:11px;color:var(--text2);flex:1">${item.text.substring(0, 55)}…</span>
                    ${!verified ? `<button class="chip-remove" onclick="removeFromCat('${cat.id}',${itemId})" title="Quitar">✕</button>` : ''}
                </div>`;
            }).join('');
            div.innerHTML = `
                <div class="cat-header">
                    <div class="cat-letter">${cat.id}</div>
                    <div>
                        <div class="cat-name">${cat.name}</div>
                        <div class="cat-desc">${cat.desc}</div>
                    </div>
                </div>
                <div class="cat-items" id="cat-items-${cat.id}">
                    ${chipsHtml || '<div class="drop-hint">⬇ Suelta aquí</div>'}
                </div>
            `;
            if (!verified) {
                div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
                div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
                div.addEventListener('drop', e => {
                    e.preventDefault();
                    div.classList.remove('drag-over');
                    const id = parseInt(e.dataTransfer.getData('text/plain'));
                    dropItem(id, cat.id);
                });
            }
            grid.appendChild(div);
        });
    }

    function dropItem(itemId, catId) {
        if (!itemId || verified) return;
        if (placements[catId].includes(itemId)) { showToast('⚠️ Este artículo ya está en esta categoría.'); return; }
        placements[catId].push(itemId);
        recalcPlaced(); render();
        showToast(`✅ Artículo ${itemId} → Categoría ${catId}`);
    }
    function removeFromCat(catId, itemId) {
        placements[catId] = placements[catId].filter(id => id !== itemId);
        recalcPlaced(); render();
        showToast(`↩️ Artículo ${itemId} removido de Categoría ${catId}`);
    }
    function recalcPlaced() {
        const placed = new Set();
        Object.values(placements).forEach(ids => ids.forEach(id => placed.add(id)));
        placedCount = placed.size;
        updateProgress();
    }
    function updateProgress() {
        const pct = Math.round((placedCount / ITEMS.length) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('scoreLabel').textContent = placedCount + ' / ' + ITEMS.length;
    }

    function verify() {
        if (placedCount < ITEMS.length) { showToast('⚠️ Clasifica todos los artículos antes de verificar.'); return; }
        verified = true; render();
        let correct = 0, wrong = 0;
        const rows = ITEMS.map(item => {
            const expected = item.correct;
            const userCats = getCatsForItem(item.id);
            const correctSelections = expected.filter(c => userCats.includes(c)).length;
            const wrongSelections = userCats.filter(c => !expected.includes(c)).length;
            const isOk = correctSelections === expected.length && wrongSelections === 0;
            if (isOk) correct++; else wrong++;
            return { item, expected, userCats, isOk };
        });
        const pct = Math.round((correct / ITEMS.length) * 100);
        let emoji, title;
        if (pct === 100)      { emoji = '🏆'; title = '¡Perfecto! ¡Clasificación impecable!'; }
        else if (pct >= 71)   { emoji = '🎉'; title = '¡Muy bien! Casi lo logras.'; }
        else if (pct >= 43)   { emoji = '📚'; title = 'Buen intento. Revisa la retroalimentación.'; }
        else                   { emoji = '💡'; title = 'Sigue practicando. ¡Tú puedes!'; }
        const tableRows = rows.map(r => `
            <tr>
                <td style="width:36px;text-align:center;font-size:16px">${r.item.emoji}</td>
                <td style="font-weight:500">${r.item.text.substring(0, 70)}…</td>
                <td>${r.userCats.map(c => `<span class="badge badge-${c}">${c}</span>`).join(' ')}</td>
                <td>${r.item.correct.map(c => `<span class="badge badge-${c}">${c}</span>`).join(' ')}</td>
                <td class="${r.isOk ? 'status-ok' : 'status-fail'}">${r.isOk ? '✅' : '❌'}</td>
            </tr>
            <tr>
                <td colspan="5" style="padding:3px 10px 10px;border-bottom:1px solid var(--border)">
                    <div class="explain-text">💬 ${EXPLAINS[r.item.id]}</div>
                </td>
            </tr>
        `).join('');
        const congrats = pct === 100 ? `<div class="feedback-congrats">🎉 <strong>¡Felicidades, ha completado con éxito el reto!</strong> Ha demostrado comprender cómo las externalidades afectan tanto a la producción como al consumo en distintos contextos económicos. Al clasificar correctamente cada artículo, confirmó que las actividades económicas y cotidianas pueden generar efectos positivos o negativos sobre terceros. ¡Siga aplicando este análisis y fortalecerá su comprensión de los mercados y las políticas públicas!</div>` : '';
        document.getElementById('resultInner').innerHTML = `
            <div class="result-header">
                <span class="result-emoji">${emoji}</span>
                <div class="result-title">${title}</div>
                <div class="result-sub">Has clasificado correctamente <strong>${correct} de ${ITEMS.length}</strong> artículos.</div>
                <div class="score-chips">
                    <div class="score-chip sc-correct"><span class="sc-num">${correct}</span><span class="sc-lbl">✅ Correctos</span></div>
                    <div class="score-chip sc-wrong"><span class="sc-num">${wrong}</span><span class="sc-lbl">❌ Incorrectos</span></div>
                    <div class="score-chip sc-total"><span class="sc-num">${pct}%</span><span class="sc-lbl">📊 Precisión</span></div>
                </div>
            </div>
            <table class="result-table">
                <thead><tr><th></th><th>Artículo</th><th>Tu respuesta</th><th>Respuesta correcta</th><th>Estado</th></tr></thead>
                <tbody>${tableRows}</tbody>
            </table>
            ${congrats}
            <div style="text-align:center;margin-top:16px">
                <button class="btn btn-outline" onclick="resetGame()">🔄 Intentar de nuevo</button>
            </div>
        `;
        document.getElementById('resultOverlay').classList.add('open');
        if (pct === 100) showToast('🏆 ¡Clasificación perfecta! ¡Excelente trabajo!', 4000);
        else showToast(`📊 Resultado: ${correct}/${ITEMS.length} correctos (${pct}%)`);
    }

    function resetGame() {
        CATS.forEach(c => { placements[c.id] = []; });
        dragItemId = null; verified = false; placedCount = 0;
        document.getElementById('resultOverlay').classList.remove('open');
        render();
        showToast('🔄 Juego reiniciado. ¡A clasificar!');
    }

    // ─── TOUCH SUPPORT ───
    let touchItem = null, touchClone = null, touchOffX = 0, touchOffY = 0;
    document.addEventListener('touchstart', e => {
        const el = e.target.closest('.drag-item');
        if (!el || el.classList.contains('placed') || verified) return;
        touchItem = parseInt(el.id.replace('item-', ''));
        const rect = el.getBoundingClientRect();
        touchOffX = e.touches[0].clientX - rect.left;
        touchOffY = e.touches[0].clientY - rect.top;
        touchClone = el.cloneNode(true);
        touchClone.style.cssText = `position:fixed;z-index:9998;pointer-events:none;width:${rect.width}px;opacity:0.85;box-shadow:var(--shadow-drag);left:${rect.left}px;top:${rect.top}px;transform:rotate(2deg)`;
        document.body.appendChild(touchClone);
    }, { passive: true });
    document.addEventListener('touchmove', e => {
        if (!touchClone) return;
        e.preventDefault();
        const x = e.touches[0].clientX - touchOffX;
        const y = e.touches[0].clientY - touchOffY;
        touchClone.style.left = x + 'px';
        touchClone.style.top = y + 'px';
        document.querySelectorAll('.cat-zone').forEach(z => z.classList.remove('drag-over'));
        const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        const zone = el && el.closest('.cat-zone');
        if (zone) zone.classList.add('drag-over');
    }, { passive: false });
    document.addEventListener('touchend', e => {
        if (!touchClone) return;
        document.querySelectorAll('.cat-zone').forEach(z => z.classList.remove('drag-over'));
        const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        const zone = el && el.closest('.cat-zone');
        if (zone && touchItem) { const catId = zone.id.replace('cat-', ''); dropItem(touchItem, catId); }
        touchClone.remove();
        touchClone = null; touchItem = null;
    });

    // ─── TOAST ───
    let toastTimer;
    function showToast(msg, dur = 2800) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), dur);
    }

    render();
</script>
</body>
</html>
