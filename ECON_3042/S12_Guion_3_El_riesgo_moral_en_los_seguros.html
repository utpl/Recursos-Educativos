


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S_X_Guion_X - El riesgo moral en los seguros</title>
    <style>
        :root {
            --bg-color: #F8F9FA;
            --main-blue: #00BFFF;
            --main-teal: #20B2AA;
            --main-green: #90EE90;
            --text-color: #2D3436;
            --white: #FFFFFF;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --glow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Contenedor Principal (Responsivo) */
        .infographic-canvas {
            width: 100%;
            max-width: 800px;
            height: 800px;
            background: var(--white);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Título Superior */
        .header {
            text-align: center;
            padding: 40px 20px;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-color);
        }
        .header span {
            display: block;
            font-size: 0.8rem;
            color: var(--main-blue);
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Nodo Central */
        .core-node {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: var(--white);
            border: 3px solid var(--main-blue);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: var(--glow);
            transition: 0.3s;
        }
        .core-node:hover { transform: translate(-50%, -50%) scale(1.05); }
        .core-node i { font-size: 2.5rem; margin-bottom: 10px; }
        .core-node p { font-size: 0.9rem; font-weight: bold; text-align: center; padding: 0 10px; }

        /* Satélites */
        .satellite {
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 4px solid rgba(0,0,0,0.05);
            transition: 0.3s;
            text-align: center;
            padding: 10px;
        }
        .satellite:hover { transform: scale(1.1); border-color: var(--main-teal); }
        .satellite span { font-size: 0.75rem; font-weight: 600; margin-top: 5px; }
        .satellite emoji { font-size: 1.5rem; }

        /* Posiciones Satélites (Layout Circular) */
        .sat-1 { top: 15%; left: 15%; border: 3px solid var(--main-blue); }
        .sat-2 { top: 15%; right: 15%; border: 3px solid var(--main-teal); }
        .sat-3 { top: 45%; left: 5%; border: 3px solid var(--main-green); }
        .sat-4 { top: 45%; right: 5%; border: 3px solid var(--main-blue); }
        .sat-5 { bottom: 15%; left: 40%;  border: 3px solid var(--main-teal); }



        
        /* Líneas de Conexión Estéticas (Sutiles) */
        .line {
            position: absolute;
            top: 45%;
            left: 50%;
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--main-blue), transparent);
            z-index: 1;
            opacity: 0.2;
        }

        /* Gamificación Inferior */
        .footer-game {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .badge {
            background: rgba(144, 238, 144, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #2D3436;
        }

        /* Modales */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--white);
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            cursor: pointer; font-size: 1.2rem;
        }
        .modal-header { color: var(--main-blue); font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .modal-body { font-size: 0.95rem; line-height: 1.6; color: #636e72; }

    </style>
</head>
<body>

<div class="infographic-canvas">
    <div class="header">

        <h1>El riesgo moral en los seguros</h1>
    </div>

    <div class="core-node" onclick="openModal('intro')">
        <p>🔍 Explore la Información</p>
    </div>

    <div class="satellite sat-1" onclick="openModal('sirve')">
        <p>🛡️</p>
        <span>¿Para qué sirve?</span>
    </div>

    <div class="satellite sat-2" onclick="openModal('problemas')">
        <p>📊</p>
        <span>Problemas de Información</span>
    </div>

    <div class="satellite sat-3" onclick="openModal('riesgo')">
        <p>⚖️</p>
        <span>Riesgo Moral</span>
    </div>

    <div class="satellite sat-4" onclick="openModal('seleccion')">
        <p>🎯</p>
        <span>Selección Adversa</span>
    </div>

    <div class="satellite sat-5" onclick="openModal('solucion')">
        <p>💡</p>
        <span>Solución: Deducible</span>
    </div>

    <div class="footer-game">
        <div class="badge">✅ ¡Bien hecho!</div>
        <div class="badge">⭐ ⭐ ⭐</div>
       
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div id="modalHeader" class="modal-header"></div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
    const content = {
        intro: {
            title: "💡 Introducción",
            body: "Explore y conozca los problemas de información que surgen al comprar un seguro y cómo las aseguradoras los gestionan de manera eficiente."
        },
        sirve: {
            title: "🛡️ ¿Para qué sirve un seguro?",
            body: "Las personas compran seguros para disminuir el riesgo de perder su patrimonio ante eventualidades, por ejemplo, adquieren seguros de salud, accidentes, muerte, etc."
        },
        problemas: {
            title: "📊 Problemas de Información",
            body: "Pueden surgir problemas de información entre el asegurado y la aseguradora, clasificados como: <b>el riesgo moral</b> y la <b>selección adversa</b>."
        },
        riesgo: {
            title: "⚖️ Riesgo Moral",
            body: "<b>Menos incentivos para cuidarse:</b> El primero surge cuando la persona asegurada tiene menores incentivos para ser cuidadosa y evitar un comportamiento arriesgado."
        },
        seleccion: {
            title: "🎯 Selección Adversa",
            body: "<b>Mayor riesgo, mayor propensión:</b> La selección adversa surge cuando las personas con mayor riesgo son más propensas a comprar un seguro, lo cual influye en mayores costos para la aseguradora."
        },
        solucion: {
            title: "💡 Solución: El Deducible",
            body: "Para reducir el riesgo moral las aseguradoras establecen un deducible, con lo que el asegurado paga también parte del gasto del incidente ocurrido.<br><br><i>Elaboración propia</i>"
        }
    };

    function openModal(id) {
        document.getElementById('modalHeader').innerHTML = content[id].title;
        document.getElementById('modalBody').innerHTML = content[id].body;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>

</body>
</html>
