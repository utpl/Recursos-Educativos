<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📐 Propiedades de Límites | Infografía Interactiva</title>
    <style>
        /* ========================================
           VARIABLES CSS - SISTEMA DE DISEÑO ACTUALIZADO
           ======================================== */
        :root {
            /* Paleta moderna con contraste WCAG AAA */
            --bg-app: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #000000; /* ⬅️ NEGRO PURO para máximo contraste */
            --text-secondary: #1a1a1a; /* ⬅️ Casi negro para subtítulos */
            --text-muted: #333333; /* ⬅️ Gris oscuro accesible */
            
            /* Colores distintivos por propiedad (accesibles) */
            --c1: #0284c7; --c1-light: #e0f2fe; --c1-dark: #0369a1;
            --c2: #15803d; --c2-light: #dcfce7; --c2-dark: #166534;
            --c3: #c2410c; --c3-light: #ffedd5; --c3-dark: #9a3412;
            --c4: #7e22ce; --c4-light: #f3e8ff; --c4-dark: #6b21a8;
            --c5: #be185d; --c5-light: #fce7f3; --c5-dark: #9d174d;
            --c6: #0f766e; --c6-light: #ccfbf1; --c6-dark: #115e59;
            --c7: #a16207; --c7-light: #fef08a; --c7-dark: #854d0e;
            --c8: #1d4ed8; --c8-light: #dbeafe; --c8-dark: #1e40af;
            --c9: #4338ca; --c9-light: #e0e7ff; --c9-dark: #3730a3;
            --c10: #e11d48; --c10-light: #ffe4e6; --c10-dark: #be123c;
            
            /* ⬅️ LÍNEAS DE CONEXIÓN MÁS OSCURAS Y VISIBLES */
            --line-color: #1e293b; /* Gris azulado oscuro */
            --line-color-active: #0f172a; /* Casi negro para activo */
            
            /* Sombras neumórficas suaves */
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.08);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.12);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.18);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.22);
            --shadow-glow: 0 0 0 4px rgba(2,132,199,0.20);
            
            /* Bordes y radios */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            
            /* Transiciones fluidas */
            --ease-std: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.2s var(--ease-std);
            --transition-std: all 0.3s var(--ease-std);
            --transition-slow: all 0.5s var(--ease-std);
            
            /* ⬅️ TIPOGRAFÍA AMPLIADA SEGÚN SOLICITUD */
            --text-xs: 10px;      /* Mínimo accesible */
            --text-sm: 12px;      /* ⬅️ Subtítulos y fórmulas */
            --text-base: 14px;    /* ⬅️ Texto principal en nodos */
            --text-md: 14px;      /* ⬅️ Contenido de modal */
            --text-lg: 15px;      /* Títulos secundarios */
            --text-xl: 16px;      /* ⬅️ Máximo para títulos principales */
        }

        /* ========================================
           RESET Y BASE
           ======================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-app);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 8px;
            color: var(--text-primary);
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========================================
           CONTENEDOR PRINCIPAL (800x800px)
           ======================================== */
        .infografia {
            width: 800px;
            height: 800px;
            background: linear-gradient(145deg, var(--bg-card) 0%, #f1f5f9 100%);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.08);
        }

        /* ========================================
           HEADER MINIMALISTA
           ======================================== */
        .header {
            padding: 12px 20px 10px;
            background: linear-gradient(135deg, rgba(2,132,199,0.12) 0%, rgba(21,128,61,0.12) 100%);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
            z-index: 30;
        }

        .header-title {
            font-size: var(--text-xl);
            font-weight: 800;
            color: var(--text-primary); /* ⬅️ NEGRO */
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.4px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .header-meta {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            flex-wrap: wrap;
            gap: 4px;
            font-weight: 500;
        }

        /* ========================================
           ÁREA RADIAL PRINCIPAL
           ======================================== */
        .main-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        /* SVG para líneas conectoras - ⬅️ COLOR MÁS OSCURO */
        .connections-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection-line {
            stroke: var(--line-color); /* ⬅️ Gris oscuro visible */
            stroke-width: 1.5;
            stroke-dasharray: 4 3;
            fill: none;
            transition: var(--transition-std);
            opacity: 0.85;
        }

        .connection-line.active {
            stroke: var(--line-color-active); /* ⬅️ Casi negro cuando activo */
            stroke-width: 2.5;
            stroke-dasharray: none;
            opacity: 1;
            filter: drop-shadow(0 0 4px rgba(15,23,42,0.5));
        }

        /* ⬅️ NODO CENTRAL MÁS GRANDE (145px) */
        .central-node {
            position: absolute;
            width: 145px; /* ⬅️ Aumentado de 115px */
            height: 145px; /* ⬅️ Aumentado de 115px */
            background: linear-gradient(135deg, var(--c1) 0%, var(--c1-dark) 100%);
            border-radius: var(--radius-full);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 12;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            cursor: default;
            transition: var(--transition-std);
            border: 4px solid rgba(255,255,255,0.25);
            padding: 8px;
            text-align: center;
        }

        .central-node:hover {
            transform: scale(1.08);
            box-shadow: var(--shadow-xl), 0 0 0 8px rgba(2,132,199,0.30);
        }

        .central-node .icon {
            font-size: 36px; /* ⬅️ Icono más grande */
            margin-bottom: 4px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
        }

        .central-node .label {
            font-size: var(--text-base); /* ⬅️ 14px */
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
            letter-spacing: -0.3px;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .central-node .subtitle {
            font-size: var(--text-sm); /* ⬅️ 12px */
            opacity: 0.95;
            margin-top: 4px;
            font-weight: 600;
            color: #f0f9ff;
        }

        /* ========================================
           NODOS PERIFÉRICOS INTERACTIVOS
           ======================================== */
        .property-node {
            position: absolute;
            width: 105px; /* ⬅️ Ligeramente más ancho para texto 14px */
            height: 105px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            cursor: pointer;
            z-index: 8;
            box-shadow: var(--shadow-md);
            transition: var(--transition-std);
            border: 2px solid transparent;
            text-align: center;
            will-change: transform;
        }

        .property-node::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-md);
            padding: 2px;
            background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3), var(--c4), var(--c5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: var(--transition-fast);
            pointer-events: none;
        }

        .property-node:hover::before,
        .property-node:focus::before {
            opacity: 1;
        }

        .property-node:hover {
            transform: translateY(-6px) scale(1.06);
            box-shadow: var(--shadow-lg);
            z-index: 18;
        }

        .property-node:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(2,132,199,0.35), var(--shadow-lg);
            z-index: 18;
        }

        .property-node.active {
            border-color: var(--c1);
            box-shadow: 0 0 0 3px rgba(2,132,199,0.25), var(--shadow-lg);
            transform: scale(1.08);
            z-index: 20;
        }

        .property-node .node-icon {
            font-size: 24px; /* ⬅️ Icono más grande */
            margin-bottom: 4px;
            line-height: 1;
        }

        /* ⬅️ TEXTO PRINCIPAL EN 14px NEGRO */
        .property-node .node-name {
            font-size: var(--text-base); /* ⬅️ 14px */
            font-weight: 800;
            color: var(--text-primary); /* ⬅️ NEGRO PURO */
            line-height: 1.15;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: -0.2px;
        }

        /* ⬅️ FÓRMULA: NEGRO 10px SEGÚN SOLICITUD */
        .property-node .node-formula {
            font-size: 10px; /* ⬅️ EXACTAMENTE 10px */
            font-family: 'Courier New', monospace;
            color: #000000; /* ⬅️ NEGRO PURO */
            margin-top: 3px;
            background: rgba(0,0,0,0.06);
            padding: 3px 8px;
            border-radius: 6px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Colores distintivos por nodo (gradientes sutiles) */
        .property-node[data-color="1"] { background: linear-gradient(135deg, #fff 0%, var(--c1-light) 100%); border-top: 3px solid var(--c1); }
        .property-node[data-color="2"] { background: linear-gradient(135deg, #fff 0%, var(--c2-light) 100%); border-top: 3px solid var(--c2); }
        .property-node[data-color="3"] { background: linear-gradient(135deg, #fff 0%, var(--c3-light) 100%); border-top: 3px solid var(--c3); }
        .property-node[data-color="4"] { background: linear-gradient(135deg, #fff 0%, var(--c4-light) 100%); border-top: 3px solid var(--c4); }
        .property-node[data-color="5"] { background: linear-gradient(135deg, #fff 0%, var(--c5-light) 100%); border-top: 3px solid var(--c5); }
        .property-node[data-color="6"] { background: linear-gradient(135deg, #fff 0%, var(--c6-light) 100%); border-top: 3px solid var(--c6); }
        .property-node[data-color="7"] { background: linear-gradient(135deg, #fff 0%, var(--c7-light) 100%); border-top: 3px solid var(--c7); }
        .property-node[data-color="8"] { background: linear-gradient(135deg, #fff 0%, var(--c8-light) 100%); border-top: 3px solid var(--c8); }
        .property-node[data-color="9"] { background: linear-gradient(135deg, #fff 0%, var(--c9-light) 100%); border-top: 3px solid var(--c9); }
        .property-node[data-color="10"] { background: linear-gradient(135deg, #fff 0%, var(--c10-light) 100%); border-top: 3px solid var(--c10); }

        /* ========================================
           TOOLTIP FLOTANTE
           ======================================== */
        .tooltip {
            position: absolute;
            background: var(--text-primary);
            color: white;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: var(--text-sm); /* 12px */
            max-width: 220px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transform: translateY(8px) scale(0.98);
            transition: var(--transition-fast);
            box-shadow: var(--shadow-lg);
            font-weight: 600;
            line-height: 1.35;
            text-align: center;
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .tooltip::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: var(--text-primary);
        }

        /* ========================================
           MODAL DE DETALLE PREMIUM - ⬅️ TEXTO 12px
           ======================================== */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.72); /* ⬅️ Más oscuro para mejor contraste */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-std);
            backdrop-filter: blur(6px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            width: 94%;
            max-width: 450px;
            max-height: 90%;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            padding: 24px 26px;
            position: relative;
            animation: modalSlide 0.35s var(--ease-std);
            border: 1px solid rgba(0,0,0,0.12);
        }

        @keyframes modalSlide {
            from { 
                opacity: 0; 
                transform: translateY(25px) scale(0.97); 
                filter: blur(4px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
                filter: blur(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: #f1f5f9;
            border: none;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: var(--transition-fast);
            font-weight: 300;
            z-index: 5;
        }

        .modal-close:hover {
            background: var(--text-primary);
            color: white;
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: var(--text-xl); /* 16px máximo */
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 34px;
            color: var(--text-primary); /* ⬅️ NEGRO */
            letter-spacing: -0.4px;
        }

        .modal-formula {
            background: linear-gradient(135deg, rgba(2,132,199,0.15) 0%, rgba(21,128,61,0.15) 100%);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            font-family: 'Courier New', monospace;
            font-size: var(--text-sm); /* ⬅️ 12px */
            text-align: center;
            margin: 16px 0;
            font-weight: 700;
            color: #000000; /* ⬅️ NEGRO */
            border: 1px solid rgba(2,132,199,0.30);
            letter-spacing: -0.4px;
            line-height: 1.5;
        }

        .modal-section {
            margin: 18px 0;
        }

        .modal-section-title {
            font-size: var(--text-xs); /* 10px */
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-section-title::before {
            content: '';
            width: 18px;
            height: 2px;
            background: var(--c1);
            border-radius: 2px;
        }

        /* ⬅️ TEXTO DEL MODAL EN 12px SEGÚN SOLICITUD */
        .modal-section-content {
            font-size: 12px; /* ⬅️ EXACTAMENTE 12px */
            line-height: 1.6;
            color: var(--text-primary); /* ⬅️ NEGRO */
            font-weight: 500;
        }

        .modal-example {
            background: linear-gradient(135deg, rgba(194,65,12,0.10) 0%, rgba(161,98,7,0.10) 100%);
            border-left: 4px solid var(--c3);
            padding: 12px 16px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-family: 'Courier New', monospace;
            font-size: 12px; /* ⬅️ 12px */
            margin: 12px 0;
            color: #000000; /* ⬅️ NEGRO */
            font-weight: 700;
        }

        .modal-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0,0,0,0.10);
            font-size: var(--text-xs); /* 10px */
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 7px;
            font-weight: 600;
        }

        /* ========================================
           INDICADOR DE PROGRESO CIRCULAR
           ======================================== */
        .progress-ring {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 25;
            background: rgba(255,255,255,0.92);
            padding: 7px 14px;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.08);
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: var(--radius-full);
            background: rgba(51,51,51,0.35);
            transition: var(--transition-fast);
            position: relative;
        }

        .progress-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: var(--radius-full);
            background: currentColor;
            opacity: 0;
            transition: var(--transition-fast);
        }

        .progress-dot.active {
            background: var(--c1);
            transform: scale(1.3);
            box-shadow: 0 0 0 2px rgba(2,132,199,0.35);
        }

        .progress-dot.explored {
            background: var(--c2);
        }

        .progress-dot:hover {
            transform: scale(1.2);
        }

        /* ========================================
           INSTRUCCIÓN FLOTANTE CON PULSO
           ======================================== */
        .floating-instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm); /* 12px */
            font-weight: 700;
            color: var(--text-primary); /* ⬅️ NEGRO */
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 7px;
            z-index: 25;
            animation: pulse 2.5s infinite;
            border: 1px solid rgba(0,0,0,0.08);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: var(--shadow-md); }
            50% { box-shadow: 0 0 0 6px rgba(2,132,199,0.22); }
        }

        /* ========================================
           REFERENCIAS COMPACTAS
           ======================================== */
        .references {
            position: absolute;
            bottom: 12px;
            left: 20px;
            right: 20px;
            font-size: var(--text-xs); /* 10px */
            color: var(--text-muted);
            z-index: 25;
            background: rgba(255,255,255,0.95);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0,0,0,0.08);
            line-height: 1.4;
            font-weight: 500;
        }

        .references strong { 
            color: var(--text-primary); /* ⬅️ NEGRO */
            font-weight: 700;
        }

        /* ========================================
           ANIMACIONES DE ENTRADA
           ======================================== */
        @keyframes nodeFloatIn {
            from { 
                opacity: 0; 
                transform: scale(0.7) translateY(35px); 
                filter: blur(4px);
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
                filter: blur(0);
            }
        }

        .property-node {
            animation: nodeFloatIn 0.55s var(--ease-std) forwards;
            animation-delay: calc(var(--delay, 0) * 0.08s);
        }

        @keyframes centralPulse {
            0%, 100% { box-shadow: var(--shadow-lg), var(--shadow-glow); }
            50% { box-shadow: var(--shadow-xl), 0 0 0 9px rgba(2,132,199,0.30); }
        }

        .central-node {
            animation: centralPulse 3.5s ease-in-out infinite;
        }

        /* ========================================
           SCROLLBAR PERSONALIZADO
           ======================================== */
        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-track { background: transparent; border-radius: var(--radius-full); }
        .modal::-webkit-scrollbar-thumb { 
            background: var(--text-muted); 
            border-radius: var(--radius-full); 
            opacity: 0.5;
            transition: var(--transition-fast);
        }
        .modal::-webkit-scrollbar-thumb:hover { opacity: 0.8; }

        /* ========================================
           📱 RESPONSIVE: MÓVIL < 820px - ⬅️ CORREGIDO
           ======================================== */
        @media (max-width: 820px) {
            .infografia {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
                max-height: 100%;
            }
            
            /* Layout vertical optimizado para móvil */
            .main-area {
                flex-direction: column;
                padding: 12px 15px 25px;
                overflow-y: auto;
                align-items: center;
                gap: 18px;
            }
            
            .connections-svg { display: none; }
            
            /* ⬅️ Nodo central más grande también en móvil */
            .central-node {
                position: relative;
                margin: 10px 0 20px;
                width: 155px; /* ⬅️ Aún más grande en móvil */
                height: 155px;
                left: auto !important;
                top: auto !important;
                transform: none !important;
            }
            
            .central-node .icon { font-size: 40px; }
            .central-node .label { font-size: 15px; }
            .central-node .subtitle { font-size: 12px; }
            
            /* ⬅️ Nodos como tarjetas horizontales en móvil */
            .property-node {
                position: relative !important;
                width: 100%;
                max-width: 360px;
                height: auto;
                min-height: 82px;
                margin: 5px 0;
                flex-direction: row;
                justify-content: flex-start;
                padding: 14px 20px;
                text-align: left;
                left: auto !important;
                top: auto !important;
                transform: none !important;
                border-radius: var(--radius-md);
            }
            
            .property-node::before { display: none; }
            
            .property-node .node-icon { 
                margin: 0 16px 0 0; 
                font-size: 26px;
                min-width: 26px;
                display: flex;
                align-items: center;
            }
            
            .property-node .node-content {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }
            
            /* ⬅️ Mantener 14px negro en móvil */
            .property-node .node-name { 
                font-size: 14px; /* ⬅️ 14px en móvil también */
                font-weight: 800;
                color: #000000;
                line-height: 1.2;
            }
            
           
.property-node .node-formula {
    font-size: 8px;              /* ⬅️ REDUCIDO de 10px a 8px */
    font-family: 'Courier New', monospace;
    color: #000000;
    margin-top: 2px;
    background: rgba(0,0,0,0.05);
    padding: 2px 6px;            /* ⬅️ Padding reducido */

    max-width: 100%;

}

/* ⬅️ NUEVO: Permitir salto de línea en fórmulas muy largas (opcional) */
.property-node .node-formula.allow-wrap {
    white-space: normal;         /* Permite wrapping */
    word-break: break-word;      /* Rompe palabras largas */
    overflow-wrap: break-word;   /* Fallback moderno */
    line-height: 1.05;
    text-align: center;
}
            
            .floating-instruction {
                position: relative;
                top: auto;
                right: auto;
                margin: 8px auto 0;

            .progress-ring {
                position: relative;

            .references {
                position: relative;
                bottom: auto;
                left: auto;
                right: auto;
                margin: 0 20px 20px;
                text-align: center;
                font-size: 10px;
            }
            
            /* ⬅️ Modal optimizado para móvil con texto 12px */
            .modal {
                width: 96%;
                max-width: 380px;
                padding: 22px 24px;
                margin: 10px;
            }
            
            .modal-title { font-size: 16px; padding-right: 36px; }
            .modal-formula { font-size: 12px; padding: 14px 18px; }
            .modal-section-content { font-size: 12px; line-height: 1.65; }
            .modal-example { font-size: 12px; padding: 11px 14px; }
            .modal-footer { font-size: 10px; }
            
            /* Ajustar tooltip para móvil */
            .tooltip {
                font-size: 12px;
                max-width: 240px;
                padding: 11px 15px;

        }

        /* ========================================
           ACCESIBILIDAD: FOCUS VISIBLE
           ======================================== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus visible para navegación por teclado */
        .property-node:focus-visible,
        .modal-close:focus-visible {
            outline: 3px solid var(--c1);
            outline-offset: 2px;
        }

        /* ========================================
           UTILIDADES DE ACCESIBILIDAD
           ======================================== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

<body>
<div class="infografia" role="application" aria-label="Infografía interactiva: Propiedades de Límites - Dashboard radial educativo">
    
    <!-- Header minimalista con jerarquía visual -->
    <header class="header">
        <h1 class="header-title">📐 Propiedades de Límites</h1>
     
    </header>

    <!-- Área principal con layout radial interactivo -->
    <main class="main-area" id="mainArea">
        <!-- SVG para líneas conectoras animadas (accesibilidad: aria-hidden) -->
        <svg class="connections-svg" id="connectionsSvg" aria-hidden="true"></svg>
        
        <!-- ⬅️ Nodo central MÁS GRANDE: hub de navegación -->
        <div class="central-node" aria-label="Núcleo conceptual: Cálculo de límites - 10 propiedades disponibles">
            <span class="icon" aria-hidden="true">∞</span>
            <span class="label">LÍMITES</span>
            <span class="subtitle">10 propiedades</span>
        </div>

        <!-- Contenedor para nodos de propiedades (generados dinámicamente) -->
        <div id="nodesContainer" aria-live="polite"></div>

        <!-- Tooltip flotante para micro-interacciones -->
        <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true"></div>

        <!-- Instrucción flotante con animación de pulso -->
        <div class="floating-instruction" aria-hidden="true">
            <span>👆</span> Explora: toca una propiedad
        </div>

        <!-- Indicador de progreso circular -->
        <div class="progress-ring" id="progressIndicator" role="status" aria-label="Progreso de exploración: 0 de 10 propiedades visitadas"></div>

        <!-- Referencias académicas compactas -->
        <div class="references">
            <strong>Refs:</strong> Cuenca et al. (2020) • Khan Academy • Stewart Calculus
        </div>
    </main>

    <!-- Modal de detalle con animación de entrada -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modalTitle">
        <div class="modal">
            <button class="modal-close" id="modalClose" aria-label="Cerrar panel de detalle">×</button>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-formula" id="modalFormula" aria-label="Fórmula matemática"></div>
            <div id="modalContent" aria-live="polite"></div>
            <div class="modal-footer">
                <span aria-hidden="true">💡</span> 
                <span>Navegación: ← → entre propiedades • ESC para cerrar</span>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * ========================================
     * DATOS EDUCATIVOS - PROPIEDADES DE LÍMITES
     * Estructura optimizada para dashboard radial
     * ========================================
     */
    const properties = [
        {
            id: 1, name: "Constante", icon: "🔢",
            formula: "limₓ→ₐ c = c",
            desc: "El límite de una constante es la misma constante.",
            allows: "Evaluar límites de números fijos directamente sin cálculos.",
            example: "limₓ→₂ 5 = 5 • limₓ→₋₁ 10 = 10",
            detail: "Si f(x)=c para todo x en un entorno de a, entonces al acercarse x a a, el valor de f(x) permanece constante. Esta propiedad es la base para evaluar términos independientes."
        },
        {
            id: 2, name: "Identidad", icon: "📌",
            formula: "limₓ→ₐ x = a",
            desc: "El límite de la función identidad es el valor al que tiende x.",
            allows: "Base para sustitución directa en funciones continuas.",
            example: "limₓ→₃ x = 3 • limₓ→₋₂ x = -2",
            detail: "La función f(x)=x es continua en todo ℝ. Su gráfica es una recta diagonal, por lo que el límite coincide exactamente con la evaluación en el punto."
        },
        {
            id: 3, name: "Constante × Función", icon: "✖️",
            formula: "limₓ→ₐ [k·f(x)] = k·limₓ→ₐ f(x)",
            desc: "Una constante multiplicativa puede extraerse del límite.",
            allows: "Sacar constantes fuera del límite para simplificar cálculos algebraicos.",
            example: "limₓ→₁ 4x = 4·limₓ→₁ x = 4·1 = 4",
            detail: "Válida cuando k∈ℝ y el límite de f existe. Esta propiedad permite factorizar coeficientes numéricos antes de evaluar el límite de la función variable."
        },
        {
            id: 4, name: "Suma/Resta", icon: "➕",
            formula: "lim [f±g] = lim f ± lim g",
            desc: "El límite de una suma/resta es la suma/resta de los límites.",
            allows: "Separar expresiones complejas en partes simples para evaluar individualmente.",
            example: "limₓ→₂ (x²+3x) = lim x² + lim 3x = 4 + 6 = 10",
            detail: "Requiere que ambos límites individuales existan. Fundamental para descomponer polinomios y expresiones algebraicas complejas en términos manejables."
        },
        {
            id: 5, name: "Producto", icon: "📦",
            formula: "lim [f·g] = (lim f)·(lim g)",
            desc: "El límite de un producto es el producto de los límites.",
            allows: "Multiplicar límites de factores independientemente antes de combinar resultados.",
            example: "limₓ→₂ x(x+1) = (lim x)·(lim x+1) = 2·3 = 6",
            detail: "Permite calcular límites de productos factorizando funciones más simples. Esencial para evaluar límites de funciones polinómicas factorizadas."
        },
        {
            id: 6, name: "Cociente", icon: "➗",
            formula: "lim [f/g] = (lim f)/(lim g), si lim g ≠ 0",
            desc: "El límite de un cociente es el cociente de los límites (denominador ≠ 0).",
            allows: "Dividir límites cuando el denominador no se anula en el punto de evaluación.",
            example: "limₓ→₂ x²/(x+1) = 4/3 • limₓ→₁ (2x)/(x+3) = 2/4 = 0.5",
            detail: "Crítico para funciones racionales. Si lim g=0, se requiere análisis adicional (factorización, racionalización o regla de L'Hôpital)."
        },
        {
            id: 7, name: "Potencias", icon: "⬆️",
            formula: "lim [f(x)]ⁿ = [lim f(x)]ⁿ",
            desc: "El límite de una potencia es la potencia del límite.",
            allows: "Elevar al exponente después de calcular el límite base, simplificando operaciones.",
            example: "limₓ→₂ (x+1)² = [lim(x+1)]² = 3² = 9",
            detail: "Válida para n∈ℕ. Se extiende a exponentes reales cuando f es continua y positiva en un entorno del punto. Fundamental para funciones exponenciales."
        },
        {
            id: 8, name: "Raíces", icon: "√",
            formula: "lim ⁿ√f = ⁿ√(lim f) [si está definida]",
            desc: "El límite de una raíz es la raíz del límite.",
            allows: "Pasar el límite dentro de expresiones radicales para evaluar el radicando primero.",
            example: "limₓ→₉ √x = √(lim x) = √9 = 3 • limₓ→₈ ³√x = 2",
            detail: "Para raíces pares, el radicando debe ser ≥0 en un entorno del punto. Para raíces impares, válido para todo ℝ. Esencial en funciones algebraicas."
        },
        {
            id: 9, name: "Polinomios", icon: "📈",
            formula: "limₓ→ₐ p(x) = p(a)",
            desc: "El límite de un polinomio es su evaluación directa en el punto.",
            allows: "Sustitución directa sin cálculos adicionales ni factorizaciones complejas.",
            example: "limₓ→₂ (x²−1) = 2²−1 = 3 • limₓ→₋₁ (x³+2x) = -1-2 = -3",
            detail: "Los polinomios son funciones continuas en todo ℝ, garantizando que el límite coincida con la evaluación. Propiedad fundamental para cálculo diferencial."
        },
        {
            id: 10, name: "Racionales", icon: "🧮",
            formula: "lim p/q = p(a)/q(a), si q(a)≠0",
            desc: "Límite de función racional = evaluación directa si denominador ≠ 0.",
            allows: "Sustitución directa en fracciones algebraicas válidas sin simplificaciones previas.",
            example: "limₓ→₂ (x²+1)/(x+3) = 5/5 = 1 • limₓ→₀ (3x+2)/(x-1) = 2/-1 = -2",
            detail: "Las funciones racionales son continuas en todos los puntos donde el denominador no se anula. Si q(a)=0, requiere análisis de indeterminaciones."
        }
    ];

    /**
     * ========================================
     * CONFIGURACIÓN DEL LAYOUT RADIAL
     * ========================================
     */
    const centerX = 400, centerY = 400; // Centro del contenedor 800x800
    const radius = 250; // ⬅️ Ajustado para nodo central más grande
    const nodeRadius = 52; // ⬅️ Radio visual ajustado para nodos más grandes

    /**
     * ========================================
     * ESTADO DE LA APLICACIÓN
     * ========================================
     */
    const state = {
        explored: new Set(), // Propiedades ya visitadas
        currentIndex: -1,    // Índice de propiedad activa en modal
        isMobile: window.innerWidth <= 820
    };

    /**
     * ========================================
     * REFERENCIAS DOM
     * ========================================
     */
    const els = {
        nodesContainer: document.getElementById('nodesContainer'),
        connectionsSvg: document.getElementById('connectionsSvg'),
        tooltip: document.getElementById('tooltip'),
        modalOverlay: document.getElementById('modalOverlay'),
        modalClose: document.getElementById('modalClose'),
        progressIndicator: document.getElementById('progressIndicator'),
        mainArea: document.getElementById('mainArea')
    };

    /**
     * ========================================
     * RENDERIZADO DEL LAYOUT RADIAL
     * ========================================
     */
    function renderRadialLayout() {
        // Generar nodos periféricos con posición circular
        properties.forEach((prop, i) => {
            // Calcular posición angular (36° entre nodos, comenzando en la parte superior)
            const angleRad = (i * 36 - 90) * Math.PI / 180;
            const x = centerX + radius * Math.cos(angleRad) - nodeRadius;
            const y = centerY + radius * Math.sin(angleRad) - nodeRadius;
            
            // Crear elemento nodo
            const node = document.createElement('div');
            node.className = 'property-node';
            node.setAttribute('data-color', prop.id);
            node.setAttribute('data-index', i);
            node.setAttribute('role', 'button');
            node.setAttribute('tabindex', '0');
            node.setAttribute('aria-label', `Propiedad ${prop.id}: ${prop.name}. ${prop.desc}`);
            node.style.cssText = `left:${Math.round(x)}px;top:${Math.round(y)}px;--delay:${i}`;
            
            // Contenido del nodo con jerarquía visual - ⬅️ Estructura mejorada para móvil
            node.innerHTML = `
                <span class="node-icon" aria-hidden="true">${prop.icon}</span>
                <div class="node-content">
                    <span class="node-name">${prop.name}</span>
                    <span class="node-formula">${prop.formula}</span>
                </div>
            `;
            
            // Eventos de interacción
            node.addEventListener('click', () => openModal(i));
            node.addEventListener('mouseenter', (e) => showTooltip(e, prop));
            node.addEventListener('mouseleave', hideTooltip);
            node.addEventListener('focus', (e) => showTooltip(e, prop));
            node.addEventListener('blur', hideTooltip);
            node.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openModal(i);
                }
            });
            
            els.nodesContainer.appendChild(node);
            
            // Dibujar línea de conexión SVG desde centro al nodo
            drawConnection(centerX, centerY, x + nodeRadius, y + nodeRadius, i);
        });
        
        // Generar indicadores de progreso
        properties.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'progress-dot';
            dot.setAttribute('data-index', i);
            dot.setAttribute('aria-label', `Propiedad ${i+1}: ${properties[i].name}`);
            els.progressIndicator.appendChild(dot);
        });
        
        // Actualizar estado inicial del progreso
        updateProgressIndicator();
    }

    /**
     * ========================================
     * DIBUJAR LÍNEAS CONECTORAS SVG - ⬅️ COLOR OSCURO
     * ========================================
     */
    function drawConnection(x1, y1, x2, y2, index) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('class', 'connection-line');
        line.setAttribute('data-index', index);
        els.connectionsSvg.appendChild(line);
    }

    /**
     * ========================================
     * TOOLTIP: MICRO-INTERACCIÓN FLOTANTE
     * ========================================
     */
    function showTooltip(e, prop) {
        // Calcular posición relativa al contenedor principal
        const nodeRect = e.currentTarget.getBoundingClientRect();
        const containerRect = document.querySelector('.infografia').getBoundingClientRect();
        
        // Contenido del tooltip
        els.tooltip.textContent = prop.desc;
        els.tooltip.style.left = `${nodeRect.left + nodeRect.width/2 - containerRect.left}px`;
        els.tooltip.style.top = `${nodeRect.top - containerRect.top - 12}px`;
        els.tooltip.setAttribute('aria-hidden', 'false');
        els.tooltip.classList.add('visible');
    }

    function hideTooltip() {
        els.tooltip.classList.remove('visible');
        els.tooltip.setAttribute('aria-hidden', 'true');
    }

    /**
     * ========================================
     * MODAL: PANEL DE DETALLE PREMIUM - ⬅️ TEXTO 12px
     * ========================================
     */
    function openModal(index) {
        const prop = properties[index];
        state.currentIndex = index;
        state.explored.add(index);
        
        // Actualizar UI: progreso y conexiones
        updateProgressIndicator();
        updateConnectionHighlight(index);
        
        // Poblar contenido del modal con jerarquía visual
        document.getElementById('modalTitle').innerHTML = `<span aria-hidden="true">${prop.icon}</span> ${prop.name}`;
        document.getElementById('modalFormula').textContent = prop.formula;
        document.getElementById('modalContent').innerHTML = `
            <section class="modal-section">
                <h3 class="modal-section-title">Aplicación</h3>
                <p class="modal-section-content">${prop.allows}</p>
            </section>
            <section class="modal-section">
                <h3 class="modal-section-title">Ejemplo práctico</h3>
                <div class="modal-example" aria-label="Ejemplo numérico">${prop.example}</div>
            </section>
            <section class="modal-section">
                <h3 class="modal-section-title">Fundamento teórico</h3>
                <p class="modal-section-content">${prop.detail}</p>
            </section>
            <section class="modal-section">
                <h3 class="modal-section-title">Condición de validez</h3>
                <p class="modal-section-content" style="font-style:italic;color:var(--text-muted)">
                    ${prop.id === 6 ? 'Denominador no nulo en el punto de evaluación' : 
                      prop.id === 8 ? 'Radicando no negativo para raíces pares' : 
                      'Límites individuales deben existir'}
                </p>
            </section>
        `;
        
        // Mostrar modal con animación
        els.modalOverlay.classList.add('active');
        els.modalOverlay.setAttribute('aria-hidden', 'false');
        els.modalClose.focus();
        
        // Anunciar cambio a lectores de pantalla
        const announcement = document.createElement('div');
        announcement.setAttribute('aria-live', 'assertive');
        announcement.className = 'sr-only';
        announcement.textContent = `Panel abierto: ${prop.name}. Fórmula: ${prop.formula}`;
        document.body.appendChild(announcement);
        setTimeout(() => announcement.remove(), 1000);
    }

    function closeModal() {
        els.modalOverlay.classList.remove('active');
        els.modalOverlay.setAttribute('aria-hidden', 'true');
        updateConnectionHighlight(-1);
        // Retornar foco al nodo activo si existe
        if (state.currentIndex >= 0) {
            const activeNode = document.querySelector(`.property-node[data-index="${state.currentIndex}"]`);
            if (activeNode) activeNode.focus();
        }
    }

    /**
     * ========================================
     * ACTUALIZAR CONEXIONES VISUALES
     * ========================================
     */
    function updateConnectionHighlight(index) {
        // Resaltar línea SVG conectada al nodo activo
        document.querySelectorAll('.connection-line').forEach(line => {
            line.classList.toggle('active', parseInt(line.dataset.index) === index);
        });
        // Resaltar nodo activo
        document.querySelectorAll('.property-node').forEach(node => {
            node.classList.toggle('active', parseInt(node.dataset.index) === index);
        });
    }

    /**
     * ========================================
     * INDICADOR DE PROGRESO CIRCULAR
     * ========================================
     */
    function updateProgressIndicator() {
        const total = properties.length;
        const exploredCount = state.explored.size;
        
        // Actualizar atributo aria para accesibilidad
        els.progressIndicator.setAttribute('aria-label', 
            `Progreso: ${exploredCount} de ${total} propiedades exploradas`);
        
        // Actualizar estado visual de cada dot
        document.querySelectorAll('.progress-dot').forEach((dot, i) => {
            dot.classList.toggle('explored', state.explored.has(i));
            dot.classList.toggle('active', i === state.currentIndex);
        });
    }

    /**
     * ========================================
     * NAVEGACIÓN CON TECLADO
     * ========================================
     */
    function navigateProperties(direction) {
        if (state.currentIndex < 0 || state.currentIndex === null) return;
        
        // Navegación circular entre propiedades
        let newIndex = state.currentIndex + direction;
        if (newIndex < 0) newIndex = properties.length - 1;
        if (newIndex >= properties.length) newIndex = 0;
        
        openModal(newIndex);
    }

    /**
     * ========================================
     * EVENTOS GLOBALES Y ACCESIBILIDAD
     * ========================================
     */
    function setupGlobalEvents() {
        // Cerrar modal con botón
        els.modalClose.addEventListener('click', closeModal);
        
        // Cerrar modal al hacer clic fuera del contenido
        els.modalOverlay.addEventListener('click', (e) => {
            if (e.target === els.modalOverlay) closeModal();
        });
        
        // Navegación por teclado en modal
        document.addEventListener('keydown', (e) => {
            if (!els.modalOverlay.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                e.preventDefault();
                closeModal();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                navigateProperties(-1);
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                navigateProperties(1);
            }
        });
        
        // Detección de móvil para layout responsivo
        window.addEventListener('resize', () => {
            const wasMobile = state.isMobile;
            state.isMobile = window.innerWidth <= 820;
            
            // Si cambia el estado móvil, forzar reflow para aplicar estilos
            if (wasMobile !== state.isMobile) {
                document.body.style.display = 'none';
                void document.body.offsetHeight; // Forzar reflow
                document.body.style.display = '';
            }
        });
    }

    /**
     * ========================================
     * INICIALIZACIÓN DE LA APLICACIÓN
     * ========================================
     */
    function init() {
        // Renderizar layout radial
        renderRadialLayout();
        
        // Configurar eventos globales
        setupGlobalEvents();
        
        // Animación secuencial de entrada de nodos
        setTimeout(() => {
            document.querySelectorAll('.property-node').forEach((node, i) => {
                node.style.animationDelay = `${i * 0.09}s`;
            });
        }, 150);
        
        // Mensaje inicial para lectores de pantalla
        const initAnnouncement = document.createElement('div');
        initAnnouncement.setAttribute('aria-live', 'polite');
        initAnnouncement.className = 'sr-only';
        initAnnouncement.textContent = 'Infografía interactiva cargada. 10 propiedades de límites disponibles. Use tabulador para navegar o toque una propiedad para explorar.';
        document.body.appendChild(initAnnouncement);
        setTimeout(() => initAnnouncement.remove(), 3000);
    }

    // ========================================
    // INICIAR APLICACIÓN AL CARGAR DOM
    // ========================================
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
