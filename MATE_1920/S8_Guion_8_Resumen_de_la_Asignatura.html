        .planet-wrapper {

            display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
            cursor:pointer; transition:all .4s cubic-bezier(.34,1.56,.64,1); z-index:20;

        }
        .planet-wrapper:hover { z-index:30; }

        .planet-node {
            width:90px; height:90px; border-radius:50%;
            background:linear-gradient(145deg,#ffffff,#e6eaf0);
            box-shadow:var(--shadow-neu),0 4px 20px rgba(0,0,0,0.08);
            display:flex; align-items:center; justify-content:center;
            border:3px solid white;
            transition:all .4s cubic-bezier(.34,1.56,.64,1);
            position:relative; animation:float 6s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .planet-wrapper:hover .planet-node { transform:scale(1.2); animation-play-state:paused; }
        .planet-wrapper.active .planet-node { transform:scale(1.25); animation-play-state:paused; box-shadow:0 0 0 4px white,0 0 0 10px var(--planet-color),0 25px 50px rgba(0,0,0,0.2); }

        .planet-node::after { content:''; position:absolute; inset:-8px; border-radius:50%; border:2px solid transparent; border-top-color:var(--planet-color); border-right-color:var(--planet-color); opacity:0; transition:all .3s; }

            <h2>Unidad 1. Conjuntos numéricos</h2>
            <p>En la primera semana, se introducen los conjuntos numéricos y su clasificación, analizando las características de los números naturales, enteros, racionales e irracionales. También se estudia el conjunto de los números reales y sus distintas representaciones como fracciones, decimales y porcentajes.</p>
            <p>Reconocer qué tipo de número estamos usando no es un detalle “teórico”: afecta la forma de operar, interpretar y decidir. Por eso, antes de aprender procedimientos, conviene preguntarnos: ¿Por qué no basta con decir “es un número”? ¿Qué ganamos al clasificarlo? Esta pregunta conecta directamente con el análisis de información, donde la calidad de un reporte depende tanto del cálculo como de la interpretación correcta.</p>
 <img src="media/Imagen 1.png" alt="">
            <h3>1.1. Clasificación de los números</h3>
            <p>La clasificación más utilizada organiza los números en conjuntos que se incluyen unos dentro de otros. Los naturales (ℕ) se asocian al conteo: 1, 2, 3, …. Los enteros (ℤ) amplían esa idea incorporando el cero y los negativos: …, −3, −2, −1, 0, 1, 2, 3, …; son esenciales para representar cambios con dirección (subidas/bajadas), deudas y temperaturas. Los racionales (ℚ) incluyen todos los números que pueden expresarse como fracción  con a y b enteros y , finalmente, los reales (ℝ) agrupan a los racionales y a los irracionales (I), que son aquellos que no pueden expresarse como fracción y cuya expansión decimal es infinita no periódica, como  o .</p>
            <img src="media/Imagen 2.png" alt="">
            <p>Este enfoque tiene ventajas que van más allá de la organización. Permite reutilizar código en diferentes partes de su programa, facilita la resolución de problemas al dividir una aplicación en componentes más manejables y hace que su código sea más intuitivo y fácil de mantener.</p>

            <h3>1.2. Enteros</h3>
            <p>Los enteros aparecen cuando la realidad no solo “cuenta”, sino que también “indica dirección”. En la figura se muestran tres ámbitos donde se denota la importancia del estudio de los enteros en contextos de la vida cotidiana. Entender el signo negativo o positivo evita interpretaciones equivocadas al comunicar resultados a ciudadanos o en la toma de decisiones.</p>
             <img src="media/Imagen 3.png" alt="">
            <p>Los enteros permiten representar y operar con cantidades que pueden ser positivas, negativas o cero, integrando el significado del signo. Si un indicador sube +12 en un mes y luego baja −20 en el siguiente, el cambio total es +12 + (−20) = −8. El signo final comunica la tendencia general: hubo una disminución neta. Observa que el cálculo es sencillo, pero lo importante es la interpretación: “bajó” no significa necesariamente “el dato es malo”; puede ser deseable según el indicador (por ejemplo, disminuir la tasa de error o la tasa de desempleo).</p>
           

            <h3>1.3. Racionales</h3>
            <p>1. ¿Qué son los racionales?<br>Números que pueden expresarse como fracción a/b (b≠0). Incluyen enteros, fracciones y decimales finitos o periódicos.</p>
            <p>2. Representaciones equivalentes<br>Un mismo valor puede escribirse como fracción, decimal o porcentaje (3/5 = 0,6 = 60 %), según el propósito comunicativo.</p>
            <p>3. Uso en información pública y financiera<br>Sustentan indicadores como ejecución presupuestaria, cobertura, promedios y tasas.</p>
            <p>4. Formas clave de análisis<br>• Proporción: parte/total<br>• Variación: cambio entre valores<br>• Porcentaje: proporción por cada 100</p>
            <p>5. Valor para la toma de decisiones<br>Permiten comparar desempeño, identificar brechas y comunicar resultados con claridad cuantitativa.</p>

            <h3>5.3. Combinación de funciones</h3>
            <p>En la realidad, los fenómenos rara vez dependen de una sola relación simple. A menudo, el resultado final es una combinación de procesos: el costo total depende de costos parciales; el ingreso neto depende de ingreso bruto menos impuestos; la utilidad depende de ingresos menos costos; un indicador puede depender de una función de cobertura y otra de calidad. En estos casos, necesitamos combinar funciones para construir modelos más representativos. La combinación de funciones permite sumar, restar, multiplicar, dividir o componer relaciones, ampliando la capacidad de modelar situaciones complejas de manera estructurada.
A continuación, se presentan combinaciones de funciones que modelan situaciones reales (costos, ingresos, promedios y comisiones). 
</p>
<p><strong>Suma de funciones $(f + g)(x)$:</strong></p>
<p>La suma combina dos efectos o componentes que aportan al mismo resultado.</p>

<p><strong>Definición:</strong> $(f + g)(x) = f(x) + g(x)$</p>
<p><strong>Ejemplo aplicado:</strong> Se dispone de dos funciones, la primera es costo de atención: $f(x) = 1200 + 15x$ y costo de logística: $g(x) = 300 + 2x$, determine el costo total mensual.</p>
<p>Para resolver la interrogante, se debe aplicar la suma de las funciones y se tendría: $(f + g)(x) = 1200 + 15x + 300 + 2x = 1500 + 17x$</p>
<p><strong>Interpretación:</strong> El costo total mensual es “fijo total + costo por trámite”.</p>

<hr>

<p><strong>Resta de funciones $(f - g)(x)$:</strong></p>
<p>La resta permite obtener un “neto”: utilidad, saldo o diferencia.</p>
<p><strong>Definición:</strong> $(f - g)(x) = f(x) - g(x)$</p>

<p><strong>Ejemplo aplicado:</strong> dada la función de ingreso $f(x) = 50x$ y costo $g(x) = 20x + 500$, determine la utilidad.</p>
<p>Para calcular la utilidad se debe aplicar la resta de funciones: $(f - g)(x) = (50x) - (20x + 500) = 30x - 500$</p>
<p><strong>Interpretación:</strong> Utilidad = ingreso – costo</p>

            <p>Durante esta semana se profundiza en el modelado de situaciones reales mediante funciones. Se analizan las funciones lineales, cuadráticas y exponenciales como herramientas para representar distintos tipos de comportamiento o variación en los datos. A través de estos modelos, se busca interpretar y describir fenómenos de crecimiento, cambio o relación entre variables en diversos contextos.</p>

            <h3>5.5. Modelado con funciones lineales</h3>
            <p>En planificación y análisis de datos, una de las aproximaciones más útiles es asumir que una variable cambia a un <strong>ritmo constante</strong> respecto a otra. Ese supuesto da lugar a las <strong>funciones lineales</strong>, que aparecen en costos con componente fijo y variable, ingresos proporcionales a ventas, consumo proporcional a usuarios, y proyecciones en horizontes cortos donde el comportamiento puede considerarse estable. En el entorno económico y social, un modelo lineal suele ser el primer paso porque es fácil de interpretar, comunicar y ajustar.</p>

<p>La gráfica de una función lineal es una recta, y su lectura aporta interpretación inmediata. La pendiente muestra si el fenómeno crece o decrece, y su magnitud indica sensibilidad: una pendiente alta significa que pequeñas variaciones en $x$ cambian mucho el resultado. En análisis financiero y social, esta sensibilidad ayuda a identificar variables “críticas” y evaluar escenarios, “¿qué pasa si aumenta $x$ en 10%?”.</p>

<p><strong>Ejemplo 1:</strong> Una institución atiende trámites ciudadanos. Se identifica que existe un <strong>costo fijo</strong> mensual (infraestructura, plataforma, soporte mínimo) y un <strong>costo variable</strong> por cada trámite.</p>

</ul>

<p><strong>Paso 3. Construir el modelo lineal</strong></p>
<p style="text-align: center;">$C(x) = mx + b \rightarrow C(x) = 12x + 1800$</p>

<p><strong>Paso 4. Interpretación</strong></p>
<ul>
    <li>Si $x = 0$, $C(0) = 1800$: es el <strong>costo mínimo</strong> (solo operar).</li>
    <li>Por cada trámite adicional, el costo sube <strong>12 USD</strong>.</li>
</ul>

            <h3>5.6. Modelado con funciones cuadráticas</h3>
            <p>Hay fenómenos donde el cambio no es constante: a veces se acelera, se desacelera o existe un punto óptimo. En economía, esto ocurre cuando hay rendimientos decrecientes, costos crecientes por saturación, o ingresos que suben hasta cierto punto y luego bajan. En estos casos, un modelo lineal puede ocultar la realidad; se requiere un modelo que capture curvatura. Las <strong>funciones cuadráticas</strong> son una herramienta óptima para ello porque representan relaciones donde la variación depende del nivel de la variable y donde pueden existir máximos o mínimos. Esto es muy útil para problemas de optimización, equilibrio y análisis de eficiencia.</p>

<p><strong>Ejemplo 1.</strong> Una operadora turística estima que el <strong>ingreso diario</strong> (en USD) al fijar un precio promocional $x$ (en USD) puede aproximarse por:</p>
<p style="text-align: center;">$R(x) = -5x^2 + 200x$</p>

<p>Aquí $a = -5 < 0$, por lo tanto, la parábola <strong>abre hacia abajo</strong> y el <strong>vértice representa un máximo</strong>: el “mejor” nivel de $x$.</p>

<p><strong>1) Vértice $(x_v, y_v)$: el punto clave del modelo (máximo)</strong></p>
<p style="text-align: center;">
    $x_v = \frac{-b}{2a} = \frac{-200}{2(-5)} = \frac{-200}{-10} = 20$
</p>
<p style="text-align: center;">
    $y_v = R(20) = -5(20)^2 + 200(20) = -5(400) + 4000 = -2000 + 4000 = 2000$
</p>
<p><strong>Interpretación:</strong> el modelo sugiere que el <strong>precio $x = 20$</strong> maximiza el ingreso, y el ingreso máximo estimado sería <strong>USD 2000</strong>. Esta es la idea de <strong>óptimo</strong>: elegir $x$ para lograr el mejor desempeño.</p>

<p><strong>2) Intersección con el eje $y$ (cuando $x = 0$)</strong></p>
<p style="text-align: center;">$R(0) = 0$</p>
<p><strong>Interpretación:</strong> con precio cero (o sin venta), el ingreso es cero. En una función $ax^2 + bx + c$, esta intersección es $c$. Aquí $c = 0$.</p>

<p><strong>3) Intersecciones con el eje $x$ (cuando $R(x) = 0$)</strong></p>
<p style="text-align: center;">$-5x^2 + 200x = 0 \Rightarrow x(-5x + 200) = 0 \rightarrow x = 0$ o $x = 40$</p>
<p><strong>Interpretación:</strong> el modelo indica dos “puntos de equilibrio” del ingreso:</p>
<ul>
    <li>$x = 0$ (no hay precio/venta) y</li>
    <li>$x = 40$ (precio tan alto en el modelo que el ingreso vuelve a cero).</li>
</ul>
<p>En gestión económica, estos cortes ayudan a delimitar <strong>rangos plausibles</strong> de decisión.</p>

            <p>En esta semana se introducen los conceptos de límites y continuidad, fundamentales para analizar el comportamiento de las funciones. Se estudian las propiedades de los límites y las condiciones necesarias para determinar si una función es continua en un determinado punto o intervalo. Estos conceptos permiten comprender cómo se comportan las funciones cuando se aproximan a ciertos valores y constituyen una base importante para el estudio de procesos matemáticos más avanzados.</p>

            <h3>6.2. Continuidad</h3>
            <p><strong>Ejemplo 1: Continuidad en un modelo de costo operativo para planificación</strong></p>

<p><strong>Contexto.</strong> Una municipalidad estima el costo mensual de operar un servicio digital en función del número de trámites $x$. Usa el modelo:</p>
<p style="text-align: center;">$C(x) = 1800 + 12x, x \geq 0$</p>

<p><strong>Porque es un ejemplo de continuidad.</strong></p>
<ul>
    <li>Es una función lineal, por tanto, es <strong>continua</strong> en todo su dominio.</li>
    <li>En términos prácticos: si los trámites cambian un poco (por ejemplo, de 100 a 102), el costo cambia de forma proporcional y predecible:</li>
</ul>

<p style="text-align: center;">$C(102) - C(100) = 12(2) = 24$</p>

<p><strong>Interpretación:</strong> pequeñas variaciones en la demanda producen cambios <strong>pequeños y controlables</strong> en el costo. Esto es clave para presupuestar y evitar “saltos” inesperados.</p>

<p>En un modelo continuo como este, el equipo puede confiar en que errores pequeños en el conteo de trámites o fluctuaciones normales no alterarán el presupuesto de manera abrupta. Si el costo “saltara” por una regla mal definida, la planificación y la rendición de cuentas se volverían menos predecibles.</p>

    function createModals() {
        const container = document.getElementById('weekModals');
        container.innerHTML = '';

        weeksData.forEach(data => {
            const modal = document.createElement('div');
            modal.className = 'week-modal';
            modal.id = `modal-week-${data.week}`;
            modal.innerHTML = `
                <div class="modal-content" style="--modal-color: ${data.color}">
                    <div class="modal-header">
                        <div class="modal-title">Semana ${data.week} - Resumen de la Asignatura</div>
                        <button class="modal-close" onclick="closeWeekModal(${data.week})">×</button>
                    </div>
                    <div class="modal-body">
                        <div class="instruction">Haga clic en los temas para visualizar la información</div>
                        ${weekContent[data.week] || '<p>Contenido en desarrollo.</p>'}
                        <div class="reference">Cuenca, L. (2026). Fundamentos Matemáticos | MATE_1920. EDILOJA.</div>
                    </div>
                    <div class="nav-buttons">
                        <button class="nav-btn" onclick="prevWeek(${data.week})">← Semana anterior</button>
                        <button class="nav-btn" onclick="closeWeekModal(${data.week})">Cerrar</button>
                        <button class="nav-btn" onclick="nextWeek(${data.week})">Semana siguiente →</button>
                    </div>
                </div>
            `;
            container.appendChild(modal);
        });
    }

    function openWeek(weekNum) {
        currentWeek = weekNum;
        document.getElementById(`modal-week-${weekNum}`).classList.add('active');
        document.getElementById('overlay').classList.add('active');
        
        if (!isMobile()) {
            document.querySelectorAll('.planet-wrapper').forEach(w => 
                w.classList.toggle('active', parseInt(w.dataset.week) === weekNum)
            );
        }
    }

    function closeWeekModal(weekNum) {
        document.getElementById(`modal-week-${weekNum}`).classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
        if (!isMobile()) {
            document.querySelectorAll('.planet-wrapper').forEach(w => w.classList.remove('active'));
        }
    }

    function prevWeek(current) {
        let prev = current - 1;
        if (prev < 1) prev = 8;
        closeWeekModal(current);
        setTimeout(() => openWeek(prev), 300);
    }

    function nextWeek(current) {
        let next = current + 1;
        if (next > 8) next = 1;
        closeWeekModal(current);
        setTimeout(() => openWeek(next), 300);
    }

    function closePanel() {
        document.getElementById('infoPanel').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    function resetView() {
        closePanel();
    }

    // Inicialización (mantengo la lógica de desktop/móvil del código base)
    function init() {
        createModals();

        if (isMobile()) {
            document.getElementById('mobileHeader').style.display = 'flex';
            const grid = document.getElementById('mobileGrid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            weeksData.forEach(data => {
                const card = document.createElement('div');
                card.className = 'mobile-week-card';
                card.style.setProperty('--wc', data.color);
                card.innerHTML = `
                    <div class="mwc-badge">SEMANA ${data.week}</div>
                    <div class="mwc-icon">${data.icon}</div>
                    <div class="mwc-title">${data.title}</div>`;
                card.onclick = () => openWeek(data.week);
                grid.appendChild(card);
            });
            document.getElementById('appWrapper').style.display = 'none';
        } else {
            // Desktop planets (código simplificado pero funcional)
            const container = document.getElementById('orbitContainer');
            container.innerHTML = '';
            const cx=400, cy=400, r=260;
            weeksData.forEach((data, i) => {
                const angle = (i * 45 - 90) * Math.PI / 180;
                const x = cx + r * Math.cos(angle) - 70;
                const y = cy + r * Math.sin(angle) - 80;

                const wrap = document.createElement('div');
                wrap.className = 'planet-wrapper';
                wrap.style.left = `${x}px`;
                wrap.style.top = `${y}px`;
                wrap.style.setProperty('--planet-color', data.color);
                wrap.dataset.week = data.week;
                wrap.innerHTML = `
                    <div class="planet-node">
                        <div style="font-size:42px;">${data.icon}</div>
                        <div class="planet-number">${data.week}</div>
                    </div>
                    <div class="planet-title">Semana ${data.week}</div>`;
                wrap.onclick = () => openWeek(data.week);
                container.appendChild(wrap);
            });
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            const activeModal = document.querySelector('.week-modal.active');
            if (activeModal) {
                const week = parseInt(activeModal.id.split('-')[2]);
                closeWeekModal(week);
            } else {
                closePanel();
            }
        }
    });

    window.addEventListener('resize', () => location.reload());

    init();
</script>
