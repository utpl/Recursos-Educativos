<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cámara de Compensación de Cheques — BCE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');




:root {
  --gold:   #332602;
  --gold2:  #332303;
  --blue:   #1e293b;
  --blue2:  #2d3a4e;
  --red:    #aa6f5c;
  --cream:  #f8f6f2;
  --dark:   #f5f3ef;
  --gray:   #151a1d;
  --gray-light: #e8e6e0;
  --white:  #ffffff;
  --teal:  #2d4949;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: #3a4a3a;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* grain (más sutil) */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── HERO ── */
.hero {
  position: relative; z-index: 1;
  padding: 40px 40px 20px;
  text-align: center;
  border-bottom: 1px solid rgba(100,80,40,0.15);
}
.hero-eyebrow {
  font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px;
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content: ''; width: 60px; height: 1px; background: var(--gold); opacity: .4;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3.5vw, 40px);
  font-weight: 900; line-height: 1.05;
  background: linear-gradient(135deg, #3e3422 0%, #504424 40%, #3a3a2a 70%, #7b6a3a 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px; letter-spacing: -1px;
}
.hero-sub {
  font-size: 11px; color: #1d211d;
  letter-spacing: 2.5px; text-transform: uppercase;
}
/* Animated cheque icon */
.cheque-deco {
  width: 100px; height: 60px;
  border: 2px solid rgba(100,80,40,0.3);
  border-radius: 8px;
  margin: 28px auto 0;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  animation: float 3s ease-in-out infinite;
}
.cheque-deco::before {
  content: '';
  position: absolute; top: 12px; left: 12px; right: 12px;
  height: 2px; background: rgba(100,80,40,0.2); border-radius: 2px;
}
.cheque-deco::after {
  content: '';
  position: absolute; top: 20px; left: 12px; right: 30px;
  height: 2px; background: rgba(100,80,40,0.15); border-radius: 2px;
  box-shadow: 0 8px 0 rgba(100,80,40,0.1);
}
.cheque-deco span {
  font-family: 'Playfair Display', serif;
  font-size: 22px; color: var(--gold); opacity: .6;
  position: absolute; bottom: 8px; right: 12px;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%      { transform: translateY(-8px) rotate(1deg); }
}

/* ── INSTRUCTION ── */
.instruction {
  text-align: center; padding: 22px 20px 0;
  font-size: 11px; color: #9aae9a;
  letter-spacing: 2px; text-transform: uppercase;
  position: relative; z-index: 1;
}

/* ── FLOW TRACK ── */
.flow-wrap {
  position: relative; z-index: 1;
  padding: 50px 0 15px;
}

/* Horizontal scroll track */
.track {
  display: flex; align-items: flex-start;
  padding: 0 60px 40px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) var(--gray-light);
  gap: 0;
}
.track::-webkit-scrollbar { height: 3px; }
.track::-webkit-scrollbar-track { background: var(--gray-light); }
.track::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* Connecting line */
.track-line {
  position: absolute;
  top: calc(50px + 44px);
  left: 0; right: 0; height: 2px;
  z-index: 0;
  background: linear-gradient(90deg,
    transparent 0%, rgba(100,80,40,0.1) 4%,
    #6e8f8f 20%, #6f9e7a 40%,
    var(--gold) 60%, var(--red) 85%,
    rgba(100,80,40,0.1) 96%, transparent 100%);
}

/* ── STEP NODE ── */
.step {
  flex: 0 0 200px; scroll-snap-align: center;
  position: relative; cursor: pointer;
  padding: 0 12px;
  transition: flex 0.4s ease;
  animation: fadeUp 0.6s ease both;
}
.step:nth-child(1){animation-delay:.05s}
.step:nth-child(2){animation-delay:.12s}
.step:nth-child(3){animation-delay:.19s}
.step:nth-child(4){animation-delay:.26s}
.step:nth-child(5){animation-delay:.33s}
.step:nth-child(6){animation-delay:.40s}

@keyframes fadeUp {
  from{opacity:0;transform:translateY(28px);}
  to  {opacity:1;transform:translateY(0);}
}

.step-stem {
  width: 2px; height: 38px; margin: 0 auto;
  background: linear-gradient(to bottom, rgba(100,80,40,0.4), transparent);
  position: relative; z-index: 1;
  transition: height .3s ease;
}
.step:hover .step-stem, .step.open .step-stem {
  height: 52px; background: linear-gradient(to bottom, var(--gold2), transparent);
}

/* Node with step number */
.node {
  width: 88px; height: 88px; border-radius: 50%;
  margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  position: relative; z-index: 2;
  border: 2px solid rgba(100,80,40,0.2);
  transition: all 0.4s cubic-bezier(.4,0,.2,1);
}
.step:hover .node, .step.open .node {
  border-color: var(--gold);
  box-shadow: 0 0 0 6px rgba(184,154,74,0.08), 0 0 28px rgba(0,0,0,0.05);
}

/* Each step has its own color (versión suave) */
.step[data-id="0"] .node { background: radial-gradient(circle at 35% 35%, #e6e4dd, #f0ede8); }
.step[data-id="1"] .node { background: radial-gradient(circle at 35% 35%, #e6e4dd, #f0ede8); }
.step[data-id="2"] .node { background: radial-gradient(circle at 35% 35%, #e0e4da, #efede4); }
.step[data-id="3"] .node { background: radial-gradient(circle at 35% 35%, #e2dfd4, #f2efe8); }
.step[data-id="4"] .node { background: radial-gradient(circle at 35% 35%, #dee4da, #edf0e4); }
.step[data-id="5"] .node { background: radial-gradient(circle at 35% 35%, #e4dbd4, #f2ebe4); }

.step.open[data-id="0"] .node, .step:hover[data-id="0"] .node { background: radial-gradient(circle at 35% 35%, #f5f2ec, #faf8f4); }
.step.open[data-id="1"] .node, .step:hover[data-id="1"] .node { background: radial-gradient(circle at 35% 35%, #f5f2ec, #faf8f4); }
.step.open[data-id="2"] .node, .step:hover[data-id="2"] .node { background: radial-gradient(circle at 35% 35%, #f0f2ea, #f8faf0); }
.step.open[data-id="3"] .node, .step:hover[data-id="3"] .node { background: radial-gradient(circle at 35% 35%, #f5f0e8, #fcf8f0); }
.step.open[data-id="4"] .node, .step:hover[data-id="4"] .node { background: radial-gradient(circle at 35% 35%, #ecf2e8, #f4faf0); }
.step.open[data-id="5"] .node, .step:hover[data-id="5"] .node { background: radial-gradient(circle at 35% 35%, #f8ece4, #fff6f0); }

.node-icon { font-size: 24px; line-height: 1; color: #5a6e5a; }
.node-num {
  font-size: 10px; font-weight: 500; color: var(--gold);
  letter-spacing: 1px; margin-top: 3px;
}

.step-label {
  text-align: center; margin-top: 13px;
  font-size: 11px; font-weight: 500;
  color: #1d221d;
  letter-spacing: .5px;
  line-height: 1.4; max-width: 150px; margin-left: auto; margin-right: auto;
  transition: color .3s;
}
.step:hover .step-label, .step.open .step-label { color: var(--gold); }

/* Active dot below node */
.step.open .node::after {
  content: '';
  position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 8px rgba(184,154,74,0.4);
}

/* ── DETAIL PANEL ── */
.detail-panel {
  position: relative; z-index: 10;
  margin: 0 40px 60px;
  border: 1px solid var(--gray-light);
  border-radius: 20px; overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height .6s cubic-bezier(.4,0,.2,1), opacity .4s ease;
  box-shadow: 0 20px 40px rgba(0,0,0,0.05);
  background: var(--white);
}
.detail-panel.visible { max-height: 600px; opacity: 1; }

/* colored top bar per step */
.panel-bar {
  height: 3px;
  transition: background .4s;
}

.panel-inner {
  display: flex; min-height: 240px;
}

/* Left stamp */
.panel-left {
  flex: 0 0 190px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px 24px;
  border-right: 1px solid var(--gray-light);
}
.panel-step-icon { font-size: 52px; margin-bottom: 10px; }
.panel-step-num {
  font-family: 'Playfair Display', serif;
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--gold); margin-bottom: 4px;
}
.panel-step-badge {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700;
  color: #1e221e; text-align: center; line-height: 1.5;
}

/* Right content */
.panel-right {
  flex: 1; padding: 34px 36px 34px 32px;
  display: flex; flex-direction: column; justify-content: center;
}
.panel-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px, 2.5vw, 28px);
  font-weight: 700; color: #3a4a3a; margin-bottom: 12px; line-height: 1.2;
}
.panel-text {
  font-size: 13.5px; line-height: 1.82;
  color: #2a302a;
}
.panel-text strong { color: var(--gold); font-weight: 500; }

/* Key detail pills */
.panel-detail {
  margin-top: 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.detail-pill {
  padding: 6px 14px; border-radius: 20px;
  font-size: 11px; letter-spacing: .5px;
  display: flex; align-items: center; gap: 6px;
}
.detail-pill.time {
  border: 1px solid rgba(100,80,40,0.2); color: #212a23;
  background: rgba(100,80,40,0.04);
}
.detail-pill.actor {
  border: 1px solid rgba(100,80,40,0.2); color: #212a23;
  background: rgba(100,80,40,0.04);
}
.detail-pill.warn {
  border: 1px solid rgba(170,111,92,0.3); color: #212a23;
  background: rgba(170,111,92,0.04);
}
.detail-pill.ok {
  border: 1px solid rgba(111,158,122,0.3); color: #212a23;
  background: rgba(111,158,122,0.04);
}

.panel-close {
  position: absolute; top: 14px; right: 14px;
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--gray-light);
  background: var(--white);
  color: #7e8c7e; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; z-index: 2;
}
.panel-close:hover { background: var(--gray-light); color: var(--gold); }

/* Progress bar at bottom of panel */
.panel-progress {
  height: 2px; background: var(--gray-light);
  margin: 0;
}
.panel-progress-fill {
  height: 100%; transition: width .5s ease;
}


@media (max-width: 680px) {
  .track { padding: 0 20px 30px; }
  .step { flex: 0 0 155px; }
  .panel-inner { flex-direction: column; }
  .panel-left {
    flex: none; border-right: none;
    border-bottom: 1px solid var(--gray-light);
    padding: 20px; flex-direction: row; gap: 14px; justify-content: flex-start;
  }
  .panel-step-icon { font-size: 36px; margin-bottom: 0; }
  .panel-step-badge { display: none; }
  .panel-right { padding: 20px; }
  .detail-panel { margin: 0 14px 40px; }
  .detail-panel.visible { max-height: 900px; }
  .hero { padding: 46px 20px 36px; }
}
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <p class="hero-eyebrow">Sistema financiero · BCE</p>
  <h1>Cámara de Compensación de Cheques</h1>
  <p class="hero-sub">Proceso CCC · Banco Central del Ecuador</p>

</header>



<!-- FLOW TRACK -->
<div class="flow-wrap">
  <div class="track-line"></div>
  <div class="track" id="track">

    <div class="step" data-id="0">
      <div class="step-stem"></div>
      <div class="node">
        <div class="node-icon">📥</div>
        <div class="node-num">Paso 1</div>
      </div>
      <div class="step-label">Depósito del cheque</div>
    </div>

    <div class="step" data-id="1">
      <div class="step-stem"></div>
      <div class="node">
        <div class="node-icon">🖥️</div>
        <div class="node-num">Paso 2</div>
      </div>
      <div class="step-label">Digitalización y envío</div>
    </div>

    <div class="step" data-id="2">
      <div class="step-stem"></div>
      <div class="node">
        <div class="node-icon">⚖️</div>
        <div class="node-num">Paso 3</div>
      </div>
      <div class="step-label">Compensación de saldos</div>
    </div>

    <div class="step" data-id="3">
      <div class="step-stem"></div>
      <div class="node">
        <div class="node-icon">🏦</div>
        <div class="node-num">Paso 4</div>
      </div>
      <div class="step-label">Liquidación en el BCE</div>
    </div>

    <div class="step" data-id="4">
      <div class="step-stem"></div>
      <div class="node">
        <div class="node-icon">✅</div>
        <div class="node-num">Paso 5</div>
      </div>
      <div class="step-label">Acreditación al cliente</div>
    </div>

    <div class="step" data-id="5">
      <div class="step-stem"></div>
      <div class="node">
        <div class="node-icon">🚫</div>
        <div class="node-num">Paso 6</div>
      </div>
      <div class="step-label">Devoluciones y rechazo</div>
    </div>

  </div>
</div>

<!-- NAV DOTS -->
<div class="nav-dots" id="navDots"></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <div class="panel-bar" id="panelBar"></div>
  <button class="panel-close" id="panelClose">✕</button>
  <div class="panel-inner" id="panelInner"></div>
  <div class="panel-progress">
    <div class="panel-progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>




<script>
const STEPS = [
  {
    icon: "📥",
    num: "PASO 1",
    badge: "Inicio del proceso",
    title: "Depósito del cheque",
    bar: "linear-gradient(90deg,#6e8f8f,#7e9e9e)",
    progress: "linear-gradient(90deg,#6e8f8f,#7e9e9e)",
    text: `El <strong>beneficiario</strong> del cheque se acerca a su entidad financiera (banco o cooperativa) y realiza el depósito del documento. A partir de este momento, la entidad depositaria asume la responsabilidad de iniciar el proceso de cobro a través del sistema de compensación.`,
    pills: [
      { type: "actor", icon: "👤", label: "Beneficiario" },
      { type: "actor", icon: "🏛️", label: "Entidad depositaria" },
      { type: "ok",   icon: "📄", label: "Cheque físico recibido" },
    ]
  },
  {
    icon: "🖥️",
    num: "PASO 2",
    badge: "Ingreso al sistema",
    title: "Digitalización y envío al sistema CCC",
    bar: "linear-gradient(90deg,#7e9e9e,#8aae7a)",
    progress: "linear-gradient(90deg,#6e8f8f,#8aae7a)",
    text: `La <strong>entidad depositaria</strong> digitaliza el cheque generando una <strong>imagen digital</strong> del documento, que es el insumo reconocido para ingresar a la Cámara de Compensación de Cheques (CCC). Esta imagen, junto con la información del cheque, se transmite al sistema del BCE siguiendo los archivos y protocolos establecidos.`,
    pills: [
      { type: "actor", icon: "🏛️", label: "Entidad depositaria" },
      { type: "actor", icon: "🏦", label: "Sistema BCE" },
      { type: "ok",   icon: "🖼️", label: "Imagen digital generada" },
      { type: "ok",   icon: "📡", label: "Transmisión al CCC" },
    ]
  },
  {
    icon: "⚖️",
    num: "PASO 3",
    badge: "Cálculo de saldos netos",
    title: "Compensación — cálculo de saldos netos",
    bar: "linear-gradient(90deg,#8aae7a,#b89a4a)",
    progress: "linear-gradient(90deg,#6e8f8f,#b89a4a)",
    text: `El <strong>BCE</strong> procesa toda la información recibida de las distintas entidades financieras participantes y determina el <strong>resultado neto por entidad</strong>: cuánto debe pagar o recibir cada participante frente al resto del sistema. Este proceso de compensación calcula los saldos netos multilaterales de forma eficiente, reduciendo el número de transacciones individuales necesarias.`,
    pills: [
      { type: "actor", icon: "🏦", label: "Banco Central (BCE)" },
      { type: "ok",   icon: "📊", label: "Saldo neto calculado" },
      { type: "ok",   icon: "🔄", label: "Multilateral netting" },
    ]
  },
  {
    icon: "🏦",
    num: "PASO 4",
    badge: "Cámara definitiva",
    title: "Liquidación en cuentas corrientes del BCE",
    bar: "linear-gradient(90deg,#b89a4a,#a87830)",
    progress: "linear-gradient(90deg,#6e8f8f,#b89a4a,#a87830)",
    text: `El proceso de la CCC culmina con la <strong>liquidación definitiva</strong> de los resultados netos en las <strong>cuentas corrientes</strong> que las entidades financieras mantienen en el Banco Central del Ecuador. Los débitos y créditos se aplican de forma simultánea y final, garantizando la firmeza de las liquidaciones.`,
    pills: [
      { type: "actor", icon: "🏦", label: "BCE — Liquidación" },
      { type: "ok",   icon: "💳", label: "Cuentas corrientes entidades" },
      { type: "ok",   icon: "🔒", label: "Liquidación definitiva" },
    ]
  },
  {
    icon: "✅",
    num: "PASO 5",
    badge: "Acreditación final",
    title: "Acreditación del valor al cliente",
    bar: "linear-gradient(90deg,#6f9e7a,#8abe8a)",
    progress: "linear-gradient(90deg,#6e8f8f,#b89a4a,#6f9e7a)",
    text: `Una vez realizada la compensación y liquidación en el BCE, las <strong>entidades depositarias</strong> deben <strong>efectivizar el depósito</strong> —el valor del cheque— en la cuenta del cliente beneficiario dentro de los plazos establecidos por la normativa vigente.`,
    pills: [
      { type: "actor", icon: "🏛️", label: "Entidad depositaria" },
      { type: "actor", icon: "👤", label: "Cliente beneficiario" },
      { type: "time",  icon: "⏱️", label: "Máx. 1 día hábil" },
      { type: "time",  icon: "⚡", label: "Máx. 3 horas post-liquidación" },
    ]
  },
  {
    icon: "🚫",
    num: "PASO 6",
    badge: "Proceso alternativo",
    title: "Devoluciones, rechazo y protesto",
    bar: "linear-gradient(90deg,#aa6f5c,#c08a6a)",
    progress: "linear-gradient(90deg,#6e8f8f,#b89a4a,#aa6f5c)",
    text: `Si el cheque <strong>no cumple las condiciones de pago</strong> —por ejemplo, falta de fondos, firma no conforme, cuenta cerrada, u otras causales— entra al proceso de <strong>rechazo y/o protesto</strong>. Se registra la causal respectiva, y el cheque es devuelto a la entidad depositaria, quien notifica al beneficiario. Este proceso tiene sus propios plazos y consecuencias legales para el girador.`,
    pills: [
      { type: "warn", icon: "💸", label: "Fondos insuficientes" },
      { type: "warn", icon: "🚫", label: "Cuenta cerrada / irregularidades" },
      { type: "actor",icon: "📋", label: "Registro de causal" },
      { type: "warn", icon: "⚠️", label: "Protesto legal" },
    ]
  }
];

let openId = null;
const steps     = document.querySelectorAll('.step');
const panel     = document.getElementById('detailPanel');
const panelBar  = document.getElementById('panelBar');
const panelInner= document.getElementById('panelInner');
const panelClose= document.getElementById('panelClose');
const progress  = document.getElementById('progressFill');
const navDotsEl = document.getElementById('navDots');

// Build nav dots
STEPS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.addEventListener('click', () => activate(i));
  navDotsEl.appendChild(d);
});
const dots = navDotsEl.querySelectorAll('.dot');

function buildPills(pills) {
  return pills.map(p => `<span class="detail-pill ${p.type}">${p.icon} ${p.label}</span>`).join('');
}

function renderPanel(id) {
  const s = STEPS[id];
  const pct = Math.round(((id + 1) / STEPS.length) * 100);

  panelBar.style.background = s.bar;
  progress.style.background = s.progress;
  progress.style.width = pct + '%';

  panelInner.innerHTML = `
    <div class="panel-left">
      <div class="panel-step-icon">${s.icon}</div>
      <div class="panel-step-num">${s.num}</div>
      <div class="panel-step-badge">${s.badge}</div>
    </div>
    <div class="panel-right">
      <h2 class="panel-title">${s.title}</h2>
      <p class="panel-text">${s.text}</p>
      <div class="panel-detail">${buildPills(s.pills)}</div>
    </div>
  `;
}

function activate(id) {
  if (openId !== null) {
    steps[openId].classList.remove('open');
    dots[openId].classList.remove('active');
  }
  if (openId === id) {
    openId = null;
    panel.classList.remove('visible');
    return;
  }
  openId = id;
  steps[id].classList.add('open');
  dots[id].classList.add('active');
  renderPanel(id);
  panel.classList.add('visible');
  steps[id].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 300);
}

steps.forEach(s => s.addEventListener('click', () => activate(+s.dataset.id)));

panelClose.addEventListener('click', () => {
  if (openId !== null) {
    steps[openId].classList.remove('open');
    dots[openId].classList.remove('active');
    openId = null;
  }
  panel.classList.remove('visible');
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') activate(openId === null ? 0 : Math.min(openId+1, STEPS.length-1));
  if (e.key === 'ArrowLeft')  activate(openId === null ? 0 : Math.max(openId-1, 0));
  if (e.key === 'Escape')     panelClose.click();
});

setTimeout(() => activate(0), 700);
</script>
</body>
</html>
