<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipos de Continuidad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F7F3EE;
  --card: #FFFFFF;
  --ink: #1C1510;
  --amber: #C16F2E;
  --c1: #2C6E9E;
  --c2: #3F7E5C;
  --c3: #BA6B2C;
  --c4: #8B5F8C;
  --c5: #C27D3A;
}

html, body {
  width: 800px;
  height: 800px;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Sora', sans-serif;
}

.wrap {
  width: 800px;
  height: 800px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

/* ── fondo decorativo ── */
.bg-circles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg-circles circle {
  fill: none;
  stroke: #D8CBBA;
  stroke-width: 1;
  opacity: 0.35;
}

/* ── header ── */
.header {
  position: absolute;
  top: 28px;
  left: 0; right: 0;
  text-align: center;
  z-index: 10;
}
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--amber);
  background: #FEF0E0;
  border: 1px solid #F0D8B8;
  padding: 3px 12px;
  border-radius: 40px;
  margin-bottom: 6px;
}
.main-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--ink);
  line-height: 1.15;
}
.main-title em {
  font-style: normal;
  color: var(--amber);
}

/* ── footer ── */
.footer {
  position: absolute;
  bottom: 18px;
  left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  color: #A08870;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.3px;
}

/* ── SVG principal ── */
#diagram {
  position: absolute;
  inset: 0;
  width: 800px;
  height: 800px;
}

/* ── nodo central ── */
.center-node {
  cursor: default;
}
.center-node circle.outer-ring {
  fill: none;
  stroke: var(--amber);
  stroke-width: 2;
  stroke-dasharray: 8 5;
  animation: spin 18s linear infinite;
  transform-origin: 400px 400px;
}
.center-node circle.bg {
  fill: var(--amber);
}
.center-node circle.inner {
  fill: #F5D9B8;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── nodos satelite ── */
.node {
  cursor: pointer;
}
.node .ring {
  fill: none;
  stroke-width: 1.5;
  opacity: 0;
  transition: opacity 0.25s, r 0.25s;
}
.node:hover .ring {
  opacity: 1;
}
.node .disc {
  transition: r 0.2s;
}
.node:hover .disc {
  filter: brightness(1.08);
}

/* etiqueta fuera del nodo */
.node-label-group {
  pointer-events: none;
}
.node-label-group text.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  fill-opacity: 0.8;
}
.node-label-group text.name {
  font-family: 'Sora', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
}

/* tooltip ── */
#tooltip {
  position: absolute;
  pointer-events: none;
  z-index: 30;
  opacity: 0;
  transition: opacity 0.18s;
  width: 200px;
}
#tooltip.visible {
  opacity: 1;
}
.tt-box {
  background: #FFFFFF;
  border-radius: 16px;
  padding: 12px 14px;
  box-shadow: 0 8px 28px -6px rgba(0,0,0,0.18);
  border: 1px solid #EDE4D8;
}
.tt-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
  opacity: 0.75;
}
.tt-title {
  font-size: 12.5px;
  font-weight: 700;
  margin-bottom: 6px;
  line-height: 1.2;
}
.tt-desc {
  font-size: 10.5px;
  color: #5F5343;
  line-height: 1.5;
}
.tt-arrow {
  width: 12px;
  height: 7px;
  position: absolute;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- fondo decorativo -->
  <svg class="bg-circles" viewBox="0 0 800 800">
    <circle cx="400" cy="400" r="300"/>
    <circle cx="400" cy="400" r="215"/>
    <circle cx="400" cy="400" r="130"/>
    <circle cx="400" cy="400" r="52"/>
  </svg>

  <!-- header -->
  <div class="header">
    <div class="badge">📐 análisis matemático</div>
    <div class="main-title">Tipos de <em>continuidad</em> en funciones reales</div>
  </div>

  <!-- diagrama SVG principal -->
  <svg id="diagram" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

    <!-- ── LÍNEAS CONECTOR ── dibujadas primero para quedar debajo -->
    <g id="connectors" stroke-width="1.5" stroke-dasharray="5 4" fill="none" opacity="0.55">
      <!-- Se generan con JS -->
    </g>

    <!-- ── NODO CENTRAL ── -->
    <g class="center-node">
      <circle class="outer-ring" cx="400" cy="400" r="66"/>
      <circle class="bg" cx="400" cy="400" r="56" fill="var(--amber)"/>
      <circle class="inner" cx="400" cy="400" r="48"/>
      <!-- ícono matemático central -->
      <text x="400" y="393" text-anchor="middle" font-family="JetBrains Mono" font-size="13" font-weight="500" fill="#8B4A10" opacity="0.7">f(x)</text>
      <text x="400" y="410" text-anchor="middle" font-family="Sora" font-size="9" font-weight="700" fill="#7A3B0A" letter-spacing="0.5px">CONTINUA</text>
    </g>

    <!-- ── NODOS SATÉLITE — generados vía JS ── -->
    <g id="nodes"></g>
    <g id="labels"></g>

  </svg>

  <!-- tooltip -->
  <div id="tooltip">
    <div class="tt-box">
      <div class="tt-tag" id="tt-tag"></div>
      <div class="tt-title" id="tt-title"></div>
      <div class="tt-desc" id="tt-desc"></div>
    </div>
  </div>

  <!-- footer -->
  <div class="footer">Rohoden, K. (2025) · Fundamentos de continuidad · MATE_2037 &nbsp;·&nbsp; hover en cada nodo para más detalle</div>

</div>

<script>
const nodes = [
  {
    id: 1,
    title: "En un punto",
    tag: "puntual",
    color: "#2C6E9E",
    bg: "#EFF6FC",
    desc: "f continua en x = a si lím f(x) = f(a). Sin saltos ni agujeros en ese punto.",
    svgPath: `<path d="M-10,6 Q-4,2 0,2 Q4,2 10,6" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="0" cy="2" r="2.5" fill="currentColor"/>`
  },
  {
    id: 2,
    title: "En un intervalo",
    tag: "intervalo [a,b]",
    color: "#3F7E5C",
    bg: "#F0F7F2",
    desc: "Continua en todos los puntos de [a, b]. Se dibuja sin levantar el lápiz.",
    svgPath: `<path d="M-10,4 Q-5,0 0,0 Q5,0 10,4" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="-10" cy="4" r="2" fill="currentColor"/><circle cx="10" cy="4" r="2" fill="currentColor"/>`
  },
  {
    id: 3,
    title: "Por la izquierda",
    tag: "lím x→a⁻",
    color: "#BA6B2C",
    bg: "#FEF5EA",
    desc: "El límite desde la izquierda coincide con f(a). La curva se une sin salto desde x < a.",
    svgPath: `<path d="M-10,5 Q-4,-1 0,-1" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="0" cy="-1" r="2.5" fill="currentColor"/><path d="M0,-1 Q4,3 10,6" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2" fill="none" opacity="0.4"/>`
  },
  {
    id: 4,
    title: "Por la derecha",
    tag: "lím x→a⁺",
    color: "#8B5F8C",
    bg: "#F8F0FA",
    desc: "El límite desde la derecha coincide con f(a). Fundamental en extremos de intervalos.",
    svgPath: `<path d="M-10,6 Q-4,3 0,-1" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2" fill="none" opacity="0.4"/><circle cx="0" cy="-1" r="2.5" fill="currentColor"/><path d="M0,-1 Q6,-1 10,5" stroke="currentColor" stroke-width="1.8" fill="none"/>`
  },
  {
    id: 5,
    title: "Absoluta (AC)",
    tag: "variación acotada",
    color: "#C27D3A",
    bg: "#FEF7E6",
    desc: "Propiedad más fuerte. Para ε>0 ∃δ: sumas de variaciones son pequeñas. Clave en integración.",
    svgPath: `<path d="M-10,3 Q-5,-1 0,-1 Q5,-1 10,3" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M-7,0 Q0,-3 7,0" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" fill="none" opacity="0.5"/>`
  }
];

// Ángulos: distribuir 5 nodos evenly, empezando desde arriba (-90°)
const R = 210; // radio del orbit
const cx = 400, cy = 400;
const tooltip = document.getElementById('tooltip');
const ttTag = document.getElementById('tt-tag');
const ttTitle = document.getElementById('tt-title');
const ttDesc = document.getElementById('tt-desc');

const nodesG = document.getElementById('nodes');
const labelsG = document.getElementById('labels');
const connG = document.getElementById('connectors');

nodes.forEach((node, i) => {
  const angle = -Math.PI/2 + (i * 2 * Math.PI / nodes.length);
  const nx = cx + R * Math.cos(angle);
  const ny = cy + R * Math.sin(angle);
  const r = 46;

  // --- Connector ---
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  const startDist = 68; // edge of center node
  const endDist = r + 2;
  line.setAttribute('x1', cx + startDist * Math.cos(angle));
  line.setAttribute('y1', cy + startDist * Math.sin(angle));
  line.setAttribute('x2', nx - endDist * Math.cos(angle));
  line.setAttribute('y2', ny - endDist * Math.sin(angle));
  line.setAttribute('stroke', node.color);
  connG.appendChild(line);

  // --- Nodo principal ---
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','node');
  g.setAttribute('data-i', i);

  // ring hover
  const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('class','ring');
  ring.setAttribute('cx', nx); ring.setAttribute('cy', ny);
  ring.setAttribute('r', r + 10);
  ring.setAttribute('stroke', node.color);
  g.appendChild(ring);

  // disco base
  const disc = document.createElementNS('http://www.w3.org/2000/svg','circle');
  disc.setAttribute('class','disc');
  disc.setAttribute('cx', nx); disc.setAttribute('cy', ny);
  disc.setAttribute('r', r);
  disc.setAttribute('fill', node.bg);
  disc.setAttribute('stroke', node.color);
  disc.setAttribute('stroke-width','2');
  g.appendChild(disc);

  // mini gráfico SVG (traducido al centro del nodo) — usamos foreignObject para inyectar SVG inline
  // En su lugar hacemos un sub-SVG con transform
  const iconG = document.createElementNS('http://www.w3.org/2000/svg','g');
  iconG.setAttribute('transform',`translate(${nx},${ny - 8})`);
  iconG.setAttribute('color', node.color);
  iconG.innerHTML = node.svgPath;
  g.appendChild(iconG);

  // número / tag debajo del ícono
  const numText = document.createElementNS('http://www.w3.org/2000/svg','text');
  numText.setAttribute('x', nx);
  numText.setAttribute('y', ny + 22);
  numText.setAttribute('text-anchor','middle');
  numText.setAttribute('font-family','JetBrains Mono, monospace');
  numText.setAttribute('font-size','9');
  numText.setAttribute('font-weight','600');
  numText.setAttribute('fill', node.color);
  numText.setAttribute('opacity','0.7');
  numText.textContent = `0${node.id}`;
  g.appendChild(numText);

  // hover events para tooltip
  g.addEventListener('mouseenter', (e) => showTooltip(e, node, nx, ny));
  g.addEventListener('mouseleave', hideTooltip);

  nodesG.appendChild(g);

  // --- Etiqueta exterior ---
  const labelG = document.createElementNS('http://www.w3.org/2000/svg','g');
  labelG.setAttribute('class','node-label-group');

  // Posición de la etiqueta: empujar más afuera
  const labelDist = r + 28;
  const lx = nx + labelDist * Math.cos(angle);
  const ly = ny + labelDist * Math.sin(angle);

  // Determinar ancla de texto según posición
  let anchor = 'middle';
  const cosA = Math.cos(angle);
  if (cosA > 0.3) anchor = 'start';
  else if (cosA < -0.3) anchor = 'end';

  const tagT = document.createElementNS('http://www.w3.org/2000/svg','text');
  tagT.setAttribute('class','tag');
  tagT.setAttribute('x', lx);
  tagT.setAttribute('y', ly - 6);
  tagT.setAttribute('text-anchor', anchor);
  tagT.setAttribute('fill', node.color);
  tagT.textContent = node.tag;
  labelG.appendChild(tagT);

  const nameT = document.createElementNS('http://www.w3.org/2000/svg','text');
  nameT.setAttribute('class','name');
  nameT.setAttribute('x', lx);
  nameT.setAttribute('y', ly + 9);
  nameT.setAttribute('text-anchor', anchor);
  nameT.setAttribute('fill','#2C241C');
  nameT.textContent = node.title;
  labelG.appendChild(nameT);

  labelsG.appendChild(labelG);
});

function showTooltip(e, node, nx, ny) {
  ttTag.textContent = node.tag.toUpperCase();
  ttTag.style.color = node.color;
  ttTitle.textContent = node.title;
  ttTitle.style.color = node.color;
  ttDesc.textContent = node.desc;

  // Posición relativa al .wrap (800x800 absoluto)
  const wrap = document.querySelector('.wrap');
  const wRect = wrap.getBoundingClientRect();

  let left = nx - wRect.left + 60;
  let top  = ny - wRect.top  - 40;

  // Clip a los bordes
  if (left + 210 > 800) left = nx - wRect.left - 220;
  if (top + 120  > 800) top  = ny - wRect.top  - 120;
  if (top < 0) top = 8;

  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// Animación de entrada suave
document.querySelectorAll('.node').forEach((g, i) => {
  g.style.opacity = '0';
  g.style.transition = 'opacity 0.4s ease';
  setTimeout(() => { g.style.opacity = '1'; }, 200 + i * 100);
});
document.querySelectorAll('.node-label-group').forEach((g, i) => {
  g.style.opacity = '0';
  g.style.transition = 'opacity 0.4s ease';
  setTimeout(() => { g.style.opacity = '1'; }, 300 + i * 100);
});
document.querySelectorAll('#connectors line').forEach((l, i) => {
  l.style.opacity = '0';
  l.style.transition = 'opacity 0.4s ease';
  setTimeout(() => { l.style.opacity = '0.55'; }, 150 + i * 80);
});
</script>
</body>
</html>
