title: "Hitos internacionales en gestión del riesgo",
content: `<div class="timeline-container"><div class="infographic-instruction" style="margin-bottom: 24px;">Haga clic en el <strong>"+"</strong> de cada hito para visualizar el contenido detallado.</div><div class="timeline"><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-1')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-1')"><span class="timeline-icon">🌍</span><div class="timeline-year">1989</div><div class="timeline-title">Decenio Internacional para la Reducción de Desastres Naturales</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-1')">+</button><div id="s6-1-1" class="expandable-content"><p>La ONU declaró los años 90 como el Decenio Internacional para la Reducción de Desastres Naturales, con el objetivo de reducir la pérdida de vidas, la propiedad y el impacto económico y social de los desastres naturales mediante la acción internacional coordinada.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-2')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-2')"><span class="timeline-icon">🌡️</span><div class="timeline-year">1992</div><div class="timeline-title">Convención Marco de la ONU sobre Cambio Climático</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-2')">+</button><div id="s6-1-2" class="expandable-content"><p>Estableció un marco internacional para abordar el problema del cambio climático, reconociendo la necesidad de estabilizar las concentraciones de gases de efecto invernadero en la atmósfera.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-3')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-3')"><span class="timeline-icon">🗾</span><div class="timeline-year">1994</div><div class="timeline-title">Estrategia y Plan de Acción de Yokohama</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-3')">+</button><div id="s6-1-3" class="expandable-content"><p>Para un mundo más seguro: Directrices para la prevención de desastres naturales, la preparación para casos de desastre y la mitigación de sus efectos. Primera estrategia global sistemática para la reducción de desastres.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-4')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-4')"><span class="timeline-icon">🌋</span><div class="timeline-year">1999</div><div class="timeline-title">Estrategia Internacional para la Reducción de Desastres</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-4')">+</button><div id="s6-1-4" class="expandable-content"><p>La ONU estableció la Estrategia Internacional para la Reducción de Desastres (EIRD) para coordinar esfuerzos globales en la reducción de riesgos y promover una cultura de prevención.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-5')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-5')"><span class="timeline-icon">🏗️</span><div class="timeline-year">2005</div><div class="timeline-title">Marco de Acción de Hyogo 2005-2015</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-5')">+</button><div id="s6-1-5" class="expandable-content"><p>Primer plan detallado acordado internacionalmente para reducir las pérdidas por desastres. Estableció cinco prioridades de acción para fortalecer la resiliencia de las naciones y comunidades.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-6')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-6')"><span class="timeline-icon">🌱</span><div class="timeline-year">2015</div><div class="timeline-title">Agenda 2030, Acuerdo de París y Marco de Sendai</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-6')">+</button><div id="s6-1-6" class="expandable-content"><p>Año histórico con tres acuerdos fundamentales:</p><ul><li><strong>Agenda 2030:</strong> Objetivos de Desarrollo Sostenible</li><li><strong>Acuerdo de París:</strong> Acción climática global</li><li><strong>Marco de Sendai:</strong> Reducción del riesgo de desastres 2015-2030</li></ul></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-7')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-7')"><span class="timeline-icon">🏙️</span><div class="timeline-year">2016</div><div class="timeline-title">Nueva Agenda Urbana</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-7')">+</button><div id="s6-1-7" class="expandable-content"><p>Adoptada en la Conferencia Hábitat III, establece estándares globales para el desarrollo urbano sostenible, enfatizando ciudades inclusivas, seguras, resilientes y sostenibles.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s6-1-8')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s6-1-8')"><span class="timeline-icon">🌳</span><div class="timeline-year">2018</div><div class="timeline-title">Acuerdo de Escazú</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s6-1-8')">+</button><div id="s6-1-8" class="expandable-content"><p>Primer tratado ambiental de América Latina y el Caribe. Garantiza acceso a información, participación ciudadana y justicia en asuntos ambientales, con protección especial para defensores ambientales.</p></div></div></div></div><div class="apa-references"><div class="apa-references-title">Referencias</div><div class="apa-reference">Bárcena, A., Torres, V., & Muñoz Ávila, L. (Eds.). (2021). El Acuerdo de Escazú sobre democracia ambiental y su relación con la Agenda 2030 para el Desarrollo Sostenible. CEPAL; Editorial Universidad del Rosario. https://doi.org/10.12804/urosario9789587847567</div></div></div>`
},
{
id: "s6-2",
number: "4.1.1",
title: "Marco de Sendai (2015-2030)",
content: `<div class="feature-box"><h4>Resultados esperados</h4><p>Disminuir significativamente el riesgo de desastres y las pérdidas que estos generan, reduciendo impactos en la vida, la salud, los medios de vida y los activos económicos, físicos, sociales, culturales y ambientales.</p></div><div class="feature-box" style="background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-left-color: var(--warning);"><h4 style="color: #92400e;">Objetivo principal</h4><p>Evitar la generación de nuevos riesgos de desastres y disminuir los ya presentes mediante la aplicación de acciones integrales e inclusivas (económicas, estructurales, normativas, sociales, sanitarias, culturales, educativas, ambientales, tecnológicas, políticas e institucionales).</p></div><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Cuatro Prioridades de Acción</h3><table class="data-table"><tr><th>Prioridad</th><th>Descripción</th></tr><tr><td><strong>1. Comprensión del riesgo</strong></td><td>Entender el riesgo de desastres en todas sus dimensiones de vulnerabilidad, capacidad, exposición de personas y bienes, amenazas y medio ambiente</td></tr><tr><td><strong>2. Gobernanza</strong></td><td>Fortalecer la gobernanza del riesgo de desastres para gestionar el riesgo de desastres</td></tr><tr><td><strong>3. Inversión</strong></td><td>Invertir en la reducción del riesgo de desastres para la resiliencia</td></tr><tr><td><strong>4. Preparación</strong></td><td>Mejorar la preparación para la respuesta, la recuperación, la rehabilitación y la reconstrucción</td></tr></table>`
},
{
id: "s6-3",
number: "4.1.2",
title: "Acuerdo de París",
content: `<div class="interactive-presentation" data-resource="S6_Guion_13"><div class="presentation-header"><div class="presentation-title"><span>🌍</span>Acuerdo de París - Fundamentos</div><div class="presentation-nav"><button onclick="changeSlide('s6-3', -1)" id="s6-3-prev">← Anterior</button><button onclick="changeSlide('s6-3', 1)" id="s6-3-next">Siguiente →</button></div></div><div class="slide-info" style="text-align: center; color: var(--primary-main); margin-bottom: 16px; font-size: 0.9rem;">ℹ️ Haga clic en el <strong>"+"</strong> para visualizar el contenido.</div><div class="presentation-slide active" data-slide="0"><div class="slide-content"><span class="slide-icon">🎯</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Objetivo (Artículo 2)</h4><div class="feature-box"><h4>Meta de temperatura</h4><p>Mantener el incremento de la temperatura promedio del planeta <strong>muy por debajo de 2 °C</strong> respecto a los niveles preindustriales, y sostener esfuerzos adicionales para limitarlo a <strong>1,5 °C</strong> sobre esos mismos niveles.</p></div><p style="margin-top: 20px;">Este acuerdo es un instrumento internacional jurídicamente vinculante que establece el marco global para la acción climática.</p></div></div><div class="presentation-slide" data-slide="1"><div class="slide-content"><span class="slide-icon">📉</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Mitigación</h4><div style="margin-bottom: 16px;"><strong>NDC actualizadas cada 5 años</strong><button class="expand-btn" onclick="toggleExpand('s6-3-1')">+</button><div id="s6-3-1" class="expandable-content">Los países deben presentar y renovar periódicamente sus Contribuciones Determinadas a Nivel Nacional, explicando con claridad qué medidas aplicarán y cómo reportarán sus avances de manera transparente.</div></div><div style="margin-bottom: 16px;"><strong>Ambición creciente</strong><button class="expand-btn" onclick="toggleExpand('s6-3-2')">+</button><div id="s6-3-2" class="expandable-content">Cada nueva NDC debe superar a la anterior, mostrando mejoras progresivas y compromisos más exigentes.</div></div><div style="margin-bottom: 16px;"><strong>Responsabilidades diferenciadas</strong><button class="expand-btn" onclick="toggleExpand('s6-3-3')">+</button><div id="s6-3-3" class="expandable-content">Se espera que los países desarrollados lideren con metas absolutas de reducción, mientras que los países en desarrollo incrementen sus esfuerzos de forma gradual según sus capacidades y circunstancias.</div></div><div style="margin-bottom: 16px;"><strong>Registro público</strong><button class="expand-btn" onclick="toggleExpand('s6-3-4')">+</button><div id="s6-3-4" class="expandable-content">Las NDC comunicadas por las Partes se incorporan en un registro oficial administrado por la Secretaría del Acuerdo.</div></div><div><strong>Sumideros de GEI</strong><button class="expand-btn" onclick="toggleExpand('s6-3-5')">+</button><div id="s6-3-5" class="expandable-content">El Acuerdo promueve conservar y fortalecer los sumideros y reservorios de gases de efecto invernadero, incluyendo los bosques, como parte clave de la mitigación.</div></div></div></div><div class="presentation-slide" data-slide="2"><div class="slide-content"><span class="slide-icon">🤝</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Cooperación Voluntaria (Artículo 6)</h4><p>El Acuerdo de París contempla que los países puedan colaborar de manera voluntaria para elevar su nivel de ambición climática.</p><div style="margin-top: 20px; margin-bottom: 16px;"><strong>Principios fundamentales</strong><button class="expand-btn" onclick="toggleExpand('s6-3-6')">+</button><div id="s6-3-6" class="expandable-content"><ul><li>Integridad ambiental</li><li>Transparencia</li><li>Contabilidad rigurosa (especialmente en transferencia internacional de resultados de mitigación)</li></ul></div></div><div><strong>Mecanismo del Artículo 6</strong><button class="expand-btn" onclick="toggleExpand('s6-3-7')">+</button><div id="s6-3-7" class="expandable-content">Define un mecanismo que contribuye a:<ul><li>Reducir las emisiones de gases de efecto invernadero</li><li>Apoyar el desarrollo sostenible</li><li>Orientar enfoques no basados en mercados para avanzar en la acción climática</li></ul></div></div></div></div><div class="presentation-slide" data-slide="3"><div class="slide-content"><span class="slide-icon">🛡️</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Adaptación</h4><p>El Acuerdo define una <strong>meta global de adaptación</strong>, orientada a:</p><ul><li>Elevar la capacidad de adaptación</li><li>Fortalecer la resiliencia</li><li>Disminuir la vulnerabilidad frente al cambio climático</li></ul><div style="margin-top: 20px; margin-bottom: 16px;"><strong>Compromisos de las Partes</strong><button class="expand-btn" onclick="toggleExpand('s6-3-8')">+</button><div id="s6-3-8" class="expandable-content"><ul><li>Diseñar e implementar planes nacionales de adaptación</li><li>Comunicar periódicamente prioridades, necesidades, estrategias y acciones</li><li>Valorar y respaldar los avances de adaptación en países en desarrollo</li></ul></div></div><div class="feature-box" style="margin-top: 20px;"><h4>Reconocimiento importante</h4><p>La adaptación es un <strong>reto compartido a escala mundial</strong> que requiere cooperación internacional y apoyo sustantivo.</p></div></div></div><div class="presentation-slide" data-slide="4"><div class="slide-content"><span class="slide-icon">⚠️</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Pérdidas y Daños (Artículo 8)</h4><p>El Acuerdo reconoce la necesidad de prevenir, disminuir y atender las pérdidas y los daños asociados a los impactos del cambio climático.</p><div style="margin-top: 20px; margin-bottom: 16px;"><strong>Tipos de impactos</strong><button class="expand-btn" onclick="toggleExpand('s6-3-9')">+</button><div id="s6-3-9" class="expandable-content"><ul><li><strong>Eventos extremos:</strong> tormentas, inundaciones, huracanes</li><li><strong>Procesos de evolución gradual:</strong> aumento del nivel del mar, degradación de ecosistemas, desertificación</li></ul></div></div><div><strong>Mecanismo Internacional de Varsovia</strong><button class="expand-btn" onclick="toggleExpand('s6-3-10')">+</button><div id="s6-3-10" class="expandable-content">Las Partes se comprometen a mejorar el conocimiento, fortalecer medidas de respuesta y ampliar el apoyo y la cooperación internacional a través de este mecanismo, orientado a facilitar acciones frente a las pérdidas y daños derivados de los efectos adversos del cambio climático.</div></div></div></div><div class="presentation-slide" data-slide="5"><div class="slide-content"><span class="slide-icon">📚</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Formación, Participación y Acceso a la Información (Artículo 12)</h4><p>El Acuerdo plantea que deben fortalecerse:</p><div style="margin-bottom: 16px;"><strong>Educación y capacitación</strong><button class="expand-btn" onclick="toggleExpand('s6-3-11')">+</button><div id="s6-3-11" class="expandable-content">Sobre cambio climático, junto con acciones de sensibilización pública para aumentar la conciencia sobre los impactos y las soluciones.</div></div><div style="margin-bottom: 16px;"><strong>Participación ciudadana</strong><button class="expand-btn" onclick="toggleExpand('s6-3-12')">+</button><div id="s6-3-12" class="expandable-content">Promueve que la ciudadanía participe activamente en la toma de decisiones relacionadas con la acción climática a nivel local, nacional e internacional.</div></div><div><strong>Acceso a información</strong><button class="expand-btn" onclick="toggleExpand('s6-3-13')">+</button><div id="s6-3-13" class="expandable-content">Existencia de acceso público a información climática como parte de los compromisos de las Partes, garantizando transparencia y empoderamiento ciudadano.</div></div></div></div><div class="presentation-slide" data-slide="6"><div class="slide-content"><span class="slide-icon">📊</span><h4 style="color: var(--primary-main); margin-bottom: 16px;">Transparencia, Implementación y Cumplimiento (Artículos 14 y 15)</h4><p>El Acuerdo incorpora un <strong>marco robusto de transparencia y rendición de cuentas</strong>.</p><div style="margin-bottom: 16px;"><strong>Reporte y revisión</strong><button class="expand-btn" onclick="toggleExpand('s6-3-14')">+</button><div id="s6-3-14" class="expandable-content"><ul><li>Reportar avances en mitigación, adaptación y apoyo</li><li>La información se somete a revisión técnica internacional</li><li>Considera la diversidad de capacidades entre países</li></ul></div></div><div style="margin-bottom: 16px;"><strong>Mecanismos de cumplimiento</strong><button class="expand-btn" onclick="toggleExpand('s6-3-15')">+</button><div id="s6-3-15" class="expandable-content">Se contemplan mecanismos para facilitar la aplicación y promover el cumplimiento de manera <strong>no punitiva y no confrontacional</strong>, con reportes periódicos a la Conferencia de las Partes.</div></div><div class="feature-box" style="margin-top: 20px;"><h4>Objetivo del marco</h4><p>Garantizar que las acciones y apoyos climáticos sean comparables y comprensibles, fomentando la confianza entre las Partes y la efectividad del Acuerdo.</p></div><div class="apa-references" style="margin-top: 20px;"><div class="apa-references-title">Referencias</div><div class="apa-reference">Servicio Nacional de Gestión de Riesgos y Emergencias. (2019). Lineamientos para incluir la gestión del riesgo de desastres en el Plan de Desarrollo y Ordenamiento Territorial (PDOT). https://www.gestionderiesgos.gob.ec</div></div></div></div><div style="text-align: center; margin-top: 16px; color: var(--text-light); font-size: 0.85rem;">Diapositiva <span id="s6-3-current">1</span> de 7</div></div><div class="quiz-container" style="margin-top: 32px;"><div class="quiz-header"><div class="quiz-title">🧠 Mitos y Verdades</div><p class="quiz-intro">Antes de continuar, complete este pequeño quiz y verifique qué afirmaciones se sostienen en los acuerdos y cuáles son interpretaciones equivocadas. Esto le permitirá comprender con mayor claridad el propósito y el alcance de estos marcos internacionales.</p></div><div id="quiz-questions"></div><div class="quiz-results" id="quiz-results"><div class="quiz-results-icon">🎉</div><div class="quiz-results-title">¡Quiz Completado!</div><div class="quiz-results-score" id="quiz-score">0/10</div><div class="quiz-results-text" id="quiz-message"></div><button class="quiz-restart-btn" onclick="restartQuiz()">Intentar de nuevo</button></div><div class="quiz-progress" id="quiz-progress"></div></div>`
},

title: "Acuerdo de Escazú",
content: `<div class="feature-box"><h4>Origen del acuerdo</h4><p>Este instrumento es el resultado de un proceso abierto y participativo que se inició a partir de <strong>Río+20, en 2012</strong>. Es el primer tratado ambiental de América Latina y el Caribe.</p></div><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Artículos Clave</h3><div class="infographic-list"><div class="infographic-item"><span class="infographic-item-icon">📋</span><div class="infographic-item-content"><div class="infographic-item-title">Artículo 6.3 - Sistemas de información<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s6-4-1')">+</button></div><div class="infographic-item-preview">Cada Parte contará con uno o más sistemas de información ambiental actualizados...</div><div id="s6-4-1" class="infographic-detail"><p>Cada Parte contará con uno o más sistemas de información ambiental actualizados, que podrán incluir fuentes relativas a cambio climático, facilitando el acceso público a datos ambientales relevantes.</p></div></div></div><div class="infographic-item"><span class="infographic-item-icon">🏭</span><div class="infographic-item-content"><div class="infographic-item-title">Artículo 6.4 - Registro de emisiones<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s6-4-2')">+</button></div><div class="infographic-item-preview">Cada Parte tomará medidas para establecer un registro de emisiones...</div><div id="s6-4-2" class="infographic-detail"><p>Cada Parte tomará medidas para establecer un registro de emisiones y transferencias de contaminantes, promoviendo la transparencia en la gestión ambiental industrial.</p></div></div></div><div class="infographic-item"><span class="infographic-item-icon">🚨</span><div class="infographic-item-content"><div class="infographic-item-title">Artículo 6.5 - Alertas tempranas<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s6-4-3')">+</button></div><div class="infographic-item-preview">Cada Parte deberá desarrollar e implementar un sistema de alerta temprana...</div><div id="s6-4-3" class="infographic-detail"><p>Cada Parte deberá desarrollar e implementar un sistema de alerta temprana para proteger a la población ante eventos ambientales peligrosos y desastres.</p></div></div></div><div class="infographic-item"><span class="infographic-item-icon">👥</span><div class="infographic-item-content"><div class="infographic-item-title">Principio Rector - Participación<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s6-4-4')">+</button></div><div class="infographic-item-preview">La reducción del riesgo requiere la implicación de toda la sociedad...</div><div id="s6-4-4" class="infographic-detail"><p>La reducción del riesgo de desastres requiere la implicación y colaboración de toda la sociedad. Requiere también empoderamiento y una participación inclusiva, accesible y no discriminatoria, prestando atención a las personas afectadas desproporcionalmente por los desastres, en particular las más pobres.</p><p style="margin-top: 12px;"><strong>Deben integrarse perspectivas de:</strong> género, edad, discapacidad y cultura en todas las políticas y prácticas, promoviendo el liderazgo de mujeres y jóvenes.</p></div></div></div><div class="infographic-item"><span class="infographic-item-icon">📖</span><div class="infographic-item-content"><div class="infographic-item-title">Artículo 12 - Educación y sensibilización<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s6-4-5')">+</button></div><div class="infographic-item-preview">Las partes deberán cooperar para mejorar la educación y formación...</div><div id="s6-4-5" class="infographic-detail"><p>Las partes deberán cooperar en la adopción de las medidas que correspondan para mejorar la educación, formación, sensibilización y participación del público, y el acceso a la información sobre el cambio climático.</p></div></div></div></div><div class="apa-references"><div class="apa-references-title">Referencias</div><div class="apa-reference">Bárcena, A., Torres, V., & Muñoz Ávila, L. (Eds.). (2021). El Acuerdo de Escazú sobre democracia ambiental y su relación con la Agenda 2030 para el Desarrollo Sostenible. CEPAL; Editorial Universidad del Rosario. https://doi.org/10.12804/urosario9789587847567</div></div>`
},

content: `<div class="feature-box"><h4>🎥 Recurso Audiovisual</h4><p><strong>S6_Guion de video 1:</strong> "Marcos Internacionales: Sendai, París y Escazú"</p><p style="margin-top: 12px; color: var(--text-light); font-size: 0.9rem;">Este video explora cómo los tres marcos internacionales se conectan y complementan en la gestión del riesgo de desastres y la acción climática.</p></div><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border-left-color: var(--success);"><h4 style="color: #166534;">Conexión entre marcos internacionales</h4><p>Los marcos internacionales se conectan cuando hablan de:</p><ul style="margin-top: 12px;"><li>✅ Formación y educación</li><li>✅ Participación ciudadana</li><li>✅ Acceso a información</li><li>✅ Alertas tempranas</li></ul><p style="margin-top: 12px;">Estos son condiciones para actuar <strong>antes del desastre</strong> y no solo después.</p></div>`

7: {
title: "Desarrollo Sostenible",
emoji: "🌱",
unit: "Unidad 5. Gestión del Riesgo y Desarrollo Sostenible",
sections: [
{
id: "s7-1",
number: "5.1",
title: "¿Qué es el Desarrollo Sostenible?",
content: `<p>Su estudio se asemeja al <strong>análisis de sistemas complejos</strong>: no basta mirar una sola variable, sino las relaciones entre economía, sociedad, ambiente y decisiones políticas.</p><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Antecedentes históricos del Desarrollo Sostenible</h3><div class="timeline-container"><div class="infographic-instruction" style="margin-bottom: 24px;">Haga clic en el <strong>"+"</strong> de cada hito para visualizar el contenido detallado.</div><div class="timeline"><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-1')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-1')"><span class="timeline-icon">🏭</span><div class="timeline-year">Años 40</div><div class="timeline-title">Primeras aproximaciones</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-1')">+</button><div id="s7-1-1" class="expandable-content"><p>Se habla de <strong>"producción sostenible"</strong>, aplicada sobre todo al manejo de recursos naturales. Comienza la conciencia sobre la necesidad de equilibrar explotación y conservación.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-2')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-2')"><span class="timeline-icon">🌍</span><div class="timeline-year">Años 50</div><div class="timeline-title">Factores que empujan el debate</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-2')">+</button><div id="s7-1-2" class="expandable-content"><p>Relación Norte–Sur, "Tercer Mundo" como proveedor de materias primas, Guerra Fría y reordenamiento geopolítico; presión de mercados, superpoblación y visibilización de pobreza masiva → surge la idea de <strong>"países subdesarrollados"</strong>.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-3')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-3')"><span class="timeline-icon">🌿</span><div class="timeline-year">Años 70</div><div class="timeline-title">Asuntos ambientales en la agenda política</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-3')">+</button><div id="s7-1-3" class="expandable-content"><p>Los asuntos ambientales entran con fuerza a la agenda política, impulsados por conferencias ambientales (ONU) que evidencian impactos humanos: contaminación, extinción de especies, deterioro ambiental.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-4')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-4')"><span class="timeline-icon">📖</span><div class="timeline-year">Años 80 (inicio – mitad)</div><div class="timeline-title">Libro Verde en Europa</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-4')">+</button><div id="s7-1-4" class="expandable-content"><p>En Europa se impulsa una lectura de política pública: el "Libro Verde" plantea integrar más activamente la política agraria con la política ambiental, priorizando prevención y reducción de actividades de alto impacto.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-5')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-5')"><span class="timeline-icon">🌐</span><div class="timeline-year">Años 80 (mitad – final)</div><div class="timeline-title">Preocupación por problemas globales</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-5')">+</button><div id="s7-1-5" class="expandable-content"><p>Se amplifica la preocupación por problemas globales (explosión demográfica, agujero de ozono, contaminación), lo que refuerza la idea de que <strong>los recursos no son infinitos</strong>.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-6')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-6')"><span class="timeline-icon">📄</span><div class="timeline-year">1987</div><div class="timeline-title">Informe Brundtland</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-6')">+</button><div id="s7-1-6" class="expandable-content"><p>El Informe Brundtland consolida el <strong>concepto moderno de desarrollo sostenible</strong>, planteando crecimiento económico con políticas orientadas a la sostenibilidad: "satisfacer las necesidades del presente sin comprometer la capacidad de las generaciones futuras".</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-7')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-7')"><span class="timeline-icon">📋</span><div class="timeline-year">1992</div><div class="timeline-title">Agenda 21</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-7')">+</button><div id="s7-1-7" class="expandable-content"><p>Se formaliza una hoja de ruta global: <strong>Agenda 21 (Programa 21)</strong>, con acciones para aplicarse a escala mundial, nacional y local, involucrando sectores donde la actividad humana impacta el ambiente.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-8')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-8')"><span class="timeline-icon">🤝</span><div class="timeline-year">1992 (Cumbre de Río)</div><div class="timeline-title">Conferencia de Río</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-8')">+</button><div id="s7-1-8" class="expandable-content"><p>Impulsa cooperación entre Estados y acuerdos para proteger el ambiente; subraya prioridades de países en desarrollo y el <strong>principio de responsabilidades comunes pero diferenciadas</strong>; llama a cambiar patrones de extracción, producción y consumo.</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-9')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-9')"><span class="timeline-icon">🦋</span><div class="timeline-year">Años 90 (inicio)</div><div class="timeline-title">Convenio de Diversidad Biológica</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-9')">+</button><div id="s7-1-9" class="expandable-content"><p>Entra en vigor el Convenio de Diversidad Biológica: destaca biodiversidad y ecosistemas como base del desarrollo; propone uso racional y enfatiza el <strong>valor intrínseco de la naturaleza</strong> (no solo el utilitario).</p></div></div></div><div class="timeline-item"><div class="timeline-dot" onclick="toggleTimelineDetail('s7-1-10')"></div><div class="timeline-content" onclick="toggleTimelineDetail('s7-1-10')"><span class="timeline-icon">🏘️</span><div class="timeline-year">1993</div><div class="timeline-title">Proyecto Ciudades Sostenibles</div><button class="expand-btn" style="margin-top: 12px;" onclick="event.stopPropagation(); toggleTimelineDetail('s7-1-10')">+</button><div id="s7-1-10" class="expandable-content"><p>Nace el proyecto de <strong>Ciudades Sostenibles (Europa)</strong>: promueve reflexión sobre sostenibilidad urbana, intercambio de experiencias y difusión de buenas prácticas locales de largo plazo.</p></div></div></div></div><div class="apa-references"><div class="apa-references-title">Referencias</div><div class="apa-reference">Madroñero-Palacios, S., & Guzmán-Hernández, T. (2018). Desarrollo sostenible: Aplicabilidad y sus tendencias. Tecnología en Marcha, 31(3), 122–130. https://doi.org/10.18845/tm.v31i3.3907</div></div></div>`
},
{
id: "s7-2",
number: "5.1.1",
title: "Precisiones conceptuales",
content: `<div class="feature-box"><h4>Sostenible vs. Sustentable</h4><p>En muchos usos son equivalentes, diferenciándose sobre todo por tradición geográfica/lingüística. El debate aparece cuando se interpreta <strong>sustentable</strong> como "capaz de sustentarse a sí mismo", algo difícil si el sistema económico entra en contradicción con principios de sostenibilidad.</p></div><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Semáforo de Sostenibilidad</h3><table class="data-table"><tr><th>Concepto</th><th>Características</th><th>Impacto en GRD</th></tr><tr><td><strong style="color: var(--danger);">❌ No Sostenible</strong></td><td>"Sustentable" se entiende solo como 'se financia solo', aunque degrade ecosistemas. Greenwashing o discurso sin cambios reales.</td><td>Aumenta exposición y vulnerabilidad → se termina reaccionando</td></tr><tr><td><strong style="color: var(--warning);">⚠️ Declarativo</strong></td><td>Se declara "sostenible/sustentable" sin métricas claras o con evidencia parcial. Prioriza crecimiento y subestima impactos acumulativos.</td><td>Riesgo de falsas expectativas y medidas insuficientes</td></tr><tr><td><strong style="color: var(--success);">✅ Verdaderamente Sostenible</strong></td><td>Integra ambiente, sociedad y economía con límites ecológicos. Define metas e indicadores verificables (agua, suelo, emisiones, equidad).</td><td>Reduce vulnerabilidades y factores subyacentes del riesgo</td></tr></table><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border-left-color: var(--success);"><h4 style="color: #166534;">Sostenibilidad como trayectoria</h4><p>La sostenibilidad se entiende como una <strong>trayectoria de mejora continua</strong> que se consolida mediante aprendizaje, monitoreo y ajustes continuos, no como un estado final alcanzado.</p></div>`
},
{
id: "s7-3",
number: "5.2",
title: "Desarrollo sostenible como política transversal",
content: `<p>El desarrollo sostenible se establece como una política transversal que integra las tres dimensiones fundamentales:</p><div class="feature-box"><h4>🔗 Vínculo explícito</h4><p>Se establece un vínculo explícito entre el <strong>desarrollo sostenible y la gestión del riesgo</strong>, con la finalidad de promover ciudades y asentamientos humanos que sean inclusivos, seguros, resilientes y sostenibles.</p></div><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Agenda 2030</h3><p>Se trata de una agenda orientada a reafirmar el compromiso de cumplir los <strong>Objetivos de Desarrollo del Milenio</strong>, integrando de manera conjunta las tres dimensiones del desarrollo sostenible: la económica, la social y la ambiental.</p><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-left-color: var(--warning);"><h4 style="color: #92400e;">Acción climática</h4><p>Asimismo, se enfatiza la necesidad de implementar <strong>acciones inmediatas para enfrentar el cambio climático y sus impactos</strong>, reconociendo la urgencia de la crisis ambiental global.</p></div>`
},
{
id: "s7-4",
number: "5.3",
title: "Riesgos, desastres y desarrollo: relación bidireccional",
content: `<div class="feature-box"><h4>Relación compleja</h4><p>La relación entre desarrollo, riesgo y desastres es <strong>bidireccional</strong>. Los desastres pueden frenar el desarrollo, pero las decisiones y modelos de desarrollo pueden incrementar o reducir el riesgo.</p></div><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Impacto de los desastres en el desarrollo</h3><table class="data-table"><tr><th>Dimensión</th><th>Impactos</th></tr><tr><td><strong>Desarrollo Económico</strong></td><td><ul><li>Pérdida de vidas y destrucción de activos fijos</li><li>Empeoramiento de la capacidad productiva</li><li>Acceso restringido al mercado de bienes y materiales</li><li>Daños a infraestructuras básicas (salud, educación, transporte, comunicación, energía)</li><li>Deterioro de los medios de vida, del ahorro y de capital físico</li></ul></td></tr><tr><td><strong>Desarrollo Social</strong></td><td><ul><li>Destrucción de infraestructura sanitaria o educativa</li><li>Pérdida de recursos humanos</li><li>Muerte, incapacidad o migración de agentes sociales importantes</li><li>Deterioro del capital social</li></ul></td></tr></table><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">El desarrollo puede generar o reducir riesgo</h3><table class="data-table"><tr><th>Tipo de Desarrollo</th><th>Características</th><th>Efecto en el Riesgo</th></tr><tr><td><strong style="color: var(--danger);">NO Sostenible</strong></td><td>Consumo irresponsable, explotación laboral, deterioro ambiental, mala planificación territorial, poca gestión de políticas públicas</td><td>Mayores condiciones de vulnerabilidad → Provoca desastres</td></tr><tr><td><strong style="color: var(--success);">Sostenible</strong></td><td>Acceso a alimentación, educación, empleo justo, servicios básicos; consumo responsable; planificación estructurada; mecanismos de protección financiera</td><td>Reduce condiciones de vulnerabilidad → Reduce el riesgo</td></tr></table><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border-left-color: var(--primary-main);"><h4>Desarrollo no sostenible provoca riesgo</h4><p>El consumo irresponsable y desmedido de los recursos naturales, las prácticas de comercio sin conciencia ambiental y social, la explotación laboral, el deterioro del medio ambiente, la mala planificación de los territorios y la poca gestión de políticas públicas, llevan al desarrollo no sostenible y por tanto <strong>mayores condiciones de vulnerabilidad ante los riesgos, provocando desastres</strong>.</p></div><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border-left-color: var(--success);"><h4 style="color: #166534;">Desarrollo sostenible reduce el riesgo</h4><p>El acceso a alimentación, educación, empleo justo, servicios y saneamientos básicos son imprescindibles para promover el desarrollo. El consumo responsable de recursos naturales y la economía circular contribuyen a <strong>reducir la exposición ante los riesgos de desastres</strong>.</p></div>`
}
]
},

content: `<div class="feature-box"><h4>Relación bidireccional</h4><p>La relación entre desarrollo, riesgo y desastres es <strong>bidireccional</strong>. Los desastres pueden frenar el desarrollo, pero, al mismo tiempo, las decisiones y modelos de desarrollo pueden incrementar o reducir el riesgo.</p></div><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-left-color: var(--warning);"><h4 style="color: #92400e;">Sostenibilidad como trayectoria</h4><p>Si la sostenibilidad se entiende como una trayectoria que se consolida mediante <strong>aprendizaje, monitoreo y ajustes continuos</strong>, la reducción del riesgo no puede abordarse como una acción aislada ni limitarse a una respuesta tardía ante la emergencia.</p></div>`

title: "Gestión de Riesgos como política transversal",
content: `<div class="feature-box"><h4>La GRD tiene sentido porque...</h4><p>El riesgo se construye en ámbitos que no pertenecen solo a emergencias, sino a <strong>decisiones de desarrollo</strong>.</p></div><p style="margin-top: 20px;">La GRD se convierte en una <strong>política transversal</strong> que se articula con:</p><ul><li>Ordenamiento territorial</li><li>Políticas ambientales y sociales</li><li>Inversión pública y gestión de infraestructura</li><li>Protección social y seguridad humana</li></ul><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Enfoques de Gestión</h3><table class="data-table"><tr><th>Enfoque</th><th>Descripción</th><th>Ejemplo</th></tr><tr><td><strong>Prospectivo</strong></td><td>Evitar la generación de nuevos riesgos</td><td>Regulación de uso de suelo, normas de construcción</td></tr><tr><td><strong>Correctivo</strong></td><td>Reducir riesgos ya existentes</td><td>Reubicación, reforzamiento estructural, mitigación</td></tr><tr><td><strong>Compensatorio</strong></td><td>Compartir y diversificar el riesgo</td><td>Seguros, fondos de emergencia, transferencia financiera</td></tr><tr><td><strong>Emergencias</strong></td><td>Respuesta, rehabilitación y recuperación</td><td>Planes de contingencia, sistemas de alerta temprana</td></tr></table>`

title: "Relación entre RRD y GRD",
content: `<div class="feature-box" style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border-left-color: var(--primary-main);"><h4>Idea Central</h4><p>La forma más efectiva de prevenir pérdidas y reducir impactos <strong>no es únicamente reaccionar</strong>, sino reducir y gestionar las condiciones que generan exposición y vulnerabilidad.</p></div><p style="margin-top: 20px;">Dado que, en general, no es posible disminuir la magnitud de muchas amenazas naturales, <strong>la mayor oportunidad de reducción del riesgo se ubica precisamente en disminuir exposición y vulnerabilidad</strong>.</p><h3 style="margin-top: 24px; margin-bottom: 16px; color: var(--primary-dark);">Estrategias de la GRD</h3><ul><li><strong>Evitar</strong> la generación de nuevos riesgos</li><li><strong>Reducir o controlar</strong> riesgos ya existentes</li><li><strong>Compartir y diversificar</strong> el riesgo, de modo que las pérdidas no absorban recursos destinados al desarrollo ni profundicen pobreza y exclusión</li></ul><div class="feature-box" style="margin-top: 24px; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border-left-color: var(--success);"><h4 style="color: #166534;">Transición paradigmática</h4><p>El riesgo se reduce cuando pasamos de una <strong>lógica basada principalmente en responder</strong> a una <strong>lógica centrada en prevenir, mitigar y fortalecer resiliencia</strong>, integrando la gestión del riesgo en el desarrollo y en la toma de decisiones públicas.</p></div>`

title: "Componentes de la Gestión de Riesgos",
content: `<div class="infographic-list" data-resource="S8_Guion_17"><div class="infographic-header"><span class="infographic-icon">🛡️</span><div><div class="infographic-title">Componentes de la Gestión de Riesgos</div><div style="color: var(--text-light); font-size: 0.9rem;">Infografía interactiva</div></div></div><div class="infographic-instruction">Haga clic en el <strong>"+"</strong> para visualizar el contenido.</div><div class="infographic-item"><span class="infographic-item-icon">🚫</span><div class="infographic-item-content"><div class="infographic-item-title">PREVENCIÓN<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s8-4-1')">+</button></div><div class="infographic-item-preview">Actividades y medidas orientadas a evitar la generación de riesgos nuevos...</div><div id="s8-4-1" class="infographic-detail"><p><strong>PREVENCIÓN</strong></p><p>Actividades y medidas orientadas a evitar la generación de riesgos nuevos y a eliminar o reducir riesgos ya existentes. En general, estas acciones suelen ser más costo-efectivas que el socorro y la respuesta una vez ocurrido el desastre.</p><div class="infographic-example"><div class="infographic-example-title">📍 Ejemplo</div><p>Reubicación planificada de personas y bienes expuestos hacia zonas seguras, fuera de áreas identificadas como peligrosas.</p></div></div></div></div><div class="infographic-item"><span class="infographic-item-icon">📉</span><div class="infographic-item-content"><div class="infographic-item-title">MITIGACIÓN<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s8-4-2')">+</button></div><div class="infographic-item-preview">Consiste en disminuir o amortiguar los efectos negativos...</div><div id="s8-4-2" class="infographic-detail"><p><strong>MITIGACIÓN</strong></p><p>Consiste en disminuir o amortiguar los efectos negativos que pueden generar las amenazas y los desastres asociados. En la práctica, implica aplicar medidas que reduzcan la magnitud del daño esperado.</p><div class="infographic-example"><div class="infographic-example-title">🏗️ Ejemplo</div><p>Construir obras de protección frente a inundaciones, reforestar o plantar árboles para estabilizar laderas, e implementar y hacer cumplir normas estrictas de uso del suelo y de construcción segura.</p></div></div></div></div><div class="infographic-item"><span class="infographic-item-icon">🔄</span><div class="infographic-item-content"><div class="infographic-item-title">TRANSFERENCIA<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s8-4-3')">+</button></div><div class="infographic-item-preview">Proceso mediante el cual las consecuencias financieras se trasladan...</div><div id="s8-4-3" class="infographic-detail"><p><strong>TRANSFERENCIA</strong></p><p>Proceso mediante el cual las consecuencias financieras asociadas a un riesgo específico se trasladan, de manera formal o informal, desde un actor a otro. De este modo, un hogar, una comunidad, una empresa o una institución pública puede recibir apoyo económico después de un desastre.</p><div class="infographic-example"><div class="infographic-example-title">💼 Ejemplo</div><p>Un caso representativo de transferencia del riesgo son los <strong>seguros</strong>, que permiten distribuir las pérdidas y facilitar la recuperación.</p></div></div></div></div><div class="infographic-item"><span class="infographic-item-icon">📋</span><div class="infographic-item-content"><div class="infographic-item-title">PREPARACIÓN<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s8-4-4')">+</button></div><div class="infographic-item-preview">Conjunto de conocimientos, competencias y capacidades...</div><div id="s8-4-4" class="infographic-detail"><p><strong>PREPARACIÓN</strong></p><p>Se refiere al conjunto de conocimientos, competencias y capacidades que desarrollan los gobiernos, las organizaciones de respuesta y recuperación, las comunidades y las personas para anticipar, enfrentar y recuperarse de manera efectiva ante los impactos de eventos peligrosos probables, inminentes o ya presentes.</p><div class="infographic-example"><div class="infographic-example-title">🚨 Ejemplo</div><p>Instalar sistemas de alerta temprana, identificar rutas de evacuación y preparar suministros de emergencia.</p></div></div></div></div><div class="infographic-item"><span class="infographic-item-icon">🏗️</span><div class="infographic-item-content"><div class="infographic-item-title">RECONSTRUCCIÓN RESILIENTE<button class="infographic-expand-btn" onclick="toggleInfographicDetail('s8-4-5')">+</button></div><div class="infographic-item-preview">Para que la reconstrucción sea realmente resiliente...</div><div id="s8-4-5" class="infographic-detail"><p><strong>RECONSTRUCCIÓN RESILIENTE</strong></p><p>Para que la reconstrucción sea realmente resiliente, la información de riesgo debe estar disponible con anticipación, ya que tras el evento suele existir poco tiempo para recopilar datos suficientes que sustenten diseños seguros y decisiones adecuadas de uso del suelo durante la fase de reconstrucción.</p><div class="infographic-example"><div class="infographic-example-title">📐 Ejemplo</div><p>Cumplir las normativas que impide construir infraestructura en las zonas más vulnerables puede no parecer algo llamativo ni innovador, pero, sin duda, es una forma directa y eficaz de salvar vidas.</p></div></div></div></div><div class="apa-references"><div class="apa-references-title">Referencias</div><div class="apa-reference">Bárcena, A., Torres, V., & Muñoz Ávila, L. (Eds.). (2021). El Acuerdo de Escazú sobre democracia ambiental y su relación con la Agenda 2030 para el Desarrollo Sostenible. CEPAL; Editorial Universidad del Rosario. https://doi.org/10.12804/urosario9789587847567</div></div></div>`
}
]

let currentWeek = 1;
let currentSection = 0;
const totalWeeks = 8;
const visitedWeeks = new Set();
let currentView = 'grid';
const presentationState = {};
let currentQuestion = 0;
let quizScore = 0;
let quizAnswered = [];

document.addEventListener('DOMContentLoaded', () => {
renderGrid();
renderList();
updateProgress();
initQuiz();
});

function renderGrid() {
const grid = document.getElementById('gridView');
grid.innerHTML = '';
for (let i = 1; i <= totalWeeks; i++) {
const data = courseData[i];
const card = document.createElement('article');
card.className = 'week-card';
card.onclick = () => openModal(i);
card.setAttribute('tabindex', '0');
card.setAttribute('role', 'button');
card.setAttribute('aria-label', `Ver detalles de la Semana ${i}`);
card.style.animationDelay = `${i * 0.1}s`;
card.innerHTML = `<div class="status-indicator"></div><div class="card-image-container"><div style="width: 100%; height: 100%; background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem;">${data.emoji}</div></div><div class="card-content"><div class="card-number">Semana 0${i}</div><div class="card-title">${data.title}</div><div class="card-unit">${data.unit}</div></div>`;
grid.appendChild(card);
}
}

function renderList() {
const list = document.getElementById('listView');
list.innerHTML = '';
for (let i = 1; i <= totalWeeks; i++) {
const data = courseData[i];
const item = document.createElement('div');
item.className = 'list-item';
item.onclick = () => openModal(i);
item.innerHTML = `<div class="list-number">0${i}</div><div class="list-content"><div class="list-title">${data.title}</div><div class="list-unit">${data.unit}</div></div><div class="list-arrow">→</div>`;
list.appendChild(item);
}
}

function switchView(view) {
currentView = view;
const grid = document.getElementById('gridView');
const list = document.getElementById('listView');
const buttons = document.querySelectorAll('.view-btn');
const currentViewLabel = document.getElementById('currentView');
buttons.forEach(btn => btn.classList.remove('active'));
if (view === 'grid') {
grid.classList.remove('hidden');
list.classList.remove('active');
buttons[0].classList.add('active');
currentViewLabel.textContent = 'Vista de Tarjetas';
} else {
grid.classList.add('hidden');
list.classList.add('active');
buttons[1].classList.add('active');
currentViewLabel.textContent = 'Vista de Lista';
}
}

function openModal(weekNum) {
currentWeek = weekNum;
currentSection = 0;
visitedWeeks.add(weekNum);
updateProgress();
document.querySelectorAll('.week-card').forEach((card, index) => {
if (index + 1 === weekNum) card.classList.add('current');
else card.classList.remove('current');
if (visitedWeeks.has(index + 1)) card.classList.add('visited');
});
updateModalContent();
document.getElementById('modalBackdrop').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('modalBackdrop').classList.remove('active');
document.body.style.overflow = '';
document.querySelectorAll('.week-card').forEach(card => {
card.classList.remove('current');
});
}

function updateModalContent() {
const data = courseData[currentWeek];
document.getElementById('modalWeekBadge').textContent = `Semana 0${currentWeek}`;
document.getElementById('modalTitle').textContent = data.title;
document.getElementById('modalUnit').textContent = data.unit;
renderSections();
updateButtons();
updateModalProgress();
}

function renderSections() {
const modalBody = document.getElementById('modalBody');
const data = courseData[currentWeek];
modalBody.innerHTML = '';
data.sections.forEach((section, index) => {
const sectionEl = document.createElement('section');
sectionEl.className = 'content-section';
sectionEl.id = `section-${index}`;
sectionEl.innerHTML = `<div class="section-header"><div class="section-number">${section.number}</div><h3 class="section-title">${section.title}</h3></div><div class="section-content">${section.content}</div>`;
modalBody.appendChild(sectionEl);
});
setTimeout(() => {
const target = document.getElementById(`section-${currentSection}`);
if (target) target.scrollIntoView({ behavior: 'smooth' });
}, 100);
}

function navigateWeek(direction) {
const newWeek = currentWeek + direction;
if (newWeek >= 1 && newWeek <= totalWeeks) {
const modalBody = document.getElementById('modalBody');
modalBody.style.opacity = '0';
modalBody.style.transform = 'translateY(10px)';
setTimeout(() => {
currentWeek = newWeek;
currentSection = 0;
visitedWeeks.add(currentWeek);
updateProgress();
document.querySelectorAll('.week-card').forEach((card, index) => {
if (visitedWeeks.has(index + 1)) card.classList.add('visited');
});
updateModalContent();
modalBody.style.transition = 'none';
modalBody.style.opacity = '1';
modalBody.style.transform = 'translateY(-10px)';
void modalBody.offsetWidth;
modalBody.style.transition = 'all 0.3s ease';
modalBody.style.transform = 'translateY(0)';
}, 200);
}
}

function updateButtons() {
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
btnPrev.disabled = currentWeek === 1;
if (currentWeek === totalWeeks) {
btnNext.innerHTML = 'Finalizar ✓';
btnNext.onclick = () => {
closeModal();
setTimeout(() => {
alert('¡Felicitaciones! Has completado el recorrido por todas las semanas de la asignatura.');
}, 300);
};
} else {
btnNext.innerHTML = 'Siguiente Semana →';
btnNext.onclick = () => navigateWeek(1);
}
}

function updateModalProgress() {
const container = document.getElementById('modalProgress');
container.innerHTML = '';
for (let i = 1; i <= totalWeeks; i++) {
const dot = document.createElement('div');
dot.className = 'dot';
if (i === currentWeek) dot.classList.add('active');
if (visitedWeeks.has(i)) dot.classList.add('completed');
container.appendChild(dot);
}
}

function updateProgress() {
const percentage = (visitedWeeks.size / totalWeeks) * 100;
document.getElementById('progressBarTop').style.width = `${percentage}%`;
}

function changeSlide(resourceId, direction) {
const container = document.querySelector(`.interactive-presentation[data-resource="${resourceId}"]`);
if (!container) return;
const slides = container.querySelectorAll('.presentation-slide');
let currentState = presentationState[resourceId] || { current: 0 };
const newSlide = currentState.current + direction;
if (newSlide >= 0 && newSlide < slides.length) {
slides[currentState.current].classList.remove('active');
slides[newSlide].classList.add('active');
currentState.current = newSlide;
presentationState[resourceId] = currentState;
const counter = container.querySelector(`[id="${resourceId}-current"]`);
if (counter) counter.textContent = newSlide + 1;
const prevBtn = container.querySelector(`[id="${resourceId}-prev"]`);
const nextBtn = container.querySelector(`[id="${resourceId}-next"]`);
if (prevBtn) prevBtn.disabled = newSlide === 0;
if (nextBtn) nextBtn.disabled = newSlide === slides.length - 1;
}
}

function toggleExpand(elementId) {
const element = document.getElementById(elementId);
if (element) {
element.classList.toggle('show');
const btn = element.previousElementSibling;
if (btn && btn.classList.contains('expand-btn')) {
btn.textContent = element.classList.contains('show') ? '−' : '+';
}
}
}

function toggleInfographicDetail(elementId) {
const element = document.getElementById(elementId);
if (element) {
element.classList.toggle('show');
const btn = element.closest('.infographic-item').querySelector('.infographic-expand-btn');
if (btn) {
btn.textContent = element.classList.contains('show') ? '−' : '+';
}
}
}

function toggleTimelineDetail(elementId) {
toggleExpand(elementId);
}

function initQuiz() {
quizAnswered = new Array(quizQuestions.length).fill(false);
}

function renderQuizQuestion() {
const container = document.getElementById('quiz-questions');
if (!container) return;
const q = quizQuestions[currentQuestion];
container.innerHTML = `<div class="quiz-question"><div class="quiz-question-number">Pregunta ${currentQuestion + 1} de ${quizQuestions.length}</div><div class="quiz-question-text">${q.question}</div><div class="quiz-options"><button class="quiz-option" onclick="selectQuizOption(0)">Mito</button><button class="quiz-option" onclick="selectQuizOption(1)">Verdad</button></div><div class="quiz-feedback" id="quiz-feedback"></div><button class="quiz-next-btn" id="quiz-next-btn" onclick="nextQuizQuestion()">Siguiente pregunta →</button></div>`;
updateQuizProgress();
}

function selectQuizOption(optionIndex) {
const q = quizQuestions[currentQuestion];
const options = document.querySelectorAll('.quiz-option');
const feedback = document.getElementById('quiz-feedback');
const nextBtn = document.getElementById('quiz-next-btn');
options.forEach((opt, idx) => {
opt.classList.remove('selected', 'correct', 'incorrect');
if (idx === optionIndex) opt.classList.add('selected');
if (idx === q.correct) opt.classList.add('correct');
if (idx === optionIndex && idx !== q.correct) opt.classList.add('incorrect');
opt.disabled = true;
});
quizAnswered[currentQuestion] = true;
if (optionIndex === q.correct) {
quizScore++;
feedback.className = 'quiz-feedback show positive';
feedback.innerHTML = `<span class="quiz-feedback-icon">✅</span> ${q.feedback.positive}`;
} else {
feedback.className = 'quiz-feedback show negative';
feedback.innerHTML = `<span class="quiz-feedback-icon">❌</span> ${q.feedback.negative}`;
}
nextBtn.classList.add('show');
}

function nextQuizQuestion() {
currentQuestion++;
if (currentQuestion >= quizQuestions.length) {
showQuizResults();
} else {
renderQuizQuestion();
}
}

function updateQuizProgress() {
const container = document.getElementById('quiz-progress');
if (!container) return;
container.innerHTML = '';
for (let i = 0; i < quizQuestions.length; i++) {
const dot = document.createElement('div');
dot.className = 'quiz-progress-dot';
if (i === currentQuestion) dot.classList.add('active');
if (quizAnswered[i]) dot.classList.add('completed');
container.appendChild(dot);
}
}

function showQuizResults() {
document.getElementById('quiz-questions').innerHTML = '';
document.getElementById('quiz-progress').innerHTML = '';
const results = document.getElementById('quiz-results');
const score = document.getElementById('quiz-score');
const message = document.getElementById('quiz-message');
score.textContent = `${quizScore}/${quizQuestions.length}`;
if (quizScore >= 8) {
message.textContent = '¡Excelente! Tienes un conocimiento sólido de los marcos internacionales.';
} else if (quizScore >= 5) {
message.textContent = '¡Bien hecho! Pero aún hay espacio para mejorar tu comprensión.';
} else {
message.textContent = 'Sigue repasando el contenido para fortalecer tu conocimiento.';
}
results.classList.add('show');
}

function restartQuiz() {
currentQuestion = 0;
quizScore = 0;
quizAnswered = new Array(quizQuestions.length).fill(false);
document.getElementById('quiz-results').classList.remove('show');
renderQuizQuestion();
}

document.getElementById('modalBackdrop').addEventListener('click', function(e) {
if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
if (e.key === 'Escape') closeModal();
});

renderQuizQuestion();
</script>
