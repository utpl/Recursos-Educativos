<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centro de Recursos: Gestión Integral del Riesgo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta institucional académica */
            --primary-dark: #0f172a;
            --primary-main: #1e40af;
            --primary-light: #3b82f6;
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            
            /* Glassmorphism refinado */
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            
            /* Texto */
            --text-main: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            
            /* Espaciado */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            
            /* Animaciones */
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #f1f5f9 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fondo dinámico con partículas sutiles */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(30, 64, 175, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }

        /* Header académico formal */
        .academic-header {
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-main) 100%);
            padding: 20px 20px 8px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .academic-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            animation: patternMove 20s linear infinite;
        }

        @keyframes patternMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .institution-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: 600;
            color: white;
            margin-bottom: 12px;
            line-height: 1.2;
            position: relative;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .course-code {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255,255,255,0.9);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Barra de progreso superior */
        .progress-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .progress-bar-top {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.5s var(--transition-smooth);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Controles superiores */
        .top-controls {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--glass-shadow);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .breadcrumb span {
            color: var(--primary-main);
            font-weight: 600;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(241, 245, 249, 0.8);
            padding: 4px;
            border-radius: 12px;
        }

        .view-btn {
            border: none;
            background: transparent;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: white;
            color: var(--primary-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Grid de tarjetas - Vista principal */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        .week-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 0;
            cursor: pointer;
            transition: all 0.4s var(--transition-bounce);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 300px;
        }

        .week-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .week-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-light);
        }

        .week-card:hover::before {
            opacity: 1;
        }

        .card-image-container {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-main) 0%, var(--primary-light) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: transform 0.5s ease;
        }

        .week-card:hover .card-image-container img {
            transform: scale(1.1);
        }

        .card-emoji-overlay {
            position: absolute;
            font-size: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            z-index: 2;
            transition: transform 0.4s var(--transition-bounce);
        }

        .week-card:hover .card-emoji-overlay {
            transform: scale(1.2) rotate(5deg);
        }

        .card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-main);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-number::before {
            content: '';
            width: 20px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .card-unit {
            font-size: 0.8rem;
            color: var(--text-light);
            line-height: 1.5;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .status-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: 2px solid white;
            transition: all 0.3s ease;
            z-index: 3;
        }

        .week-card.visited .status-indicator {
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
            border-color: white;
        }

        .week-card.current .status-indicator {
            background: var(--warning);
            box-shadow: 0 0 15px var(--warning);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* Sistema de Modal Avanzado */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--transition-smooth);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: #ffffff;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            transform: scale(0.9) translateY(30px);
            transition: all 0.5s var(--transition-bounce);
            overflow: hidden;
            position: relative;
        }

        .modal-backdrop.active .modal-container {
            transform: scale(1) translateY(0);
        }

        /* Header del Modal */
        .modal-header {
            background: linear-gradient(135deg, var(--primary-main) 0%, var(--primary-light) 100%);
            color: white;
            padding: 40px;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        .modal-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .modal-header-content {
            position: relative;
            z-index: 2;
        }

        .modal-nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.3);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .modal-week-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            margin-top: 16px;
            line-height: 1.3;
            max-width: 80%;
        }

        .modal-unit {
            font-size: 1rem;
            opacity: 0.9;
            margin-top: 8px;
            font-weight: 300;
        }

        /* Navegación de secciones */
        .section-nav {
            display: flex;
            gap: 8px;
            padding: 16px 40px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-light) transparent;
        }

        .section-nav::-webkit-scrollbar {
            height: 4px;
        }

        .section-nav::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 4px;
        }

        .section-tab {
            border: none;
            background: transparent;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            white-space: nowrap;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .section-tab:hover {
            color: var(--primary-main);
            background: rgba(30, 64, 175, 0.05);
        }

        .section-tab.active {
            color: var(--primary-main);
            background: white;
            border-color: var(--primary-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Cuerpo del modal con scroll suave */
        .modal-body {
            padding: 0;
            overflow-y: auto;
            flex: 1;
            scroll-behavior: smooth;
        }

        .modal-body::-webkit-scrollbar {
            width: 8px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .content-section {
            padding: 40px;
            border-bottom: 1px solid #f1f5f9;
            animation: fadeInUp 0.6s ease;
        }

        .content-section:last-child {
            border-bottom: none;
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .section-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        .section-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-main), var(--accent));
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.3;
            padding-top: 6px;
        }

        .section-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-main);
            margin-left: 56px;
        }

        .section-content p {
            margin-bottom: 16px;
        }

        .section-content strong {
            color: var(--primary-main);
            font-weight: 600;
        }

        .section-content ul {
            list-style: none;
            margin: 16px 0;
            padding: 0;
        }

        .section-content li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .section-content li::before {
            content: '▸';
            color: var(--accent);
            font-weight: bold;
            position: absolute;
            left: 0;
            top: 0;
        }

        /* Tablas estilizadas */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .data-table th {
            background: linear-gradient(135deg, var(--primary-main), var(--primary-light));
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        .data-table tr:hover td {
            background: #f8fafc;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* Feature boxes */
        .feature-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-left: 4px solid var(--accent);
            padding: 24px;
            border-radius: 0 16px 16px 0;
            margin: 24px 0;
            position: relative;
        }

        .feature-box::before {
            content: '💡';
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 1.5rem;
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .feature-box h4 {
            color: var(--primary-main);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        /* Referencias académicas */
        .reference-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            margin-top: 32px;
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .reference-box::before {
            content: '📚';
            font-size: 1.2rem;
            font-style: normal;
        }

        /* Footer del modal con navegación */
        .modal-footer {
            padding: 20px 40px;
            border-top: 2px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .nav-btn {
            background: white;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--primary-main);
            color: var(--primary-main);
            background: #eff6ff;
            transform: translateX(-4px);
        }

        .nav-btn.next:hover:not(:disabled) {
            transform: translateX(4px);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, var(--primary-main), var(--primary-light));
            color: white;
            border: none;
        }

        .nav-btn.primary:hover {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.4);
        }

        .progress-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--primary-main);
            width: 24px;
            border-radius: 4px;
        }

        .dot.completed {
            background: var(--success);
        }

        /* Indicador de instrucción */
        .instruction-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text-main);
            z-index: 50;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .instruction-hint::before {
            content: '👆';
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .academic-header {
                padding: 40px 20px 60px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .grid-container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 0 16px;
            }

            .modal-container {
                max-height: 100vh;
                border-radius: 0;
            }

            .modal-header {
                padding: 24px;
            }

            .modal-title {
                font-size: 1.4rem;
                max-width: 100%;
            }

            .section-nav {
                padding: 12px 20px;
            }

            .content-section {
                padding: 24px;
            }

            .section-content {
                margin-left: 0;
            }

            .section-header {
                flex-direction: column;
                gap: 12px;
            }

            .modal-footer {
                padding: 16px 20px;
                flex-direction: column;
                gap: 12px;
            }

            .instruction-hint {
                display: none;
            }
        }

        /* Vista de lista alternativa */

        // Cerrar modal
        function closeModal() {
            document.getElementById('modalBackdrop').classList.remove('active');
            document.body.style.overflow = '';
            
            // Quitar clase current
            document.querySelectorAll('.week-card').forEach(card => {
                card.classList.remove('current');
            });
        }

        // Actualizar contenido del modal
        function updateModalContent() {
            const data = courseData[currentWeek];
            
            // Header
            document.getElementById('modalWeekBadge').textContent = `Semana 0${currentWeek}`;
            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalUnit').textContent = data.unit;
            
            // Navegación de secciones
            const sectionNav = document.getElementById('sectionNav');
            sectionNav.innerHTML = '';
            
            data.sections.forEach((section, index) => {
                const tab = document.createElement('button');
                tab.className = 'section-tab' + (index === currentSection ? ' active' : '');
                tab.textContent = section.number;
                tab.onclick = () => {
                    currentSection = index;
                    renderSections();
                    updateSectionTabs();
                };
                sectionNav.appendChild(tab);
            });
            
            renderSections();
            updateButtons();
            updateModalProgress();
        }

        // Renderizar secciones
        function renderSections() {
            const modalBody = document.getElementById('modalBody');
            const data = courseData[currentWeek];
            
            modalBody.innerHTML = '';
            
            data.sections.forEach((section, index) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'content-section';
                sectionEl.id = `section-${index}`;
                
                sectionEl.innerHTML = `
                    <div class="section-header">
                        <div class="section-number">${section.number}</div>
                        <h3 class="section-title">${section.title}</h3>
                    </div>
                    <div class="section-content">
                        ${section.content}
                    </div>
                `;
                
                modalBody.appendChild(sectionEl);
            });
            
            // Scroll a la sección actual
            setTimeout(() => {
                const target = document.getElementById(`section-${currentSection}`);
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // Actualizar tabs de sección
        function updateSectionTabs() {
            document.querySelectorAll('.section-tab').forEach((tab, index) => {
                tab.classList.toggle('active', index === currentSection);
            });
        }

        // Navegar entre semanas
        function navigateWeek(direction) {
            const newWeek = currentWeek + direction;
            if (newWeek >= 1 && newWeek <= totalWeeks) {
                // Animación de transición
                const modalBody = document.getElementById('modalBody');
                modalBody.style.opacity = '0';
                modalBody.style.transform = 'translateY(10px)';
                
                setTimeout(() => {
                    currentWeek = newWeek;
                    currentSection = 0;
                    visitedWeeks.add(currentWeek);
                    updateProgress();
                    
                    // Actualizar indicadores
                    document.querySelectorAll('.week-card').forEach((card, index) => {
                        if (visitedWeeks.has(index + 1)) card.classList.add('visited');
                    });
                    
                    updateModalContent();
                    
                    modalBody.style.transition = 'none';
                    modalBody.style.opacity = '1';
                    modalBody.style.transform = 'translateY(-10px)';
                    
                    void modalBody.offsetWidth;
                    
                    modalBody.style.transition = 'all 0.3s ease';
                    modalBody.style.transform = 'translateY(0)';
                }, 200);
            }
        }

        // Actualizar botones de navegación
        function updateButtons() {
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            
            btnPrev.disabled = currentWeek === 1;
            
            if (currentWeek === totalWeeks) {
                btnNext.innerHTML = 'Finalizar ✓';
                btnNext.onclick = () => {
                    closeModal();
                    // Mostrar mensaje de completado
                    setTimeout(() => {
                        alert('¡Felicitaciones! Has completado el recorrido por todas las semanas de la asignatura.');
                    }, 300);
                };
            } else {
                btnNext.innerHTML = 'Siguiente Semana →';
                btnNext.onclick = () => navigateWeek(1);
            }
        }

        // Actualizar progreso del modal
        function updateModalProgress() {
            const container = document.getElementById('modalProgress');
            container.innerHTML = '';
            
            for (let i = 1; i <= totalWeeks; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                if (i === currentWeek) dot.classList.add('active');
                if (visitedWeeks.has(i)) dot.classList.add('completed');
                container.appendChild(dot);
            }
        }

        // Actualizar barra de progreso global
        function updateProgress() {
            const percentage = (visitedWeeks.size / totalWeeks) * 100;
            document.getElementById('progressBarTop').style.width = `${percentage}%`;
        }

        // Event listeners
        document.getElementById('modalBackdrop').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if (!document.getElementById('modalBackdrop').classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') {
                if (e.shiftKey) navigateWeek(1);
                else {
                    const data = courseData[currentWeek];
                    if (currentSection < data.sections.length - 1) {
                        currentSection++;
                        updateSectionTabs();
                        document.getElementById(`section-${currentSection}`).scrollIntoView({ behavior: 'smooth' });
                    }
                }
            }
            if (e.key === 'ArrowLeft') {
                if (e.shiftKey) navigateWeek(-1);
                else {
                    if (currentSection > 0) {
                        currentSection--;
                        updateSectionTabs();
                        document.getElementById(`section-${currentSection}`).scrollIntoView({ behavior: 'smooth' });
                    }
                }
            }
        });

        // Intersection Observer para actualizar tab activo al hacer scroll
        const observerOptions = {
            root: document.getElementById('modalBody'),
            threshold: 0.5
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const index = parseInt(entry.target.id.split('-')[1]);
                    currentSection = index;
                    updateSectionTabs();
                }
            });
        }, observerOptions);

        // Observar secciones cuando se renderizan
        const modalBody = document.getElementById('modalBody');
        const mutationObserver = new MutationObserver(() => {
            document.querySelectorAll('.content-section').forEach(section => {
                observer.observe(section);
            });
        });

        mutationObserver.observe(modalBody, { childList: true });
    </script>
</body>
</html>
