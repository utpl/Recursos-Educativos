<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antecedentes históricos del Desarrollo Sostenible</title>
<style>
  :root {
    --c1: #1b6b3a;
    --c1l: #2e9e58;
    --c1pale: #e6f4ec;
    --c2: #0d5c7a;
    --c2l: #1a8ab0;
    --c2pale: #e3f3fa;
    --c3: #7b4f12;
    --c3l: #b87825;
    --c3pale: #fdf3e3;
    --accent: #e8a020;
    --dot-size: 18px;
    --line: #c8ddd0;
    --text: #1a1f2e;
    --text-med: #3d4560;
    --text-light: #6b7280;
    --bg: #f3f7f4;
    --white: #ffffff;
    --border: #d4e4db;
    --shadow: 0 8px 32px rgba(0,0,0,.11);
    --radius: 16px;
    --radius-sm: 9px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: white;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;

  }

  /* ── CANVAS ── */
  .canvas {
    width: 800px;
    max-width: 800px;
    background: var(--white);

    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 100%);
    color: #fff;
    padding: 12px 32px 8px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '🌿';
    position: absolute;
    right: 28px; top: 50%;
    transform: translateY(-50%);
    font-size: 56px;
    opacity: .18;
  }
  .header-badge {
    display: inline-block;
    background: rgba(255,255,255,.18);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: 3px 12px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 800;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 12px;
    opacity: .82;
    margin-top: 5px;
  }

  /* ── HINT ── */
  .hint-bar {
    background: var(--c1pale);
    border-bottom: 1px solid var(--border);
    padding: 9px 28px;
    font-size: 12.5px;
    color: var(--c1);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  /* ── TIMELINE WRAPPER ── */
  .timeline-wrap {
    padding: 6px 32px 4px;
    overflow-y: auto;
    flex: 1;
  }

  /* ── VERTICAL LINE ── */
  .timeline {
    position: relative;
    padding-left: 56px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 10px;
    bottom: 10px;
    width: 3px;
    background: linear-gradient(to bottom, var(--c1l), var(--c2l));
    border-radius: 2px;
  }

  /* ── ITEM ── */
  .tl-item {
    position: relative;
    margin-bottom: 4px;
  }
  .tl-item:last-child { margin-bottom: 0; }

  /* dot */
  .tl-dot {
    position: absolute;
    left: -46px;
    top: 14px;
    width: var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    background: var(--white);
    border: 3px solid var(--c1l);
    transition: transform .2s, border-color .2s;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }
  .tl-item.open .tl-dot {
    border-color: var(--accent);
    background: var(--accent);
    transform: scale(1.15);
  }

  /* card */
  .tl-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .2s, border-color .2s, transform .15s;
  }
  .tl-card:hover { box-shadow: 0 4px 20px rgba(27,107,58,.14); border-color: var(--c1l); transform: translateX(3px); }
  .tl-item.open .tl-card { border-color: var(--c1); box-shadow: 0 4px 20px rgba(27,107,58,.18); }

  /* card header */
  .tl-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px 4px;
    user-select: none;
  }
  .tl-emoji {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .tl-year {
    font-size: 15px;
    font-weight: 800;
    color: var(--c1);
    line-height: 1;
  }
  .tl-subtitle {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
    font-weight: 500;
  }
  .tl-plus {
    margin-left: auto;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--c1pale);
    color: var(--c1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    transition: transform .22s, background .22s, color .22s;
  }
  .tl-item.open .tl-plus {
    transform: rotate(45deg);
    background: var(--c1);
    color: #fff;
  }

  /* card body */
  .tl-body {
    display: none;
    padding: 0 16px 14px 16px;
    border-top: 1px solid var(--border);
    animation: fadeIn .25s ease;
  }
  .tl-item.open .tl-body { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .tl-body p {
    font-size: 13px;
    color: var(--text-med);
    line-height: 1.65;
    margin-top: 12px;
  }
  .tl-body .tag {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 9px;
    margin-bottom: 2px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    max-width: 520px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.22);
    overflow: hidden;
    animation: modalIn .22s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  .modal-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-emoji { font-size: 30px; }
  .modal-year { font-size: 22px; font-weight: 800; color: var(--c1); }
  .modal-subtitle { font-size: 12px; color: var(--text-light); }
  .modal-close {
    margin-left: auto;
    background: var(--c1pale);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 18px;
    cursor: pointer;
    color: var(--c1);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body {
    padding: 16px 20px 20px;
    font-size: 13.5px;
    color: var(--text-med);
    line-height: 1.7;
  }
  .modal-tag {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  /* ── REFERENCE ── */
  .reference {
    margin: 0 32px 24px;
    background: #f8faf9;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.6;
  }
  .reference strong { color: var(--text-med); }

  /* ── ERA COLORS ── */
  .era-40 { background: #fff8e1; }
  .era-50 { background: #fce4ec; }
  .era-70 { background: #e8f5e9; }
  .era-80a { background: #e3f2fd; }
  .era-80b { background: #ede7f6; }
  .era-87 { background: #fff3e0; }
  .era-92 { background: #e0f7fa; }
  .era-92r { background: #f1f8e9; }
  .era-90s { background: #fbe9e7; }
  .era-93 { background: #e8eaf6; }

  .tag-40 { background: #fff8e1; color: #7b5e00; }
  .tag-50 { background: #fce4ec; color: #880e4f; }
  .tag-70 { background: #e8f5e9; color: #1b5e20; }
  .tag-80a { background: #e3f2fd; color: #0d47a1; }
  .tag-80b { background: #ede7f6; color: #4527a0; }
  .tag-87 { background: #fff3e0; color: #e65100; }
  .tag-92 { background: #e0f7fa; color: #006064; }
  .tag-92r { background: #f1f8e9; color: #33691e; }
  .tag-90s { background: #fbe9e7; color: #bf360c; }
  .tag-93 { background: #e8eaf6; color: #283593; }

  /* ── RESPONSIVE ── */
  @media (max-width: 820px) {
    body { padding: 0; }
    .canvas { width: 100%; max-width: 100%; border-radius: 0; }
    .header { padding: 18px 16px 14px; }
    .header h1 { font-size: 18px; }
    .timeline-wrap { padding: 20px 16px 20px; }
    .timeline { padding-left: 44px; }
    .timeline::before { left: 14px; }
    .tl-dot { left: -38px; }
    .reference { margin: 0 16px 20px; }
    .hint-bar { padding: 9px 16px; }
  }
</style>
</head>
<body>

<div class="canvas">

  <!-- HEADER -->
  <div class="header">
   
    <h1>Antecedentes históricos del Desarrollo Sostenible</h1>
    <div class="header-sub">Línea de tiempo interactiva · Décadas 1940 – 1993</div>
  </div>

  <!-- HINT -->


  <!-- TIMELINE -->
  <div class="timeline-wrap">
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- REFERENCE -->
  <div class="reference">
    <strong>Referencia:</strong> Madroñero-Palacios, S., &amp; Guzmán-Hernández, T. (2018). Desarrollo sostenible: Aplicabilidad y sus tendencias. <em>Tecnología en Marcha, 31</em>(3), 122–130. <a href="https://doi.org/10.18845/tm.v31i3.3907" target="_blank" style="color:var(--c2l);">https://doi.org/10.18845/tm.v31i3.3907</a>
  </div>

</div><!-- /canvas -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-emoji" id="mEmoji"></div>
      <div>
        <div class="modal-year" id="mYear"></div>
        <div class="modal-subtitle" id="mSub"></div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <span class="modal-tag" id="mTag"></span>
      <div id="mContent"></div>
    </div>
  </div>
</div>

<script>
const events = [
  {
    id: 'e40',
    year: 'Años 40',
    subtitle: 'Primeras aproximaciones',
    emoji: '🌱',
    era: '40',
    tag: 'Recursos naturales',
    content: 'Se habla de <strong>"producción sostenible"</strong>, aplicada sobre todo al manejo de recursos naturales. Es el primer antecedente conceptual del desarrollo sostenible moderno.'
  },
  {
    id: 'e50',
    year: 'Años 50',
    subtitle: 'Factores geopolíticos y económicos',
    emoji: '🌐',
    era: '50',
    tag: 'Geopolítica · Desarrollo',
    content: 'Factores que empujan el debate: relación Norte–Sur, <strong>"Tercer Mundo"</strong> como proveedor de materias primas, Guerra Fría y reordenamiento geopolítico; presión de mercados, superpoblación y visibilización de pobreza masiva → surge la idea de <strong>"países subdesarrollados"</strong>.'
  },
  {
    id: 'e70',
    year: 'Años 70',
    subtitle: 'Los asuntos ambientales en la agenda política',
    emoji: '🏭',
    era: '70',
    tag: 'Medio ambiente · ONU',
    content: 'Los asuntos ambientales entran con fuerza a la agenda política, impulsados por <strong>conferencias ambientales de la ONU</strong> que evidencian impactos humanos: contaminación, extinción de especies, deterioro ambiental.'
  },
  {
    id: 'e80a',
    year: 'Años 80 (inicio – mitad)',
    subtitle: 'Política agraria y ambiental en Europa',
    emoji: '📗',
    era: '80a',
    tag: 'Europa · Política pública',
    content: 'En Europa se impulsa una lectura de política pública: el <strong>"Libro Verde"</strong> plantea integrar más activamente la política agraria con la política ambiental, priorizando prevención y reducción de actividades de alto impacto.'
  },
  {
    id: 'e80b',
    year: 'Años 80 (mitad – final)',
    subtitle: 'Problemas globales y recursos finitos',
    emoji: '🕳️',
    era: '80b',
    tag: 'Crisis ambiental global',
    content: 'Se amplifica la preocupación por problemas globales (explosión demográfica, <strong>agujero de ozono</strong>, contaminación), lo que refuerza la idea de que los recursos no son infinitos.'
  },
  {
    id: 'e87',
    year: '1987',
    subtitle: 'Informe Brundtland',
    emoji: '📄',
    era: '87',
    tag: 'Hito conceptual',
    content: 'El <strong>Informe Brundtland</strong> consolida el concepto moderno de desarrollo sostenible, planteando crecimiento económico con políticas orientadas a la sostenibilidad. Define el desarrollo sostenible como aquel que satisface las necesidades del presente sin comprometer las de las generaciones futuras.'
  },
  {
    id: 'e92a',
    year: '1992 — Agenda 21',
    subtitle: 'Hoja de ruta global',
    emoji: '📋',
    era: '92',
    tag: 'Agenda global',
    content: 'Se formaliza una hoja de ruta global: <strong>Agenda 21 (Programa 21)</strong>, con acciones para aplicarse a escala mundial, nacional y local, involucrando sectores donde la actividad humana impacta el ambiente.'
  },
  {
    id: 'e92r',
    year: '1992 — Cumbre de Río',
    subtitle: 'Cooperación internacional y responsabilidades',
    emoji: '🌎',
    era: '92r',
    tag: 'Cumbre de la Tierra',
    content: 'La <strong>Conferencia de Río</strong> impulsa cooperación entre Estados y acuerdos para proteger el ambiente; subraya prioridades de países en desarrollo y el principio de <strong>responsabilidades comunes pero diferenciadas</strong>; llama a cambiar patrones de extracción, producción y consumo.'
  },
  {
    id: 'e90s',
    year: 'Años 90 (inicio)',
    subtitle: 'Convenio de Diversidad Biológica',
    emoji: '🦋',
    era: '90s',
    tag: 'Biodiversidad',
    content: 'Entra en vigor el <strong>Convenio de Diversidad Biológica</strong>: destaca biodiversidad y ecosistemas como base del desarrollo; propone uso racional y enfatiza el valor intrínseco de la naturaleza (no solo el utilitario).'
  },
  {
    id: 'e93',
    year: '1993',
    subtitle: 'Proyecto de Ciudades Sostenibles',
    emoji: '🏙️',
    era: '93',
    tag: 'Sostenibilidad urbana',
    content: 'Nace el <strong>proyecto de Ciudades Sostenibles</strong> (Europa): promueve reflexión sobre sostenibilidad urbana, intercambio de experiencias y difusión de buenas prácticas locales de largo plazo.'
  }
];

/* Build timeline */
const tl = document.getElementById('timeline');
events.forEach((ev, i) => {
  const item = document.createElement('div');
  item.className = 'tl-item';
  item.id = 'item-' + ev.id;
  item.innerHTML = `
    <div class="tl-dot"></div>
    <div class="tl-card" onclick="openModal('${ev.id}', event)">
      <div class="tl-head">
        <div class="tl-emoji era-${ev.era}">${ev.emoji}</div>
        <div>
          <div class="tl-year">${ev.year}</div>
          <div class="tl-subtitle">${ev.subtitle}</div>
        </div>
        <div class="tl-plus">+</div>
      </div>
      <div class="tl-body">
        <span class="tag tag-${ev.era}">${ev.tag}</span>
        <p>${ev.content}</p>
      </div>
    </div>
  `;
  tl.appendChild(item);
});

/* Toggle inline */
function toggleItem(id) {
  const item = document.getElementById('item-' + id);
  item.classList.toggle('open');
}

/* Open modal */
function openModal(id, e) {
  e && e.stopPropagation();
  const ev = events.find(x => x.id === id);
  if (!ev) return;
  document.getElementById('mEmoji').textContent = ev.emoji;
  document.getElementById('mYear').textContent = ev.year;
  document.getElementById('mSub').textContent = ev.subtitle;
  const tag = document.getElementById('mTag');
  tag.textContent = ev.tag;
  tag.className = 'modal-tag tag-' + ev.era;
  document.getElementById('mContent').innerHTML = '<p>' + ev.content + '</p>';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
});
</script>
</body>
</html>
