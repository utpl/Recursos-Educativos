<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SoVI · Etapas del procedimiento | Visualización interactiva</title>
    <style>
        /* ============================================
           OPTIMIZADO PARA IFRAME DE CANVAS LMS
           - Tamaño dinámico: se adapta al contenedor sin scroll forzado
           - En escritorio: tamaño relativo (80vh máximo) en lugar de fijo 800px
           - En móvil: scroll vertical suave si es necesario
           ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-light: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent-1: #0891b2;
            --accent-2: #16a34a;
            --accent-3: #9333ea;
            --accent-4: #ea580c;
            --accent-5: #ca8a04;
            --accent-6: #db2777;
            --accent-7: #0284c7;
            --accent-8: #65a30d;
            --accent-9: #dc2626;
            --accent-10: #0d9488;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        body {
            background: linear-gradient(135deg, #eef2ff 0%, #f1f5f9 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        /* Contenedor principal: se adapta al espacio disponible SIN scroll externo forzado */
        .sovi-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: transparent;
            border-radius: 32px;
            /* IMPORTANTE: altura máxima relativa al viewport, pero sin overflow forzado */
            max-height: 90vh;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
        }

        /* Contenedor circular: en escritorio usa tamaño dinámico basado en el ancho */
        .sovi-container {
            position: relative;
            width: 100%;
            /* Altura dinámica: en desktop se mantiene cuadrada pero con max-width */
            aspect-ratio: 1 / 1;
            max-width: 650px;
            margin: 0 auto;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.6), rgba(226, 232, 240, 0.9));
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.7);
            border: 1px solid rgba(100, 116, 139, 0.25);
            transition: all 0.2s;
        }

        /* Círculos decorativos (orbit line) solo visibles en desktop */
        .orbit-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80%;
            height: 80%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        .orbit-line:nth-child(2) {
            width: 66%;
            height: 66%;
            border-color: rgba(8, 145, 178, 0.15);
        }

        /* Núcleo central - tamaño relativo */
        .center-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26%;
            min-width: 140px;
            max-width: 210px;
            height: auto;
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #ffffff, #f9fafb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 15;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            border: 2px solid rgba(8, 145, 178, 0.4);
            backdrop-filter: blur(2px);
            padding: 12px;
        }
        .center-core h1 {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            letter-spacing: -0.2px;
        }

        /* Nodos: elementos interactivos - tamaño relativo */
        .node {
            position: absolute;
            width: 13%;
            min-width: 85px;
            max-width: 110px;
            height: auto;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s;
            border: 2px solid;
            box-shadow: var(--shadow-sm);
            z-index: 20;
            padding: 8px;
            text-align: center;
            will-change: transform;
        }
        .node:hover, .node:focus-visible {
            transform: scale(1.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            outline: 2px solid currentColor;
            outline-offset: 3px;
            z-index: 25;
        }
        .node-number {
            font-size: clamp(1.2rem, 4vw, 1.7rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }
        .node-title {
            font-size: clamp(0.6rem, 2vw, 0.7rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-primary);
            max-width: 90%;
            word-break: break-word;
        }

        /* ========== MODAL MEJORADO ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 32px;
            max-width: 520px;
            width: 90%;
            padding: 28px 28px 32px 28px;
            position: relative;
            border-top: 6px solid;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            animation: modalFadeIn 0.2s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.96) translateY(12px);}
            to { opacity: 1; transform: scale(1) translateY(0);}
        }
        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .modal-number {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            background-color: #0891b2;
            flex-shrink: 0;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            line-height: 1.3;
        }
        .modal-body {
            color: #1e293b;
            font-size: 1rem;
            line-height: 1.55;
            margin-top: 8px;
        }
        .close-btn {
            position: absolute;
            top: 18px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: #e2e8f0;
            transform: rotate(90deg);
        }

        /* ========== RESPONSIVE: MODO LISTA VERTICAL CON SCROLL SUAVE ========== */
        @media (max-width: 700px) {
            body {
                padding: 12px;
                align-items: flex-start;
            }
            .sovi-wrapper {
                max-height: 95vh;
                overflow-y: auto;
                border-radius: 24px;
                background: transparent;
            }
            .sovi-container {
                aspect-ratio: auto;
                width: 100%;
                height: auto;
                background: #f8fafc;
                border-radius: 28px;
                margin: 0;
                padding: 20px 16px 32px 16px;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                box-shadow: none;
                border: none;
                max-width: 100%;
            }
            /* Ocultar elementos decorativos circulares */
            .orbit-line {
                display: none;
            }
            .center-core {
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                width: 160px;
                min-width: 140px;
                height: 160px;
                margin: 0 auto 24px auto;
                background: white;
                border: 2px solid rgba(8,145,178,0.3);
            }
            .center-core h1 {
                font-size: 1rem;
            }
            /* Nodos en bloque vertical */
            .node {
                position: relative !important;
                width: 100% !important;
                min-width: unset !important;
                max-width: unset !important;
                height: auto !important;
                min-height: 75px;
                aspect-ratio: auto !important;
                border-radius: 20px !important;
                flex-direction: row !important;
                justify-content: flex-start !important;
                gap: 16px;
                padding: 14px 18px;
                margin-bottom: 12px;
                background: white;
                border-left-width: 5px;
                border-left-style: solid;
                border-top: 1px solid rgba(0,0,0,0.08);
                border-right: 1px solid rgba(0,0,0,0.08);
                border-bottom: 1px solid rgba(0,0,0,0.08);
                box-shadow: 0 2px 6px rgba(0,0,0,0.04);
                transition: transform 0.1s, background 0.2s;
                left: auto !important;
                top: auto !important;
                transform: none !important;
            }
            .node:hover {
                transform: translateX(4px) !important;
                background: #ffffff;
            }
            .node-number {
                font-size: 1.8rem;
                width: 50px;
                height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f1f5f9;
                border-radius: 30px;
                margin-bottom: 0;
            }
            .node-title {
                font-size: 0.95rem;
                text-transform: none;
                letter-spacing: normal;
                font-weight: 600;
                max-width: 100%;
                text-align: left;
            }
            /* Colores de borde izquierdo */
            .node[data-stage="1"] { border-left-color: var(--accent-1); }
            .node[data-stage="2"] { border-left-color: var(--accent-2); }
            .node[data-stage="3"] { border-left-color: var(--accent-3); }
            .node[data-stage="4"] { border-left-color: var(--accent-4); }
            .node[data-stage="5"] { border-left-color: var(--accent-5); }
            .node[data-stage="6"] { border-left-color: var(--accent-6); }
            .node[data-stage="7"] { border-left-color: var(--accent-7); }
            .node[data-stage="8"] { border-left-color: var(--accent-8); }
            .node[data-stage="9"] { border-left-color: var(--accent-9); }
            .node[data-stage="10"] { border-left-color: var(--accent-10); }
        }

        /* Para pantallas de escritorio más pequeñas (iframe estrecho) */
        @media (min-width: 701px) and (max-width: 850px) {
            .sovi-container {
                max-width: 550px;
            }
            .node {
                width: 14%;
                min-width: 75px;
            }
            .node-title {
                font-size: 0.6rem;
            }
            .node-number {
                font-size: 1.3rem;
            }
        }

        /* Para pantallas muy pequeñas en altura, mantener scroll solo interno */
        @media (max-height: 700px) and (min-width: 701px) {
            .sovi-wrapper {
                max-height: 85vh;
            }
        }

        .node:focus-visible {
            outline: 3px solid #0891b2;
            outline-offset: 4px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>
<div class="sovi-wrapper">
    <div class="sovi-container" role="main">
        <div class="orbit-line"></div>
        <div class="orbit-line"></div>
        
        <div class="center-core" aria-label="Núcleo metodológico SoVI">
            <h1>📊 Etapas del<br>procedimiento SoVI</h1>
        </div>

        <!-- 10 nodos interactivos -->
        <button class="node" data-stage="1" aria-label="Etapa 1: Delimitación del área">
            <span class="node-number">1</span>
            <span class="node-title">Delimitación del área</span>
        </button>
        <button class="node" data-stage="2" aria-label="Etapa 2: Marco conceptual">
            <span class="node-number">2</span>
            <span class="node-title">Marco conceptual</span>
        </button>
        <button class="node" data-stage="3" aria-label="Etapa 3: Revisión de datos">
            <span class="node-number">3</span>
            <span class="node-title">Revisión de datos</span>
        </button>
        <button class="node" data-stage="4" aria-label="Etapa 4: Unidad de análisis">
            <span class="node-number">4</span>
            <span class="node-title">Unidad de análisis</span>
        </button>
        <button class="node" data-stage="5" aria-label="Etapa 5: Selección de variables">
            <span class="node-number">5</span>
            <span class="node-title">Selección de variables</span>
        </button>
        <button class="node" data-stage="6" aria-label="Etapa 6: Evaluación de limitaciones">
            <span class="node-number">6</span>
            <span class="node-title">Evaluación de limitaciones</span>
        </button>
        <button class="node" data-stage="7" aria-label="Etapa 7: Estandarización">
            <span class="node-number">7</span>
            <span class="node-title">Estandarización</span>
        </button>
        <button class="node" data-stage="8" aria-label="Etapa 8: Reducción de factores">
            <span class="node-number">8</span>
            <span class="node-title">Reducción de factores</span>
        </button>
        <button class="node" data-stage="9" aria-label="Etapa 9: Construcción del índice">
            <span class="node-number">9</span>
            <span class="node-title">Construcción del índice</span>
        </button>
        <button class="node" data-stage="10" aria-label="Etapa 10: Mapeo de resultados">
            <span class="node-number">10</span>
            <span class="node-title">Mapeo de resultados</span>
        </button>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="stageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
        <button class="close-btn" id="closeModalBtn" aria-label="Cerrar ventana">✕</button>
        <div class="modal-header">
            <div class="modal-number" id="modalNumber">1</div>
            <h2 class="modal-title" id="modalTitle">Título</h2>
        </div>
        <div class="modal-body" id="modalBody">
            Descripción detallada del procedimiento.
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // DATOS COMPLETOS DE CADA ETAPA
    // --------------------------------------------------------------
    const stagesData = {
        1: { 
            title: "Delimitación del área", 
            desc: "Definición precisa del territorio de estudio (municipios, provincias o cuencas). Se consideran límites administrativos, disponibilidad de información censal y criterios de homogeneidad geográfica para garantizar la replicabilidad del análisis.", 
            color: "#0891b2" 
        },
        2: { 
            title: "Marco conceptual", 
            desc: "Construcción de un marco teórico robusto que define vulnerabilidad social como la susceptibilidad de grupos sociales ante amenazas. Incluye dimensiones como sensibilidad, capacidad adaptativa y exposición.", 
            color: "#16a34a" 
        },
        3: { 
            title: "Revisión de datos", 
            desc: "Exploración de fuentes estadísticas (censos, encuestas) y bases geoespaciales. Se evalúa consistencia, año de referencia, nivel de desagregación y posibles sesgos de muestreo.", 
            color: "#9333ea" 
        },
        4: { 
            title: "Unidad de análisis", 
            desc: "Selección de la unidad espacial básica (cantón, parroquia, sector censal). Debe ser significativa para la toma de decisiones y compatible con los datos disponibles.", 
            color: "#ea580c" 
        },
        5: { 
            title: "Selección de variables", 
            desc: "Identificación de indicadores socioeconómicos clave: ingresos, educación, estructura familiar, acceso a servicios, vivienda, empleo, etc. Cada variable debe reflejar dimensiones de vulnerabilidad.", 
            color: "#ca8a04" 
        },
        6: { 
            title: "Evaluación de limitaciones", 
            desc: "Análisis de datos faltantes, valores atípicos, sesgos de agregación y problemas de multicolinealidad. Se aplican técnicas de imputación y sensibilidad para minimizar incertidumbre.", 
            color: "#db2777" 
        },
        7: { 
            title: "Estandarización", 
            desc: "Transformación de variables a escalas comparables (Z-score o rango 0-1). Se evita que variables con unidades distintas dominen el índice final.", 
            color: "#0284c7" 
        },
        8: { 
            title: "Reducción de factores", 
            desc: "Aplicación de Análisis de Componentes Principales (ACP) para agrupar variables correlacionadas en factores sintéticos. Se retienen componentes con autovalor >1, explicando la varianza.", 
            color: "#65a30d" 
        },
        9: { 
            title: "Construcción del índice", 
            desc: "Suma ponderada de los factores retenidos, generando el índice SoVI. Se normaliza para facilitar comparaciones espaciales y categorización de vulnerabilidad.", 
            color: "#dc2626" 
        },
        10: { 
            title: "Mapeo de resultados", 
            desc: "Visualización cartográfica mediante cuantiles o clasificación natural. Los mapas permiten identificar hotspots de vulnerabilidad y comunicar hallazgos a tomadores de decisiones.", 
            color: "#0d9488" 
        }
    };

    // Elementos DOM
    const modal = document.getElementById('stageModal');
    const modalNumberSpan = document.getElementById('modalNumber');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalContent = document.querySelector('.modal-content');
    let lastFocusedNode = null;

    function openModal(stageId, nodeElement) {
        const data = stagesData[stageId];
        if (!data) return;
        
        lastFocusedNode = nodeElement;
        
        modalNumberSpan.textContent = stageId;
        modalNumberSpan.style.backgroundColor = data.color;
        modalNumberSpan.style.boxShadow = `0 6px 14px ${data.color}60`;
        modalTitle.textContent = data.title;
        modalBody.innerHTML = data.desc;
        modalContent.style.borderTopColor = data.color;
        
        modal.classList.add('active');
        const closeBtn = document.getElementById('closeModalBtn');
        if (closeBtn) closeBtn.focus();
    }

    function closeModal() {
        modal.classList.remove('active');
        if (lastFocusedNode && typeof lastFocusedNode.focus === 'function') {
            lastFocusedNode.focus();
        }
    }

    // Asignar eventos a los nodos
    const nodes = document.querySelectorAll('.node');
    nodes.forEach(node => {
        node.addEventListener('click', (e) => {
            e.stopPropagation();
            const stage = node.getAttribute('data-stage');
            if (stage) openModal(parseInt(stage), node);
        });
        node.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const stage = node.getAttribute('data-stage');
                if (stage) openModal(parseInt(stage), node);
            }
        });
    });

    const closeBtn = document.getElementById('closeModalBtn');
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    // --------------------------------------------------------------
    // POSICIONAMIENTO CIRCULAR EN ESCRITORIO (totalmente dinámico)
    // --------------------------------------------------------------
    function positionNodesDesktop() {
        // Solo en modo escritorio (pantalla > 700px)
        if (window.innerWidth <= 700) return;
        
        const container = document.querySelector('.sovi-container');
        if (!container) return;
        const nodesList = document.querySelectorAll('.node');
        if (!nodesList.length) return;
        
        const containerWidth = container.offsetWidth;
        const containerHeight = container.offsetHeight;
        const centerX = containerWidth / 2;
        const centerY = containerHeight / 2;
        
        // Radio dinámico: 38% del contenedor para que los nodos queden dentro del círculo
        const radius = Math.min(containerWidth, containerHeight) * 0.36;
        
        nodesList.forEach((node, idx) => {
            const nodeWidth = node.offsetWidth;
            const nodeHeight = node.offsetHeight;
            const angleDeg = -90 + (idx * 36); // empezar arriba (12 en punto)
            const angleRad = angleDeg * Math.PI / 180;
            
            let x = centerX + radius * Math.cos(angleRad) - (nodeWidth / 2);
            let y = centerY + radius * Math.sin(angleRad) - (nodeHeight / 2);
            
            // Evitar que se salga completamente del borde
            x = Math.min(Math.max(x, 5), containerWidth - nodeWidth - 5);
            y = Math.min(Math.max(y, 5), containerHeight - nodeHeight - 5);
            
            node.style.position = 'absolute';
            node.style.left = `${x}px`;
            node.style.top = `${y}px`;
            node.style.right = 'auto';
            node.style.bottom = 'auto';
            node.style.transform = 'none';
            node.style.display = 'flex';
        });
    }

    function resetForMobile() {
        if (window.innerWidth <= 700) {
            const container = document.querySelector('.sovi-container');
            if (container) {
                container.style.display = 'flex';
                container.style.flexDirection = 'column';
                container.style.height = 'auto';
            }
            const nodesMobile = document.querySelectorAll('.node');
            nodesMobile.forEach(node => {
                node.style.position = 'relative';
                node.style.left = '';
                node.style.top = '';
                node.style.transform = '';
                node.style.width = '';
                node.style.marginBottom = '12px';
            });
        } else {
            const container = document.querySelector('.sovi-container');
            if (container) {
                container.style.display = 'block';
                container.style.height = 'auto';
            }
            const nodesDesktop = document.querySelectorAll('.node');
            nodesDesktop.forEach(node => {
                node.style.position = 'absolute';
                node.style.marginBottom = '0';
            });
            // Esperar a que termine el reflow para posicionar
            setTimeout(() => positionNodesDesktop(), 10);
        }
    }

    // Manejar resize con debounce
    let resizeTimer;
    function handleResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            resetForMobile();
        }, 100);
    }
    
    window.addEventListener('load', () => {
        // Asignar colores de borde a cada nodo
        nodes.forEach(node => {
            const stage = node.getAttribute('data-stage');
            const colorVar = stagesData[stage]?.color || '#0891b2';
            node.style.borderColor = colorVar;
            const numberSpan = node.querySelector('.node-number');
            if (numberSpan) numberSpan.style.color = colorVar;
        });
        resetForMobile();
        window.addEventListener('resize', handleResize);
        
        // Observador para cambios de tamaño del contenedor (útil en iframes)
        if (window.ResizeObserver) {
            const containerObserve = document.querySelector('.sovi-container');
            if (containerObserve) {
                const resizeObserver = new ResizeObserver(() => {
                    if (window.innerWidth > 700) positionNodesDesktop();
                });
                resizeObserver.observe(containerObserve);
            }
        }
    });
</script>
