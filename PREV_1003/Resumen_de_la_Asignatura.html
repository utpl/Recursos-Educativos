<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Resumen de la Asignatura – Introducción a los Riesgos de Desastres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-dark: #0f172a;
  --primary-main: #1e40af;
  --primary-light: #3b82f6;
  --accent: #0ea5e9;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --glass-bg: rgba(255,255,255,0.95);
  --glass-border: rgba(255,255,255,0.7);
  --glass-shadow: 0 8px 32px 0 rgba(31,38,135,0.15);
  --text-main: #1e293b;
  --text-light: #64748b;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(135deg,#f0f4f8 0%,#e2e8f0 50%,#f1f5f9 100%);
  background-attachment:fixed;
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
  width:800px;
  margin:0 auto;
}
/* ── HEADER ── */
.academic-header{
  background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary-main) 100%);
  padding:28px 24px 22px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.academic-header::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.08) 1px,transparent 1px);
  background-size:50px 50px;opacity:.3;
  animation:patternMove 20s linear infinite;
}
@keyframes patternMove{0%{transform:translate(0,0);}100%{transform:translate(50px,50px);}}
.header-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);
  padding:6px 18px;border-radius:50px;font-size:.8rem;font-weight:500;
  color:rgba(255,255,255,.9);margin-bottom:18px;
  border:1px solid rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:1px;
}
.academic-header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,3vw,1.9rem);
  color:#fff;margin-bottom:8px;line-height:1.2;
  position:relative;text-shadow:0 2px 10px rgba(0,0,0,.2);
}
.academic-header .subtitle{
  font-size:1rem;color:rgba(255,255,255,.85);font-weight:300;
  position:relative;
}

/* ── PROGRESS BAR ── */
.progress-wrapper{height:4px;background:rgba(30,64,175,.15);}
.progress-bar-top{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--success));transition:width .5s ease;}

/* ── TOP CONTROLS ── */
.top-controls{
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  padding:12px 20px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--glass-shadow);position:sticky;top:0;z-index:100;
}
.breadcrumb{font-size:.85rem;color:var(--text-light);}
.breadcrumb span{color:var(--primary-main);font-weight:600;}
.view-toggle{display:flex;gap:6px;background:rgba(241,245,249,.8);padding:4px;border-radius:10px;}
.view-btn{border:none;background:transparent;padding:6px 14px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:500;color:var(--text-light);transition:all .3s;}
.view-btn.active{background:#fff;color:var(--primary-main);box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* ── GRID ── */
.grid-container{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
  padding:24px 20px;
}
.week-card{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);cursor:pointer;overflow:hidden;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;position:relative;
  box-shadow:0 4px 6px -1px rgba(0,0,0,.05);
  opacity:0;animation:cardEnter .6s ease forwards;
}
.week-card:nth-child(1){animation-delay:.05s}.week-card:nth-child(2){animation-delay:.1s}
.week-card:nth-child(3){animation-delay:.15s}.week-card:nth-child(4){animation-delay:.2s}
.week-card:nth-child(5){animation-delay:.25s}.week-card:nth-child(6){animation-delay:.3s}
.week-card:nth-child(7){animation-delay:.35s}.week-card:nth-child(8){animation-delay:.4s}
@keyframes cardEnter{from{opacity:0;transform:translateY(20px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.week-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 40px -10px rgba(0,0,0,.15);border-color:var(--primary-light);}
.card-emoji-box{
  width:100%;height:72px;
  background:linear-gradient(135deg,var(--primary-main) 0%,var(--primary-light) 100%);
  display:flex;align-items:center;justify-content:center;font-size:2.2rem;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.week-card:hover .card-emoji-box{transform:scale(1.08);}
.card-content{padding:14px 12px;flex:1;display:flex;flex-direction:column;}
.card-number{font-size:.7rem;font-weight:700;color:var(--primary-main);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;}
.card-title{font-size:.85rem;font-weight:700;color:var(--primary-dark);line-height:1.3;margin-bottom:8px;}
.card-unit{font-size:.72rem;color:var(--text-light);line-height:1.4;margin-top:auto;padding-top:8px;border-top:1px solid rgba(0,0,0,.05);}
.status-dot{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);border:2px solid #fff;z-index:3;}
.week-card.visited .status-dot{background:var(--success);box-shadow:0 0 10px var(--success);}
.week-card.current .status-dot{background:var(--warning);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.2);opacity:.8;}}

/* ── LIST VIEW ── */
.list-view{display:none;padding:20px;}
.list-view.active{display:block;}
.list-item{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:var(--radius-md);padding:18px 20px;margin-bottom:12px;
  display:flex;align-items:center;gap:16px;cursor:pointer;
  transition:all .3s ease;
}
.list-item:hover{transform:translateX(6px);border-color:var(--primary-light);box-shadow:var(--glass-shadow);}
.list-num{width:46px;height:46px;background:linear-gradient(135deg,var(--primary-main),var(--primary-light));color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0;}
.list-content{flex:1;}
.list-title{font-size:1rem;font-weight:700;color:var(--primary-dark);}
.list-unit{font-size:.82rem;color:var(--text-light);margin-top:2px;}
.list-arrow{color:var(--text-light);font-size:1.3rem;transition:transform .3s;}
.list-item:hover .list-arrow{transform:translateX(4px);color:var(--primary-main);}
.grid-container.hidden{display:none;}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(15,23,42,.82);backdrop-filter:blur(14px);
  z-index:1000;opacity:0;visibility:hidden;transition:all .4s ease;
  display:flex;justify-content:center;align-items:center;padding:10px;
}
.modal-backdrop.active{opacity:1;visibility:visible;}
.modal-container{
  background:#fff;width:100%;max-width:760px;max-height:92vh;
  border-radius:var(--radius-lg);box-shadow:0 25px 60px -12px rgba(0,0,0,.5);
  display:flex;flex-direction:column;
  transform:scale(.9) translateY(30px);transition:all .5s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
.modal-backdrop.active .modal-container{transform:scale(1) translateY(0);}
.modal-header{
  background:linear-gradient(135deg,var(--primary-main) 0%,var(--primary-light) 100%);
  color:#fff;padding:16px 20px;flex-shrink:0;position:relative;overflow:hidden;
}
.modal-header::before{
  content:'';position:absolute;top:-50%;right:-5%;width:350px;height:350px;
  background:radial-gradient(circle,rgba(255,255,255,.15) 0%,transparent 70%);border-radius:50%;
}
.modal-nav-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:2;}
.btn-close{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);width:36px;height:36px;border-radius:50%;color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.btn-close:hover{background:rgba(255,255,255,.3);transform:rotate(90deg);}
.modal-week-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:50px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px solid rgba(255,255,255,.3);}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;margin-top:12px;line-height:1.3;max-width:85%;position:relative;z-index:2;}
.modal-unit{font-size:.9rem;opacity:.9;margin-top:10px;font-weight:300;position:relative;z-index:2;}

/* ── MODAL BODY ── */
.modal-body{padding:0;overflow-y:auto;flex:1;scroll-behavior:smooth;}
.modal-body::-webkit-scrollbar{width:7px;}
.modal-body::-webkit-scrollbar-track{background:#f1f5f9;}
.modal-body::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
.modal-body::-webkit-scrollbar-thumb:hover{background:#94a3b8;}

/* ── SLIDES PAGES ── */
.slide-page{display:none;padding:32px 36px;border-bottom:1px solid #f1f5f9;animation:fadeInUp .5s ease;}
.slide-page.active{display:block;}
.slide-page:last-child{border-bottom:none;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ── SECTION STYLES ── */
.section-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;}
.section-number{width:38px;height:38px;background:linear-gradient(135deg,var(--primary-main),var(--accent));color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;flex-shrink:0;box-shadow:0 4px 10px rgba(30,64,175,.3);}
.section-title{font-size:1.25rem;font-weight:700;color:var(--primary-dark);line-height:1.3;padding-top:6px;}
.section-content{font-size:.98rem;line-height:1.8;color:var(--text-main);}
.section-content p{margin-bottom:14px;}
.section-content strong{color:var(--primary-main);font-weight:600;}
.section-content ul{list-style:none;margin:12px 0;padding:0;}
.section-content li{position:relative;padding-left:24px;margin-bottom:10px;line-height:1.6;}
.section-content li::before{content:'▸';color:var(--accent);font-weight:bold;position:absolute;left:0;}

/* ── WEEK INTRO BOX ── */
.week-intro{
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  border-left:4px solid var(--primary-main);
  padding:18px 22px;border-radius:0 12px 12px 0;
  margin-bottom:24px;font-size:.95rem;line-height:1.7;color:var(--text-main);
}
.week-intro strong{color:var(--primary-main);}

/* ── INFO BOX ── */
.info-box{
  background:linear-gradient(135deg,#f0f9ff,#e0f2fe);
  border-left:4px solid var(--accent);
  padding:20px 22px;border-radius:0 14px 14px 0;margin:18px 0;position:relative;
}
.info-box h4{color:var(--primary-main);margin-bottom:10px;font-size:1rem;}
.info-box ul{list-style:none;padding:0;margin:0;}
.info-box li{position:relative;padding-left:22px;margin-bottom:8px;font-size:.92rem;line-height:1.5;}
.info-box li::before{content:'▸';color:var(--accent);position:absolute;left:0;}

/* ── DATA TABLE ── */
.data-table{width:100%;border-collapse:collapse;margin:18px 0;font-size:.9rem;border-radius:10px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,.06);}
.data-table th{background:linear-gradient(135deg,var(--primary-main),var(--primary-light));color:#fff;padding:13px 14px;text-align:left;font-weight:600;}
.data-table td{padding:12px 14px;border-bottom:1px solid #e2e8f0;background:#fff;vertical-align:top;}
.data-table tr:hover td{background:#f8fafc;}
.data-table tr:last-child td{border-bottom:none;}
.data-table td ul{list-style:none;padding:0;margin:0;}
.data-table td li{position:relative;padding-left:18px;margin-bottom:6px;font-size:.88rem;}
.data-table td li::before{content:'•';color:var(--accent);position:absolute;left:0;}

/* ── SEMÁFORO TABLE ── */
.semaforo-table{width:100%;border-collapse:collapse;margin:18px 0;font-size:.88rem;border-radius:10px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,.06);}
.semaforo-table th{padding:13px 14px;text-align:left;font-weight:700;color:#fff;}
.semaforo-table td{padding:11px 14px;border-bottom:1px solid #e2e8f0;background:#fff;vertical-align:top;font-size:.87rem;line-height:1.5;}
.semaforo-table tr:last-child td{border-bottom:none;}
.th-red{background:var(--danger);}
.th-yellow{background:var(--warning);}
.th-green{background:var(--success);}

/* ── IMAGES ── */
.content-img{
  display:block;width:100%;max-width:560px;margin:18px auto;
  border-radius:var(--radius-md);
  box-shadow:0 6px 20px rgba(0,0,0,.12);
  border:1px solid #e2e8f0;
}
.img-caption{text-align:center;font-size:.8rem;color:var(--text-light);margin-top:-10px;margin-bottom:16px;}

/* ── SIMULATOR / IFRAME ── */
.simulator-link{
  width:100%;margin:20px 0;border-radius:var(--radius-md);overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.12);border:1px solid #e2e8f0;
}
.simulator-link iframe{display:block;width:100%;border:none;}

/* ── FORMULA BOX ── */
.formula-box{
  background:#f8fafc;border:2px solid var(--primary-light);
  border-radius:12px;padding:18px 22px;margin:16px 0;text-align:center;
  font-size:1.05rem;font-weight:600;color:var(--primary-main);
}
.formula-box sub{font-size:.75em;}

/* ── REFERENCE BOX ── */
.ref-box{
  background:#f8fafc;border:1px solid #e2e8f0;
  padding:16px 20px;border-radius:10px;margin-top:24px;
  font-size:.82rem;color:var(--text-light);font-style:italic;
}
.ref-box::before{content:'📖 ';font-style:normal;}

/* ── SLIDE COUNTER ── */
.slide-counter{text-align:center;padding:12px;font-size:.8rem;color:var(--text-light);}

/* ── MODAL FOOTER ── */
.modal-footer{
  padding:16px 24px;border-top:2px solid #f1f5f9;
  display:flex;justify-content:space-between;align-items:center;background:#fff;flex-shrink:0;
}
.nav-btn{
  background:#fff;border:2px solid #e2e8f0;color:var(--text-main);
  padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:600;
  cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px;font-size:.88rem;
}
.nav-btn:hover:not(:disabled){border-color:var(--primary-main);color:var(--primary-main);background:#eff6ff;}
.nav-btn.next-btn:hover:not(:disabled){transform:translateX(4px);}
.nav-btn.prev-btn:hover:not(:disabled){transform:translateX(-4px);}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;}
.nav-btn.primary{background:linear-gradient(135deg,var(--primary-main),var(--primary-light));color:#fff;border:none;}
.nav-btn.primary:hover{background:linear-gradient(135deg,#1e3a8a,#2563eb);box-shadow:0 4px 12px rgba(30,64,175,.4);}
.progress-dots{display:flex;gap:5px;align-items:center;}
.pdot{width:7px;height:7px;border-radius:50%;background:#e2e8f0;transition:all .3s;}
.pdot.active{background:var(--primary-main);width:22px;border-radius:4px;}
.pdot.done{background:var(--success);}
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div class="progress-wrapper"><div class="progress-bar-top" id="progressBarTop"></div></div>

<!-- HEADER -->
<header class="academic-header">

  <h1>Resumen de la Asignatura</h1>
  <p class="subtitle">Introducción a los Riesgos de Desastres</p>
</header>

<!-- TOP CONTROLS -->
<div class="top-controls">
  <div class="breadcrumb">Inicio <span style="color:#94a3b8"> / </span> <span id="currentViewLabel">Cuadrícula</span></div>
  <div class="view-toggle">
    <button class="view-btn active" onclick="switchView('grid')">⊞ Cuadrícula</button>
    <button class="view-btn" onclick="switchView('list')">☰ Lista</button>
  </div>
</div>

<!-- GRID VIEW -->
<main class="grid-container" id="gridView"></main>

<!-- LIST VIEW -->
<div class="list-view" id="listView"></div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-container">
    <header class="modal-header">
      <div class="modal-nav-top">
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-week-badge" id="modalBadge">Semana 1</div>
      <h2 class="modal-title" id="modalTitle">Título</h2>
      <div class="modal-unit" id="modalUnit">Unidad</div>
    </header>
    <div class="modal-body" id="modalBody"></div>
    <footer class="modal-footer">
      <button class="nav-btn prev-btn" id="btnPrev" onclick="navigateWeek(-1)">← Anterior</button>
      <div class="progress-dots" id="modalDots"></div>
      <button class="nav-btn next-btn primary" id="btnNext" onclick="navigateWeek(1)">Siguiente →</button>
    </footer>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA  –  contenido EXACTO del documento Word
// ─────────────────────────────────────────────
const weeks = [
  // ══ SEMANA 1 ══
  {
    num: 1,
    title: "Fundamentos del Riesgo y Territorio",
    emoji: "🗺️",
    unit: "Unidad 1. Fundamentos de la Gestión del Riesgo de Desastres",
    pages: [
      {
        id:"s1-intro",
        sectionNum:"",
        sectionTitle:"Semana 1",
        html:`
          <div class="week-intro">En esta semana se abordaron los fundamentos del riesgo, sus principios, antecedentes y evolución hacia su modelo actual.</div>
          <ul style="list-style:none;padding:0;margin:0;">
            <li style="padding:9px 0;border-bottom:1px solid #f1f5f9;font-weight:600;color:var(--primary-main);">1.1. Territorio y sistemas expuestos: fundamentos del riesgo</li>
            <li style="padding:9px 0;border-bottom:1px solid #f1f5f9;font-weight:600;color:var(--primary-main);">1.2. Perspectivas conceptuales del Territorio</li>
            <li style="padding:9px 0;border-bottom:1px solid #f1f5f9;font-weight:600;color:var(--primary-main);">1.3. Relación entre Territorio y Riesgo de Desastres</li>
            <li style="padding:9px 0;border-bottom:1px solid #f1f5f9;font-weight:600;color:var(--primary-main);">1.4. Aproximación conceptual a los "desastres socio naturales"</li>
            <li style="padding:9px 0;font-weight:600;color:var(--primary-main);">1.5. ¿Desde qué perspectiva se interpretan los desastres?</li>
          </ul>
        `
      },
      {
        id:"s1-1",
        sectionNum:"1.1",
        sectionTitle:"Territorio y sistemas expuestos: fundamentos del riesgo",
        html:`
          <div class="section-content">
            <p><strong>¿Qué es?</strong><br>
            Es donde se organiza la vida cotidiana, la infraestructura, los servicios, los ecosistemas y las decisiones políticas. Por ello, comprender el riesgo exige mirar el territorio como un sistema, allí se ubican los elementos expuestos, se acumulan vulnerabilidades y se definen las condiciones que pueden amplificar o reducir los impactos de una amenaza.</p>
            <div class="info-box">
              <h4>Propósito</h4>
              <ul>
                <li>El espacio como contenedor donde ocurren los hechos.</li>
                <li>El espacio como reflejo de la sociedad (expresa dinámicas y estructuras).</li>
                <li>El espacio como dimensión integrada a los procesos sociales (participa activamente en su configuración y transformación).</li>
              </ul>
            </div>
          </div>
        `
      },
      {
        id:"s1-2",
        sectionNum:"1.2",
        sectionTitle:"Perspectivas conceptuales del Territorio",
        html:`
          <div class="section-content">
            <div class="simulator-link">
              <iframe src="./Perspectivas_conceptuales_del_Territorio.html" style="width:100%;height:600px;" title="S1 Guion 1 - Perspectivas conceptuales del Territorio"></iframe>
            </div>
          </div>
        `
      },
      {
        id:"s1-3",
        sectionNum:"1.3",
        sectionTitle:"Relación entre Territorio y Riesgo de Desastres",
        html:`
          <div class="section-content">
            <p>En la literatura contemporánea se ha difundido la idea de los desastres socio naturales, para enfatizar que, aunque el fenómeno detonante pueda tener origen natural (por ejemplo, un sismo o una lluvia intensa), la forma en que el desastre se produce y se agrava suele estar mediada por la acción humana. Esto incluye decisiones de ocupación del suelo, desigualdades sociales, calidad de la infraestructura, acceso a servicios y capacidades institucionales. En este sentido, el desastre no se explica únicamente por lo que hace la naturaleza, sino por cómo la sociedad construye condiciones de riesgo en el territorio.</p>
            <div class="info-box">
              <h4>¿Qué relación existe entre territorio y desastres?</h4>

        sectionTitle:"El riesgo y sus múltiples significados",
        html:`
          <div class="section-content">
            <p>Hoy se reconoce que el riesgo puede expresarse de formas distintas y que no todo impacto relevante proviene de un evento "gigante".</p>
            <div class="info-box"><h4>Concepciones</h4>
              <ul>
                <li><strong>Riesgo intensivo:</strong> se asocia a eventos de alta severidad que ocurren con frecuencia media o baja, y cuyos daños tienden a concentrarse en áreas específicas, a menudo en zonas urbanas densamente pobladas.</li>
                <li><strong>Riesgo extensivo:</strong> se relaciona con eventos de menor severidad, pero frecuentes, usualmente más localizados; aunque cada episodio parezca pequeño, su repetición puede acumular pérdidas importantes y afectar de manera persistente a comunidades y economías locales (por ejemplo, pequeñas inundaciones recurrentes o deslizamientos localizados).</li>
              </ul>
            </div>
            <p>La diferencia entre riesgo intensivo y riesgo extensivo no depende solo del tamaño del evento, sino también de su frecuencia y de la forma en que las pérdidas se distribuyen en el tiempo. Un terremoto severo puede representar riesgo intensivo, mientras que pequeñas inundaciones recurrentes pueden expresar riesgo extensivo.</p>
            <div class="info-box"><h4>Dimensiones</h4>
              <ul>
                <li>El riesgo tiene al menos dos dimensiones, un material u objetiva, que puede analizarse con información técnica (por ejemplo, condiciones geológicas o climáticas) y una subjetiva, relacionada con cómo las personas perciben el riesgo.</li>
                <li>Cuando un riesgo se vuelve cotidiano, algunas personas pueden normalizarlo. Por ello se habla también de riesgo aceptable, entendiendo que lo aceptable debe preguntarse siempre para quién, para una institución, para una comunidad o para grupos específicos con mayor vulnerabilidad.</li>
              </ul>
            </div>
            <p><strong>Riesgo total</strong></p>
            <div class="formula-box">R<sub>total</sub> = R<sub>rot</sub> + R<sub>nrot</sub></div>
            <p>donde, de manera interpretativa:</p>
            <ul>
              <li>R<sub>rot</sub> representa el riesgo asociado a rotura/falla (zona oscura), y</li>
              <li>R<sub>nrot</sub> el riesgo asociado a no rotura/no falla (zona clara).</li>
            </ul>
            <img class="content-img" src="./media/Imagen 33.png" alt="Riesgo total">
            <p><strong>Riesgo incremental</strong></p>
            <p>Es la parte del riesgo que se origina exclusivamente cuando una infraestructura falla o pierde funcionalidad. Para estimarlo de manera operativa, se consideran dos elementos:</p>
            <ul>
              <li><strong>Probabilidad de falla:</strong> qué tan probable es que la infraestructura deje de cumplir su función.</li>
              <li><strong>Impacto adicional por la falla:</strong> cuánto aumentan las pérdidas debido a esa falla. Se calcula comparando dos escenarios, uno sin falla y otro con falla.</li>
            </ul>
          </div>
        `

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentWeek = 1;
let currentPage  = 0;
const visited    = new Set();

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderGrid();
  renderList();
});

// ─────────────────────────────────────────────
//  GRID + LIST
// ─────────────────────────────────────────────
function renderGrid(){
  const g = document.getElementById('gridView');
  g.innerHTML = '';
  weeks.forEach(w => {
    const el = document.createElement('article');
    el.className = 'week-card';
    el.onclick = () => openModal(w.num);
    el.innerHTML = `
      <div class="status-dot"></div>
      <div class="card-emoji-box">${w.emoji}</div>
      <div class="card-content">
        <div class="card-number">Semana 0${w.num}</div>
        <div class="card-title">${w.title}</div>
        <div class="card-unit">${w.unit}</div>
      </div>`;
    g.appendChild(el);
  });
}

function renderList(){
  const l = document.getElementById('listView');
  l.innerHTML = '';
  weeks.forEach(w => {
    const el = document.createElement('div');
    el.className = 'list-item';
    el.onclick = () => openModal(w.num);
    el.innerHTML = `
      <div class="list-num">0${w.num}</div>
      <div class="list-content">
        <div class="list-title">${w.title}</div>
        <div class="list-unit">${w.unit}</div>
      </div>
      <div class="list-arrow">→</div>`;
    l.appendChild(el);
  });
}

function switchView(v){
  const g = document.getElementById('gridView');
  const l = document.getElementById('listView');
  const btns = document.querySelectorAll('.view-btn');
  const lbl  = document.getElementById('currentViewLabel');
  btns.forEach(b => b.classList.remove('active'));
  if(v === 'grid'){
    g.classList.remove('hidden'); l.classList.remove('active');
    btns[0].classList.add('active'); lbl.textContent = 'Cuadrícula';
  } else {
    g.classList.add('hidden'); l.classList.add('active');
    btns[1].classList.add('active'); lbl.textContent = 'Lista';
  }
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(num){
  currentWeek = num;
  currentPage  = 0;
  visited.add(num);
  updateProgress();
  updateCardStates();
  renderModal();
  document.getElementById('modalBackdrop').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('active');
  document.body.style.overflow = '';
  updateCardStates();
}

function updateCardStates(){
  document.querySelectorAll('.week-card').forEach((c, i) => {
    c.classList.remove('current','visited');
    if(i+1 === currentWeek) c.classList.add('current');
    if(visited.has(i+1))   c.classList.add('visited');
  });
}

function renderModal(){
  const w = weeks[currentWeek-1];
  document.getElementById('modalBadge').textContent  = `Semana 0${w.num}`;
  document.getElementById('modalTitle').textContent  = w.title;
  document.getElementById('modalUnit').textContent   = w.unit;
  renderPages();
  renderDots();
  renderFooterBtns();
}

function renderPages(){
  const body = document.getElementById('modalBody');
  const w    = weeks[currentWeek-1];
  body.innerHTML = '';
  w.pages.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'slide-page' + (i === currentPage ? ' active' : '');
    div.id = `page-${i}`;
    let headerHtml = '';
    if(p.sectionNum){
      headerHtml = `<div class="section-header">
        <div class="section-number">${p.sectionNum}</div>
        <h3 class="section-title">${p.sectionTitle}</h3>
      </div>`;
    } else {
      headerHtml = `<div class="section-header">
        <h3 class="section-title" style="font-size:1.4rem;padding-top:0;">${p.sectionTitle}</h3>
      </div>`;
    }
    div.innerHTML = headerHtml + p.html;
    body.appendChild(div);
  });
  body.scrollTop = 0;
  renderSlideCounter();
}

function renderSlideCounter(){
  const w = weeks[currentWeek-1];
  const existing = document.getElementById('slideCounter');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'slideCounter';
  div.className = 'slide-counter';
  div.textContent = `Página ${currentPage+1} de ${w.pages.length}`;
  document.getElementById('modalBody').appendChild(div);
}

function renderDots(){
  const c = document.getElementById('modalDots');
  c.innerHTML = '';
  const total = weeks.length;
  for(let i=1; i<=total; i++){
    const d = document.createElement('div');
    d.className = 'pdot';
    if(i===currentWeek) d.classList.add('active');
    if(visited.has(i))  d.classList.add('done');
    c.appendChild(d);
  }
}

function renderFooterBtns(){
  const w = weeks[currentWeek-1];
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');

  // Previous page / week
  prev.disabled = (currentWeek === 1 && currentPage === 0);
  prev.onclick = () => {
    if(currentPage > 0){
      currentPage--;
      goToPage(currentPage);
    } else {
      navigateWeek(-1);
    }
  };

  // Next page / week
  const isLastPage = currentPage === w.pages.length - 1;
  const isLastWeek = currentWeek === weeks.length;
  if(isLastPage && isLastWeek){
    next.innerHTML = 'Finalizar ✓';
    next.onclick = () => { closeModal(); };
  } else if(isLastPage){
    next.innerHTML = 'Siguiente Semana →';
    next.onclick = () => navigateWeek(1);
  } else {
    next.innerHTML = 'Siguiente →';
    next.onclick = () => { currentPage++; goToPage(currentPage); };
  }
}

function goToPage(idx){
  document.querySelectorAll('.slide-page').forEach((p,i) => {
    p.classList.toggle('active', i === idx);
  });
  document.getElementById('modalBody').scrollTop = 0;
  renderSlideCounter();
  renderFooterBtns();
}

function navigateWeek(dir){
  const newW = currentWeek + dir;
  if(newW < 1 || newW > weeks.length) return;
  currentWeek = newW;
  currentPage  = 0;
  visited.add(currentWeek);
  updateProgress();
  updateCardStates();
  renderModal();
}

function updateProgress(){
  const pct = (visited.size / weeks.length) * 100;
  document.getElementById('progressBarTop').style.width = pct + '%';
}

// Close on backdrop click / ESC
document.getElementById('modalBackdrop').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
