<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis PESTEL</title>
  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: white;
      color: #2c2c2c;
      min-height: 100vh;
      padding: 32px 16px 48px;
    }

    /* ============================================================
       INSTRUCCIÓN
    ============================================================ */
    .instruccion {
      text-align: center;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 28px;
      letter-spacing: 0.03em;
    }

    .instruccion span {
      display: inline-block;
      background: #e8f4fd;
      border: 1px solid #b3d9f5;
      border-radius: 20px;
      padding: 6px 18px;
      color: #2176ae;
      font-weight: 600;
    }

    /* ============================================================
       TÍTULO PESTEL
    ============================================================ */
    .pestel-title {
      text-align: center;
      margin-bottom: 36px;
    }

    .pestel-title h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #2c3e50;
      line-height: 1;
    }

    .pestel-title p {
      font-size: 0.78rem;
      letter-spacing: 0.35em;
      color: #8a9bb0;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ============================================================
       GRID DE TARJETAS
    ============================================================ */
    .pestel-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ============================================================
       TARJETA INDIVIDUAL
    ============================================================ */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-radius: 12px 12px 0 0;
      outline: none;
      position: relative;
    }

    .card:hover, .card:focus {
      transform: translateY(-6px);
    }

    /* Cuerpo cuadrado con letra */
    .card-body {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Círculo con letra */
    .card-letter {
      width: 62%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Punta tipo flecha hacia abajo */
    .card-arrow {
      width: 100%;
      height: 32px;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      margin-top: -1px;
    }

    /* Etiqueta inferior */
    .card-label {
      margin-top: 10px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7c93;
      text-align: center;
    }

    /* Botón "+" sobre la tarjeta */
    .card-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(0,0,0,0.15);
      font-size: 1rem;
      font-weight: 700;
      color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      pointer-events: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ----  COLORES POR COMPONENTE  ---- */
    .p-card .card-body  { background: #a8b8d8; }
    .p-card .card-arrow { background: #a8b8d8; }
    .p-card .card-letter { color: #a8b8d8; }

    .e-card .card-body  { background: #7eccd4; }
    .e-card .card-arrow { background: #7eccd4; }
    .e-card .card-letter { color: #7eccd4; }

    .s-card .card-body  { background: #6dcbbf; }
    .s-card .card-arrow { background: #6dcbbf; }
    .s-card .card-letter { color: #6dcbbf; }

    .t-card .card-body  { background: #9dd68c; }
    .t-card .card-arrow { background: #9dd68c; }
    .t-card .card-letter { color: #9dd68c; }

    .en-card .card-body  { background: #f0d060; }
    .en-card .card-arrow { background: #f0d060; }
    .en-card .card-letter { color: #f0d060; }

    .l-card .card-body  { background: #f09090; }
    .l-card .card-arrow { background: #f09090; }
    .l-card .card-letter { color: #f09090; }

    /* ============================================================
       MODAL OVERLAY
    ============================================================ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.52);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 580px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.22s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.92) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);       opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 24px 16px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
      border-radius: 16px 16px 0 0;
    }

    .modal-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #2c3e50;
      letter-spacing: 0.04em;
    }

    .modal-close {
      margin-left: auto;
      background: #f0f2f5;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover { background: #e0e3e8; }

    .modal-body {
      padding: 20px 24px 28px;
    }

    .modal-body p {
      font-size: 0.93rem;
      line-height: 1.7;
      color: #3a4555;
      margin-bottom: 12px;
    }

    .modal-body ul {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .modal-body li {
      font-size: 0.93rem;
      line-height: 1.7;
      color: #3a4555;
      margin-bottom: 6px;
    }

    .modal-footer-note {
      font-size: 0.82rem;
      color: #7a8aa0;
      margin-top: 16px;
      font-style: italic;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    /* ============================================================
       COLORES DE ENCABEZADO DE MODAL POR COMPONENTE
    ============================================================ */
    .modal-icon.p  { background: #a8b8d8; }
    .modal-icon.e  { background: #7eccd4; }
    .modal-icon.s  { background: #6dcbbf; }
    .modal-icon.t  { background: #9dd68c; }
    .modal-icon.en { background: #f0d060; }
    .modal-icon.l  { background: #f09090; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 700px) {
      .pestel-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .card-letter { font-size: 1.8rem; }
      .pestel-title h1 { font-size: 2.2rem; }
    }

    @media (max-width: 400px) {
      .pestel-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       INSTRUCCIÓN
  ============================================================ -->
  <div class="instruccion">
    <span>Haga clic en el botón "+" para visualizar el contenido</span>
  </div>

  <!-- ============================================================
       TÍTULO
  ============================================================ -->
  <div class="pestel-title">
    <h1>PESTEL</h1>
    <p>Infographic</p>
  </div>

  <!-- ============================================================
       GRID DE 6 TARJETAS
  ============================================================ -->
  <div class="pestel-grid" role="list">

    <!-- P - POLÍTICO -->
    <div class="card p-card" role="listitem" tabindex="0"
         aria-label="Político – haga clic para ver contenido"
         onclick="openModal('political')">
      <div class="card-body">
        <div class="card-letter">P</div>
        <div class="card-btn">+</div>
      </div>
      <div class="card-arrow"></div>
      <div class="card-label">Political</div>
    </div>

    <!-- E - ECONÓMICO -->
    <div class="card e-card" role="listitem" tabindex="0"
         aria-label="Económico – haga clic para ver contenido"
         onclick="openModal('economic')">
      <div class="card-body">
        <div class="card-letter">E</div>
        <div class="card-btn">+</div>
      </div>
      <div class="card-arrow"></div>
      <div class="card-label">Economic</div>
    </div>

    <!-- S - SOCIAL -->
    <div class="card s-card" role="listitem" tabindex="0"
         aria-label="Social – haga clic para ver contenido"
         onclick="openModal('social')">
      <div class="card-body">
        <div class="card-letter">S</div>
        <div class="card-btn">+</div>
      </div>
      <div class="card-arrow"></div>
      <div class="card-label">Social</div>
    </div>

    <!-- T - TECNOLÓGICO -->
    <div class="card t-card" role="listitem" tabindex="0"
         aria-label="Tecnológico – haga clic para ver contenido"
         onclick="openModal('technology')">
      <div class="card-body">
        <div class="card-letter">T</div>
        <div class="card-btn">+</div>
      </div>
      <div class="card-arrow"></div>
      <div class="card-label">Technology</div>
    </div>

    <!-- E - ECOLÓGICO/AMBIENTAL -->
    <div class="card en-card" role="listitem" tabindex="0"
         aria-label="Ecológico/Ambiental – haga clic para ver contenido"
         onclick="openModal('environmental')">
      <div class="card-body">
        <div class="card-letter">E</div>
        <div class="card-btn">+</div>
      </div>
      <div class="card-arrow"></div>
      <div class="card-label">Environmental</div>
    </div>

    <!-- L - LEGAL -->
    <div class="card l-card" role="listitem" tabindex="0"
         aria-label="Legal – haga clic para ver contenido"
         onclick="openModal('legal')">
      <div class="card-body">
        <div class="card-letter">L</div>
        <div class="card-btn">+</div>
      </div>
      <div class="card-arrow"></div>
      <div class="card-label">Legal</div>
    </div>

  </div><!-- /pestel-grid -->

  <!-- ============================================================
       MODAL OVERLAY
  ============================================================ -->
  <div class="modal-overlay" id="modalOverlay" role="dialog"
       aria-modal="true" aria-labelledby="modalTitleText"
       onclick="closeOnOverlay(event)">
    <div class="modal" id="modalBox">
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"></div>
        <div class="modal-title" id="modalTitleText"></div>
        <button class="modal-close" onclick="closeModal()"
                aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body" id="modalContent"></div>
    </div>
  </div>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    /* ---- Datos de cada componente PESTEL ---- */
    const DATA = {

      political: {
        letter: 'P',
        colorClass: 'p',
        title: 'POLÍTICO',
        emoji: '🏛️',
        intro: 'En este apartado usted deberá analizar:',
        items: [
          'Las políticas públicas que afectan al sector en el que opera la organización.',
          'La estabilidad política del país y su influencia en la actividad económica.',
          'Programas gubernamentales de apoyo, incentivos o restricciones.',
          'Reformas o cambios en normativas que impactan al sector financiero, empresarial o productivo.'
        ],
        closing: 'Este análisis permitirá identificar cómo el contexto político regula, impulsa o limita la gestión de la organización.'
      },

      economic: {
        letter: 'E',
        colorClass: 'e',
        title: 'ECONÓMICO',
        emoji: '📈',
        intro: 'Este apartado requiere un análisis más profundo debido a su relevancia dentro del Prácticum I. Usted deberá examinar:',
        items: [
          'La evolución de las captaciones y colocaciones del sistema financiero.',
          'El comportamiento de las tasas de interés de la cartera comercial, productiva, microcrédito, consumo.',
          'La inflación, el empleo, el crecimiento económico y otros indicadores macroeconómicos.',
          'La disponibilidad de crédito y condiciones de financiamiento.',
          'Costos de producción, precios y tendencias económicas del sector.'
        ],
        closing: 'Esta información permitirá comprender las alternativas de financiamiento e inversión disponibles para la organización y anticipar riesgos económicos relevantes.'
      },

      social: {
        letter: 'S',
        colorClass: 's',
        title: 'SOCIAL',
        emoji: '👥',
        intro: 'En este componente usted evaluará:',
        items: [
          'Cambios en el comportamiento del consumidor.',
          'Nivel de educación financiera de la población.',
          'Tendencias sociales, culturales y demográficas.',
          'Preferencias sociales que influyen en la demanda de productos o servicios.',
          'Condiciones laborales y dinámicas comunitarias del entorno.'
        ],
        closing: 'Este análisis permitirá reconocer factores sociales que influyen en la demanda, la aceptación de productos o la relación con clientes y comunidades.'
      },

      technology: {
        letter: 'T',
        colorClass: 't',
        title: 'TECNOLÓGICO',
        emoji: '💻',
        intro: 'Aquí deberá analizar el grado de avance tecnológico del sector y de la organización:',
        items: [
          'Nivel de digitalización y uso de herramientas tecnológicas.',
          'Innovaciones en sistemas de pago, finanzas digitales o producción.',
          'Plataformas digitales utilizadas para ventas, atención o gestión interna.',
          'Automatización y sistemas tecnológicos del sector.',
          'Riesgos asociados a la ciberseguridad.'
        ],
        closing: 'Este componente permite evaluar si la organización cuenta con la tecnología necesaria para competir y adaptarse a los cambios del entorno.'
      },

      environmental: {
        letter: 'E',
        colorClass: 'en',
        title: 'ECOLÓGICO / AMBIENTAL',
        emoji: '🌿',
        intro: 'En este apartado usted deberá considerar:',
        items: [
          'Reglamentación ambiental aplicable al sector.',
          'Prácticas de sostenibilidad implementadas por la organización.',
          'Gestión de residuos, eficiencia energética y uso responsable de recursos.',
          'Riesgos ambientales que podrían afectar la operación.',
          'Normativas o exigencias en materia ambiental que impacten al sector.'
        ],
        closing: 'Este análisis permitirá identificar oportunidades relacionadas con prácticas sostenibles y posibles amenazas derivadas de obligaciones ambientales.'
      },

      legal: {
        letter: 'L',
        colorClass: 'l',
        title: 'LEGAL',
        emoji: '⚖️',
        intro: 'En este componente usted deberá analizar:',
        items: [
          'Normas laborales, tributarias y comerciales que regulan a la organización.',
          'Regulaciones específicas del sector financiero, productivo o de servicios.',
          'Exigencias de cumplimiento normativo.',
          'Riesgos legales y cambios recientes en la normativa aplicable.'
        ],
        closing: 'Este análisis permitirá comprender el marco legal que condiciona el funcionamiento de la entidad y sus obligaciones operativas y financieras.'
      }
    };

    /* ---- Abrir modal ---- */
    function openModal(key) {
      const d = DATA[key];
      if (!d) return;

      /* Ícono */
      const icon = document.getElementById('modalIcon');
      icon.className = 'modal-icon ' + d.colorClass;
      icon.textContent = d.emoji;

      /* Título */
      document.getElementById('modalTitleText').textContent = d.title;

      /* Cuerpo */
      let html = '';
      if (d.intro) html += `<p>${d.intro}</p>`;
      if (d.items && d.items.length) {
        html += '<ul>';
        d.items.forEach(item => { html += `<li>${item}</li>`; });
        html += '</ul>';
      }
      if (d.closing) html += `<p class="modal-footer-note">${d.closing}</p>`;

      document.getElementById('modalContent').innerHTML = html;

      /* Mostrar overlay */
      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';

      /* Foco al botón cerrar para accesibilidad */
      setTimeout(() => {
        const closeBtn = document.querySelector('.modal-close');
        if (closeBtn) closeBtn.focus();
      }, 50);
    }

    /* ---- Cerrar modal ---- */
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    /* ---- Cerrar al hacer clic fuera del modal ---- */
    function closeOnOverlay(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    /* ---- Teclado: Enter/Space en tarjetas, Escape para cerrar ---- */
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
