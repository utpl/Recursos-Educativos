<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Quiz – Topologías Básicas de Circuitos Eléctricos</title>
<style>
/* RESET BÁSICO */
:root {
  --primary: #0E2D52; --primary-d: #1B4F8A; --accent: #2E6DAD;
  --gold: #F5A800; --green: #006747; --sand: #E8F0FA;
  --blue-l: #B8CCE4; --bg: #FFFFFF; --surface: #F4F7FB;
  --text: #0E2D52; --muted: #4A5568; --border: #B8CCE4;
  --correct: #006747; --correct-bg: #e8f5ee;
  --wrong: #A51C30; --wrong-bg: #fdecea;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* CLAVE: HTML/BODY sin overflow hidden para permitir crecimiento */
html, body {
  width: 100%;
  height: auto;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: block; /* Importante: no flex en body para iframes */
}

/* CONTENEDOR PRINCIPAL (#sw) */
#sw {
  width: 100%;
  max-width: 900px; /* Un poco más ancho que el iframe para margen */
  margin: 0 auto;
  background: var(--surface);
  
  /* SOLUCIÓN AL PROBLEMA DE LOS 35PX: Altura mínima grande */
  min-height: 700px; 
  height: auto;
  
  display: flex;
  flex-direction: column;
  position: relative;
}

#stage {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: visible; /* Permitir que el contenido empuje */
}

/* HEADER */
.hdr {
  background: linear-gradient(110deg, var(--primary), var(--accent));
  padding: 0 20px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.hdr-l { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.hdr-ico { width: 32px; height: 32px; }
.hdr-t h1 { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr-t p { font-size: 10px; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bdg { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: var(--gold); color: var(--text); }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; min-height: 500px; } /* Min-height extra de seguridad */

.q-panel {
  flex: 1;
  padding: 20px;
  background: var(--surface);
  overflow: visible; /* Sin scroll interno */
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: linear-gradient(180deg, var(--sand), #dde8f5);
  border-left: 1px solid var(--border);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* COMPONENTES INTERNOS (Estilos simplificados para el ejemplo) */
.intro-wrap, .results-wrap { display: flex; flex-direction: column; gap: 20px; }
.intro-hero { background: var(--primary); color: #fff; padding: 20px; border-radius: 10px; display: flex; gap: 15px; align-items: center; }
.intro-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.meta-card { background: #fff; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
.meta-card strong { display: block; font-size: 13px; }
.meta-card span { font-size: 10px; color: var(--muted); }
.btn-start { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }

.q-wrap { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
.q-header { border-bottom: 2px solid var(--sand); padding-bottom: 10px; }
.q-text { font-size: 16px; font-weight: bold; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option { background: #fff; border: 2px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; display: flex; gap: 10px; align-items: center; }
.option:hover { border-color: var(--primary); background: var(--sand); }
.option.correct { border-color: var(--correct); background: var(--correct-bg); }
.option.wrong { border-color: var(--wrong); background: var(--wrong-bg); }

.tracker-item { background: #fff; padding: 8px; margin-bottom: 5px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; }
.tracker-item.active { border-color: var(--accent); background: #eaf2fb; }
.score-card { background: #fff; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); margin-top: auto; }
.score-num { font-size: 20px; font-weight: bold; color: var(--primary); }

.ftr { background: var(--primary); color: rgba(255,255,255,0.7); font-size: 10px; padding: 8px 20px; text-align: center; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .options-grid { grid-template-columns: 1fr; }
  .intro-meta { grid-template-columns: 1fr; }
  .hdr-t h1 { font-size: 12px; }
}
</style>
</head>
<body>

<div id="sw">
  <div id="stage">
    <!-- HEADER -->
    <div class="hdr">
      <div class="hdr-l">
        <svg class="hdr-ico" viewBox="0 0 38 38" fill="none"><rect width="38" height="38" rx="9" fill="rgba(255,255,255,.2)"/><circle cx="19" cy="19" r="10" fill="var(--gold)"/></svg>
        <div class="hdr-t">
          <h1>Topologías de Circuitos</h1>
          <p>ELEN_2019 | Semana 2</p>
        </div>
      </div>
      <div class="bdg">Quiz</div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="q-panel" id="q-panel"></div>
      
      <div class="sidebar">
        <div id="tracker-items"></div>
        <div class="score-card">
          <div class="score-num" id="scoreNum">0/5</div>
          <div style="font-size:10px; color:var(--muted)">Puntaje</div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="ftr">Seleccione la respuesta correcta</div>
  </div>
</div>

<script>
// DATOS DEL QUIZ
const QUIZ = [
  { type: 'tf', q: 'Una rama es un elemento de dos terminales.', correct: 0, opts: ['Verdadero','Falso'], author: 'Rama' },
  { type: 'mc', q: '¿Qué es un nodo?', opts: ['Un cable', 'Punto de conexión', 'Una batería'], correct: 1, author: 'Nodo' },
  { type: 'mc', q: 'Un lazo es una trayectoria...', opts: ['Abierta', 'Cerrada', 'Infinita'], correct: 1, author: 'Lazo' },
  { type: 'tf', q: 'En paralelo, los elementos tienen la misma tensión.', correct: 0, opts: ['Verdadero','Falso'], author: 'Paralelo' },
  { type: 'mc', q: 'Serie implica:', opts: ['Misma corriente', 'Mismo voltaje', 'Ninguna'], correct: 0, author: 'Serie' }
];

let current = -1, score = 0, answered = [], answers = [];

function init() {
  answered = Array(QUIZ.length).fill(false);
  answers = Array(QUIZ.length).fill(null);
  score = 0;
  renderIntro();
  resizeIframe();
}

function renderIntro() {
  current = -1;
  document.getElementById('q-panel').innerHTML = `
    <div class="intro-wrap">
      <div class="intro-hero">
        <div style="font-size:40px">⚡</div>
        <div><h2>¡Bienvenidos!</h2><p>Evalúa tus conocimientos sobre topologías.</p></div>
      </div>
      <div class="intro-meta">
        <div class="meta-card"><strong>5</strong><span>Preguntas</span></div>
        <div class="meta-card"><strong>Sin límite</strong><span>Tiempo</span></div>
        <div class="meta-card"><strong>Inmediata</strong><span>Retro</span></div>
      </div>
      <button class="btn-start" onclick="startQuiz()">▶ Comenzar Quiz</button>
    </div>`;
  updateTracker();
  resizeIframe();
}

function startQuiz() { renderQuestion(0); }

function renderQuestion(idx) {
  current = idx;
  const q = QUIZ[idx];
  let html = `<div class="q-wrap">
    <div class="q-header"><div class="q-text">${idx+1}. ${q.q}</div></div>
    <div class="options-grid">`;
  
  q.opts.forEach((opt, i) => {
    let cls = 'option';
    if(answered[idx]) {
      cls += ' disabled';
      if(i === q.correct) cls += ' correct';
      else if(answers[idx] === i) cls += ' wrong';
    }
    html += `<div class="${cls}" onclick="${answered[idx]?'':'selectAnswer('+idx+','+i+')'}">
      <div style="font-weight:bold; background:var(--primary); color:#fff; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;">${String.fromCharCode(65+i)}</div>
      <div>${opt}</div>
    </div>`;
  });
  
  html += `</div>`;
  
  if(answered[idx]) {
    const ok = answers[idx] === q.correct;
    html += `<div style="background:${ok?'var(--correct-bg)':'var(--wrong-bg)'}; padding:15px; border-radius:8px; margin-top:15px; border:1px solid ${ok?'var(--correct)':'var(--wrong)'}">
      <strong>${ok?'¡Correcto!':'Incorrecto'}</strong><br>${ok?'Muy bien.': 'La respuesta correcta era la opción '+String.fromCharCode(65+q.correct)+'. '}
    </div>`;
    
    if(idx < QUIZ.length - 1) {
      html += `<div style="margin-top:15px; text-align:right"><button class="btn-start" onclick="renderQuestion(${idx+1})">Siguiente ▶</button></div>`;
    } else {
      html += `<div style="margin-top:15px; text-align:right"><button class="btn-start" style="background:var(--green)" onclick="showResults()">Ver Resultados 🏆</button></div>`;
    }
  }
  
  html += `</div>`;
  document.getElementById('q-panel').innerHTML = html;
  updateTracker();
  resizeIframe();
}

function selectAnswer(qIdx, optIdx) {
  answered[qIdx] = true;
  answers[qIdx] = optIdx;
  if(optIdx === QUIZ[qIdx].correct) score++;
  renderQuestion(qIdx);
  updateScore();
  resizeIframe();
}

function showResults() {
  const pct = Math.round((score/QUIZ.length)*100);
  document.getElementById('q-panel').innerHTML = `
    <div class="results-wrap" style="text-align:center; padding:20px;">
      <div style="font-size:50px">🏆</div>
      <h2>Resultados</h2>
      <p style="font-size:24px; font-weight:bold; color:var(--primary)">${score}/${QUIZ.length} (${pct}%)</p>
      <p>${pct>=80?'¡Excelente trabajo!':(pct>=60?'Bien hecho':'Sigue practicando.')}</p>
      <button class="btn-start" onclick="init()">🔄 Intentar de nuevo</button>
    </div>`;
  resizeIframe();
}

function updateTracker() {
  const container = document.getElementById('tracker-items');
  container.innerHTML = '<div style="font-weight:bold; margin-bottom:10px; font-size:12px; color:var(--muted)">PREGUNTAS</div>';
  QUIZ.forEach((q, i) => {
    let cls = 'tracker-item';
    if(i===current) cls+=' active';
    else if(answered[i]) cls += (answers[i]===q.correct)?' correct-border':' wrong-border';
    container.innerHTML += `<div class="${cls}">${i+1}. ${q.author}</div>`;
  });
}

function updateScore() {
  document.getElementById('scoreNum').textContent = `${score}/${QUIZ.length}`;
}

/* ── SCRIPT MÁGICO PARA CANVAS ── */
function resizeIframe() {
  // Esperar un poco para que el DOM se renderice
  setTimeout(() => {
    // Calcular altura real
    const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight, 600);
    // Enviar mensaje a Canvas (LTI)
    window.parent.postMessage({ subject: 'lti.frameResize', message: { height: height + 20 } }, '*');
  }, 100);
}

// Escuchar cambios en el DOM para redimensionar automáticamente
const observer = new MutationObserver(resizeIframe);
observer.observe(document.body, { childList: true, subtree: true });

// Iniciar
window.addEventListener('load', () => {
  init();
  setTimeout(resizeIframe, 500); // Doble disparo por seguridad
});
</script>
</body>
</html>
