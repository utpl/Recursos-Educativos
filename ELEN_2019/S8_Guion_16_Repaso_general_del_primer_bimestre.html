<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Repaso General del Primer Bimestre — Circuitos Eléctricos</title>
<style>
:root{
  --primary:#0E2D52;--primary-d:#1B4F8A;--accent:#2E6DAD;
  --gold:#F5A800;--gold-d:#C98700;
  --green:#006747;--green-bg:#e8f5ee;
  --sand:#E8F0FA;--blue-l:#B8CCE4;
  --bg:#FFFFFF;--surface:#F4F7FB;
  --text:#0E2D52;--muted:#4A5568;--border:#B8CCE4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html, body {
  width: 100%;
  height: auto;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}
#sw {
  width: 100%;
  max-width: 850px;
  height: 520px;
  margin: 0 auto;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
#stage {
  width: 100%;
  height: 520px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* HEADER */
.hdr{background:linear-gradient(110deg,var(--primary) 0%,var(--primary-d) 50%,var(--accent) 100%);
  padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;right:-50px;top:-50px;width:160px;height:160px;
  border-radius:50%;background:rgba(245,168,0,.08);}
.hdr-l{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.hdr-ico{width:32px;height:32px;flex-shrink:0;}
.hdr-t h1{font-size:13px;font-weight:700;color:#fff;line-height:1.2;}
.hdr-t p{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
.bdg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);color:#fff;}
.bdg-gold{background:var(--gold);border-color:var(--gold-d);color:var(--primary);}

/* SLIDE PROGRESS */
.slide-prog{height:3px;background:rgba(0,0,0,.1);flex-shrink:0;display:flex;}
.sp-seg{flex:1;height:100%;background:transparent;transition:background .3s;}
.sp-seg.done{background:var(--gold);}

/* BODY */
.body{flex:1;display:flex;overflow:hidden;}

/* LEFT SIDEBAR — index */
.sidebar{width:180px;flex-shrink:0;background:var(--primary);display:flex;flex-direction:column;
  padding:10px 10px;gap:5px;overflow:hidden;}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:rgba(255,255,255,.5);margin-bottom:4px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;
  cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
.sb-item:hover{background:rgba(255,255,255,.08);}
.sb-item.active{background:rgba(255,255,255,.12);border-color:var(--gold);}
.sb-num{width:24px;height:24px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--primary);background:rgba(255,255,255,.25);}
.sb-item.active .sb-num{background:var(--gold);color:var(--primary);}
.sb-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);line-height:1.2;}
.sb-item.active .sb-label{color:#fff;}
/* formula pills */
.sb-pills{margin-top:auto;display:flex;flex-direction:column;gap:4px;}
.pill{background:rgba(245,168,0,.15);border:1px solid rgba(245,168,0,.3);border-radius:8px;
  padding:5px 10px;font-family:'Courier New',monospace;font-size:10px;font-weight:700;
  color:var(--gold);text-align:center;}

/* CONTENT PANEL */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 14px 8px;}

/* SLIDE header */
.slide-hdr{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-bottom:12px;}
.slide-num-tag{background:linear-gradient(135deg,var(--primary),var(--primary-d));
  color:#fff;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;white-space:nowrap;}
.slide-title{font-size:16px;font-weight:700;color:var(--text);}
.slide-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* INFOGRAFIA GRID — each slide has cards */
.info-grid{display:grid;gap:8px;flex:1;min-height:0;}
.g-2{grid-template-columns:repeat(2,1fr);grid-template-rows:1fr;}
.g-3{grid-template-columns:repeat(3,1fr);grid-template-rows:1fr;}
.g-4{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);}
.g-32{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);}

.ic{background:#fff;border-radius:10px;border:2px solid var(--border);
  padding:11px 13px;overflow:auto;display:flex;flex-direction:column;gap:4px;}
.ic-head{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.ic-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ic-title{font-size:12px;font-weight:700;color:var(--text);}
.ic-body{font-size:11px;color:var(--muted);line-height:1.6;flex:1;}
.ic-body b{color:var(--text);}
.ic-formula{font-family:'Courier New',monospace;font-size:11px;font-weight:700;
  color:var(--primary);background:var(--sand);border-radius:5px;
  border-left:3px solid var(--gold);padding:4px 8px;margin-top:4px;display:block;}
.ic-list{padding-left:13px;margin-top:2px;}
.ic-list li{font-size:11px;color:var(--muted);margin-bottom:3px;line-height:1.5;}
.ic-list li b{color:var(--text);}

/* INTRO SLIDE */
.intro-wrap{display:flex;flex-direction:column;gap:12px;height:100%;}
.intro-hero{background:linear-gradient(120deg,var(--primary) 0%,var(--primary-d) 50%,var(--accent) 100%);
  border-radius:12px;padding:18px 24px;display:flex;align-items:center;gap:18px;
  flex-shrink:0;position:relative;overflow:hidden;}
.intro-hero::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;
  border-radius:50%;background:rgba(245,168,0,.08);}
.intro-hero h2{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px;}
.intro-hero p{font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;}
.intro-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;flex:1;}
.intro-card{background:#fff;border-radius:10px;border:2px solid var(--border);
  padding:12px;display:flex;flex-direction:column;align-items:center;text-align:center;
  cursor:pointer;transition:all .2s;gap:6px;}
.intro-card:hover{transform:translateY(-3px);box-shadow:0 5px 16px rgba(14,45,82,.12);border-color:var(--accent);}
.intro-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.intro-label{font-size:12px;font-weight:700;color:var(--text);line-height:1.2;}
.intro-sub{font-size:10px;color:var(--muted);line-height:1.3;}
.intro-instr{font-size:12px;color:var(--muted);text-align:center;font-style:italic;}

/* NAV FOOTER */
.nav-bar{display:flex;align-items:center;gap:10px;flex-shrink:0;
  padding:7px 0 0 0;border-top:1px solid var(--border);margin-top:8px;}
.nav-btn{border:none;border-radius:20px;padding:6px 18px;font-family:inherit;
  font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s;}
.nav-btn:active{transform:scale(.97);}
.nav-prev{background:var(--sand);color:var(--text);border:1.5px solid var(--border);}
.nav-prev:hover{background:var(--blue-l);}
.nav-next{background:var(--primary);color:#fff;}
.nav-next:hover{background:var(--primary-d);}
.nav-dots{flex:1;display:flex;justify-content:center;gap:6px;}
.nd{width:8px;height:8px;border-radius:50%;background:var(--border);
  cursor:pointer;transition:all .2s;}
.nd.active{background:var(--gold);transform:scale(1.3);}
.nd.visited{background:var(--accent);}
.nav-info{font-size:11px;color:var(--muted);}

/* FOOTER */
.ftr{background:linear-gradient(90deg,var(--primary),var(--accent));
  height:22px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;}
.ftr-l{font-size:10px;color:rgba(255,255,255,.7);}
.ftr-r{font-size:10px;color:rgba(245,168,0,.85);font-style:italic;}
@media (max-width: 768px) {
  #sw { height: auto; min-height: 100vh; }
  #stage { height: auto; }
  .hdr { padding: 0 15px; height: 46px; }
  .hdr-t h1 { font-size: 11px; }
  .hdr-t p { font-size: 8px; }
  .body { flex-direction: column; }
  .sidebar {
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
    padding: 8px 10px;
    gap: 4px;
    height: auto;
  }
  .sb-title { display: none; }
  .sb-pills { display: none; }
  .sb-item { padding: 5px 8px; flex: 1; min-width: 80px; justify-content: center; }
  .sb-label { font-size: 10px; text-align: center; }
  .content { padding: 8px 10px 6px; }
  .intro-grid { grid-template-columns: repeat(3,1fr); }
  .g-32 { grid-template-columns: repeat(2,1fr); }
  .g-4 { grid-template-columns: repeat(2,1fr); }
  .g-3 { grid-template-columns: repeat(2,1fr); }
  .nav-info{display: none;}
}
@media (max-width: 480px) {
  .hdr-t h1 { font-size: 10px; }
  .hdr-t p { display: none; }
  .bdg { display: none; }
  .intro-grid { grid-template-columns: repeat(2,1fr); }
  .g-32, .g-4, .g-3 { grid-template-columns: 1fr; }
  .sb-item { min-width: 60px; }
  .sb-label { font-size: 9px; }
}
</style>
</head>
<body>
<div id="sw"><div id="stage">

<div class="hdr">
  <div class="hdr-l">
    <svg class="hdr-ico" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="7" fill="rgba(255,255,255,.12)"/>
      <rect x="5" y="6" width="14" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.2"/>
      <path d="M8 11h8M8 14h6M8 17h7M8 20h5" stroke="rgba(255,255,255,.6)" stroke-width="1" stroke-linecap="round"/>
      <circle cx="23" cy="23" r="6" fill="var(--gold)"/>
      <path d="M21 23h4M23 21v4" stroke="var(--primary)" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <div class="hdr-t">
      <h1>Repaso General del Primer Bimestre — Circuitos Eléctricos</h1>
    </div>
  </div>
  <div class="hdr-r">
    <span class="bdg bdg-gold">Presentación</span>
  </div>
</div>

<div class="slide-prog" id="slideProgBar"></div>

<div class="body">
  <div class="sidebar">
    <div class="sb-title">Índice</div>
    <div id="sb-items"></div>
    <div class="sb-pills">
      <div class="pill">τ = RC &nbsp;|&nbsp; τ = L/R</div>
      <div class="pill">V = I · R</div>
      <div class="pill">w = ½Cv²</div>
    </div>
  </div>
  <div class="content">
    <div id="slide-area" style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;"></div>
    <div class="nav-bar">
      <button class="nav-btn nav-prev" id="btn-prev">← Anterior</button>
      <div class="nav-dots" id="nav-dots"></div>
      <span class="nav-info" id="nav-info">0 / 6</span>
      <button class="nav-btn nav-next" id="btn-next">Siguiente →</button>
    </div>
  </div>
</div>

<div class="ftr">
  <span class="ftr-l">Elaboración propia</span>
  <span class="ftr-r">Haga clic en los temas para visualizar la información</span>
</div>

</div></div>

<script>
var SECTIONS = [
  { label:'Inicio', sub:'Presentación' },
  { label:'Conceptos y magnitudes', sub:'S1–S2' },
  { label:'Leyes de Ohm y Kirchhoff', sub:'S2–S3' },
  { label:'Métodos: nodos y mallas', sub:'S3–S5' },
  { label:'Teoremas de redes lineales', sub:'S6' },
  { label:'Capacitores e inductores', sub:'S7' }
];

var COLORS = ['#0E2D52','#1B4F8A','#2E6DAD','#006747','#9E1030','#F5A800'];
var NUM_COLORS = ['#fff','#fff','#fff','#fff','#fff','#0E2D52'];

var currentSlide = 0;
var visited = [true, false, false, false, false, false];

/* Build sidebar */
function buildSidebar() {
  var el = document.getElementById('sb-items');
  el.innerHTML = '';
  for (var i = 0; i < SECTIONS.length; i++) {
    var item = document.createElement('div');
    item.className = 'sb-item' + (i === currentSlide ? ' active' : '');
    item.dataset.idx = i;
    item.innerHTML =
      '<div class="sb-num">' + i + '</div>' +
      '<div class="sb-label">' + SECTIONS[i].label + '</div>';
    item.onclick = (function(idx) { return function() { goTo(idx); }; })(i);
    el.appendChild(item);
  }
}

/* Build dots */
function buildDots() {
  var el = document.getElementById('nav-dots');
  el.innerHTML = '';
  for (var i = 0; i < SECTIONS.length; i++) {
    var d = document.createElement('div');
    d.className = 'nd' + (i === currentSlide ? ' active' : (visited[i] ? ' visited' : ''));
    d.onclick = (function(idx) { return function() { goTo(idx); }; })(i);
    el.appendChild(d);
  }
  document.getElementById('nav-info').textContent = currentSlide + ' / ' + (SECTIONS.length - 1);
}

/* Build progress bar */
function buildProg() {
  var el = document.getElementById('slideProgBar');
  el.innerHTML = '';
  for (var i = 0; i < SECTIONS.length; i++) {
    var seg = document.createElement('div');
    seg.className = 'sp-seg' + (i <= currentSlide ? ' done' : '');
    el.appendChild(seg);
  }
}

function goTo(idx) {
  currentSlide = idx;
  visited[idx] = true;
  buildSidebar();
  buildDots();
  buildProg();
  renderSlide(idx);
}

/* Helper functions */
function card(color, title, bodyHTML) {
  return '<div class="ic"><div class="ic-head">'
    + '<div class="ic-dot" style="background:' + color + '"></div>'
    + '<div class="ic-title">' + title + '</div>'
    + '</div><div class="ic-body">' + bodyHTML + '</div></div>';
}
function formula(f) { return '<span class="ic-formula">' + f + '</span>'; }
function list(items) {
  var h = '<ul class="ic-list">';
  for (var i = 0; i < items.length; i++) h += '<li>' + items[i] + '</li>';
  return h + '</ul>';
}

function renderSlide(idx) {
  var area = document.getElementById('slide-area');

  if (idx === 0) {
    // INTRO
    var introCards = '';
    for (var i = 1; i < SECTIONS.length; i++) {
      introCards += '<div class="intro-card" onclick="goTo(' + i + ')">'
        + '<div class="intro-num" style="background:' + COLORS[i] + ';color:' + NUM_COLORS[i] + '">' + i + '</div>'
        + '<div class="intro-label">' + SECTIONS[i].label + '</div>'
        + '<div class="intro-sub">' + SECTIONS[i].sub + '</div>'
        + '</div>';
    }
    area.innerHTML = '<div class="intro-wrap">'
      + '<div class="intro-hero">'
      + '<svg width="56" height="56" viewBox="0 0 56 56" fill="none">'
      + '<rect width="56" height="56" rx="12" fill="rgba(255,255,255,.1)"/>'
      + '<rect x="8" y="10" width="22" height="28" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/>'
      + '<path d="M12 18h14M12 22h10M12 26h12M12 30h8" stroke="rgba(255,255,255,.5)" stroke-width="1.2" stroke-linecap="round"/>'
      + '<circle cx="40" cy="38" r="12" fill="var(--gold)"/>'
      + '<path d="M36 38h8M40 34v8" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"/>'
      + '</svg>'
      + '<div><h2>Repaso General del Primer Bimestre</h2>'
      + '<p>Repase los principios de la corriente directa; se integran en un marco coherente de magnitudes, leyes y métodos que permiten modelar y resolver circuitos con rigor. A continuación, se presentan conceptos, relaciones fundamentales y procedimientos clave para su análisis sistemático.</p></div>'
      + '</div>'
      + '<div class="intro-grid">' + introCards + '</div>'
      + '<div class="intro-instr">🔍 Haga clic en los temas para visualizar la información</div>'
      + '</div>';
    return;
  }

  var h = '';
  var gridCls = 'g-4';

  if (idx === 1) {
    // Conceptos y magnitudes — según documento
    gridCls = 'g-32';
    h += card(COLORS[1], 'Carga (Q)',
      'Propiedad intrínseca medida en Coulombs [C]. Un electrón tiene 1.602 x 10<sup>-19</sup> C.'
      + formula('q [C] — Coulombs'));
    h += card(COLORS[1], 'Corriente (I)',
      'Flujo de carga: i(t) = dq(t)/dt. Se mide en Amperios [A].'
      + formula('i(t) = dq(t) / dt'));
    h += card(COLORS[1], 'Voltaje (V)',
      'Diferencia de potencial: v = dw/dq. Energía por unidad de carga [V].'
      + formula('v = dw / dq'));
    h += card('#2E6DAD', 'Potencia (P)',
      'Rapidez de transferencia: p = v * i. En Watts [W]. <b>Absorbe:</b> corriente entra por (+). <b>Entrega:</b> corriente entra por (-).'
      + formula('p = v · i'));
    h += card('#2E6DAD', 'Energía (W)',
      'Capacidad de trabajo: w = ∫ p dt. En Joules [J] o kWh.'
      + formula('w = ∫ p · dt'));
    h += card(COLORS[4], 'Sistemas de unidades y prefijos',
      list([
        '<b>Mega / Kilo:</b> M (10<sup>6</sup>) / k (10<sup>3</sup>). Ejemplo: 1 MΩ = 1,000,000 Ω',
        '<b>Mili / Micro:</b> m (10<sup>-3</sup>) / μ (10<sup>-6</sup>). Ejemplo: 5 mA = 0.005 A',
        '<b>Nano / Pico:</b> n (10<sup>-9</sup>) / p (10<sup>-12</sup>). Común en capacitores'
      ]));
  }

  else if (idx === 2) {
    // Leyes de Ohm y Kirchhoff — según documento
    gridCls = 'g-32';
    h += card(COLORS[2], 'Ley de Ohm y resistencia',
      'Relación lineal: V = I * R o I = V * G.'
      + formula('V = I · R &nbsp;|&nbsp; I = V · G'));
    h += card(COLORS[2], 'Geometría de la resistencia',
      'Resistencia: R = ρ * (L / A). Depende de la resistividad (ρ), longitud (L) y área (A).'
      + formula('R = ρ · (L / A)'));
    h += card(COLORS[2], 'Conductancia y potencia en R',
      list([
        '<b>Conductancia (G):</b> G = 1/R. Medida en Siemens [S]',
        '<b>Potencia en R:</b> P = I²R = V²/R — disipación de calor'
      ]));
    h += card('#006747', 'Leyes de Kirchhoff (LCK y LVK)',
      list([
        '<b>LCK (nodos):</b> Suma de corrientes en un nodo es cero: Σ i<sub>n</sub> = 0 o Σ I<sub>in</sub> = Σ I<sub>out</sub>',
        '<b>LVK (lazos):</b> Suma de voltajes en una trayectoria cerrada es cero: Σ v<sub>n</sub> = 0'
      ]));
    h += card(COLORS[4], 'Divisor de voltaje',
      'En serie: V<sub>x</sub> = V<sub>s</sub> * R<sub>x</sub> / R<sub>eq</sub>'
      + formula('V<sub>x</sub> = V<sub>s</sub> · R<sub>x</sub> / R<sub>eq</sub>'));
    h += card(COLORS[4], 'Divisor de corriente y R equivalente',
      list([
        '<b>Divisor de corriente (2R):</b> I<sub>1</sub> = I<sub>t</sub> * (R<sub>2</sub> / (R<sub>1</sub> + R<sub>2</sub>))',
        '<b>Resistencia equivalente:</b> Serie: Σ R<sub>n</sub> ; Paralelo: 1 / Σ(1/R<sub>n</sub>)'
      ]));
  }

  else if (idx === 3) {
    // Métodos: nodos y mallas — según documento
    gridCls = 'g-4';
    h += card(COLORS[3], 'Análisis nodal — Procedimiento',
      list([
        '1. Elegir nodo de referencia (tierra)',
        '2. Asignar v<sub>1</sub>, v<sub>2</sub>... a cada nodo',
        '3. Aplicar LCK en cada nodo (usando la ley de Ohm)',
        '4. Resolver el sistema de ecuaciones'
      ]));
    h += card(COLORS[3], 'Supernodo',
      'Cuando hay una fuente de tensión entre dos nodos de no referencia. Se analiza como una sola entidad.'
      + formula('v<sub>a</sub> − v<sub>b</sub> = V<sub>fuente</sub>'));
    h += card('#1B4F8A', 'Análisis de mallas — Procedimiento',
      list([
        '1. Identificar mallas',
        '2. Asignar corrientes de malla (sentido horario)',
        '3. Aplicar LVK en cada malla',
        '4. Resolver el sistema para i<sub>1</sub>, i<sub>2</sub>...'
      ]));
    h += card('#1B4F8A', 'Supermalla',
      'Cuando hay una fuente de corriente en una rama compartida por dos mallas. Se excluye la rama de la corriente para la LVK.');
  }

  else if (idx === 4) {
    // Teoremas de redes lineales — según documento
    gridCls = 'g-32';
    h += card(COLORS[4], 'Superposición — Regla',
      'La variable total es la suma algebraica de las variables debidas a cada fuente independiente actuando sola.');
    h += card(COLORS[4], 'Superposición — Apagar fuentes',
      list([
        '<b>V = 0:</b> Cortocircuito',
        '<b>I = 0:</b> Circuito abierto',
        'Fuentes dependientes <b>no</b> se apagan'
      ]));
    h += card('#0E2D52', 'Thévenin',
      'Voltaje a circuito abierto (V<sub>Th</sub> = V<sub>oc</sub>) y resistencia vista (R<sub>Th</sub>).'
      + formula('V<sub>Th</sub> = V<sub>oc</sub> &nbsp;|&nbsp; R<sub>Th</sub> = R<sub>vista</sub>'));
    h += card('#0E2D52', 'Norton',
      'Corriente de cortocircuito (I<sub>N</sub> = I<sub>sc</sub>) y resistencia (R<sub>N</sub> = R<sub>Th</sub>).'
      + formula('I<sub>N</sub> = I<sub>sc</sub> &nbsp;|&nbsp; R<sub>N</sub> = R<sub>Th</sub>'));
    h += card('#2E6DAD', 'Conversión Thévenin ↔ Norton',
      'Permite cambiar entre modelos de serie y paralelo.'
      + formula('V<sub>Th</sub> = I<sub>N</sub> · R<sub>N</sub>'));
  }

  else if (idx === 5) {
    // Capacitores e inductores — según documento
    gridCls = 'g-32';
    h += card('#2E6DAD', 'Capacitores (C) — Relación I-V',
      'Almacena energía en campo eléctrico: i = C * (dv/dt). No permite cambios bruscos de voltaje.'
      + formula('i = C · dv/dt'));
    h += card('#2E6DAD', 'Capacitores — Energía y DC',
      list([
        '<b>Energía:</b> w = 1/2 * C * v²',
        '<b>En DC:</b> Se comporta como circuito abierto (corriente cero) tras cargarse',
        '<b>Capacitancia EQ.:</b> Paralelo: se suman. Serie: suma de inversos'
      ]));
    h += card('#006747', 'Inductores (L) — Relación V-I',
      'Almacena energía en campo magnético: v = L * (di/dt). No permite cambios bruscos de corriente.'
      + formula('v = L · di/dt'));
    h += card('#006747', 'Inductores — Energía y DC',
      list([
        '<b>Energía:</b> w = 1/2 * L * i²',
        '<b>En DC:</b> Se comporta como cortocircuito (voltaje cero) tras el transitorio',
        '<b>Inductancia EQ.:</b> Serie: se suman. Paralelo: suma de inversos'
      ]));
    h += card(COLORS[5], 'Constante de tiempo (τ)',
      list([
        '<b>RC:</b> τ = R * C',
        '<b>RL:</b> τ = L / R',
        'Se considera carga completa tras 5 constantes de tiempo (<b>5τ</b>)'
      ])
      + formula('τ = RC &nbsp;|&nbsp; τ = L/R'));
    h += card(COLORS[5], 'Respuesta transitoria (RC/RL)',
      'Transición entre estados inicial y final. Curva exponencial:'
      + formula('x(t) = X<sub>f</sub> + (X<sub>i</sub> − X<sub>f</sub>) · e<sup>−t/τ</sup>'));
  }

  var slideLabel = SECTIONS[idx] ? SECTIONS[idx].label : '';
  var slideSub   = SECTIONS[idx] ? SECTIONS[idx].sub : '';

  area.innerHTML =
    '<div class="slide-hdr">'
    + '<div class="slide-num-tag">Tema ' + idx + ' de 5</div>'
    + '<div><div class="slide-title">' + slideLabel + '</div>'
    + '<div class="slide-sub">' + slideSub + '</div></div>'
    + '</div>'
    + '<div class="info-grid ' + gridCls + '" style="flex:1;min-height:0;">' + h + '</div>';
}

/* Navigation */
document.getElementById('btn-prev').onclick = function() {
  if (currentSlide > 0) goTo(currentSlide - 1);
};
document.getElementById('btn-next').onclick = function() {
  if (currentSlide < SECTIONS.length - 1) goTo(currentSlide + 1);
};

/* INIT */
goTo(0);
</script>
</body>
</html>
