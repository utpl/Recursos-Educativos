<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Quiz – Magnitudes y Conceptos Eléctricos Fundamentales</title>
<style>
:root {
  --c1:#A51C30;--c2:#00529B;--c3:#8C1515;--c4:#B9D3B0;
  --c5:#6CACE4;--c6:#E1D9B9;--c7:#FFD700;--c8:#006747;
  --c9:#E68F71;--c10:#9E1030;--c11:#D2B48C;--c12:#6D351A;

  --primary:   #0E2D52;
  --primary-d: #1B4F8A;
  --accent:    #2E6DAD;
  --accent-d:  #0E2D52;
  --gold:      #F5A800;
  --gold-dark: #C98700;
  --green:     #006747;
  --green-l:   #B9D3B0;
  --sand:      #E8F0FA;
  --salmon:    #F5A800;
  --blue-l:    #B8CCE4;
  --bg:        #FFFFFF;
  --surface:   #F4F7FB;
  --text:      #0E2D52;
  --muted:     #4A5568;
  --border:    #B8CCE4;
  --correct:   #006747;
  --correct-bg:#e8f5ee;
  --wrong:     #A51C30;
  --wrong-bg:  #fdecea;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── CONTENEDOR PRINCIPAL RESPONSIVO ── */
html, body {
  width: 100%;
  height: auto; /* Permitir scroll si es necesario */
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}

#sw {
  width: 100%;
  max-width: 850px; /* Tamaño base solicitado */
  margin: 0 auto;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  /* Aspect ratio para mantener forma de video/iframe en escritorio */
  aspect-ratio: 16/9; 
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

#stage {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(110deg,var(--primary) 0%,var(--primary-d) 50%,var(--accent) 100%);
  padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;overflow:hidden;
}
.hdr::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;
  border-radius:50%;background:rgba(245,168,0,.1);}
.hdr-l{display:flex;align-items:center;gap:10px;position:relative;z-index:1; min-width: 0;}
.hdr-ico{width:32px;height:32px;flex-shrink:0;}
.hdr-t h1{font-size:13px;font-weight:700;color:#fff;line-height:1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.hdr-t p{font-size:9px;color:rgba(255,255,255,.75);margin-top:2px;letter-spacing:.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.hdr-r{display:flex;align-items:center;gap:10px;position:relative;z-index:1; flex-shrink: 0;}
.bdg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);color:#fff; white-space: nowrap;}
.bdg-gold{background:var(--gold);border-color:var(--gold-dark);color:var(--text);}

.top-progress{height:4px;background:rgba(0,0,0,.08);flex-shrink:0;}
.top-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--salmon));
  transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;}

.main{flex:1;display:flex;overflow:hidden; min-height: 0;}

.q-panel{
  flex:1;display:flex;flex-direction:column;
  padding:15px 20px;overflow-y:auto;overflow-x:hidden;
  background:var(--surface);
  scrollbar-width: thin;
  scrollbar-color: var(--blue-l) transparent;
}
.q-panel::-webkit-scrollbar{width:4px;}
.q-panel::-webkit-scrollbar-thumb{background:var(--blue-l);border-radius:2px;}

/* intro */
.intro-wrap{display:flex;flex-direction:column;gap:15px;height:100%;}
.intro-hero{
  background:linear-gradient(120deg,var(--primary) 0%,var(--primary-d) 40%,var(--accent) 100%);
  border-radius:12px;padding:20px;display:flex;align-items:center;gap:15px;
  position:relative;overflow:hidden;flex-shrink:0;}
.intro-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,215,0,.08);}
.intro-hero-ico{width:60px;height:60px;flex-shrink:0;}
.intro-hero h2{font-size:18px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:6px;}
.intro-hero p{font-size:12px;color:#ffffff;line-height:1.6;}
.intro-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;flex-shrink:0;}
.meta-card{background:var(--sand);border:1.5px solid var(--border);border-radius:8px;
  padding:10px;display:flex;align-items:center;gap:8px;}
.meta-card-ico{width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;}
.meta-card-ico.red{background:rgba(165,28,48,.12);}
.meta-card-ico.blue{background:rgba(0,82,155,.12);}
.meta-card-ico.green{background:rgba(0,103,71,.12);}
.meta-card strong{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.meta-card span{font-size:10px;color:var(--muted);}
.intro-instr{background:linear-gradient(90deg,#fff8e8,#fff);
  border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
  padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.intro-instr p{font-size:12px;color:var(--text);line-height:1.5;}
.intro-instr strong{color:var(--accent);}
.btn-start{align-self:flex-start;background:linear-gradient(135deg,var(--primary-d),var(--accent));
  color:#fff;border:none;border-radius:20px;padding:10px 24px;
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(14,45,82,.35);
  transition:all .2s ease;display:flex;align-items:center;gap:6px;font-family:inherit;}
.btn-start:hover{background:linear-gradient(135deg,var(--accent),var(--primary-d));transform:translateY(-2px);}

/* question */
.q-wrap{display:flex;flex-direction:column;gap:12px;}
.q-header{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid var(--sand);}
.q-num-tag{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;
  border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.q-text{font-size:16px;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.q-sub{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400;}

/* options grid */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.options-grid.single{grid-template-columns:1fr;}
.option{display:flex;align-items:center;gap:10px;
  background:var(--sand);border:2px solid var(--border);
  border-radius:10px;padding:12px;cursor:pointer;
  transition:all .2s ease;position:relative;overflow:hidden;}
.option::before{content:'';position:absolute;inset:0;background:var(--primary);opacity:0;transition:opacity .2s;}
.option:hover::before{opacity:.04;}
.option:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,82,155,.12);}
.option.correct{border-color:var(--correct);background:var(--correct-bg);}
.option.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
.option.disabled{cursor:default;transform:none;}
.opt-letter{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
  background:var(--primary);transition:background .2s;position:relative;z-index:1;}
.option.correct .opt-letter{background:var(--correct);}
.option.wrong   .opt-letter{background:var(--wrong);}
.opt-text{font-size:12px;color:var(--text);line-height:1.4;position:relative;z-index:1;}

/* match question */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.match-col h4{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:6px;border-bottom:2px solid var(--blue-l);padding-bottom:4px;}
.match-item{background:#fff;border:1.5px solid var(--border);border-radius:6px;
  padding:8px 10px;margin-bottom:4px;font-size:12px;color:var(--text);
  cursor:pointer;transition:all .2s;user-select:none;}
.match-item:hover{border-color:var(--accent);background:var(--sand);}
.match-item.selected{border-color:var(--gold);background:#fffbee;}
.match-item.matched{border-color:var(--correct);background:var(--correct-bg);cursor:default;}
.match-item.wrong-sel{border-color:var(--wrong);background:var(--wrong-bg);}
.match-key{font-weight:700;color:var(--primary);margin-right:4px;}

/* formula question */
.formula-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.formula-eq{font-size:18px;font-weight:700;color:var(--text);font-family:'Courier New',monospace;}
.formula-opts{display:flex;gap:6px;flex-wrap:wrap;}
.formula-opt{background:#fff;border:2px solid var(--border);border-radius:6px;
  padding:6px 12px;font-size:14px;font-weight:700;font-family:'Courier New',monospace;
  cursor:pointer;color:var(--text);transition:all .2s;}
.formula-opt:hover{border-color:var(--primary);background:var(--sand);}
.formula-opt.correct{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);}
.formula-opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);}
.formula-opt.disabled{cursor:default;}

/* feedback */
.feedback{border-radius:10px;padding:12px;display:flex;align-items:flex-start;gap:10px;animation:fbIn .3s ease;}
@keyframes fbIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback.correct{background:var(--correct-bg);border:1.5px solid var(--correct);}
.feedback.wrong  {background:var(--wrong-bg);  border:1.5px solid var(--wrong);}
.fb-ico{width:24px;height:24px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;}
.feedback.correct .fb-ico{background:var(--correct);color:#fff;}
.feedback.wrong   .fb-ico{background:var(--wrong);  color:#fff;}
.fb-txt strong{display:block;font-size:13px;font-weight:700;margin-bottom:2px;}
.feedback.correct .fb-txt strong{color:var(--correct);}
.feedback.wrong   .fb-txt strong{color:var(--wrong);}
.fb-txt p{font-size:12px;color:var(--muted);line-height:1.5;}

/* sidebar */
.sidebar{width:200px;flex-shrink:0;background:linear-gradient(180deg,var(--sand) 0%,#dde8f5 100%);
  border-left:1px solid var(--border);display:flex;flex-direction:column;padding:15px;gap:12px;overflow:hidden;}
.q-tracker{display:flex;flex-direction:column;gap:6px;}
.tracker-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.tracker-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;}
.tracker-item:hover{border-color:var(--primary);background:#eaf2fb;}
.tracker-item.active{border-color:var(--accent);background:rgba(46,109,173,.06);}
.tracker-item.done-ok{border-color:var(--correct);background:var(--correct-bg);}
.tracker-item.done-fail{border-color:var(--wrong);background:var(--wrong-bg);}
.ti-num{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;background:var(--border);color:var(--muted);transition:all .2s;}
.tracker-item.active    .ti-num{background:var(--accent);color:#fff;}
.tracker-item.done-ok   .ti-num{background:var(--correct);color:#fff;}
.tracker-item.done-fail .ti-num{background:var(--wrong);color:#fff;}
.ti-label{font-size:10px;color:var(--muted);line-height:1.2;flex:1;}
.tracker-item.active .ti-label{color:var(--accent);font-weight:600;}

.score-card{background:#fff;border-radius:10px;border:1.5px solid var(--border);padding:10px;text-align:center;}
.score-ring{width:60px;height:60px;margin:0 auto 6px;position:relative;}
.score-ring svg{width:100%;height:100%;}
.score-ring-bg{fill:none;stroke:var(--sand);stroke-width:6;}
.score-ring-fill{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:188.5;stroke-dashoffset:188.5;
  transition:stroke-dashoffset .6s ease;transform:rotate(-90deg);transform-origin:50% 50%;}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--text);}
.score-lbl{font-size:10px;color:var(--muted);}
.score-lbl strong{display:block;font-size:11px;color:var(--text);margin-bottom:2px;}

.q-actions{display:flex;gap:8px;margin-top:10px;flex-shrink:0;}
.btn{border:none;border-radius:20px;padding:8px 18px;font-family:inherit;
  font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s;}
.btn:active{transform:scale(.97);}
.btn-next{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 3px 12px rgba(0,82,155,.3);}
.btn-next:hover{background:linear-gradient(135deg,var(--primary-d),#002a52);}
.btn-retry{background:var(--sand);color:var(--text);border:1.5px solid var(--border);}
.btn-retry:hover{background:var(--blue-l);}
.btn-finish{background:linear-gradient(135deg,var(--green),#004d36);color:#fff;box-shadow:0 3px 12px rgba(0,103,71,.3);}
.btn-finish:hover{opacity:.9;}

/* results */
.results-wrap{display:flex;flex-direction:column;gap:12px;height:100%;}
.results-hero{background:linear-gradient(120deg,var(--green),#004d36 40%,var(--primary) 80%);
  border-radius:12px;padding:15px 20px;display:flex;align-items:center;gap:15px;
  flex-shrink:0;position:relative;overflow:hidden;}
.results-hero::before{content:'';position:absolute;right:-20px;top:-20px;width:130px;height:130px;
  border-radius:50%;background:rgba(255,215,0,.1);}
.results-score-big{font-size:36px;font-weight:700;color:var(--gold);line-height:1;flex-shrink:0;}
.results-score-sub{font-size:11px;color:rgba(255,255,255,.75);}
.results-hero h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;}
.results-hero p{font-size:12px;color:rgba(255,255,255,.8);line-height:1.5;}
.results-list{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;}
.results-list::-webkit-scrollbar{width:4px;}
.results-list::-webkit-scrollbar-thumb{background:var(--c11);border-radius:2px;}
.result-item{display:flex;align-items:center;gap:10px;
  background:var(--sand);border-radius:8px;border:1.5px solid var(--border);padding:8px 10px;}
.ri-ico{width:24px;height:24px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;}
.ri-ico.ok{background:var(--correct-bg);color:var(--correct);}
.ri-ico.fail{background:var(--wrong-bg);color:var(--wrong);}
.ri-q{font-size:12px;color:var(--text);flex:1;line-height:1.4;}
.ri-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0;}
.ri-badge.ok{background:var(--correct-bg);color:var(--correct);}
.ri-badge.fail{background:var(--wrong-bg);color:var(--wrong);}

.ftr{background:linear-gradient(90deg,var(--primary),var(--accent));
  height:24px;display:flex;align-items:center;justify-content:space-between;
  padding:0 15px;flex-shrink:0;}
.ftr-l{font-size:10px;color:rgba(255,255,255,.7);}
.ftr-r{font-size:10px;color:#ffffff;font-style:italic;}

/* ═══════════════════════════════════════════════════
   MEDIA QUERIES RESPONSIVAS
   ═══════════════════════════════════════════════════ */

/* TABLET Y MÓVIL: ≤ 768px */
@media (max-width: 768px) {
  #sw {
    aspect-ratio: auto; /* Liberar aspecto fijo */
    height: auto;
    min-height: 500px;
  }
  
  .hdr { padding: 0 15px; height: 50px; }
  .hdr-t h1 { font-size: 12px; }
  .hdr-t p { font-size: 8px; }
  .hdr-ico { width: 28px; height: 28px; }
  
  .sidebar { display: none; } /* Ocultar barra lateral */
  
  .q-panel { padding: 12px 15px; }
  
  .intro-hero { flex-direction: column; text-align: center; padding: 15px; }
  .intro-meta { grid-template-columns: 1fr; }
  
  .options-grid { grid-template-columns: 1fr; } /* Una columna para opciones */
  
  .match-wrap { grid-template-columns: 1fr; gap: 10px; }
  
  .results-hero { flex-direction: column; text-align: center; }
  
  .ftr { flex-direction: column; height: auto; padding: 8px; gap: 4px; text-align: center; }
}

/* MÓVIL PEQUEÑO: ≤ 480px */
@media (max-width: 480px) {
  .hdr-t h1 { font-size: 11px; }
  .q-text { font-size: 14px; }
  .option { padding: 10px; }
  .opt-text { font-size: 11px; }
  .btn { padding: 8px 12px; font-size: 11px; }
  .meta-card { padding: 8px; }
  .meta-card strong { font-size: 11px; }
  .meta-card span { font-size: 9px; }
}
</style>
</head>
<body>

<div id="sw">
  <div id="stage">

    <div class="hdr">
      <div class="hdr-l">
        <svg class="hdr-ico" viewBox="0 0 38 38" fill="none">
          <rect width="38" height="38" rx="9" fill="rgba(255,255,255,.12)"/>
          <rect x="8" y="7" width="14" height="18" rx="3" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
          <path d="M11 12h8M11 15h6M11 18h7" stroke="#fff" stroke-width="1.3" stroke-linecap="round" opacity=".8"/>
          <circle cx="27" cy="26" r="7" fill="var(--gold)"/>
          <path d="M24.5 26l2 2 4-3.5" stroke="#5a3d00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="hdr-t">
          <h1>Magnitudes y Conceptos Eléctricos</h1>
          <p>ELEN_2019 | Semana 1 | Esteban Briceño</p>
        </div>
      </div>
      <div class="hdr-r">
        <span class="bdg bdg-gold">Quiz</span>
      </div>
    </div>

    <div class="top-progress"><div class="top-progress-fill" id="topBar"></div></div>

    <div class="main">
      <div class="q-panel" id="q-panel"></div>
      <div class="sidebar">
        <div class="q-tracker">
          <div class="tracker-title">Preguntas</div>
          <div id="tracker-items"></div>
        </div>
        <div class="score-card">
          <div class="score-ring">
            <svg viewBox="0 0 64 64">
              <circle class="score-ring-bg" cx="32" cy="32" r="28"/>
              <circle class="score-ring-fill" id="scoreRing" cx="32" cy="32" r="28"/>
            </svg>
            <div class="score-num" id="scoreNum">0/5</div>
          </div>
          <div class="score-lbl"><strong>Puntaje</strong>Respuestas correctas</div>
        </div>
      </div>
    </div>

    <div class="ftr">
      <span class="ftr-l">Esteban Briceño Sánchez · ELEN_2019</span>
      <span class="ftr-r">Seleccione la respuesta correcta</span>
    </div>

  </div>
</div>

<script>
/* ══ DATA ══ */
const QUIZ = [
  {
    type: 'tf',
    q: 'La carga eléctrica es una propiedad intrínseca de las partículas subatómicas que conforman la materia.',
    correct: 0,
    opts: ['Verdadero','Falso'],
    fb_ok:   'La carga caracteriza a protones y electrones y explica las interacciones eléctricas.',
    fb_fail: 'La respuesta correcta es: Verdadero.',
    author:  'Carga eléctrica'
  },
  {
    type: 'mc',
    q: 'La corriente eléctrica se genera cuando existe:',
    opts: [
      'Una diferencia de potencial entre dos puntos.',
      'Un campo magnético constante.',
      'Un aumento de temperatura en el conductor.'
    ],
    correct: 0,
    fb_ok:   'La circulación ordenada de cargas requiere una fuerza impulsora (tensión).',
    fb_fail: 'La respuesta correcta es: Una diferencia de potencial.',
    author:  'Corriente eléctrica'
  },
  {
    type: 'formula',
    q: 'La corriente eléctrica se define matemáticamente como:',
    sub: 'i(t) = _____ / _____',
    opts: ['dq / dt', 'dv / dt', 'dq / dv', 'dt / dq'],
    correct: 0,
    fb_ok:   'Relación entre carga y tiempo.',
    fb_fail: 'La respuesta correcta es: dq / dt.',
    author:  'Definición i(t)'
  },
  {
    type: 'mc',
    q: 'La corriente continua se caracteriza porque:',
    opts: [
      'Cambia periódicamente de dirección.',
      'Presenta forma senoidal.',
      'Mantiene un valor constante en el tiempo.'
    ],
    correct: 2,
    fb_ok:   'En corriente continua, la magnitud no varía con el tiempo.',
    fb_fail: 'La respuesta correcta es: Mantiene un valor constante.',
    author:  'Corriente continua'
  },
  {
    type: 'match',
    q: 'Relacione cada magnitud con su definición.',
    colA: [
      { key:'A', label:'Tensión eléctrica' },
      { key:'B', label:'Potencia eléctrica' },
      { key:'C', label:'Energía eléctrica' }
    ],
    colB: [
      { key:'1', label:'Tasa de transferencia de energía.' },
      { key:'2', label:'Energía por unidad de carga.' },
      { key:'3', label:'Capacidad de realizar trabajo.' }
    ],
    correctMap: {'A':'2','B':'1','C':'3'},
    fb_ok:   'Correcto. Tensión impulsa, Potencia es rapidez, Energía es trabajo.',
    fb_fail: 'A→2, B→1, C→3.',
    author:  'Magnitudes'
  }
];

const LETTERS = ['A','B','C','D'];
let current  = -1;
let answers  = Array(QUIZ.length).fill(null);
let answered = Array(QUIZ.length).fill(false);
let score    = 0;
let matchSelA = null;
let matchPairs = {};

/* ══ RENDER INTRO ══ */
function renderIntro() {
  current = -1;
  document.getElementById('q-panel').innerHTML = `
    <div class="intro-wrap">
      <div class="intro-hero">
        <svg class="intro-hero-ico" viewBox="0 0 72 72" fill="none">
          <rect width="72" height="72" rx="14" fill="rgba(255,255,255,.08)"/>
          <circle cx="36" cy="28" r="14" fill="none" stroke="#fff" stroke-width="1.8"/>
          <path d="M36 14v4M36 38v4M22 28h4M46 28h4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity=".7"/>
          <circle cx="52" cy="52" r="14" fill="var(--gold)"/>
          <path d="M47 52l3.5 3.5 7.5-7" stroke="#0E2D52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <h2>¡Bienvenidos al Quiz!</h2>
          <p>Evalúa tus conocimientos sobre magnitudes eléctricas fundamentales.</p>
        </div>
      </div>
      <div class="intro-meta">
        <div class="meta-card">
          <div class="meta-card-ico blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2" stroke="var(--primary)" stroke-width="1.6" stroke-linecap="round"/></svg></div>
          <div><strong>5 preguntas</strong><span>Tipos variados</span></div>
        </div>
        <div class="meta-card">
          <div class="meta-card-ico red"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--accent)" stroke-width="1.6"/><path d="M12 7v5l3 3" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div><strong>Sin límite</strong><span>Tiempo libre</span></div>
        </div>
        <div class="meta-card">
          <div class="meta-card-ico green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="var(--green)" stroke-width="1.6" stroke-linejoin="round"/></svg></div>
          <div><strong>Retroalimentación</strong><span>Inmediata</span></div>
        </div>
      </div>
      <div class="intro-instr">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none" style="flex-shrink:0"><circle cx="11" cy="11" r="10" fill="var(--gold)"/><path d="M11 7v5M11 14v1" stroke="#0E2D52" stroke-width="1.7" stroke-linecap="round"/></svg>
        <p><strong>Instrucción:</strong> Revise cada enunciado y elija la opción correcta.</p>
      </div>
      <button class="btn-start" onclick="startQuiz()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        Comenzar Quiz
      </button>
    </div>`;
  updateTracker(); updateTopBar(); updateScore();
}

/* ══ RENDER QUESTION ══ */
function renderQuestion(idx) {
  current = idx;
  const q = QUIZ[idx];
  const isAnswered = answered[idx];
  let contentHTML = '';

  if (q.type === 'tf' || q.type === 'mc') {
    const cols = q.opts.length === 2 ? 'single' : '';
    const optsHTML = q.opts.map((opt, i) => {
      let cls = 'option';
      if (isAnswered) {
        cls += ' disabled';
        if (i === q.correct) cls += ' correct';
        else if (answers[idx] === i && i !== q.correct) cls += ' wrong';
      }
      const onclick = isAnswered ? '' : `onclick="selectAnswer(${idx},${i})"`;
      return `<div class="${cls}" ${onclick}>
        <div class="opt-letter">${LETTERS[i]}</div>
        <div class="opt-text">${opt}</div>
      </div>`;
    }).join('');
    contentHTML = `<div class="options-grid ${cols}">${optsHTML}</div>`;

  } else if (q.type === 'formula') {
    const optsHTML = q.opts.map((opt, i) => {
      let cls = 'formula-opt';
      if (isAnswered) {
        cls += ' disabled';
        if (i === q.correct) cls += ' correct';
        else if (answers[idx] === i) cls += ' wrong';
      }
      const onclick = isAnswered ? '' : `onclick="selectAnswer(${idx},${i})"`;
      return `<div class="${cls}" ${onclick}>${opt}</div>`;
    }).join('');
    contentHTML = `
      <div style="margin-bottom:10px;">
        <div class="formula-eq">i(t) = ?</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">Selecciona la expresión:</div>
      </div>
      <div class="formula-opts">${optsHTML}</div>`;

  } else if (q.type === 'match') {
    contentHTML = renderMatchContent(idx, isAnswered);
  }

  let fbHTML = '';
  if (isAnswered) {
    const ok = answers[idx] === true || answers[idx] === q.correct;
    fbHTML = `<div class="feedback ${ok?'correct':'wrong'}">
      <div class="fb-ico">${ok?'✓':'✕'}</div>
      <div class="fb-txt">
        <strong>${ok?'¡Excelente!':'¡Oh, no!'}</strong>
        <p>${ok ? q.fb_ok : q.fb_fail}</p>
      </div>
    </div>`;
  }

  const allDone  = answered.every(Boolean);
  const isLast   = idx === QUIZ.length - 1;
  let actionsHTML = '';
  if (isAnswered) {
    if (allDone) {
      actionsHTML = `<button class="btn btn-finish" onclick="showResults()">
        Ver resultados
      </button>`;
    } else if (!isLast) {
      actionsHTML = `<button class="btn btn-next" onclick="nextQuestion()">
        Siguiente
      </button>`;
    } else {
      actionsHTML = `<button class="btn btn-next" onclick="nextUnanswered()">
        Siguiente sin responder
      </button>`;
    }
  }

  document.getElementById('q-panel').innerHTML = `
    <div class="q-wrap">
      <div class="q-header">
        <div class="q-num-tag">Pregunta ${idx+1}/${QUIZ.length}</div>
        <div>
          <div class="q-text">${q.q}</div>
          ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
        </div>
      </div>
      ${contentHTML}
      ${fbHTML}
      <div class="q-actions">${actionsHTML}</div>
    </div>`;

  if (q.type === 'match' && !isAnswered) bindMatchEvents(idx);
  updateTracker(); updateTopBar(); updateScore();
}

/* ══ MATCH LOGIC ══ */
function renderMatchContent(idx, isAnswered) {
  const q = QUIZ[idx];
  const pairs = isAnswered ? (answers[idx] || {}) : matchPairs;
  const colAHTML = q.colA.map(a => {
    const paired = pairs[a.key];
    let cls = 'match-item';
    if (isAnswered) {
      cls += q.correctMap[a.key] === paired ? ' matched' : ' wrong-sel';
    } else if (matchSelA === a.key) cls += ' selected';
    else if (pairs[a.key]) cls += ' matched';
    return `<div class="${cls}" id="ma-${a.key}" data-key="${a.key}">
      <span class="match-key">${a.key})</span> ${a.label}
      ${paired ? `<span style="font-size:10px;color:var(--muted);margin-left:4px;">→ ${paired}</span>` : ''}
    </div>`;
  }).join('');
  const colBHTML = q.colB.map(b => {
    const used = Object.values(pairs).includes(b.key);
    let cls = 'match-item' + (used ? ' matched' : '');
    if (isAnswered) {
      const aKey = Object.keys(pairs).find(k => pairs[k] === b.key);
      if (aKey) cls = 'match-item ' + (q.correctMap[aKey] === b.key ? 'matched' : 'wrong-sel');
    }
    return `<div class="${cls}" id="mb-${b.key}" data-key="${b.key}">
      <span class="match-key">${b.key})</span> ${b.label}
    </div>`;
  }).join('');
  return `<div class="match-wrap">
    <div><h4>Columna A</h4>${colAHTML}</div>
    <div><h4>Columna B</h4>${colBHTML}</div>
  </div>`;
}

function bindMatchEvents(idx) {
  const q = QUIZ[idx];
  q.colA.forEach(a => {
    const el = document.getElementById('ma-'+a.key);
    if (el) el.addEventListener('click', () => selectMatchA(idx, a.key));
  });
  q.colB.forEach(b => {
    const el = document.getElementById('mb-'+b.key);
    if (el) el.addEventListener('click', () => selectMatchB(idx, b.key));
  });
}

function selectMatchA(idx, key) {
  if (matchPairs[key]) return;
  matchSelA = key;
  renderQuestion(idx);
  bindMatchEvents(idx);
}

function selectMatchB(idx, key) {
  if (!matchSelA) return;
  if (Object.values(matchPairs).includes(key)) return;
  matchPairs[matchSelA] = key;
  matchSelA = null;
  if (Object.keys(matchPairs).length === QUIZ[idx].colA.length) {
    const correct = QUIZ[idx].colA.every(a => matchPairs[a.key] === QUIZ[idx].correctMap[a.key]);
    answered[idx] = true;
    answers[idx]  = {...matchPairs};
    if (correct) score++;
    renderQuestion(idx);
  } else {
    renderQuestion(idx);
    bindMatchEvents(idx);
  }
}

/* ══ ANSWER ══ */
function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;
  answers[qIdx]  = optIdx;
  if (optIdx === QUIZ[qIdx].correct) score++;
  renderQuestion(qIdx);
  updateScore();
}

function nextQuestion()   { if (current < QUIZ.length-1) renderQuestion(current+1); }
function nextUnanswered() { const i = answered.findIndex(a=>!a); if(i!==-1) renderQuestion(i); }
function startQuiz()      { matchPairs={}; matchSelA=null; renderQuestion(0); }

/* ══ RESULTS ══ */
function showResults() {
  current = QUIZ.length;
  const pct = Math.round((score/QUIZ.length)*100);
  let msg='',emoji='';
  if (score===QUIZ.length){msg='¡Perfecto! Domina todos los conceptos.';emoji='🏆';}
  else if(score>=4){msg='¡Muy bien! Sólida comprensión.';emoji='🎯';}
  else if(score>=3){msg='¡Buen intento! Repase los conceptos.';emoji='📚';}
  else{msg='Repase los contenidos e intente de nuevo.';emoji='💡';}

  const listHTML = QUIZ.map((q,i)=>{
    const ok = answers[i]===q.correct || (q.type==='match' && typeof answers[i]==='object' &&
      q.colA.every(a=>answers[i][a.key]===q.correctMap[a.key]));
    return `<div class="result-item">
      <div class="ri-ico ${ok?'ok':'fail'}">${ok?'✓':'✕'}</div>
      <div class="ri-q">${q.q}</div>
      <span class="ri-badge ${ok?'ok':'fail'}">${ok?'Correcto':'Incorrecto'}</span>
    </div>`;
  }).join('');

  document.getElementById('q-panel').innerHTML = `
    <div class="results-wrap">
      <div class="results-hero">
        <div>
          <div class="results-score-big">${score}/${QUIZ.length}</div>
          <div class="results-score-sub">${pct}% correcto</div>
        </div>
        <div>
          <h2>${emoji} Resultados</h2>
          <p>${msg}</p>
        </div>
      </div>
      <div class="results-list">${listHTML}</div>
      <div class="q-actions">
        <button class="btn btn-retry" onclick="retryQuiz()">
          Volver a intentar
        </button>
      </div>
    </div>`;
  updateTracker(); updateTopBar();
}

function retryQuiz() {
  answers=Array(QUIZ.length).fill(null);
  answered=Array(QUIZ.length).fill(false);
  score=0; matchPairs={}; matchSelA=null;
  renderIntro();
}

/* ══ UI ══ */
function updateTracker() {
  const cont = document.getElementById('tracker-items');
  cont.innerHTML='';
  QUIZ.forEach((q,i)=>{
    const div = document.createElement('div');
    let cls = 'tracker-item';
    if(i===current) cls+=' active';
    else if(answered[i]){
      const ok = answers[i]===q.correct || (q.type==='match' && typeof answers[i]==='object' && q.colA.every(a=>answers[i][a.key]===q.correctMap[a.key]));
      cls += ok?' done-ok':' done-fail';
    }
    div.className=cls;
    div.onclick=()=>renderQuestion(i);
    div.innerHTML=`<div class="ti-num">${i+1}</div><div class="ti-label">${q.author||'Pregunta '+(i+1)}</div>`;
    cont.appendChild(div);
  });
}

function updateTopBar(){
  const done=answered.filter(Boolean).length;
  document.getElementById('topBar').style.width=(done/QUIZ.length*100)+'%';
}

function updateScore(){
  const pct=score/QUIZ.length;
  const offset=188.5*(1-pct);
  document.getElementById('scoreRing').style.strokeDashoffset=offset;
  document.getElementById('scoreNum').textContent=`${score}/${QUIZ.length}`;
  const ring=document.getElementById('scoreRing');
  if(pct>=.75)ring.style.stroke='var(--correct)';
  else if(pct>=.5)ring.style.stroke='var(--gold)';
  else ring.style.stroke='var(--accent)';
}

/* ══ INIT ══ */
renderIntro();
</script>
