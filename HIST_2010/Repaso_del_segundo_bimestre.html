    <script>
        const W = [
            {
                n: 9, lb: 'Semana 9', ic: '🏛️', unit: 'Unidad 3 · Republicanismo del siglo XIX', title: 'Formación de los Estados-nación latinoamericanos',
                intro: 'Se analiza el inicio del periodo republicano en América Latina y Ecuador, enfocándose en la formación de los Estados-nación y las primeras experiencias políticas del siglo XIX.',
                cl: 'w9',
                itags: ['📜 Constitucionalismo liberal', '🇺🇸 Modelo federal EE. UU.', '⚖️ Orden vs. libertad', '🥊 Unitarios vs. federales', '🏚️ Debilidad institucional', '🌾 Hacienda y cacao', '🔔 Revolución Marcista 1845'],
                topics: [
                    {
                        ic: '📜', tit: '3.1.1. El laboratorio constitucional latinoamericano', sub: 'Constitucionalismo · Modelos · Tensiones políticas',
                        c: `<div class="sec"><div class="stitle">Contexto</div><p>Tras la caída del orden colonial, América Latina se convirtió en un espacio de experimentación política, donde se ensayaron distintos modelos de organización estatal.</p></div>
     <div class="sec"><div class="stitle">Inspiración constitucional</div><ul>
     <li>El liberalismo y constitucionalismo europeo.</li>
     <li>El modelo federal de Estados Unidos.</li>
     <li>Las ideas de soberanía popular.</li>
     </ul><p style="margin-top:6px">Estas propuestas debieron adaptarse a realidades marcadas por desigualdad social y diversidad regional.</p></div>
     <div class="sec"><div class="stitle">Caso del Río de la Plata</div><ul>
     <li>Conflicto entre <b>unitarios</b> (centralismo) y <b>federales</b> (autonomía regional).</li>
     <li>Rechazo de constituciones centralistas (1819 y 1826).</li>
     <li>Predominio de liderazgos caudillistas ante la falta de consenso político.</li>
     </ul></div>
     <div class="sec"><div class="stitle">Característica del periodo</div><p>Tensión constante entre <b>orden y libertad</b>, donde la inestabilidad llevó en muchos casos a soluciones autoritarias.</p></div>`},
                    {
                        ic: '🇪🇨', tit: '3.1.2. El incipiente Estado ecuatoriano (1830–1860)', sub: 'Gran Colombia · Primeros gobiernos · Inestabilidad',
                        c: `<div class="sec"><div class="stitle">Origen del Estado ecuatoriano</div><p>Tras la independencia, el territorio ecuatoriano formó parte de la Gran Colombia hasta su disolución en 1830, momento en que se constituyó como Estado independiente.</p></div>
     <div class="sec"><div class="stitle">Primeros años republicanos</div><ul>
     <li>Debilidad institucional y falta de recursos.</li>
     <li>Fragmentación regional entre Quito, Guayaquil y Cuenca.</li>
     <li>Predominio del poder militar y de las élites.</li>
     </ul></div>
     <div class="sec"><div class="stitle">Gobiernos fundacionales</div><ul>
     <li><b>Juan José Flores:</b> Estado centralista, dependiente de acuerdos con grupos regionales.</li>
     <li><b>Vicente Rocafuerte:</b> reformas orientadas a modernizar el país en educación y administración.</li>
     <li><b>Revolución Marcista (1845):</b> rechazo a la Constitución de 1843 y fin del dominio de Flores.</li>
     </ul></div>
     <div class="sec"><div class="stitle">Periodo 1845–1859</div><ul>

     <li>Fragmentación del poder en gobiernos regionales.</li>
     <li>Crisis nacional en 1859 que evidenció la debilidad del Estado.</li>
     </ul></div>
     <div class="sec"><div class="stitle">Plano social y económico</div><ul>
     <li>Sociedad jerárquica con exclusión de indígenas y sectores populares.</li>
     <li>Persistieron formas de dominación como la hacienda.</li>
     <li>Economía dependiente del cacao, fortaleciendo desigualdades regionales.</li>
     </ul></div>`}
                ]
            },
            {
                n: 10, lb: 'Semana 10', ic: '🚂', unit: 'Unidad 3 · Republicanismo del siglo XIX', title: 'En busca del progreso: América Latina en la segunda mitad del siglo XIX',

                cl: 'w10',
                itags: ['⚖️ Liberalismo y positivismo', '🚂 Modelo agroexportador', '🏗️ Ferrocarriles y puertos', '📚 Educación científica', '⛪ Conservadurismo serrano', '☕ Auge del cacao', '🔥 Revolución Liberal 1895'],
                topics: [
                    {
                        ic: '🌍', tit: '3.2. Latinoamérica en la segunda mitad del siglo XIX', sub: 'Progreso · Liberalismo · Modernización',
                        c: `<div class="sec"><div class="stitle">El ideal de progreso</div><p>En la segunda mitad del siglo XIX, los Estados latinoamericanos buscaron consolidarse mediante el ideal de progreso: modernización, orden y crecimiento económico. Este proceso estuvo influenciado por el liberalismo y el positivismo.</p></div>
     <div class="sec"><div class="stitle">Dimensiones del proceso</div><ul>
     <li><b>Político:</b> Estados centralizados y reformas legales, aunque con prácticas excluyentes y autoritarias.</li>
     <li><b>Económico:</b> consolidación del modelo agroexportador, ferrocarriles y puertos, pero generando dependencia y desigualdad.</li>
     <li><b>Social y cultural:</b> promoción de la educación y el conocimiento científico, aunque bajo una visión excluyente que marginó a amplios sectores.</li>
     </ul></div>`},
                    {
                        ic: '🇪🇨', tit: '3.2.1. La construcción de la nación ecuatoriana', sub: 'García Moreno · Liberalismo costeño · Revolución Liberal',
                        c: `<div class="sec"><div class="stitle">Gabriel García Moreno (1861–1875)</div><p>Impulsó un modelo conservador basado en un Estado centralizado, la alianza con la Iglesia y el fortalecimiento institucional. Combinó <b>modernización con autoritarismo</b>.</p></div>
     <div class="sec"><div class="stitle">Post-García Moreno</div><p>Tras su muerte, se abrió una etapa de inestabilidad con gobiernos débiles y conflictos entre conservadores y liberales. Se configuraron dos tendencias:</p><ul>
     <li><b>Conservadurismo serrano:</b> vinculado a la Iglesia y al centralismo.</li>
     <li><b>Liberalismo costeño:</b> ligado al comercio y a sectores exportadores.</li>
     </ul></div>
     <div class="sec"><div class="stitle">Economía y sociedad</div><p>Se consolidó el <b>modelo agroexportador basado en el cacao</b>, que fortaleció a la Costa pero profundizó las desigualdades regionales. Persistió la exclusión de amplios sectores sociales.</p></div>
     <div class="sec"><div class="stitle">Revolución Liberal de 1895</div><p>Culminación de las tensiones del periodo. Marcó el fin del dominio conservador e inició una nueva etapa de reformas modernizadoras.</p></div>`}
                ]
            },
            {

                intro: 'Se analiza el inicio del siglo XX en América Latina y Ecuador: los procesos de modernización, el liberalismo ecuatoriano y las celebraciones de los centenarios de independencia.',

                itags: ['🔥 Revolución Liberal: Eloy Alfaro', '🏫 Educación laica', '📋 Registro Civil', '⛪ Libertad de culto', '🌾 Abolición del concertaje', '🎆 Centenarios de independencia', '🏛️ Monumentos y modernidad'],
                topics: [
                    {
                        ic: '⚖️', tit: '4.1. Política liberal ecuatoriana en el siglo XX', sub: 'Eloy Alfaro · Secularización · Reformas',
                        c: `<div class="sec"><div class="stitle">La Revolución Liberal (1895–1912)</div><p>Iniciada con la Revolución Liberal liderada por <b>Eloy Alfaro</b>, representó una ruptura con el orden conservador. Se basó en la secularización y la construcción de un Estado más fuerte y centralizado, reduciendo la influencia de la Iglesia.</p></div>
     <div class="sec"><div class="stitle">Principales reformas</div><ul>
     <li><b>Secularización de la educación:</b> pasó a ser laica y responsabilidad del Estado.</li>
     <li><b>Registro Civil:</b> control estatal de nacimientos, matrimonios y defunciones.</li>
     <li><b>Matrimonio civil y divorcio:</b> regulación del matrimonio como contrato civil.</li>
     <li><b>Libertad de culto y de pensamiento:</b> eliminación del monopolio religioso.</li>
     <li><b>Abolición del concertaje:</b> fin formal de este sistema de trabajo forzado.</li>
     <li><b>Profesionalización del ejército:</b> fortalecimiento institucional.</li>
     </ul></div>
     <div class="sec"><div class="stitle">Economía y fin del liberalismo</div><p>El liberalismo coincidió con el auge del cacao, fortaleciendo a las élites costeñas pero manteniendo desigualdades. El proceso concluyó con el <b>asesinato de Eloy Alfaro en 1912</b>.</p></div>`},

                        c: `<div class="sec"><div class="stitle">Contexto</div><p>Durante las primeras décadas del siglo XX, varios países latinoamericanos celebraron los centenarios de sus independencias como parte de procesos de modernización y construcción de identidad nacional.</p></div>
     <div class="sec"><div class="stitle">Función de las celebraciones</div><ul>

     <li>Consolidar narrativas oficiales sobre el pasado.</li>

                itags: ['✊ Marxismo latinoamericano', '🔨 Mariátegui', '📣 Movimiento obrero', '🏭 Industrialización', '🔔 Revolución Juliana 1925', '🏦 Banco Central del Ecuador', '🌹 La Gloriosa 1944'],
                topics: [
                    {

        function openM(wi, ti) {

            document.getElementById('mi2').textContent = t.ic;
            document.getElementById('mt2').textContent = t.tit;
            document.getElementById('mb2').innerHTML = t.c;
            document.getElementById('overlay2').classList.add('on');
            document.body.style.overflow = 'hidden';
        }
        function closeM() {
            document.getElementById('overlay2').classList.remove('on');
            document.body.style.overflow = '';
