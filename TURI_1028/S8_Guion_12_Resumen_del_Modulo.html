<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repaso del Módulo — Fundamentos del Turismo y la Gastronomía</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #F5F2EC;
      --surface: #FFFFFF;
      --text: #1C1C2E;
      --sub: #5A5A7A;
      --border: #E2DDD5;
      --s1: #D94F3D;
      --s1l: #FDF0EE;
      --s2: #E07B39;
      --s2l: #FDF3EC;
      --s3: #C9A227;
      --s3l: #FDF8E8;
      --s4: #4A9A5C;
      --s4l: #EAF5ED;
      --s5: #2A7EB8;
      --s5l: #E8F2FB;
      --s6: #7C50BE;
      --s6l: #F2ECFB;
      --s7: #D45D8A;
      --s7l: #FBF0F4;
      --s8: #3D8A8A;
      --s8l: #E8F5F5;
      --radius: 18px;
      --shadow: 0 4px 24px rgba(28, 28, 46, .09);
      --shadow-lg: 0 12px 48px rgba(28, 28, 46, .16);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
   
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hdr {
      width: 100%;
      max-width: 800px;
      text-align: center;
      margin-bottom: 8px;
    }

    .hdr .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--text);
      color: #fff;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .hdr h1 {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 8px;
    }

    .hdr h1 em {
      font-style: italic;
      color: var(--s4);
    }

    .hdr .desc {
      font-size: 12px;
      color: var(--sub);
      font-weight: 500;
      line-height: 1.5;
    }

    .hdr .instruction {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--sub);
    }

    .main-card {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-strip {
      background: linear-gradient(135deg, #1C1C2E 0%, #2E2E4E 50%, #3A3A60 100%);
      padding: 26px 28px 22px;
      position: relative;
      overflow: hidden;
    }

    .hero-strip::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .04);
    }

    .hero-strip .hs-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .55);
      margin-bottom: 8px;
    }

    .hero-strip h2 {
      font-family: 'Fraunces', serif;
      font-size: clamp(17px, 4vw, 22px);
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .hero-strip p {
      font-size: 13px;
      color: rgba(255, 255, 255, .78);
      font-weight: 500;
      line-height: 1.6;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .units-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: #FAFAF8;
    }

    .unit-badge {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--sub);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .unit-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .semana-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 8px 20px 6px;
    }

    @media(max-width:480px) {
      .semana-grid {
        grid-template-columns: 1fr;
        padding: 14px 14px 20px;
      }
    }

    .sem-card {
      border-radius: 14px;
      border: 2px solid transparent;
      background: var(--bg);
      cursor: pointer;
      transition: all .22s cubic-bezier(.4, 0, .2, 1);
      position: relative;
      overflow: hidden;
      text-align: left;
      padding: 0;
      display: block;
      width: 100%;
    }

    .sem-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .sem-card:focus-visible {
      outline: 3px solid var(--s4);
      outline-offset: 2px;
    }

    .sem-card-inner {
      padding: 6px 16px 4px;
    }

    .sem-badge-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .sem-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .sem-week-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .sem-title {
      font-family: 'Fraunces', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 7px;
    }

    .sem-desc {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.55;
    }

    .sem-topics {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .sem-topic-chip {
      font-size: 10.5px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1.5px solid;
    }

    .sem-footer {
      padding: 8px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      font-size: 11.5px;
      font-weight: 600;
      color: var(--sub);
    }

    .sem-footer .arrow {
      font-size: 14px;
      transition: transform .2s;
    }

    .sem-card:hover .sem-footer .arrow {
      transform: translateX(4px);
    }

    .s1 .sem-num {
      background: var(--s1)
    }

    .s1 .sem-week-label,
    .s1 .sem-footer .arrow {
      color: var(--s1)
    }

    .s1 .sem-topic-chip {
      color: var(--s1);
      border-color: var(--s1);
      background: var(--s1l)
    }

    .s1:hover {
      border-color: var(--s1);
      background: var(--s1l)
    }

    .s2 .sem-num {
      background: var(--s2)
    }

    .s2 .sem-week-label,
    .s2 .sem-footer .arrow {
      color: var(--s2)
    }

    .s2 .sem-topic-chip {
      color: var(--s2);
      border-color: var(--s2);
      background: var(--s2l)
    }

    .s2:hover {
      border-color: var(--s2);
      background: var(--s2l)
    }

    .s3 .sem-num {
      background: var(--s3)
    }

    .s3 .sem-week-label,
    .s3 .sem-footer .arrow {
      color: var(--s3)
    }

    .s3 .sem-topic-chip {
      color: var(--s3);
      border-color: var(--s3);
      background: var(--s3l)
    }

    .s3:hover {
      border-color: var(--s3);
      background: var(--s3l)
    }

    .s4 .sem-num {
      background: var(--s4)
    }

    .s4 .sem-week-label,
    .s4 .sem-footer .arrow {
      color: var(--s4)
    }

    .s4 .sem-topic-chip {
      color: var(--s4);
      border-color: var(--s4);
      background: var(--s4l)
    }

    .s4:hover {
      border-color: var(--s4);
      background: var(--s4l)
    }

    .s5 .sem-num {
      background: var(--s5)
    }

    .s5 .sem-week-label,
    .s5 .sem-footer .arrow {
      color: var(--s5)
    }

    .s5 .sem-topic-chip {
      color: var(--s5);
      border-color: var(--s5);
      background: var(--s5l)
    }

    .s5:hover {
      border-color: var(--s5);
      background: var(--s5l)
    }

    .s6 .sem-num {
      background: var(--s6)
    }

    .s6 .sem-week-label,
    .s6 .sem-footer .arrow {
      color: var(--s6)
    }

    .s6 .sem-topic-chip {
      color: var(--s6);
      border-color: var(--s6);
      background: var(--s6l)
    }

    .s6:hover {
      border-color: var(--s6);
      background: var(--s6l)
    }

    .s7 .sem-num {
      background: var(--s7)
    }

    .s7 .sem-week-label,
    .s7 .sem-footer .arrow {
      color: var(--s7)
    }

    .s7 .sem-topic-chip {
      color: var(--s7);
      border-color: var(--s7);
      background: var(--s7l)
    }

    .s7:hover {
      border-color: var(--s7);
      background: var(--s7l)
    }

    .s8 .sem-num {
      background: var(--s8)
    }

    .s8 .sem-week-label,
    .s8 .sem-footer .arrow {
      color: var(--s8)
    }

    .s8 .sem-topic-chip {
      color: var(--s8);
      border-color: var(--s8);
      background: var(--s8l)
    }

    .s8:hover {
      border-color: var(--s8);
      background: var(--s8l)
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28, 28, 46, .52);
      backdrop-filter: blur(5px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    @media(min-width:600px) {
      .overlay {
        align-items: center;
        padding: 20px;
      }
    }

    .overlay.open {
      display: flex;
      animation: fadeOv .25s ease;
    }

    @keyframes fadeOv {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 600px;
      border-radius: 20px 20px 0 0;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp .32s cubic-bezier(.34, 1.3, .7, 1);
      position: relative;
    }

    @media(min-width:600px) {
      .modal {
        border-radius: 20px;
        animation: zoomIn .3s cubic-bezier(.34, 1.2, .7, 1);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes zoomIn {
      from {
        transform: scale(.9) translateY(20px);
        opacity: 0
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 12px auto 0;
    }

    @media(min-width:600px) {
      .modal-handle {
        display: none;
      }
    }

    .modal-head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .modal-num {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .modal-head-text {
      flex: 1;
    }

    .modal-head-text .week-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .modal-head-text h2 {
      font-family: 'Fraunces', serif;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .modal-close {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 16px;
      color: var(--sub);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
      margin-left: 6px;
    }

    .modal-close:hover {
      background: var(--border);
    }

    .modal-close:focus-visible {
      outline: 3px solid var(--s4);
      outline-offset: 2px;
    }

    .modal-body {
      padding: 18px 22px 28px;
    }

    .m-intro {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.65;
      margin-bottom: 20px;
      padding: 12px 14px;
      background: var(--bg);
      border-radius: 10px;
      border-left: 4px solid;
    }

    .subtopic {
      margin-bottom: 18px;
    }

    .subtopic-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .subtopic-hd .st-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .subtopic-hd h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .subtopic p,
    .subtopic li {
      font-size: 13px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.65;
    }

    .subtopic ul {
      padding-left: 18px;
      margin-top: 6px;
    }

    .subtopic li {
      margin-bottom: 5px;
    }

    .subtopic strong {
      color: var(--text);
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .key-idea {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 10px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--sub);
      line-height: 1.6;
      display: flex;
      gap: 8px;
    }

    .key-idea .ki-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .def-quote {
      border-left: 3px solid;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 10px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.6;
      background: var(--bg);
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip-list .chip {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1.5px solid;
      color: var(--text);
    }

    .modal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      background: #FAFAF8;
      border-radius: 0 0 20px 20px;
    }

    @media(max-width:599px) {
      .modal-nav {
        border-radius: 0;
      }
    }

    .m-nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--sub);
      cursor: pointer;
      transition: all .2s;
    }

    .m-nav-btn:hover {
      background: var(--bg);
      border-color: var(--text);
      color: var(--text);
    }

    .m-nav-btn:disabled {
      opacity: .35;
      cursor: default;
    }

    .m-nav-btn:focus-visible {
      outline: 3px solid var(--s4);
      outline-offset: 2px;
    }
  </style>
</head>

<body>

  <header class="hdr" role="banner">

    <h1>Repaso del <em>Módulo</em></h1>
    <p class="desc">Fundamentos del Turismo y la Gastronomía</p>

  </header>

  <main class="main-card" role="main">



    <div class="semana-grid" role="list">

      <button class="sem-card s1" onclick="openModal(0)" aria-label="Semana 1: Introducción al turismo" role="listitem">
        <div class="sem-card-inner">
          <div class="sem-badge-row">
            <div class="sem-num" aria-hidden="true">S1</div><span class="sem-week-label">Semana 1 · Unidad 1</span>
          </div>
          <div class="sem-title">Introducción al Turismo</div>
        
          <div class="sem-topics">
            <span class="sem-topic-chip">Etimología</span><span class="sem-topic-chip">Grand Tour</span><span
              class="sem-topic-chip">ONU Turismo</span>
          </div>
        </div>
        <div class="sem-footer"><span>Ver contenido</span><span class="arrow">→</span></div>
      </button>

      <button class="sem-card s2" onclick="openModal(1)" aria-label="Semana 2: Tipologías turísticas I" role="listitem">
        <div class="sem-card-inner">
          <div class="sem-badge-row">
            <div class="sem-num" aria-hidden="true">S2</div><span class="sem-week-label">Semana 2 · Unidad 1</span>
          </div>
          <div class="sem-title">Tipologías Turísticas (I)</div>
         
          <div class="sem-topics">
            <span class="sem-topic-chip">16 modalidades</span><span class="sem-topic-chip">Cultural</span><span
              class="sem-topic-chip">Sol y playa</span><span class="sem-topic-chip">Rural</span>
          </div>
        </div>
        <div class="sem-footer"><span>Ver contenido</span><span class="arrow">→</span></div>
      </button>

      <button class="sem-card s3" onclick="openModal(2)" aria-label="Semana 3: Tipologías contemporáneas"
        role="listitem">
        <div class="sem-card-inner">
          <div class="sem-badge-row">
            <div class="sem-num" aria-hidden="true">S3</div><span class="sem-week-label">Semana 3 · Unidad 1</span>
          </div>
          <div class="sem-title">Tipologías Turísticas (II)</div>
          
          <div class="sem-topics">
            <span class="sem-topic-chip">Salud</span><span class="sem-topic-chip">Negocios</span><span
              class="sem-topic-chip">Espacial</span><span class="sem-topic-chip">Necroturismo</span>
          </div>
        </div>
        <div class="sem-footer"><span>Ver contenido</span><span class="arrow">→</span></div>
      </button>

      <button class="sem-card s4" onclick="openModal(3)" aria-label="Semana 4: Historia del turismo" role="listitem">
        <div class="sem-card-inner">
          <div class="sem-badge-row">
            <div class="sem-num" aria-hidden="true">S4</div><span class="sem-week-label">Semana 4 · Unidad 2</span>
          </div>
          <div class="sem-title">Historia y Evolución del Turismo</div>
        
          <div class="sem-topics">
            <span class="sem-topic-chip">Edad Antigua</span><span class="sem-topic-chip">Thomas Cook</span><span
              class="sem-topic-chip">César Ritz</span><span class="sem-topic-chip">Siglo XXI</span>
          </div>
        </div>
        <div class="sem-footer"><span>Ver contenido</span><span class="arrow">→</span></div>
      </button>

      <button class="sem-card s5" onclick="openModal(4)" aria-label="Semana 5: Introducción a la gastronomía"
        role="listitem">
        <div class="sem-card-inner">
          <div class="sem-badge-row">
            <div class="sem-num" aria-hidden="true">S5</div><span class="sem-week-label">Semana 5 · Unidad 3</span>
          </div>
          <div class="sem-title">Introducción a la Gastronomía</div>
       
          <div class="sem-topics">
            <span class="sem-topic-chip">Brillat-Savarin</span><span class="sem-topic-chip">UNESCO</span><span
              class="sem-topic-chip">Patrimonio</span><span class="sem-topic-chip">Ecuador</span>
          </div>
        </div>
        <div class="sem-footer"><span>Ver contenido</span><span class="arrow">→</span></div>
      </button>

      <button class="sem-card s6" onclick="openModal(5)" aria-label="Semana 6: Modalidades de la gastronomía"
        role="listitem">
        <div class="sem-card-inner">
          <div class="sem-badge-row">
            <div class="sem-num" aria-hidden="true">S6</div><span class="sem-week-label">Semana 6 · Unidad 3</span>
          </div>
          <div class="sem-title">Modalidades de la Gastronomía</div>
       
          <div class="sem-topics">
            <span class="sem-topic-chip">Tradicional</span><span class="sem-topic-chip">Fusión</span><span
              class="sem-topic-chip">Sostenible</span><span class="sem-topic-chip">El Bulli</span>

            id: '1.1', title: '1.1 ¿De dónde proviene la palabra turismo?', content: `
      <p>Este subtema aborda el origen etimológico del término turismo y sus antecedentes históricos.</p>
      <div class="divider"></div>
      <p><strong>Etimología del término turismo</strong></p>
      <p style="margin-top:6px">La palabra <strong>turismo</strong> proviene del inglés <em>tour</em> (recorrido circular) y de la raíz latina <em>tornare</em> (girar o retornar). Desde su origen, se asocia con desplazamiento, exploración y regreso.</p>
      <div class="divider"></div>
      <p><strong>El Grand Tour</strong></p>
      <p style="margin-top:6px">Durante los siglos XVII y XVIII, jóvenes aristócratas europeos realizaban el <em>grand tour</em> como parte de su formación educativa, visitando ciudades como París, Roma o Florencia. Constituye un antecedente clave del turismo moderno, aunque restringido a élites.</p>
      <div class="key-idea"><span class="ki-icon">💡</span><span>El turismo no surge espontáneamente; es el resultado de transformaciones históricas, culturales y tecnológicas que permitieron que viajar se convierta en una práctica social cada vez más extendida.</span></div>`},
          {
            id: '1.2', title: '1.2 Definiciones del turismo', content: `
      <p>Este subtema presenta las principales definiciones del turismo desde organismos internacionales y autores especializados.</p>
      <div class="divider"></div>
      <p><strong>Definición de ONU Turismo (antes OMT)</strong></p>
      <div class="def-quote">"Las actividades que realizan las personas durante sus viajes y estancias en lugares distintos a su entorno habitual, por un período inferior a un año, y por motivos de ocio, negocios u otros no relacionados con el ejercicio de una actividad remunerada en el lugar visitado."</div>
      <p>Esta definición destaca tres aspectos:</p>
      <ul style="margin-top:6px">
        <li><strong>Desplazamiento hacia un lugar diferente al habitual.</strong></li>
        <li><strong>Temporalidad limitada.</strong></li>
        <li><strong>Motivaciones diversas, siempre que no impliquen trabajo en el destino.</strong></li>
      </ul>
      <div class="divider"></div>
      <p><strong>Otras definiciones clave</strong></p>
      <ul style="margin-top:6px">
        <li><strong>Mathieson y Wall (1982):</strong> turismo como proceso de tres etapas: desplazamiento temporal, estancia en el destino y realización de actividades y servicios.</li>
        <li style="margin-top:5px"><strong>Cooper et al. (2021):</strong> "actividad social, cultural y económica que implica la interacción entre turistas, empresas, comunidades y gobiernos".</li>

          {
            id: '1.3', title: '1.3 El sistema turístico', content: `

        ]
      },

        <p>Primeros desplazamientos por comercio, religión y cultura. Los sumerios crearon la moneda; en Grecia, los Juegos Olímpicos motivaron viajes; Roma desarrolló caminos, balnearios y villas vacacionales. Heródoto fue uno de los primeros cronistas de viajes.</p>

      {

        subtopics: [
          {
            id: '3.7', title: '3.7 Las 9 modalidades de la gastronomía', content: `
      <p>Cada modalidad gastronómica responde a realidades, intereses y dinámicas particulares dentro del ámbito turístico.</p>
      <div class="divider"></div>
      <ul>
        <li><strong>3.7.1 Gastronomía tradicional:</strong> platos, técnicas e ingredientes transmitidos de generación en generación. Patrimonio Cultural Inmaterial (UNESCO). En Ecuador: cuy asado, bollo manabita, fanesca.</li>
        <li style="margin-top:8px"><strong>3.7.2 Gastronomía contemporánea o de autor:</strong> creatividad, innovación y reinterpretación de recetas tradicionales. El chef como creador de experiencias sensoriales únicas.</li>
        <li style="margin-top:8px"><strong>3.7.3 Gastronomía territorial o de origen:</strong> vinculada al lugar de origen (geografía, clima, tradiciones). Ejemplos: cacao Arriba, café lojano.</li>
        <li style="margin-top:8px"><strong>3.7.4 Gastronomía enológica (enoturismo):</strong> centrada en vino y bebidas fermentadas. Visitas a viñedos, rutas del vino, catas y maridajes.</li>
        <li style="margin-top:8px"><strong>3.7.5 Gastronomía festiva y ritual:</strong> vinculada a celebraciones y fiestas religiosas. En Ecuador: colada morada, fanesca, dulces navideños.</li>
        <li style="margin-top:8px"><strong>3.7.6 Gastronomía comunitaria y vivencial:</strong> acercamiento directo a prácticas culinarias locales con comunidades anfitrionas (Saraguro, Yunguilla, Zuleta).</li>

          {
            id: '4.9', title: '4.9 Gastronomía, sostenibilidad y futuro', content: `
      <p>El futuro enfrenta desafíos como seguridad alimentaria, reducción de desperdicio, protección del patrimonio culinario y adaptación al cambio climático. Tendencias emergentes:</p>

    let current = 0;
    function getColor(idx) { return getComputedStyle(document.documentElement).getPropertyValue(COLORS[idx]).trim(); }
    function openModal(idx) { current = idx; renderModal(); document.getElementById('overlay').classList.add('open'); document.getElementById('modal').focus(); }
    function renderModal() {
      const d = WEEKS[current]; const c = getColor(current);
      document.getElementById('mNum').textContent = d.num;
      document.getElementById('mNum').style.background = c;
      document.getElementById('mWeek').textContent = d.week;
      document.getElementById('mWeek').style.color = c;
      document.getElementById('modalTitle').textContent = d.title;
      document.getElementById('mCounter').textContent = (current + 1) + ' de ' + WEEKS.length;
      let html = `<div class="m-intro" style="border-color:${c}">${d.intro}</div>`;
      d.subtopics.forEach(st => {
        html += `<div class="subtopic"><div class="subtopic-hd"><div class="st-dot" style="background:${c}"></div><h3>${st.title}</h3></div>${st.content}</div><div class="divider"></div>`;
      });
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('btnPrev').disabled = current === 0;
      document.getElementById('btnNext').disabled = current === WEEKS.length - 1;
      document.getElementById('modal').scrollTop = 0;
    }
    function closeModal() { document.getElementById('overlay').classList.remove('open'); }
    function navigate(dir) { current = Math.max(0, Math.min(WEEKS.length - 1, current + dir)); renderModal(); }
    document.addEventListener('keydown', e => {
      if (!document.getElementById('overlay').classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });
  </script>
