<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolución Histórica del Turismo Mundial</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #F2EDE4;
      --card: #FFFFFF;
      --text: #1A1510;
      --sub: #6A5F50;
      --border: #DDD6CA;
      --shadow: 0 4px 22px rgba(26, 21, 16, .10);
      --shadowlg: 0 14px 50px rgba(26, 21, 16, .22);
      --e1: #C0781A;
      --e1l: #FDF4E6;
      --e1d: #8A5010;
      --e2: #2A6AAA;
      --e2l: #E4F0FA;
      --e2d: #1A4A80;
      --e3: #2A8A5A;
      --e3l: #E4F6EC;
      --e3d: #1A5A38;
      --e4: #8A3AB0;
      --e4l: #F4EAFC;
      --e4d: #5A2480;
      --e5: #AA3020;
      --e5l: #FCF0EE;
      --e5d: #7A2010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
   
    }

    /* ── HEADER ── */
    .hdr {
      width: 100%;
      max-width: 780px;
      text-align: center;
      margin-bottom: 30px;
    }

    .hdr-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #1A2C40;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .hdr h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(24px, 5.5vw, 36px);
      line-height: 1.15;
      margin-bottom: 9px;
      color: var(--text);
    }

    .hdr h1 em {
      font-style: italic;
      color: var(--e1);
    }

    .hdr p {
      font-size: 13.5px;
      color: var(--sub);
      font-weight: 500;
      line-height: 1.65;
      max-width: 560px;
      margin: 0 auto 14px;
    }

    .hdr-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
    }

    /* ── WHEEL WRAP (desktop only) ── */
    .wheel-section {
      width: 100%;
      max-width: 780px;
      background: var(--card);
     
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* HERO BAND */
    .hero-band {
      background: linear-gradient(135deg, #0E1820 0%, #1E3050 100%);
      padding: 22px 28px 18px;
      position: relative;
      overflow: hidden;
    }

    .hero-band::after {
      content: '🌍';
      position: absolute;
      right: 16px;
      top: -10px;
      font-size: 100px;
      opacity: .07;
      pointer-events: none;
      filter: grayscale(1);
    }

    .hero-band .htag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .45);
      margin-bottom: 6px;
    }

    .hero-band h2 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(16px, 3.5vw, 21px);
      color: #fff;
      line-height: 1.25;
      margin-bottom: 7px;
      position: relative;
      z-index: 1;
    }

    .hero-band p {
      font-size: 13px;
      color: rgba(255, 255, 255, .78);
      font-weight: 500;
      line-height: 1.65;
      position: relative;
      z-index: 1;
      max-width: 580px;
    }

    /* WHEEL CANVAS */
    .wheel-canvas {
      display: none;
      padding: 36px 20px 28px;
      position: relative;
      align-items: center;
      justify-content: center;
    }

    @media(min-width:560px) {
      .wheel-canvas {
        display: flex;
      }
    }

    /* The SVG sits in a fixed square centered */
    .wheel-svg-wrap {
      position: relative;
      width: min(500px, 100%);
      aspect-ratio: 1/1;
    }

    .wheel-svg-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── MOBILE TIMELINE ── */
    .vtl {
      display: flex;
      flex-direction: column;
      padding: 24px 20px 28px;
    }

    @media(min-width:560px) {
      .vtl {
        display: none;
      }
    }

    .vt-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .vt-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 54px;
      flex-shrink: 0;
    }

    .vt-dot {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
      border: 3px solid;
      background: var(--card);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .vt-dot:hover {
      transform: scale(1.1);
      box-shadow: var(--shadowlg);
    }

    .vt-line {
      width: 3px;
      flex: 1;
      min-height: 20px;
      background: var(--border);
    }

    .vt-item:last-child .vt-line {
      display: none;
    }

    .vt-body {
      padding: 6px 0 22px 14px;
      flex: 1;
    }

    .vt-epoch {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .vt-name {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .vt-era {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--sub);
      margin-bottom: 9px;
    }

    .vt-btn {
      border: none;
      border-radius: 22px;
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }

    .vt-btn:hover {
      opacity: .85;
      transform: translateY(-1px);
    }

    /* LEGEND */
    .legend {
      padding: 12px 22px 14px;
      border-top: 1px solid var(--border);
      background: #F8F4EE;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      justify-content: center;
    }

    .lg-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
    }

    .lg-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 21, 16, .54);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    @media(min-width:600px) {
      .overlay {
        align-items: center;
        padding: 20px;
      }
    }

    .overlay.open {
      display: flex;
      animation: fadeOv .25s ease;
    }

    @keyframes fadeOv {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--card);
      width: 100%;
      max-width: 580px;
      border-radius: 24px 24px 0 0;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp .33s cubic-bezier(.34, 1.3, .7, 1);
    }

    @media(min-width:600px) {
      .modal {
        border-radius: 24px;
        animation: zoomIn .3s cubic-bezier(.34, 1.2, .7, 1);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes zoomIn {
      from {
        transform: scale(.9) translateY(20px);
        opacity: 0
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .m-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 12px auto 0;
    }

    @media(min-width:600px) {
      .m-handle {
        display: none;
      }
    }

    .m-hero {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 5;
    }

    .m-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      border: 3px solid;
    }

    .m-head {
      flex: 1;
    }

    .m-num {
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .m-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(18px, 4vw, 23px);
      color: var(--text);
      line-height: 1.2;
    }

    .m-era {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      margin-top: 2px;
    }

    .mclose {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 16px;
      color: var(--sub);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }

    .mclose:hover {
      background: var(--border);
    }

    .m-body {
      padding: 16px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hito {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .hito:last-child {
      border-bottom: none;
    }

    .hito-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .hito-content {
      flex: 1;
    }

    .hito-year {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .hito-text {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--sub);
      line-height: 1.65;
    }

    .hito-text strong {
      color: var(--text);
      font-weight: 700;
    }

    .m-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      background: #F8F4EE;
      border-radius: 0 0 24px 24px;
      position: sticky;
      bottom: 0;
    }

    @media(max-width:599px) {
      .m-nav {
        border-radius: 0;
      }
    }

    .mnav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      transition: all .2s;
    }

    .mnav-btn:hover {
      background: var(--bg);
      border-color: var(--text);
      color: var(--text);
    }

    .mnav-btn:disabled {
      opacity: .3;
      cursor: default;
    }

    .m-counter {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
    }

    /* modal scrollbar */
    .modal::-webkit-scrollbar {
      width: 4px;
    }

    .modal::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
  </style>
</head>

<body>



  <!-- MAIN CARD -->
  <div class="wheel-section">

    <!-- Hero band -->
    <div class="hero-band">
      <p class="htag">Línea del tiempo · 5 épocas históricas</p>
      <h2>Del viaje ancestral al turismo digital</h2>
      <p>Cinco grandes eras que transformaron el desplazamiento humano en la industria global que conocemos hoy.</p>
    </div>

    <!-- DESKTOP: SVG wheel -->
    <div class="wheel-canvas" id="wheelCanvas" aria-label="Línea del tiempo circular" role="list">
      <div class="wheel-svg-wrap">
        <svg id="wheelSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" aria-hidden="false">
          <!-- Defs -->
          <defs>
            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <!-- Faint orbit ring -->
          <circle cx="250" cy="250" r="170" fill="none" stroke="#DDD6CA" stroke-width="1.5" stroke-dasharray="6 5"
            opacity=".7" />

          <!-- Inner subtle ring -->
          <circle cx="250" cy="250" r="80" fill="none" stroke="#EDE8E0" stroke-width="1" opacity=".8" />

          <!-- Connector lines — drawn by JS into this group -->
          <g id="connectors"></g>

          <!-- Arrow path (clockwise arc between nodes) — drawn by JS -->
          <g id="arcs"></g>

          <!-- Center hub -->
          <circle cx="250" cy="250" r="70" fill="#1A2C40" />
          <circle cx="250" cy="250" r="70" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="3" />
          <text x="250" y="240" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="30"
            fill="#ffffff">🌍</text>
          <text x="250" y="258" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700"
            fill="rgba(255,255,255,.85)" letter-spacing="1">TURISMO</text>
          <text x="250" y="271" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700"
            fill="rgba(255,255,255,.85)" letter-spacing="1">MUNDIAL</text>

          <!-- Epoch nodes — drawn by JS into this group -->
          <g id="epochNodes" role="list"></g>
        </svg>
      </div>
    </div>

    <!-- MOBILE: vertical timeline -->
    <div class="vtl" role="list" id="vtl"></div>

    <!-- Legend -->
    <div class="legend" aria-label="Leyenda de épocas">
      <div class="lg-chip">
        <div class="lg-dot" style="background:var(--e1)"></div>Edad Antigua
      </div>
      <div class="lg-chip">
        <div class="lg-dot" style="background:var(--e2)"></div>Edad Media
      </div>
      <div class="lg-chip">
        <div class="lg-dot" style="background:var(--e3)"></div>Edad Moderna
      </div>
      <div class="lg-chip">
        <div class="lg-dot" style="background:var(--e4)"></div>Edad Contemporánea
      </div>
      <div class="lg-chip">
        <div class="lg-dot" style="background:var(--e5)"></div>Siglo XXI
      </div>
    </div>

  </div><!-- /wheel-section -->

  <!-- MODAL -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mTitle"
    onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal" tabindex="-1">
      <div class="m-handle" aria-hidden="true"></div>
      <div class="m-hero">
        <div class="m-icon" id="mIcon"></div>
        <div class="m-head">
          <div class="m-num" id="mNum"></div>
          <div class="m-title" id="mTitle"></div>
          <div class="m-era" id="mEra"></div>
        </div>
        <button class="mclose" onclick="closeModal()" aria-label="Cerrar">✕</button>
      </div>
      <div class="m-body" id="mBody"></div>
      <div class="m-nav">
        <button class="mnav-btn" id="btnPrev" onclick="navigate(-1)">← Anterior</button>
        <span class="m-counter" id="mCounter">1 de 5</span>
        <button class="mnav-btn" id="btnNext" onclick="navigate(1)">Siguiente →</button>
      </div>
    </div>
  </div>

  <script>
    /* ════════════════════════════════════════
       DATA
    ════════════════════════════════════════ */
    const EPOCHS = [
      {
        icon: '🏛️', num: 'Época 01', title: 'Edad Antigua', era: '3000 a.C. – 476 d.C.',
        color: '#C0781A', colorl: '#FDF4E6', vtClass: 'vt-e1',
        hitos: [
          { year: '~3000 a.C.', text: 'Los <strong>sumerios</strong> crean la moneda, lo que impulsa el comercio e incipientes viajes.' },
          { year: 'Grecia clásica', text: 'Los primeros viajes para asistir a los <strong>Juegos Olímpicos</strong>; se solicitan alojamiento y servicios de alimentación.' },
          { year: 'S. V a.C.', text: '<strong>Heródoto</strong>, considerado uno de los primeros cronistas de viajes, describe los recorridos y pueblos que visitó.' },
          { year: '410 a.C.', text: '<strong>Sócrates</strong> promueve viajar como medio para obtener conocimiento.' },
          { year: '344 a.C.', text: '<strong>Éfeso</strong> se consolida como importante centro turístico y comercial.' },
          { year: 'Imperio Romano', text: 'Visitas a templos, festividades y <strong>baños termales</strong>; viajes por comercio, fines militares, políticos y de comunicación. Las <em>villae</em> costeras son antecesoras de los centros de playa actuales.' },
          { year: '476 d.C.', text: '<strong>Caída del Imperio Romano</strong>: los viajes disminuyen significativamente en Occidente.' },
        ]
      },
      {
        icon: '⛪', num: 'Época 02', title: 'Edad Media', era: '477 – 1453',
        color: '#2A6AAA', colorl: '#E4F0FA', vtClass: 'vt-e2',
        hitos: [
          { year: 'S. V–XI', text: 'Las <strong>peregrinaciones religiosas</strong> (cristianismo e islamismo) se convierten en la principal motivación de viaje. Aparecen guías para viajeros con información de hospedaje.' },
          { year: '1095–1291', text: 'Las <strong>Cruzadas</strong> revitalizan el comercio y los desplazamientos entre Europa y Oriente Medio.' },
          { year: '1282', text: 'Se forma el <strong>gremio de posaderos en Florencia</strong>, señal de la profesionalización del hospedaje.' },
          { year: '1290', text: 'El hospedaje comienza a consolidarse como <strong>negocio productivo</strong>.' },
          { year: '1362', text: '<strong>Venecia</strong> emerge como destino turístico destacado en Europa.' },
        ]
      },
      {
        icon: '🚢', num: 'Época 03', title: 'Edad Moderna', era: '1454 – 1789',
        color: '#2A8A5A', colorl: '#E4F6EC', vtClass: 'vt-e3',
        hitos: [
          { year: '1492', text: 'Las grandes <strong>expediciones marítimas</strong> (Colón, Vespucio) amplían el conocimiento geográfico y abren rutas intercontinentales.' },
          { year: 'S. XVI–XVII', text: 'Aparecen los primeros <strong>alojamientos denominados "hotel"</strong> en Europa.' },
          { year: '1670', text: 'El <strong>Grand Tour</strong> se populariza entre la aristocracia europea como viaje educativo y cultural por Italia y Francia.' },
          { year: '1765', text: '<strong>A. Boulanger</strong> abre en París uno de los primeros restaurantes modernos.' },
          { year: '1760–1840', text: 'La <strong>Revolución Industrial</strong> transforma el transporte y sienta las bases del turismo de masas.' },
        ]
      },
      {
        icon: '✈️', num: 'Época 04', title: 'Edad Contemporánea', era: '1790 – 1999',
        color: '#8A3AB0', colorl: '#F4EAFC', vtClass: 'vt-e4',
        hitos: [
          { year: '1841', text: '<strong>Thomas Cook</strong> organiza el primer viaje colectivo en tren y funda una de las primeras agencias de viajes.' },
          { year: 'S. XIX', text: '<strong>Henry Wells y William Fargo</strong> (American Express) introducen los cheques de viajero.' },
          { year: '1867', text: '<strong>George Pullman</strong> presenta los primeros coches-cama, considerados "hoteles sobre ruedas".' },
          { year: 'S. XIX–XX', text: '<strong>César Ritz</strong> revoluciona la hotelería moderna; <strong>Auguste Escoffier</strong> profesionaliza la gastronomía hotelera.' },
          { year: '1919', text: 'Inician los primeros <strong>vuelos comerciales regulares</strong> de pasajeros.' },
          { year: '1950–1970', text: 'Auge del <strong>turismo de masas</strong>: vuelos chárter, paquetes turísticos y cadenas hoteleras internacionales (Hilton).' },
          { year: '1979', text: 'Se establecen sistemas de <strong>clasificación de hoteles</strong> a nivel internacional.' },
          { year: '1980–1990', text: 'Surge el <strong>turismo sostenible</strong>. La caída del Muro de Berlín abre nuevos destinos.' },
        ]
      },
      {
        icon: '🚀', num: 'Época 05', title: 'Siglo XXI', era: '2000 en adelante',
        color: '#AA3020', colorl: '#FCF0EE', vtClass: 'vt-e5',
        hitos: [
          { year: '2001', text: 'Se realizan los primeros <strong>vuelos suborbitales turísticos</strong>, inaugurando el turismo espacial.' },
          { year: '2000s', text: 'Consolidación del <strong>boleto electrónico</strong>, las aerolíneas de bajo costo y la comercialización digital del turismo.' },
          { year: '2003', text: 'La <strong>ONU Turismo</strong> (antes OMT) refuerza su rol como organismo rector del turismo sostenible global.' },
          { year: '2010s', text: 'El <strong>turismo experiencial y digital</strong> domina las tendencias: plataformas colaborativas y turismo responsable.' },
          { year: '2020', text: 'La <strong>pandemia de COVID-19</strong> transforma el sector: nuevos protocolos, digitalización acelerada y revalorización del turismo local.' },
          { year: 'Hoy', text: 'El turismo se orienta hacia la <strong>sostenibilidad ambiental</strong>, la inteligencia artificial y experiencias auténticas.' },
        ]
      }
    ];

    /* ════════════════════════════════════════
       SVG WHEEL — drawn programmatically
       so every measurement is exact
    ════════════════════════════════════════ */
    const CX = 250, CY = 250;          // center
    const ORBIT_R = 170;               // orbit radius (matches SVG circle)
    const NODE_R = 52;                // node circle radius
    const HUB_R = 70;                // center hub radius

    function toRad(deg) { return deg * Math.PI / 180; }

    // Pentagon: 5 nodes, start at top (-90°), clockwise
    function nodePos(i) {
      const angle = -90 + i * 72;     // 360/5 = 72°
      const rad = toRad(angle);
      return {
        x: CX + ORBIT_R * Math.cos(rad),
        y: CY + ORBIT_R * Math.sin(rad),
        angle
      };
    }

    function buildWheel() {
      const svgNS = 'http://www.w3.org/2000/svg';
      const connG = document.getElementById('connectors');
      const arcG = document.getElementById('arcs');
      const nodeG = document.getElementById('epochNodes');

      const positions = EPOCHS.map((_, i) => nodePos(i));

      /* ── Radial spoke lines (hub → node, clipped to gap) ── */
      positions.forEach((p, i) => {
        const col = EPOCHS[i].color;
        // Direction vector
        const dx = p.x - CX, dy = p.y - CY;
        const dist = Math.hypot(dx, dy);
        const nx = dx / dist, ny = dy / dist;
        // Start just outside hub, end just before node
        const x1 = CX + nx * (HUB_R + 8);
        const y1 = CY + ny * (HUB_R + 8);
        const x2 = p.x - nx * (NODE_R + 4);
        const y2 = p.y - ny * (NODE_R + 4);

        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', col);
        line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-dasharray', '4 3');
        line.setAttribute('opacity', '.55');
        connG.appendChild(line);
      });

      /* ── Clockwise arcs between consecutive nodes ── */
      // We draw a circular arc segment along the orbit ring between each pair
      positions.forEach((p, i) => {
        const next = positions[(i + 1) % 5];
        const col = EPOCHS[i].color;

        // Parametric: arc from node_i to node_(i+1)
        // Using SVG arc: large-arc=0 (always <180°), sweep=1 (clockwise)
        // Trim start/end by NODE_R offset on orbit
        const startAngleDeg = -90 + i * 72;
        const endAngleDeg = -90 + (i + 1) * 72;

        // Offset angles to not overlap node circles
        const offsetDeg = (NODE_R / ORBIT_R) * (180 / Math.PI) + 2;
        const a1 = toRad(startAngleDeg + offsetDeg);
        const a2 = toRad(endAngleDeg - offsetDeg);

        const x1 = CX + ORBIT_R * Math.cos(a1);
        const y1 = CY + ORBIT_R * Math.sin(a1);
        const x2 = CX + ORBIT_R * Math.cos(a2);
        const y2 = CY + ORBIT_R * Math.sin(a2);

        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', `M ${x1} ${y1} A ${ORBIT_R} ${ORBIT_R} 0 0 1 ${x2} ${y2}`);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', col);
        path.setAttribute('stroke-width', '2.2');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('opacity', '.75');

        // Arrowhead: small triangle at end point, tangent to arc
        const tangentAngle = a2 + Math.PI / 2; // tangent at end = perpendicular to radius
        const aw = 7, ah = 10;
        const cos = Math.cos(tangentAngle), sin = Math.sin(tangentAngle);
        const cosp = Math.cos(tangentAngle - Math.PI / 2), sinp = Math.sin(tangentAngle - Math.PI / 2);
        // tip of arrow = x2, y2
        const bx = x2 - cos * ah, by = y2 - sin * ah; // base midpoint
        const lx = bx - cosp * (aw / 2), ly = by - sinp * (aw / 2);
        const rx = bx + cosp * (aw / 2), ry = by + sinp * (aw / 2);

        const arrow = document.createElementNS(svgNS, 'polygon');
        arrow.setAttribute('points', `${x2},${y2} ${lx},${ly} ${rx},${ry}`);
        arrow.setAttribute('fill', col);
        arrow.setAttribute('opacity', '.8');

        arcG.appendChild(path);
        arcG.appendChild(arrow);
      });

      /* ── Epoch node circles ── */
      positions.forEach((p, i) => {
        const e = EPOCHS[i];
        const col = e.color, coll = e.colorl;

        const g = document.createElementNS(svgNS, 'g');
        g.setAttribute('role', 'listitem');
        g.setAttribute('tabindex', '0');
        g.setAttribute('aria-label', `${e.title} ${e.era}`);
        g.style.cursor = 'pointer';

        // Shadow circle (slightly larger, offset)
        const shadow = document.createElementNS(svgNS, 'circle');
        shadow.setAttribute('cx', p.x + 2); shadow.setAttribute('cy', p.y + 4);
        shadow.setAttribute('r', NODE_R);
        shadow.setAttribute('fill', 'rgba(26,21,16,.12)');

        // Main fill circle
        const bg = document.createElementNS(svgNS, 'circle');
        bg.setAttribute('cx', p.x); bg.setAttribute('cy', p.y);
        bg.setAttribute('r', NODE_R);
        bg.setAttribute('fill', coll);

        // Border circle
        const border = document.createElementNS(svgNS, 'circle');
        border.setAttribute('cx', p.x); border.setAttribute('cy', p.y);
        border.setAttribute('r', NODE_R);
        border.setAttribute('fill', 'none');
        border.setAttribute('stroke', col);
        border.setAttribute('stroke-width', '3');

        // Epoch number
        const numTxt = document.createElementNS(svgNS, 'text');
        numTxt.setAttribute('x', p.x); numTxt.setAttribute('y', p.y - 22);
        numTxt.setAttribute('text-anchor', 'middle');
        numTxt.setAttribute('font-family', "'DM Sans',sans-serif");
        numTxt.setAttribute('font-size', '9');
        numTxt.setAttribute('font-weight', '800');
        numTxt.setAttribute('fill', col);
        numTxt.setAttribute('letter-spacing', '0.8');
        numTxt.textContent = `0${i + 1}`;

        // Emoji icon
        const icon = document.createElementNS(svgNS, 'text');
        icon.setAttribute('x', p.x); icon.setAttribute('y', p.y - 2);
        icon.setAttribute('text-anchor', 'middle');
        icon.setAttribute('font-size', '22');
        icon.setAttribute('dominant-baseline', 'middle');
        icon.textContent = e.icon;

        // Era label (short)
        const eraShort = e.era.split('–')[0].trim();
        const eraLabel = document.createElementNS(svgNS, 'text');
        eraLabel.setAttribute('x', p.x); eraLabel.setAttribute('y', p.y + 18);
        eraLabel.setAttribute('text-anchor', 'middle');
        eraLabel.setAttribute('font-family', "'DM Sans',sans-serif");
        eraLabel.setAttribute('font-size', '8.5');
        eraLabel.setAttribute('font-weight', '700');
        eraLabel.setAttribute('fill', col);
        eraLabel.textContent = eraShort;

        // Name label (outside node, away from center)
        const nameAngle = toRad(p.angle);
        const labelDist = NODE_R + 22;
        const lx = p.x + Math.cos(nameAngle) * labelDist;
        const ly = p.y + Math.sin(nameAngle) * labelDist;

        // Determine text-anchor based on horizontal position
        let anchor = 'middle';
        if (lx < CX - 30) anchor = 'end';
        else if (lx > CX + 30) anchor = 'start';

        const nameLine1 = e.title.split(' ')[0];
        const nameLine2 = e.title.split(' ').slice(1).join(' ');

        const nameTxt1 = document.createElementNS(svgNS, 'text');
        nameTxt1.setAttribute('x', lx); nameTxt1.setAttribute('y', ly - (nameLine2 ? 5 : 0));
        nameTxt1.setAttribute('text-anchor', anchor);
        nameTxt1.setAttribute('font-family', "'DM Sans',sans-serif");
        nameTxt1.setAttribute('font-size', '11.5');
        nameTxt1.setAttribute('font-weight', '800');
        nameTxt1.setAttribute('fill', col);
        nameTxt1.textContent = nameLine1;

        g.appendChild(shadow);
        g.appendChild(bg);
        g.appendChild(border);
        g.appendChild(numTxt);
        g.appendChild(icon);
        g.appendChild(eraLabel);
        g.appendChild(nameTxt1);

        if (nameLine2) {
          const nameTxt2 = document.createElementNS(svgNS, 'text');
          nameTxt2.setAttribute('x', lx); nameTxt2.setAttribute('y', ly + 9);
          nameTxt2.setAttribute('text-anchor', anchor);
          nameTxt2.setAttribute('font-family', "'DM Sans',sans-serif");
          nameTxt2.setAttribute('font-size', '11.5');
          nameTxt2.setAttribute('font-weight', '800');
          nameTxt2.setAttribute('fill', col);
          nameTxt2.textContent = nameLine2;
          g.appendChild(nameTxt2);
        }

        // Hover / focus interaction
        function highlight(on) {
          bg.setAttribute('fill', on ? col : coll);
          icon.setAttribute('fill', on ? '#fff' : '');
          eraLabel.setAttribute('fill', on ? '#fff' : col);
          numTxt.setAttribute('fill', on ? col : col);
          g.style.filter = on ? 'drop-shadow(0 4px 12px rgba(0,0,0,.25))' : '';
        }
        g.addEventListener('mouseenter', () => highlight(true));
        g.addEventListener('mouseleave', () => highlight(false));
        g.addEventListener('focus', () => highlight(true));
        g.addEventListener('blur', () => highlight(false));
        g.addEventListener('click', () => openModal(i));
        g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(i); } });

        nodeG.appendChild(g);
      });
    }

    /* ════════════════════════════════════════
       MOBILE VERTICAL TIMELINE
    ════════════════════════════════════════ */
    function buildMobile() {
      const vtl = document.getElementById('vtl');
      EPOCHS.forEach((e, i) => {
        const item = document.createElement('div');
        item.className = 'vt-item';
        item.setAttribute('role', 'listitem');
        item.innerHTML = `
      <div class="vt-spine">
        <button class="vt-dot" style="border-color:${e.color};background:${e.colorl};"
                aria-label="${e.title}" onclick="openModal(${i})">${e.icon}</button>
        <div class="vt-line"></div>
      </div>
      <div class="vt-body">
        <div class="vt-epoch" style="color:${e.color}">0${i + 1} · ${e.title}</div>
        <div class="vt-name">${e.title}</div>
        <div class="vt-era">${e.era}</div>
        <button class="vt-btn" style="background:${e.colorl};color:${e.color};"
                onclick="openModal(${i})">Ver hitos →</button>
      </div>
    `;
        vtl.appendChild(item);
      });
    }

    /* ════════════════════════════════════════
       MODAL
    ════════════════════════════════════════ */
    let current = 0;

    function openModal(idx) {
      current = idx;
      render();
      document.getElementById('overlay').classList.add('open');
      document.getElementById('modal').focus();
    }
    function closeModal() {
      document.getElementById('overlay').classList.remove('open');
    }
    function navigate(d) {
      current = Math.max(0, Math.min(EPOCHS.length - 1, current + d));
      render();
    }
    function render() {
      const e = EPOCHS[current];
      const icon = document.getElementById('mIcon');
      icon.textContent = e.icon;
      icon.style.background = e.colorl;
      icon.style.borderColor = e.color;
      const nm = document.getElementById('mNum');
      nm.textContent = e.num; nm.style.color = e.color;
      document.getElementById('mTitle').textContent = e.title;
      document.getElementById('mEra').textContent = e.era;
      document.getElementById('mBody').innerHTML = e.hitos.map(h => `
    <div class="hito">
      <div class="hito-dot" style="background:${e.color}"></div>
      <div class="hito-content">
        <div class="hito-year" style="color:${e.color}">${h.year}</div>
        <div class="hito-text">${h.text}</div>
      </div>
    </div>`).join('');
      document.getElementById('btnPrev').disabled = current === 0;
      document.getElementById('btnNext').disabled = current === EPOCHS.length - 1;
      document.getElementById('mCounter').textContent = `${current + 1} de ${EPOCHS.length}`;
      document.getElementById('modal').scrollTop = 0;
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('overlay').classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });
    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('overlay')) closeModal();
    });

    /* ── INIT ── */
    buildWheel();
    buildMobile();
  </script>
</body>
