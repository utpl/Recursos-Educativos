<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diversidad Gastronómica del Ecuador por Regiones</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #F0EDE5;
      --card: #FFFFFF;
      --text: #1A1810;
      --sub: #585040;
      --border: #DDD8CE;
      --shadow: 0 4px 22px rgba(26, 24, 16, .10);
      --shadowlg: 0 14px 48px rgba(26, 24, 16, .18);
      /* region colours */
      --coast: #1A6A8A;
      --coastl: #E4F2F8;
      --coastd: #0E4A64;
      --sierra: #4A7A2A;
      --sierral: #EBF4E2;
      --sierrad: #2E5A18;
      --amazon: #8A5010;
      --amazonl: #F6EEE2;
      --amazond: #5A3008;
      --island: #1A5A7A;
      --islandl: #E2EEF6;
      --islandd: #0E3C52;
      --radius: 0px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lexend', sans-serif;
      background: white;
      color: var(--text);
      min-height: 100vh;
      
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .hdr {
      width: 100%;
      max-width: 800px;
      text-align: center;
      margin-bottom: 22px;
    }

    .hdr .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--text);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      padding: 5px 15px;
      border-radius: 20px;
      margin-bottom: 13px;
    }

    .hdr h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 5.5vw, 34px);
      font-weight: 700;
      line-height: 1.18;
      margin-bottom: 8px;
    }

    .hdr h1 em {
      font-style: italic;
      color: var(--coast);
    }

    .hdr .sub {
      font-size: 13px;
      color: var(--sub);
      font-weight: 500;
      line-height: 1.5;
    }

    .hdr .instr {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--sub);
    }

    /* ── MAIN CARD ── */
    .main {
      width: 100%;
      max-width: 800px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── HERO STRIP ── */
    .hero {
      background: linear-gradient(135deg, #0A2018 0%, #1A3A28 55%, #2A5038 100%);
      padding: 26px 28px 22px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '🇪🇨';
      position: absolute;
      right: 16px;
      top: -10px;
      font-size: 88px;
      opacity: .10;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .04);
      pointer-events: none;
    }

    .hero .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .5);
      margin-bottom: 8px;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(17px, 4vw, 22px);
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      font-size: 13px;
      color: rgba(255, 255, 255, .82);
      font-weight: 500;
      line-height: 1.65;
      position: relative;
      z-index: 1;
    }

    /* ── REGION GRID ── */
    .region-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 0;
    }

    @media(max-width:480px) {
      .region-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── REGION CARD ── */
    .rcard {
      cursor: pointer;
      padding: 24px 22px 20px;
      border: 0;
      background: none;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: all .22s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .rcard:last-child,
    .rcard:nth-child(2) {
      border-right: 0;
    }

    @media(max-width:480px) {
      .rcard {
        border-right: 0;
      }

      .rcard:last-child {
        border-bottom: 0;
      }
    }

    .rcard:nth-child(3),
    .rcard:nth-child(4) {
      border-bottom: 0;
    }

    .rcard:hover {
      transform: scale(1.02);
      z-index: 2;
      box-shadow: var(--shadowlg);
      border-radius: 0;
    }

    .rcard:focus-visible {
      outline: 3px solid var(--coast);
      outline-offset: 2px;
      z-index: 2;
    }

    .rcard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .22s;
    }

    .rcard:hover::before {
      opacity: 1;
    }

    .coast::before {
      background: var(--coastl);
    }

    .sierra::before {
      background: var(--sierral);
    }

    .amazon::before {
      background: var(--amazonl);
    }

    .island::before {
      background: var(--islandl);
    }

    .rc-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .rc-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      transition: transform .22s;
    }

    .rcard:hover .rc-icon {
      transform: scale(1.1) rotate(-4deg);
    }

    .coast .rc-icon {
      background: var(--coastl);
      border: 2px solid var(--coast);
    }

    .sierra .rc-icon {
      background: var(--sierral);
      border: 2px solid var(--sierra);
    }

    .amazon .rc-icon {
      background: var(--amazonl);
      border: 2px solid var(--amazon);
    }

    .island .rc-icon {
      background: var(--islandl);
      border: 2px solid var(--island);
    }

    .rc-header {
      flex: 1;
    }

    .rc-region-tag {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .coast .rc-region-tag {
      color: var(--coast);
    }

    .sierra .rc-region-tag {
      color: var(--sierra);
    }

    .amazon .rc-region-tag {
      color: var(--amazon);
    }

    .island .rc-region-tag {
      color: var(--island);
    }

    .rc-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }

    .rc-desc {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .rc-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      position: relative;
      z-index: 1;
    }

    .rc-chip {
      font-size: 10.5px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1.5px solid;
    }

    .coast .rc-chip {
      color: var(--coast);
      border-color: var(--coast);
      background: var(--coastl);
    }

    .sierra .rc-chip {
      color: var(--sierra);
      border-color: var(--sierra);
      background: var(--sierral);
    }

    .amazon .rc-chip {
      color: var(--amazon);
      border-color: var(--amazon);
      background: var(--amazonl);
    }

    .island .rc-chip {
      color: var(--island);
      border-color: var(--island);
      background: var(--islandl);
    }

    .rc-cta {
      margin-top: 2px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
      position: relative;
      z-index: 1;
      transition: gap .2s;
    }

    .rcard:hover .rc-cta {
      gap: 9px;
    }

    .coast .rc-cta {
      color: var(--coast);
    }

    .sierra .rc-cta {
      color: var(--sierra);
    }

    .amazon .rc-cta {
      color: var(--amazon);
    }

    .island .rc-cta {
      color: var(--island);
    }

    /* ── BOTTOM STRIPE ── */
    .map-stripe {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: #F8F6F0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ms-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      letter-spacing: .5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .ms-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ms-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--sub);
    }

    .ms-dot span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── REFERENCE ── */
    .ref-strip {
      padding: 10px 24px 14px;
      font-size: 10.5px;
      color: var(--sub);
      font-weight: 500;
      font-style: italic;
      border-top: 1px solid var(--border);
      background: #F8F6F0;
    }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 24, 16, .52);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    @media(min-width:600px) {
      .overlay {
        align-items: center;
        padding: 20px;
      }
    }

    .overlay.open {
      display: flex;
      animation: fadeOv .25s ease;
    }

    @keyframes fadeOv {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--card);
      width: 100%;
      max-width: 560px;
      border-radius: 22px 22px 0 0;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp .33s cubic-bezier(.34, 1.3, .7, 1);
    }

    @media(min-width:600px) {
      .modal {
        border-radius: 22px;
        animation: zoomIn .3s cubic-bezier(.34, 1.2, .7, 1);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes zoomIn {
      from {
        transform: scale(.9) translateY(20px);
        opacity: 0
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 12px auto 0;
    }

    @media(min-width:600px) {
      .modal-handle {
        display: none;
      }
    }

    .modal-hero {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .mh-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .mh-body {
      flex: 1;
    }

    .mh-tag {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .mh-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 4vw, 22px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .mclose {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 16px;
      color: var(--sub);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }

    .mclose:hover {
      background: var(--border);
    }

    .mclose:focus-visible {
      outline: 3px solid var(--coast);
      outline-offset: 2px;
    }

    .modal-body {
      padding: 18px 22px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

 

    .msection-hd {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
    }

    .msection-hd .msdot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .msection-hd h3 {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .msection p {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.68;
    }

    .msection p strong {
      color: var(--text);
      font-weight: 700;
    }

    .mdivider {
      height: 1px;
      background: var(--border);
    }

    .mchips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .mchip {
      font-size: 11.5px;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1.5px solid;
    }

    .modal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 22px;
      border-top: 1px solid var(--border);
      background: #F8F6F0;
      border-radius: 0 0 22px 22px;
    }

    @media(max-width:599px) {
      .modal-nav {
        border-radius: 0;
      }
    }

    .mnav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Lexend', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      transition: all .2s;
    }

    .mnav-btn:hover {
      background: var(--bg);
      border-color: var(--text);
      color: var(--text);
    }

    .mnav-btn:disabled {
      opacity: .3;
      cursor: default;
    }

    .mnav-btn:focus-visible {
      outline: 3px solid var(--coast);
      outline-offset: 2px;
    }

    .mcounter {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
    }
  </style>
</head>

<body>

 

  <main class="main" role="main" aria-label="Infografía de diversidad gastronómica del Ecuador">

    <!-- HERO -->
    <div class="hero">
      <p class="tag">Identidad culinaria territorial</p>
      <h2>Diversidad gastronómica del Ecuador por regiones</h2>
      <p>Explore y conozca los ingredientes, platos y tradiciones que definen la identidad culinaria de cada región.</p>
    </div>

    <!-- REGION GRID -->
    <div class="region-grid" role="list" aria-label="Regiones del Ecuador">

      <button class="rcard coast" onclick="openModal(0)" role="listitem" aria-label="Región Costa — ver contenido"
        aria-haspopup="dialog">
        <div class="rc-top">
          <div class="rc-icon" aria-hidden="true">🌊</div>
          <div class="rc-header">
            <div class="rc-region-tag">Región</div>
            <div class="rc-title">Costa</div>
          </div>
        </div>
        <p class="rc-desc">Productos del mar, plátano y maní reflejan la relación histórica con el océano y los
          manglares.</p>
        <div class="rc-chips">
          <span class="rc-chip">🦐 Mariscos</span>
          <span class="rc-chip">🥥 Coco</span>
          <span class="rc-chip">🐟 Ceviche</span>
        </div>
        <span class="rc-cta">Ver contenido <span aria-hidden="true">→</span></span>
      </button>

      <button class="rcard sierra" onclick="openModal(1)" role="listitem" aria-label="Región Sierra — ver contenido"
        aria-haspopup="dialog">
        <div class="rc-top">
          <div class="rc-icon" aria-hidden="true">🏔️</div>
          <div class="rc-header">
            <div class="rc-region-tag">Región</div>
            <div class="rc-title">Sierra</div>
          </div>
        </div>
        <p class="rc-desc">Papas, maíz y granos andinos en una cocina que refleja el ciclo agrícola y las celebraciones
          comunitarias.</p>
        <div class="rc-chips">
          <span class="rc-chip">🥔 Papa</span>
          <span class="rc-chip">🌽 Maíz</span>
          <span class="rc-chip">🐷 Hornado</span>
        </div>
        <span class="rc-cta">Ver contenido <span aria-hidden="true">→</span></span>
      </button>

      <button class="rcard amazon" onclick="openModal(2)" role="listitem" aria-label="Región Amazónica — ver contenido"
        aria-haspopup="dialog">
        <div class="rc-top">
          <div class="rc-icon" aria-hidden="true">🌿</div>
          <div class="rc-header">
            <div class="rc-region-tag">Región</div>
            <div class="rc-title">Amazónica</div>
          </div>
        </div>
        <p class="rc-desc">Gastronomía vinculada a la biodiversidad del bosque tropical y los saberes ancestrales de los
          pueblos amazónicos.</p>
        <div class="rc-chips">
          <span class="rc-chip">🌱 Yuca</span>
          <span class="rc-chip">🐛 Chontacuro</span>
          <span class="rc-chip">🍵 Guayusa</span>
        </div>
        <span class="rc-cta">Ver contenido <span aria-hidden="true">→</span></span>
      </button>

      <button class="rcard island" onclick="openModal(3)" role="listitem"
        aria-label="Región Insular Galápagos — ver contenido" aria-haspopup="dialog">
        <div class="rc-top">
          <div class="rc-icon" aria-hidden="true">🐢</div>
          <div class="rc-header">
            <div class="rc-region-tag">Región Insular</div>
            <div class="rc-title">Galápagos</div>
          </div>
        </div>
        <p class="rc-desc">Cocina basada en productos marinos con técnicas responsables, acordes con la fragilidad del
          ecosistema.</p>
        <div class="rc-chips">
          <span class="rc-chip">🐠 Productos marinos</span>
          <span class="rc-chip">♻️ Sostenible</span>
        </div>
        <span class="rc-cta">Ver contenido <span aria-hidden="true">→</span></span>
      </button>

    </div>

    <!-- LEGEND -->
    <div class="map-stripe" aria-label="Leyenda de regiones">
      <span class="ms-label">Regiones</span>
      <div class="ms-dots">
        <div class="ms-dot"><span style="background:var(--coast)"></span>Costa</div>
        <div class="ms-dot"><span style="background:var(--sierra)"></span>Sierra</div>
        <div class="ms-dot"><span style="background:var(--amazon)"></span>Amazónica</div>
        <div class="ms-dot"><span style="background:var(--island)"></span>Galápagos</div>
      </div>
    </div>

    <div class="ref-strip" role="contentinfo">Elaboración propia.</div>

  </main>

  <!-- ── MODAL ── -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mTitle"
    onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal" tabindex="-1">
      <div class="modal-handle" aria-hidden="true"></div>
      <div class="modal-hero">
        <div class="mh-icon" id="mIcon"></div>
        <div class="mh-body">
          <div class="mh-tag" id="mTag"></div>
          <div class="mh-title" id="mTitle"></div>
        </div>
        <button class="mclose" onclick="closeModal()" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="mBody"></div>
      <div class="modal-nav">
        <button class="mnav-btn" id="btnPrev" onclick="navigate(-1)">← Anterior</button>
        <span class="mcounter" id="mCounter">1 de 4</span>
        <button class="mnav-btn" id="btnNext" onclick="navigate(1)">Siguiente →</button>
      </div>
    </div>
  </div>

  <script>
    const REGIONS = [
      {
        key: 'coast', icon: '🌊', tag: 'Región Costa', title: 'Costa',
        colorVar: '--coast', colorlVar: '--coastl',
        identity: 'Sobresale una gastronomía basada en <strong>productos del mar, el plátano y el maní</strong>, ingredientes que reflejan la relación histórica de sus poblaciones con el océano y los manglares.',
        dishes: 'Los <strong>ceviches</strong>, preparados con distintas variedades de mariscos, y los <strong>encocados</strong>, elaborados con pescado o camarón y leche de coco, representan la identidad culinaria costeña y su riqueza de sabores frescos y aromáticos.',

    let current = 0;

    function css(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

    function openModal(idx) { current = idx; renderModal(); document.getElementById('overlay').classList.add('open'); document.getElementById('modal').focus(); }
    function closeModal() { document.getElementById('overlay').classList.remove('open'); }
    function navigate(d) { current = Math.max(0, Math.min(REGIONS.length - 1, current + d)); renderModal(); }

    function renderModal() {
      const r = REGIONS[current];
      const col = css(r.colorVar); const coll = css(r.colorlVar);

      // icon
      const icon = document.getElementById('mIcon');
      icon.textContent = r.icon;
      icon.style.background = coll; icon.style.border = `2px solid ${col}`;
      // tag & title
      const tag = document.getElementById('mTag'); tag.textContent = r.tag; tag.style.color = col;
      document.getElementById('mTitle').textContent = r.title;
      // body
      document.getElementById('mBody').innerHTML = `
    <div class="msection">
      <div class="msection-hd">
        <div class="msdot" style="background:${col}"></div>
        <h3>Identidad culinaria</h3>
      </div>
      <p>${r.identity}</p>
    </div>
    <div class="mdivider"></div>
    <div class="msection">
      <div class="msection-hd">
        <div class="msdot" style="background:${col}"></div>
        <h3>Platos e ingredientes representativos</h3>
      </div>
      <p>${r.dishes}</p>
      <div class="mchips">${r.chips.map(c => `<span class="mchip" style="color:${col};border-color:${col};background:${coll}">${c}</span>`).join('')}</div>
    </div>
  `;
      // nav
      document.getElementById('btnPrev').disabled = current === 0;
      document.getElementById('btnNext').disabled = current === REGIONS.length - 1;
      document.getElementById('mCounter').textContent = (current + 1) + ' de ' + REGIONS.length;
      document.getElementById('modal').scrollTop = 0;
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('overlay').classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });
  </script>
</body>
