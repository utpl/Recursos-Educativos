<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Introducción a la ecología política</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #00695c;
            --accent: #ff9800;
            --bg: #f1f8f7;
            --card-bg: #ffffff;
            --text: #111111;
            --success: #4caf50;
            --error: #f44336;
            --neutral: #757575;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* AJUSTE CRÍTICO: 100% de ancho y altura controlada */
        #quiz-resource {
            width: 100%;
            max-width: 800px;
            height: 795px; /* Altura ligeramente menor para evitar scroll en Canvas */
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 110px;
            background: linear-gradient(135deg, var(--primary), #00897b);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 30px;
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 20px;
        }

        .header-icon { font-size: 50px; }
        .header-title { font-size: 24px; font-weight: 700; flex: 1; }

        .instruction {
            padding: 15px 30px;
            background: var(--card-bg);
            border-bottom: 4px solid var(--accent);
            font-size: 14px;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: var(--primary);
        }

        .progress-container {
            flex: 0 0 60%;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 10px;
            background: #d0e8e6;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
            flex: 1;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--neutral);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .card:hover { border-color: var(--accent); background: #fffde7; }
        .card-number { font-size: 32px; font-weight: 700; color: var(--primary); }
        .card-label { font-size: 10px; font-weight: 600; color: var(--neutral); }

        .footer {
            height: 70px;
            background: var(--card-bg);
            border-top: 2px solid var(--primary);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
            flex-shrink: 0;
        }

        .final-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .final-btn:disabled { background: #ccc; }

        /* MODALES AJUSTADOS */
        .modal {
            display: none;
            position: absolute; /* Cambiado de fixed a absolute para no romper el iframe */
            inset: 0;
            background: rgba(0, 105, 92, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            border: 4px solid var(--primary);
        }

        .modal-body { padding: 20px; overflow-y: auto; }
        .modal-options { display: flex; gap: 15px; margin: 20px 0; }
        
        .option-btn {
            flex: 1;
            height: 60px;
            border: 2px solid var(--neutral);
            font-weight: 700;
            cursor: pointer;
            background: white;
        }
        
        .option-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            height: 50px;
            font-weight: 700;
            cursor: pointer;
        }

        .feedback-section { display: none; margin-top: 15px; padding: 15px; border: 2px solid; }
        .feedback-section.success { border-color: var(--success); background: #e8f5e9; }
        .feedback-section.error { border-color: var(--error); background: #ffebee; }

        .close-modal {
            position: absolute;
            top: 10px; right: 10px;
            background: none; border: none; font-size: 24px; color: white; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="quiz-resource">
        <header>
            <div class="header-content">
                <span class="material-symbols-outlined header-icon">eco</span>
                <div class="header-title">Quiz: Introducción a la ecología política</div>
            </div>
        </header>

        <div class="instruction">
            Analice cada enunciado y determine si es verdadero o falso. Considere los fundamentos de la ecología política y el carácter político de los problemas ambientales.
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <span>10 ENUNCIADOS</span>
                <div class="progress-container">
                    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                    <span id="completed-count">0</span>/10
                </div>
            </div>
            <div id="questions-grid" class="grid"></div>
        </div>

        <div class="footer">
            <button id="final-button" class="final-btn" disabled>VER RETROALIMENTACIÓN FINAL</button>
            <div style="flex:1; font-size:12px; color:var(--neutral);">Completa todo para finalizar.</div>
        </div>

        <div id="question-modal" class="modal">
            <button onclick="closeQuestionModal()" class="close-modal">✕</button>
            <div class="modal-content">
                <div class="modal-body">
                    <p id="modal-question-text" style="font-weight:700; margin-bottom:15px;"></p>
                    <div class="modal-options">
                        <button onclick="selectOption(this)" data-answer="Verdadero" class="option-btn">Verdadero</button>
                        <button onclick="selectOption(this)" data-answer="Falso" class="option-btn">Falso</button>
                    </div>
                    <button onclick="submitAnswer()" id="submit-answer-btn" class="submit-btn" disabled>CONFIRMAR</button>
                    <div id="modal-feedback" class="feedback-section">
                        <p id="feedback-text"></p>
                        <button onclick="closeQuestionModal()" style="width:100%; margin-top:10px; padding:10px; background:var(--primary); color:white; border:none; cursor:pointer;">CONTINUAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 1, text: "La naturaleza fue considerada históricamente como un objeto político central desde el inicio de las ciencias ambientales.", correct: "Falso", fb: "Durante mucho tiempo se entendió como algo técnico, no político." },
            { id: 2, text: "La crisis ecológica de las décadas de 1960 y 1970 contribuyó a cuestionar el modelo de desarrollo industrial.", correct: "Verdadero", fb: "Estas crisis evidenciaron los límites ambientales del modelo." },
            { id: 3, text: "Los problemas ambientales pueden analizarse únicamente desde la ciencia, sin dimensiones políticas.", correct: "Falso", fb: "Implican decisiones, intereses y relaciones de poder." },
            { id: 4, text: "El cambio climático pasó de ser un tema científico a un asunto de política internacional.", correct: "Verdadero", fb: "Hoy es un tema clave en la negociación global." },
            { id: 5, text: "La ecología política estudia la relación entre ecología y poder.", correct: "Verdadero", fb: "Analiza cómo el poder influye en el manejo ambiental." },
            { id: 6, text: "El término “ecología política” se popularizó en 1972 con Eric Wolf.", correct: "Verdadero", fb: "Él vinculó ambiente y poder analíticamente." },
            { id: 7, text: "La relación entre sociedad y naturaleza es independiente.", correct: "Falso", fb: "Es una relación dialéctica y constante." },
            { id: 8, text: "El ambiente es una construcción social además de un sistema natural.", correct: "Verdadero", fb: "Es producido por decisiones políticas e históricas." },
            { id: 9, text: "Los conflictos socioambientales son solo fenómenos negativos.", correct: "Falso", fb: "También producen ciudadanía y resistencia." },
            { id: 10, text: "La ecología política busca identificar alternativas políticas.", correct: "Verdadero", fb: "Es un campo tanto crítico como propositivo." }
        ];

        let userAnswers = Array(11).fill(null);
        let currentId = null;

        function renderGrid() {
            const grid = document.getElementById('questions-grid');
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-number">${q.id}</div><div class="card-label">ENUNCIADO</div>`;
                card.onclick = () => openQuestionModal(q.id);
                grid.appendChild(card);
            });
        }

        function openQuestionModal(id) {
            currentId = id;
            const q = questions.find(x => x.id === id);
            document.getElementById('modal-question-text').innerText = q.text;
            document.getElementById('modal-feedback').style.display = 'none';
            document.getElementById('submit-answer-btn').disabled = true;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('question-modal').style.display = 'flex';
        }

        function selectOption(btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('submit-answer-btn').disabled = false;
        }

        function submitAnswer() {
            const q = questions.find(x => x.id === currentId);
            const ans = document.querySelector('.option-btn.active').getAttribute('data-answer');
            userAnswers[currentId] = ans;
            const isCorrect = ans === q.correct;
            
            const fb = document.getElementById('modal-feedback');
            fb.className = 'feedback-section ' + (isCorrect ? 'success' : 'error');
            document.getElementById('feedback-text').innerText = (isCorrect ? '✅ ' : '❌ ') + q.fb;
            fb.style.display = 'block';
            document.getElementById('submit-answer-btn').disabled = true;

            updateProgress();
        }

        function updateProgress() {
            const count = userAnswers.filter(a => a !== null).length;
            document.getElementById('completed-count').innerText = count;
            document.getElementById('progress-fill').style.width = (count * 10) + '%';
            if(count === 10) document.getElementById('final-button').disabled = false;
        }

        function closeQuestionModal() { document.getElementById('question-modal').style.display = 'none'; }

        window.onload = () => { renderGrid(); };
    </script>
</body>
</html>
