<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principios de la Justicia Ambiental</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #00695c;
            --accent: #ff9800;
            --bg: #f1f8f7;
            --card-bg: #ffffff;
            --text: #111111;
            --success: #4caf50;
        }

        * {
            box-sizing: border-box;
        }

        #infografia-resource {
    width: 100%; /* Cambiado de 800px a 100% para evitar scroll X */
    max-width: 800px;
    height: 795px; /* Reducido de 800px a 795px para evitar scroll Y en Canvas */
    margin: 0 auto;
    background: linear-gradient(135deg, #e0f2f1 0%, #f1f8f7 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    /* Se eliminó el box-shadow de 12px inset que causaba desbordamiento */
    border: 1px solid #c8e6e3;
}

header {
    height: auto; /* Dejado automático para adaptarse al texto */
    min-height: 110px;
    background: linear-gradient(135deg, var(--primary), #00897b);
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px; /* Reducido padding lateral */
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
}

        header::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -40px;
            width: 220px;
            height: 220px;
            background: rgba(255,152,0,0.18);
            border-radius: 50%;
        }

        .header-content {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 24px;
            z-index: 2;
        }

        .header-icon {
            font-size: 78px;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.05;
            flex: 1;
        }

        .header-subtitle {
            font-size: 13px;
            opacity: 0.95;
           
            line-height: 1.3;
        }

        .instruction {
            padding: 10px 48px;
            background: rgba(255,255,255,0.95);
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 5px solid var(--accent);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-content {
    flex: 1;
    padding: 15px; /* Padding más equilibrado */
    overflow-y: auto; /* Permite scroll interno si hay muchos elementos */
    display: flex;
    flex-direction: column;
}

        .title-main {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding-bottom: 20px;
    /* Eliminado el flex:1 y overflow-y:auto de aquí para que el scroll sea del main-content */
}

.principio-card {
    background: var(--card-bg);
    border: 3px solid var(--primary); /* Reducido de 4px */
    padding: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    height: 100%; /* Ajustado */
    display: flex;
    flex-direction: column;
    justify-content: center;
}

        .principio-card:hover {
            transform: translate(8px) scale(1.04);
            border-color: var(--accent);
            box-shadow: 0 16px 28px rgba(255,152,0,0.25);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 4px;
            
        }

        .card-icon {
            font-size: 30px;
            flex-shrink: 0;
            line-height: 1;
            min-width: 48px;
        }

        .card-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin-top: 4px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
        }

        .card-preview {
            font-size: 13px;
            color: #555;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: auto;
        }

        .modal {
    display: none;
    position: absolute; /* Cambiado de fixed a absolute para Canvas */
    inset: 0;
    background: rgba(0, 105, 92, 0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.modal-content {
    background: white;
    width: 95%;
    max-width: 600px;
    max-height: 90%;
    border: 6px solid var(--accent);
    display: flex;
    flex-direction: column;
    position: relative;
}

        .modal-header {
            padding: 24px 32px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-header .material-symbols-outlined {
            font-size: 36px;
        }

        .modal-body {
            padding: 32px;
            flex: 1;
            overflow-y: auto;
            font-size: 16.2px;
            line-height: 1.55;
        }

        .modal-title {
            font-size: 21px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 18px;
        }

        .modal-text {
            color: #222;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 28px;
            background: none;
            border: none;
            color: white;
            font-size: 34px;
            cursor: pointer;
            width: 44px;
            height: 44px;
        }

        .footer {
            height: 72px;
            background: white;
            border-top: 5px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            font-size: 13.5px;
            color: var(--neutral);
            flex-shrink: 0;
        }

        .reference {
            font-style: italic;
        }

        /* RESPONSIVIDAD */
@media (max-width: 600px) {
    #infografia-resource {
        height: auto;
        min-height: 100vh;
        overflow: visible;
    }

    header {
        padding: 20px;
    }

    .header-content {
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }

    .header-icon, header > .material-symbols-outlined {
        display: none; /* Ocultar iconos grandes en móvil para ahorrar espacio */
    }

    .instruction {
        padding: 15px 20px;
        font-size: 12px;
    }

    .grid {
        grid-template-columns: 1fr; /* Una sola columna en móvil */
        gap: 10px;
    }

    .principio-card {
        padding: 15px;
        transform: none !important; /* Desactivar traslación en hover para móvil */
    }

    .footer {
        height: auto;
        padding: 15px;
        flex-direction: column;
        text-align: center;
    }
}
    </style>
</head>
<body>
    <div id="infografia-resource">
        <!-- HEADER -->
        <header>
            <div class="header-content">
                <span class="material-symbols-outlined header-icon">balance</span>
                <div>
                    <div class="header-title">Principios de la Justicia Ambiental<br>desde los movimientos sociales</div>
                    <div class="header-subtitle">17 principios • Derechos • Equidad • Sostenibilidad</div>
                </div>
                <span class="material-symbols-outlined" style="font-size:68px; opacity:0.85;">eco</span>
            </div>
        </header>

        <!-- INSTRUCTION -->
        <div class="instruction">
            <span class="material-symbols-outlined" style="font-size:28px;">touch_app</span>
            Haga clic en cada ítem para visualizar la información completa
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="title-main">
                🌍 Explore los 17 principios de justicia ambiental
            </div>

            <div id="principios-grid" class="grid">
                <!-- JS populated -->
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <div>📚 Infografía interactiva • Justicia Ambiental</div>
  
        </div>
    </div>

    <!-- MODAL -->
    <div id="principio-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-icon" class="material-symbols-outlined"></span>
                <div>
                    <span id="modal-number" style="font-size:28px; font-weight:700; opacity:0.9;"></span>
                    <span id="modal-title" style="font-size:21px; font-weight:700;"></span>
                </div>
                <button onclick="closeModal()" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div id="modal-text" class="modal-text"></div>
            </div>
        </div>
    </div>

    <script>
        const principios = [
            {
                id: 1,
                emoji: "🌱",
                title: "Sacralidad de la naturaleza",
                text: "La Justicia Ambiental afirma la sacralidad de la Madre Tierra, la unidad ecológica y la interdependencia de todas las especies, y el derecho a estar libres de la destrucción ecológica."
            },
            {
                id: 2,
                emoji: "🤝",
                title: "Justicia sin discriminación",
                text: "La Justicia Ambiental exige que las políticas públicas se basen en el respeto mutuo y la justicia para todos los pueblos, libres de cualquier forma de discriminación o sesgo."
            },
            {
                id: 3,
                emoji: "🌍",
                title: "Uso responsable de los recursos",
                text: "La Justicia Ambiental exige el derecho a usos éticos, equilibrados y responsables de la tierra y los recursos renovables en aras de un planeta sostenible para los humanos y otros seres vivos."
            },
            {
                id: 4,
                emoji: "🛡️",
                title: "Protección frente a contaminación y riesgos",
                text: "La Justicia Ambiental exige protección universal contra las pruebas nucleares, la extracción, la producción y la eliminación de desechos y venenos tóxicos/peligrosos que amenazan el derecho fundamental al aire limpio, la tierra, el agua y los alimentos."
            },
            {
                id: 5,
                emoji: "🗳️",
                title: "Autodeterminación de los pueblos",
                text: "La Justicia Ambiental afirma el derecho fundamental a la autodeterminación política, económica, cultural y ambiental de todos los pueblos."
            },
            {
                id: 6,
                emoji: "☢️",
                title: "Responsabilidad sobre toxinas y desechos",
                text: "La Justicia Ambiental exige el cese de la producción de todas las toxinas amenazantes, desechos peligrosos y materiales radiactivos, y que todos los productores pasados y actuales sean estrictamente responsables ante la gente de la desintoxicación y la contención en el punto de producción."
            },
            {
                id: 7,
                emoji: "🗣️",
                title: "Participación en la toma de decisiones",
                text: "La Justicia Ambiental exige el derecho a participar en igualdad de condiciones en todos los niveles de la toma de decisiones, incluyendo la evaluación de necesidades, la planificación, la implementación, el cumplimiento y la evaluación."
            },
            {
                id: 8,
                emoji: "👷",
                title: "Derechos laborales y ambientales",
                text: "La Justicia Ambiental afirma el derecho de todos los trabajadores a un entorno laboral seguro y saludable sin verse obligados a elegir entre un sustento inseguro y el desempleo. También afirma el derecho de quienes trabajan desde casa a estar libres de riesgos ambientales."
            },
            {
                id: 9,
                emoji: "⚖️",
                title: "Reparación y compensación",
                text: "La Justicia Ambiental protege el derecho de las víctimas de injusticia ambiental a recibir una compensación y reparación integrales por los daños, así como atención médica de calidad."
            },
            {
                id: 10,
                emoji: "🌐",
                title: "Violación de derechos internacionales",
                text: "La Justicia Ambiental considera que los actos gubernamentales de injusticia ambiental violan el derecho internacional, la Declaración Universal de Derechos Humanos y la Convención de las Naciones Unidas sobre el Genocidio."
            },
            {
                id: 11,
                emoji: "🪶",
                title: "Derechos de los pueblos originarios",
                text: "La Justicia Ambiental debe reconocer una relación jurídica y natural especial de los Pueblos Originarios con el gobierno nacional mediante tratados, acuerdos, pactos y convenios que afirmen la soberanía y la autodeterminación."
            },
            {
                id: 12,
                emoji: "🏙️",
                title: "Reconstrucción ecológica y territorial",
                text: "La Justicia Ambiental afirma la necesidad de políticas ecológicas urbanas y rurales para limpiar y reconstruir nuestras ciudades y áreas rurales en equilibrio con la naturaleza, honrando la integridad cultural de todas nuestras comunidades y brindando acceso justo para todos a la gama completa de recursos."
            },
            {
                id: 13,
                emoji: "📋",
                title: "Consentimiento informado",
                text: "La Justicia Ambiental exige la aplicación estricta de los principios del consentimiento informado y el cese de las pruebas de procedimientos reproductivos y médicos experimentales y vacunas en personas de color."
            },
            {
                id: 14,
                emoji: "🏢",
                title: "Crítica a corporaciones multinacionales",
                text: "La Justicia Ambiental se opone a las operaciones destructivas de las corporaciones multinacionales."
            },
            {
                id: 15,
                emoji: "🚫",
                title: "Rechazo a la explotación y ocupación",
                text: "La Justicia Ambiental se opone a la ocupación militar, la represión y la explotación de tierras, pueblos y culturas, y otras formas de vida."
            },
            {
                id: 16,
                emoji: "📚",
                title: "Educación ambiental y social",
                text: "La Justicia Ambiental exige la educación de las generaciones presentes y futuras que enfatice los problemas sociales y ambientales, con base en nuestra experiencia y una apreciación de nuestras diversas perspectivas culturales."
            },
            {
                id: 17,
                emoji: "🌿",
                title: "Responsabilidad individual y colectiva",
                text: "La Justicia Ambiental requiere que nosotros, como individuos, tomemos decisiones personales y de consumo para consumir la menor cantidad posible de los recursos de la Madre Tierra y producir la menor cantidad de desechos posible; y tomemos la decisión consciente de desafiar y repriorizar nuestros estilos de vida para garantizar la salud del mundo natural para las generaciones presentes y futuras."
            }
        ];

        function createCards() {
            const grid = document.getElementById('principios-grid');
            grid.innerHTML = '';

            principios.forEach(p => {
                const card = document.createElement('div');
                card.className = 'principio-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon">${p.emoji}</div>
                        <div class="card-number">${p.id}</div>
                        <div class="card-title">${p.title}</div>
                    </div>
                   
                `;
                card.addEventListener('click', () => showModal(p));
                grid.appendChild(card);
            });
        }

        function showModal(principio) {
            document.getElementById('modal-icon').textContent = principio.emoji;
            document.getElementById('modal-number').textContent = `${principio.id}. `;
            document.getElementById('modal-title').textContent = principio.title;
            document.getElementById('modal-text').innerHTML = `<strong>${principio.title}</strong><br><br>${principio.text}`;
            
            document.getElementById('principio-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('principio-modal').style.display = 'none';
        }

        function initializeInfografia() {
            createCards();
            console.log('%c🌍 Infografía de Justicia Ambiental cargada correctamente', 'color:#00695c; font-weight:700;');
        }

        window.onload = initializeInfografia;
    </script>
</body>
</html>
