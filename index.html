<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recursos Educativos - UTPL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#141414;
color:white;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

header{
margin-bottom:40px;
}

header h1{
font-size:40px;
color:#e50914;
margin-bottom:10px;
}

header p{
opacity:0.8;
}

.search-box{
margin:30px 0;
}

.search-box input{
width:100%;
padding:14px 20px;
font-size:16px;
border-radius:6px;
border:none;
background:#222;
color:white;
}

.search-box input::placeholder{
color:#888;
}

.courses-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.course-card{

background:#1f1f1f;
border-radius:8px;
padding:20px;
transition:all .3s ease;
cursor:pointer;
position:relative;
overflow:hidden;

}

.course-card:hover{

transform:scale(1.06);
background:#2a2a2a;
z-index:5;

}

.course-icon{

font-size:35px;
margin-bottom:15px;

}

.course-card h2{

font-size:20px;
margin-bottom:6px;

}

.code{

font-size:13px;
color:#aaa;

}

.course-card p{

font-size:14px;
opacity:.8;
margin:15px 0;

}

.resources-list{

list-style:none;

}

.resources-list li{

margin:8px 0;

}

.resources-list a{

display:block;
background:#333;
padding:10px;
border-radius:5px;
text-decoration:none;
color:white;
font-size:14px;
transition:.2s;

}

.resources-list a:hover{

background:#e50914;

}

.week-badge{

font-size:11px;
opacity:.7;
margin-left:6px;

}

.no-results{

text-align:center;
padding:40px;
opacity:.7;

}

.hidden{
display:none;
}

footer{

margin-top:60px;
text-align:center;
opacity:.6;
font-size:14px;

}

footer a{
color:white;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>UTPL Recursos Interactivos</h1>
<p>Biblioteca de materiales digitales</p>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Buscar asignatura..." onkeyup="filterCourses()">
</div>

<div class="courses-grid" id="coursesContainer">

<div class="course-card" data-course="dere3050 contratacion publica derecho administrativo">

<div class="course-icon">⚖️</div>

<h2>Contratación Pública</h2>

<div class="code">DERE_3050</div>

<p>Normativa y procedimientos de contratación pública.</p>

<ul class="resources-list">

<li>
<a href="DERE_3050/S4_Guion1_Determinación_de_contrataciones.html">
Determinación de contrataciones
<span class="week-badge">Semana 4</span>
</a>
</li>

<li>
<a href="DERE_3050/S11_Guion_2_Arrendamiento_de_bienes.html">
Arrendamiento de bienes
<span class="week-badge">Semana 11</span>
</a>
</li>

</ul>

</div>

</div>

<div id="noResults" class="no-results hidden">
No se encontraron resultados
</div>

<footer>

<p>© 2026 UTPL</p>
<p><a href="https://www.utpl.edu.ec">www.utpl.edu.ec</a></p>

</footer>

</div>

<script>

function filterCourses(){

const input=document.getElementById('searchInput');

const filter=input.value.toLowerCase();

const courses=document.getElementsByClassName('course-card');

const noResults=document.getElementById('noResults');

let visibleCount=0;

for(let i=0;i<courses.length;i++){

const course=courses[i];

const text=course.getAttribute('data-course');

if(text.indexOf(filter)>-1){

course.style.display='';
visibleCount++;

}else{

course.style.display='none';

}

}

if(visibleCount===0){

noResults.classList.remove('hidden');

}else{

noResults.classList.add('hidden');

}

}

</script>

</body>
</html>
