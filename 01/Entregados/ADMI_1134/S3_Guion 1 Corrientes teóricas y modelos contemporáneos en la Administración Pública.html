<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz – Corrientes Teóricas en la Administración Pública</title>
<style>

:root {
  --c1:#A51C30;--c2:#00529B;--c3:#8C1515;--c4:#B9D3B0;
  --c5:#6CACE4;--c6:#E1D9B9;--c7:#FFD700;--c8:#006747;
  --c9:#E68F71;--c10:#9E1030;--c11:#D2B48C;--c12:#6D351A;

  /* NEW PALETTE */
  --primary:   #0E2D52;
  --primary-d: #1B4F8A;
  --accent:    #2E6DAD;
  --accent-d:  #0E2D52;
  --gold:      #F5A800;
  --gold-dark: #C98700;
  --green:     #006747;
  --green-l:   #B9D3B0;
  --sand:      #E8F0FA;
  --salmon:    #F5A800;
  --blue-l:    #B8CCE4;
  --bg:        #FFFFFF;
  --surface:   #F4F7FB;
  --text:      #0E2D52;
  --muted:     #4A5568;
  --border:    #B8CCE4;

  --correct:   #006747;
  --correct-bg:#e8f5ee;
  --wrong:     #A51C30;
  --wrong-bg:  #fdecea;
}


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);
  overflow-x:hidden;
}
#sw{width:100%;min-height:100%;}
#stage{
  width:100%;
  min-height:100%;
  background:var(--surface);
  display:flex;
  flex-direction:column;
}
#stage{width:1280px;height:720px;flex-shrink:0;transform-origin:center center;
  background:var(--surface);border-radius:16px;overflow:hidden;
  box-shadow:0 16px 64px rgba(0,40,80,.22);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(110deg, var(--primary) 0%, var(--primary-d) 50%, var(--accent) 100%);
  padding:0 28px;min-height:58px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;
  border-radius:50%;background:rgba(245,168,0,.1);}
.hdr::after{content:'';position:absolute;right:80px;bottom:-40px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,255,255,.05);}
.hdr-l{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.hdr-ico{width:38px;height:38px;flex-shrink:0;}
.hdr-t h1{font-size:14px;font-weight:700;color:#fff;line-height:1.2;}
.hdr-t p{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px;letter-spacing:.3px;}
.hdr-r{display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.bdg{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);color:#fff;}
.bdg-gold{background:var(--gold);border-color:var(--gold-dark);color:var(--text);}

/* ── PROGRESS BAR (top) ── */
.top-progress{height:5px;background:rgba(0,0,0,.08);flex-shrink:0;}
.top-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--salmon));
  transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;}

/* ── MAIN ── */
.main{flex:1;display:flex;overflow:hidden;}

/* ── LEFT: question panel ── */
.q-panel{
  flex:1;display:flex;flex-direction:column;
  padding:22px 28px 16px;overflow-y:auto;overflow-x:hidden;
  background:var(--surface);
}
.q-panel::-webkit-scrollbar{width:4px;}
.q-panel::-webkit-scrollbar-thumb{background:var(--blue-l);border-radius:2px;}

/* intro slide */
.intro-wrap{display:flex;flex-direction:column;gap:18px;height:100%;}
.intro-hero{
  background:linear-gradient(120deg, var(--primary) 0%, var(--primary-d) 40%, var(--accent) 100%);
  border-radius:14px;padding:26px 32px;display:flex;align-items:center;gap:24px;
  position:relative;overflow:hidden;flex-shrink:0;}
.intro-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,215,0,.08);}
.intro-hero-ico{width:72px;height:72px;flex-shrink:0;}
.intro-hero h2{font-size:20px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:8px;}
.intro-hero p{font-size:13px;color:rgba(255,255,255,.82);line-height:1.7;}
.intro-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex-shrink:0;}
.meta-card{background:var(--sand);border:1.5px solid var(--border);border-radius:11px;
  padding:14px 18px;display:flex;align-items:center;gap:12px;}
.meta-card-ico{width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;}
.meta-card-ico.red{background:rgba(165,28,48,.12);}
.meta-card-ico.blue{background:rgba(0,82,155,.12);}
.meta-card-ico.green{background:rgba(0,103,71,.12);}
.meta-card strong{display:block;font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.meta-card span{font-size:12px;color:var(--muted);}
.intro-instr{background:linear-gradient(90deg,#fff8e8,#fff);
  border-left:3px solid var(--gold);border-radius:0 10px 10px 0;
  padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.intro-instr p{font-size:13px;color:var(--text);line-height:1.6;}
.intro-instr strong{color:var(--accent);}
.btn-start{align-self:flex-start;background:linear-gradient(135deg,var(--primary-d),var(--accent));
  color:#fff;border:none;border-radius:25px;padding:12px 32px;
  font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(165,28,48,.35);
  transition:all .2s ease;display:flex;align-items:center;gap:8px;font-family:inherit;}
.btn-start:hover{background:linear-gradient(135deg,var(--accent),var(--primary-d));transform:translateY(-2px);box-shadow:0 8px 24px rgba(165,28,48,.4);}

/* question slide */
.q-wrap{display:flex;flex-direction:column;gap:14px;}
.q-header{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:2px solid var(--sand);}
.q-num-tag{
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  color:#fff;border-radius:10px;padding:6px 14px;
  font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.q-text{font-size:18px;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.option{
  display:flex;align-items:center;gap:12px;
  background:var(--sand);border:2px solid var(--border);
  border-radius:12px;padding:14px 18px;cursor:pointer;
  transition:all .2s ease;position:relative;overflow:hidden;}
.option::before{content:'';position:absolute;inset:0;background:var(--primary);opacity:0;transition:opacity .2s;}
.option:hover::before{opacity:.04;}
.option:hover{border-color:var(--primary);transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,82,155,.12);}
.option.selected{border-color:var(--primary);background:#eaf2fb;}
.option.correct{border-color:var(--correct);background:var(--correct-bg);}
.option.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
.option.disabled{cursor:default;transform:none;}
.opt-letter{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
  background:var(--primary);transition:background .2s;position:relative;z-index:1;}
.option.correct .opt-letter{background:var(--correct);}
.option.wrong   .opt-letter{background:var(--wrong);}
.opt-text{font-size:13px;color:var(--text);line-height:1.4;position:relative;z-index:1;}

/* feedback */
.feedback{
  border-radius:12px;padding:14px 18px;
  display:flex;align-items:flex-start;gap:12px;
  animation:fbIn .3s ease;
}
@keyframes fbIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback.correct{background:var(--correct-bg);border:1.5px solid var(--correct);}
.feedback.wrong  {background:var(--wrong-bg);  border:1.5px solid var(--wrong);}
.fb-ico{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;}
.feedback.correct .fb-ico{background:var(--correct);color:#fff;}
.feedback.wrong   .fb-ico{background:var(--wrong);  color:#fff;}
.fb-txt strong{display:block;font-size:14px;font-weight:700;margin-bottom:4px;}
.feedback.correct .fb-txt strong{color:var(--correct);}
.feedback.wrong   .fb-txt strong{color:var(--wrong);}
.fb-txt p{font-size:13px;color:var(--muted);line-height:1.6;}

/* ── RIGHT: sidebar ── */
.sidebar{
  width:220px;flex-shrink:0;
  background:linear-gradient(180deg,var(--sand) 0%,#f0ead8 100%);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;padding:20px 16px;gap:16px;overflow:hidden;}

.q-tracker{display:flex;flex-direction:column;gap:8px;}
.tracker-title{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.tracker-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  border:1.5px solid var(--border);background:#fff;
  cursor:pointer;transition:all .2s;}
.tracker-item:hover{border-color:var(--primary);background:#eaf2fb;}
.tracker-item.active{border-color:var(--accent);background:rgba(165,28,48,.06);}
.tracker-item.done-ok{border-color:var(--correct);background:var(--correct-bg);}
.tracker-item.done-fail{border-color:var(--wrong);background:var(--wrong-bg);}
.ti-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  background:var(--border);color:var(--muted);transition:all .2s;}
.tracker-item.active    .ti-num{background:var(--accent);color:#fff;}
.tracker-item.done-ok   .ti-num{background:var(--correct);color:#fff;}
.tracker-item.done-fail .ti-num{background:var(--wrong);  color:#fff;}
.ti-label{font-size:11px;color:var(--muted);line-height:1.3;flex:1;}
.tracker-item.active    .ti-label{color:var(--accent);font-weight:600;}

/* score donut */
.score-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);
  padding:14px;text-align:center;}
.score-ring{width:72px;height:72px;margin:0 auto 8px;position:relative;}
.score-ring svg{width:100%;height:100%;}
.score-ring-bg{fill:none;stroke:var(--sand);stroke-width:6;}
.score-ring-fill{fill:none;stroke:var(--gold);stroke-width:6;
  stroke-linecap:round;stroke-dasharray:188.5;stroke-dashoffset:188.5;
  transition:stroke-dashoffset .6s ease;transform:rotate(-90deg);transform-origin:50% 50%;}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:var(--text);}
.score-lbl{font-size:11px;color:var(--muted);}
.score-lbl strong{display:block;font-size:13px;color:var(--text);margin-bottom:2px;}

/* ── BOTTOM ACTIONS ── */
.q-actions{display:flex;gap:10px;margin-top:14px;flex-shrink:0;}
.btn{border:none;border-radius:25px;padding:10px 24px;font-family:inherit;
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn:active{transform:scale(.97);}
.btn-next{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;
  box-shadow:0 3px 12px rgba(0,82,155,.3);}
.btn-next:hover{background:linear-gradient(135deg,var(--primary-d),#002a52);}
.btn-retry{background:var(--sand);color:var(--text);border:1.5px solid var(--border);}
.btn-retry:hover{background:var(--c6);border-color:var(--c11);}
.btn-finish{background:linear-gradient(135deg,var(--green),#004d36);color:#fff;
  box-shadow:0 3px 12px rgba(0,103,71,.3);}
.btn-finish:hover{opacity:.9;}

/* ── RESULTS ── */
.results-wrap{display:flex;flex-direction:column;gap:16px;height:100%;}
.results-hero{
  background:linear-gradient(120deg,var(--green),#004d36 40%,var(--primary) 80%);
  border-radius:14px;padding:22px 28px;display:flex;align-items:center;gap:20px;
  flex-shrink:0;position:relative;overflow:hidden;}
.results-hero::before{content:'';position:absolute;right:-20px;top:-20px;width:130px;height:130px;
  border-radius:50%;background:rgba(255,215,0,.1);}
.results-score-big{font-size:48px;font-weight:700;color:var(--gold);line-height:1;flex-shrink:0;}
.results-score-sub{font-size:13px;color:rgba(255,255,255,.75);}
.results-hero h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;}
.results-hero p{font-size:13px;color:rgba(255,255,255,.8);line-height:1.6;}
.results-list{display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;}
.results-list::-webkit-scrollbar{width:4px;}
.results-list::-webkit-scrollbar-thumb{background:var(--c11);border-radius:2px;}
.result-item{display:flex;align-items:center;gap:12px;
  background:var(--sand);border-radius:10px;border:1.5px solid var(--border);padding:11px 14px;}
.ri-ico{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;}
.ri-ico.ok{background:var(--correct-bg);color:var(--correct);}
.ri-ico.fail{background:var(--wrong-bg);color:var(--wrong);}
.ri-q{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.ri-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;flex-shrink:0;}
.ri-badge.ok{background:var(--correct-bg);color:var(--correct);}
.ri-badge.fail{background:var(--wrong-bg);color:var(--wrong);}

/* ── FOOTER ── */
.ftr{background:linear-gradient(90deg,var(--primary),var(--accent));
  height:28px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;}
.ftr-l{font-size:12px;color:rgba(255,255,255,.7);}
.ftr-r{font-size:12px;color:rgba(255,215,0,.75);font-style:italic;}

/* ══════════════════════════════════
   RESPONSIVE — TABLET ≤900px
══════════════════════════════════ */
@media(max-width:900px){
  html,body{overflow-x:hidden;}
  #sw,#stage{width:100%;height:auto;}

  /* Apila: primero pregunta, luego sidebar */
  .main{flex-direction:column;overflow:visible;}

  /* Panel de preguntas: ancho completo */
  .q-panel{
    width:100%;
    padding:14px 16px;
    overflow:visible;
    flex:none;
  }

  /* Opciones en columna única */
  .options-grid{grid-template-columns:1fr;}

  /* Meta cards en 3 columnas */
  .intro-meta{grid-template-columns:repeat(3,1fr);}

  /* Sidebar va debajo, horizontal */
  .sidebar{
    width:100%;
    border-left:none;
    border-top:2px solid var(--border);
    flex-direction:row;
    flex-wrap:wrap;
    padding:12px 16px;
    gap:10px;
    overflow:visible;
  }
  .q-tracker{flex-direction:row;flex-wrap:wrap;flex:1;gap:6px;}
  .tracker-item{flex:0 0 calc(25% - 6px);}
  .score-card{flex-shrink:0;min-width:120px;}
}

/* ══════════════════════════════════
   RESPONSIVE — MÓVIL ≤600px
══════════════════════════════════ */
@media(max-width:600px){
  /* Header compacto */
  .hdr{padding:10px 14px;min-height:auto;flex-wrap:wrap;gap:6px;}
  .hdr-t h1{font-size:14px;}
  .hdr-t p{font-size:10px;}
  .bdg{display:none;}

  /* Panel preguntas */
  .q-panel{padding:12px;}

  /* Hero intro */
  .intro-hero{flex-direction:column;text-align:center;padding:16px 14px;gap:12px;}
  .intro-hero h2{font-size:16px;}
  .intro-hero p{font-size:12px;}
  .intro-hero-ico{width:52px;height:52px;}

  /* Meta cards en columna */
  .intro-meta{grid-template-columns:1fr;}
  .meta-card{padding:10px 14px;}
  .meta-card strong{font-size:13px;}
  .meta-card span{font-size:12px;}

  /* Instrucción */
  .intro-instr p{font-size:12px;}

  /* Pregunta — texto legible */
  .q-text{font-size:15px;line-height:1.4;}
  .q-num-tag{font-size:12px;}

  /* Opciones */
  .opt-text{font-size:13px;line-height:1.45;}
  .opt-letter{width:28px;height:28px;font-size:13px;}
  .option{padding:12px 14px;gap:10px;}

  /* Feedback */
  .fb-txt strong{font-size:13px;}
  .fb-txt p{font-size:12px;}

  /* Resultados */
  .results-score-big{font-size:38px;}
  .results-hero{flex-direction:column;gap:10px;padding:16px;}
  .results-hero h2{font-size:16px;}
  .results-hero p{font-size:12px;}
  .ri-q{font-size:12px;}
  .ri-badge{font-size:11px;}

  /* Sidebar oculto en móvil pequeño para no ocupar espacio */
  .sidebar{display:none;}

  /* Botones */
  .btn{font-size:13px;padding:10px 20px;}
  .btn-start{font-size:13px;padding:11px 24px;}

  /* Footer */
  .ftr-l{font-size:10px;}
  .ftr-r{display:none;}
}

/* ══════════════════════════════════
   RESPONSIVE — MÓVIL PEQUEÑO ≤400px
══════════════════════════════════ */
@media(max-width:400px){
  .hdr-t p,.bdg-gold{display:none;}
  .q-panel{padding:10px;}
  .q-text{font-size:14px;}
  .opt-text{font-size:12px;}
  .intro-hero p{font-size:11px;}
  .q-actions{flex-wrap:wrap;}
  .btn{width:100%;justify-content:center;}
}
</style>
</head>
<body>
<div id="sw"><div id="stage">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l">
    <svg class="hdr-ico" viewBox="0 0 38 38" fill="none">
      <rect width="38" height="38" rx="9" fill="rgba(255,255,255,.12)"/>
      <rect x="8" y="7" width="14" height="18" rx="3" fill="rgba(255,255,255,.25)" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
      <path d="M11 12h8M11 15h6M11 18h7" stroke="#fff" stroke-width="1.3" stroke-linecap="round" opacity=".8"/>
      <circle cx="27" cy="26" r="7" fill="var(--gold)"/>
      <path d="M24.5 26l2 2 4-3.5" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="hdr-t">
      <h1>Corrientes Teóricas y Modelos Contemporáneos en la Administración Pública</h1>

    </div>
  </div>
  <div class="hdr-r">
  
    <span class="bdg bdg-gold">Quiz</span>
  </div>
</div>

<!-- TOP PROGRESS -->
<div class="top-progress"><div class="top-progress-fill" id="topBar"></div></div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: Question panel -->
  <div class="q-panel" id="q-panel">
    <!-- content injected by JS -->
  </div>

  <!-- RIGHT: Sidebar -->
  <div class="sidebar">
    <div class="q-tracker">
      <div class="tracker-title">Preguntas</div>
      <div id="tracker-items"></div>
    </div>
    <div class="score-card">
      <div class="score-ring">
        <svg viewBox="0 0 64 64">
          <circle class="score-ring-bg" cx="32" cy="32" r="28"/>
          <circle class="score-ring-fill" id="scoreRing" cx="32" cy="32" r="28"/>
        </svg>
        <div class="score-num" id="scoreNum">0/4</div>
      </div>
      <div class="score-lbl">
        <strong>Puntaje</strong>
        Respuestas correctas
      </div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="ftr">
 
  <span class="ftr-r">Seleccione la respuesta correcta para cada pregunta</span>
</div>

</div></div>

<script>
/* ══ DATA ══ */
const QUIZ = [
  {
    q: '¿Qué enfatiza principalmente la teoría clásica de la administración desarrollada por Taylor y Fayol?',
    opts: [
      'División del trabajo, estandarización y jerarquía.',
      'Autogestión sin procedimientos.',
      'Ausencia de planificación y control.',
      'Eliminación de la estructura organizacional.'
    ],
    correct: 0,
    fb_ok:   'La teoría clásica destaca la importancia de la organización formal del trabajo, la división de funciones, la estandarización de procesos y la jerarquía como bases para mejorar la eficiencia administrativa.',
    fb_fail: 'Vamos a intentarlo de nuevo. La respuesta correcta es: División del trabajo, estandarización y jerarquía.',
    author:  'Taylor & Fayol'
  },
  {
    q: '¿Qué aporte introduce la teoría neoclásica de la administración, representada por autores como Drucker?',
    opts: [
      'Administración por objetivos y foco en resultados.',
      'Eliminación de indicadores de gestión.',
      'Único criterio de gestión basado en la antigüedad.',
      'Supresión de la planificación estratégica.'
    ],
    correct: 0,
    fb_ok:   'La teoría neoclásica enfatiza la administración por objetivos, el uso de indicadores y la orientación hacia resultados organizacionales medibles.',
    fb_fail: 'Vamos a intentarlo de nuevo. La respuesta correcta es: Administración por objetivos y foco en resultados.',
    author:  'Drucker'
  },
  {
    q: '¿Cuál es una característica fundamental de la burocracia propuesta por Max Weber?',
    opts: [
      'Reglas impersonales y meritocracia.',
      'Rotación política obligatoria.',
      'Total ausencia de jerarquía.',
      'Eliminación de normas formales.'
    ],
    correct: 0,
    fb_ok:   'El modelo burocrático weberiano se basa en reglas formales, jerarquía clara, especialización del trabajo y selección del personal mediante criterios meritocráticos.',
    fb_fail: 'Vamos a intentarlo de nuevo. La respuesta correcta es: Reglas impersonales y meritocracia.',
    author:  'Max Weber'
  },
  {
    q: '¿Con qué enfoques se asocian respectivamente la Nueva Gestión Pública (NGP) y la gobernanza?',
    opts: [
      'Centralismo y secreto institucional.',
      'Resultados orientados al usuario y redes de colaboración entre actores públicos y privados.',
      'Eliminación de datos y participación.',
      'Sustitución total del Estado por el mercado.'
    ],
    correct: 1,
    fb_ok:   'La Nueva Gestión Pública promueve la eficiencia, la orientación a resultados y la atención al ciudadano, mientras que la gobernanza destaca la colaboración entre múltiples actores públicos, privados y sociales.',
    fb_fail: 'Vamos a intentarlo de nuevo. La respuesta correcta es: Resultados orientados al usuario y redes de colaboración entre actores públicos y privados.',
    author:  'NGP & Gobernanza'
  }
];

const LETTERS = ['A','B','C','D'];
let current = -1; // -1 = intro
let answers  = Array(QUIZ.length).fill(null); // null | true | false
let answered = Array(QUIZ.length).fill(false);
let score    = 0;

/* ══ RENDER FUNCTIONS ══ */
function renderIntro() {
  current = -1;
  document.getElementById('q-panel').innerHTML = `
    <div class="intro-wrap">
      <div class="intro-hero">
        <svg class="intro-hero-ico" viewBox="0 0 72 72" fill="none">
          <rect width="72" height="72" rx="14" fill="rgba(255,255,255,.08)"/>
          <rect x="12" y="10" width="26" height="34" rx="4" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.4)" stroke-width="1.4"/>
          <path d="M17 18h16M17 23h12M17 28h14M17 33h9" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity=".8"/>
          <circle cx="52" cy="50" r="14" fill="var(--gold)"/>
          <path d="M47 50l3.5 3.5 7.5-7" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <h2>¡Bienvenidos al Quiz!</h2>
          <p>¡Bienvenidos al quiz sobre las corrientes teóricas y modelos contemporáneos en la Administración Pública! Demuestre sus conocimientos sobre los principales enfoques que han influido en la gestión pública moderna. Asegúrese de haber revisado los conceptos relacionados con la teoría clásica, neoclásica, la burocracia weberiana y los modelos contemporáneos de gestión pública antes de comenzar.</p>
        </div>
      </div>
      <div class="intro-meta">
        <div class="meta-card">
          <div class="meta-card-ico blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2" stroke="var(--primary)" stroke-width="1.6" stroke-linecap="round"/></svg></div>
          <div><strong>4 preguntas</strong><span>Opción múltiple</span></div>
        </div>
        <div class="meta-card">
          <div class="meta-card-ico red"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--accent)" stroke-width="1.6"/><path d="M12 7v5l3 3" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div><strong>Sin límite</strong><span>Tiempo libre</span></div>
        </div>
        <div class="meta-card">
          <div class="meta-card-ico green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="var(--green)" stroke-width="1.6" stroke-linejoin="round"/></svg></div>
          <div><strong>Retroalimentación</strong><span>Inmediata</span></div>
        </div>
      </div>
      <div class="intro-instr">
        <svg width="20" height="20" viewBox="0 0 22 22" fill="none" style="flex-shrink:0"><circle cx="11" cy="11" r="10" fill="var(--gold)"/><path d="M11 7v5M11 14v1" stroke="var(--text)" stroke-width="1.7" stroke-linecap="round"/></svg>
        <p><strong>Instrucción:</strong> Seleccione la respuesta que considere correcta para cada pregunta.</p>
      </div>
      <button class="btn-start" onclick="startQuiz()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        Comenzar Quiz
      </button>
    </div>`;
  updateTracker();
  updateTopBar();
  updateScore();
}

function renderQuestion(idx) {
  current = idx;
  const q = QUIZ[idx];
  const isAnswered = answered[idx];
  const userAns = answers[idx];

  const optsHTML = q.opts.map((opt, i) => {
    let cls = 'option';
    if (isAnswered) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct';
      else if (i === userAns && userAns !== q.correct) cls += ' wrong';
    }
    const onclick = isAnswered ? '' : `onclick="selectAnswer(${idx},${i})"`;
    return `<div class="${cls}" ${onclick}>
      <div class="opt-letter">${LETTERS[i]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  let fbHTML = '';
  if (isAnswered) {
    const ok = answers[idx] === q.correct;
    fbHTML = `<div class="feedback ${ok?'correct':'wrong'}">
      <div class="fb-ico">${ok?'✓':'✕'}</div>
      <div class="fb-txt">
        <strong>${ok?'¡Excelente!':'¡Oh, no!'}</strong>
        <p>${ok ? q.fb_ok : q.fb_fail}</p>
      </div>
    </div>`;
  }

  const isLast = idx === QUIZ.length - 1;
  const allDone = answered.every(Boolean);
  let actionsHTML = '';
  if (isAnswered) {
    if (allDone) {
      actionsHTML = `<button class="btn btn-finish" onclick="showResults()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Ver resultados
      </button>`;
    } else if (!isLast) {
      actionsHTML = `<button class="btn btn-next" onclick="nextQuestion()">
        Siguiente
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>`;
    } else {
      // last but not all done
      actionsHTML = `<button class="btn btn-next" onclick="nextUnanswered()">
        Siguiente sin responder
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>`;
    }
  }

  document.getElementById('q-panel').innerHTML = `
    <div class="q-wrap">
      <div class="q-header">
        <div class="q-num-tag">Pregunta ${idx+1} de ${QUIZ.length}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options-grid">${optsHTML}</div>
      ${fbHTML}
      <div class="q-actions">${actionsHTML}</div>
    </div>`;
  updateTracker();
  updateTopBar();
  updateScore();
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;
  answers[qIdx]  = optIdx;
  if (optIdx === QUIZ[qIdx].correct) score++;
  renderQuestion(qIdx);
  updateScore();
}

function nextQuestion() {
  if (current < QUIZ.length - 1) renderQuestion(current + 1);
}
function nextUnanswered() {
  const idx = answered.findIndex(a => !a);
  if (idx !== -1) renderQuestion(idx);
}
function startQuiz() { renderQuestion(0); }

function showResults() {
  current = QUIZ.length; // "results" state
  const pct = Math.round((score / QUIZ.length) * 100);
  let msg = '', emoji = '';
  if (score === QUIZ.length) { msg='¡Perfecto! Ha dominado todos los conceptos.'; emoji='🏆'; }
  else if (score >= 3) { msg='¡Muy bien! Tiene una sólida comprensión de las teorías.'; emoji='🎯'; }
  else if (score >= 2) { msg='¡Buen intento! Revise los conceptos y vuelva a intentarlo.'; emoji='📚'; }
  else { msg='Repase los contenidos de la semana e intente de nuevo.'; emoji='💡'; }

  const listHTML = QUIZ.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="result-item">
      <div class="ri-ico ${ok?'ok':'fail'}">${ok?'✓':'✕'}</div>
      <div class="ri-q">${q.q}</div>
      <span class="ri-badge ${ok?'ok':'fail'}">${ok?'Correcto':'Incorrecto'}</span>
    </div>`;
  }).join('');

  document.getElementById('q-panel').innerHTML = `
    <div class="results-wrap">
      <div class="results-hero">
        <div>
          <div class="results-score-big">${score}/${QUIZ.length}</div>
          <div class="results-score-sub">${pct}% correcto</div>
        </div>
        <div>
          <h2>${emoji} Resultados del Quiz</h2>
          <p>${msg}</p>
        </div>
      </div>
      <div class="results-list">${listHTML}</div>
      <div class="q-actions">
        <button class="btn btn-retry" onclick="retryQuiz()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          Volver a intentar
        </button>
      </div>
    </div>`;
  updateTracker();
  updateTopBar();
}

function retryQuiz() {
  answers  = Array(QUIZ.length).fill(null);
  answered = Array(QUIZ.length).fill(false);
  score    = 0;
  renderIntro();
}

/* ══ TRACKER ══ */
function updateTracker() {
  const cont = document.getElementById('tracker-items');
  cont.innerHTML = '';
  QUIZ.forEach((q, i) => {
    const div = document.createElement('div');
    let cls = 'tracker-item';
    if (i === current) cls += ' active';
    else if (answered[i]) cls += answers[i] === q.correct ? ' done-ok' : ' done-fail';
    div.className = cls;
    div.onclick = () => renderQuestion(i);
    div.innerHTML = `<div class="ti-num">${i+1}</div><div class="ti-label">${q.author || 'Pregunta '+(i+1)}</div>`;
    cont.appendChild(div);
  });
}

/* ══ TOP BAR ══ */
function updateTopBar() {
  const done = answered.filter(Boolean).length;
  const pct  = (done / QUIZ.length) * 100;
  document.getElementById('topBar').style.width = pct + '%';
}

/* ══ SCORE RING ══ */
function updateScore() {
  const pct = score / QUIZ.length;
  const circumference = 2 * Math.PI * 28; // r=28
  const offset = circumference * (1 - pct);
  document.getElementById('scoreRing').style.strokeDashoffset = offset;
  document.getElementById('scoreNum').textContent = `${score}/${QUIZ.length}`;
  // Color ring based on score
  const ring = document.getElementById('scoreRing');
  if (pct >= .75) ring.style.stroke = 'var(--correct)';
  else if (pct >= .5) ring.style.stroke = 'var(--gold)';
  else ring.style.stroke = 'var(--accent)';
}

/* ══ SCALE ══ */

// Responsive scale: fills iframe at any size

function scale(){
  /* fully fluid — fills any container */
}
window.addEventListener('resize', scale); scale();


/* ══ INIT ══ */
renderIntro();

// ResizeObserver: re-triggers layout on ANY container change
// (Canvas hamburger menu, sidebar open/close, window resize)
if (typeof ResizeObserver !== 'undefined') {
  const _stageEl = document.getElementById('stage') || document.documentElement;
  new ResizeObserver(() => {
    // Force browser reflow so flex/grid recalculates
    _stageEl.style.display = 'none';
    _stageEl.offsetHeight; // trigger reflow
    _stageEl.style.display = '';
  }).observe(document.documentElement);
}
</script>
</body>
</html>
