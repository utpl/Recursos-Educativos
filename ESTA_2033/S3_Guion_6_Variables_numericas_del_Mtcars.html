<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variables Numéricas del Mtcars</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --c1: #E84855;
      --c2: #F4A261;
      --c3: #2A9D8F;
      --c4: #457B9D;
      --c5: #7B4FBF;
      --c6: #C9774A;
      --c7: #1D7A8C;
      --c8: #D95F5F;
      --dark: #1A1A2E;
      --dark2: #16213E;
      --surface: #FFFFFF;
      --bg: #F8F5F0;
      --text: #2C2C3E;
      --muted: #6B6B80;
      --border: #E2DED8;
      --font-d: 'Playfair Display', serif;
      --font-b: 'DM Sans', sans-serif;
      --font-m: 'DM Mono', monospace;
      --r: 14px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-b);
      background:white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    
    }

    /* ── CANVAS ── */
    .canvas {
      width: 800px;
      
      height: 800px;
      background: var(--bg);

      overflow: hidden;
      box-shadow: 0 24px 80px rgba(26, 26, 46, .22);
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: var(--dark);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .h-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--c1) 0%, var(--c2) 25%, var(--c3) 50%, var(--c4) 75%, var(--c5) 100%);
    }

    .h-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 10% 120%, rgba(232, 72, 85, .2) 0%, transparent 55%),
        radial-gradient(ellipse at 90% -20%, rgba(69, 123, 157, .2) 0%, transparent 55%);
      pointer-events: none;
    }

    .h-inner {
      position: relative;
      z-index: 1;
      padding: 18px 32px 16px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .h-embl {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(244, 162, 97, .22), rgba(232, 72, 85, .18));
      border: 1.5px solid rgba(255, 255, 255, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .h-meta {
      flex: 1;
    }

    .h-course {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .38);
      margin-bottom: 4px;
    }

    .h-title {
      font-family: var(--font-d);
      font-size: 20px;
      color: #fff;
      line-height: 1.2;
      letter-spacing: -.02em;
    }

    .h-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, .45);
      margin-top: 4px;
    }

    .h-sub strong {
      color: rgba(255, 255, 255, .75);
      font-weight: 600;
    }

    .h-badge {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      padding: 6px 12px;
      text-align: center;
      flex-shrink: 0;
    }

    .h-badge-num {
      font-family: var(--font-d);
      font-size: 22px;
      color: #fff;
      font-weight: 700;
      line-height: 1;
    }

    .h-badge-lbl {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .4);
      margin-top: 2px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--dark2);
      padding: 8px 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .filter-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .3);
      white-space: nowrap;
      margin-right: 4px;
    }

    .fpill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid rgba(255, 255, 255, .12);
      background: transparent;
      color: rgba(255, 255, 255, .5);
      font-family: var(--font-b);
      font-size: 10.5px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .18s;
    }

    .fpill:hover {
      border-color: rgba(255, 255, 255, .35);
      color: rgba(255, 255, 255, .8);
    }

    .fpill.active {
      border-color: var(--pill-color);
      background: color-mix(in srgb, var(--pill-color) 20%, rgba(255, 255, 255, .05));
      color: #fff;
    }

    /* ── GRID AREA ── */
    .grid-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px 32px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .var-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* ── VAR CARD ── */
    .var-card {
      background: var(--surface);
      border-radius: var(--r);
      border: 2px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .18s;
      position: relative;
    }

    .var-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--vc-color);
      transition: height .2s;
    }

    .var-card:hover {
      border-color: var(--vc-color);
      box-shadow: 0 8px 28px rgba(26, 26, 46, .12);
      transform: translateY(-2px);
    }

    .var-card:hover::before {
      height: 5px;
    }

    .var-card.expanded {
      border-color: var(--vc-color);
      box-shadow: 0 8px 32px rgba(26, 26, 46, .14);
    }

    .var-card.hidden {
      display: none;
    }

    .vc-top {
      padding: 12px 14px 10px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .vc-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--vc-color) 14%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .vc-head {
      flex: 1;
      min-width: 0;
    }

    .vc-code {
      font-family: var(--font-m);
      font-size: 12px;
      font-weight: 500;
      color: var(--vc-color);
      letter-spacing: .02em;
      margin-bottom: 2px;
    }

    .vc-name {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vc-expand {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--vc-color) 10%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--vc-color) 25%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--vc-color);
      font-weight: 700;
      transition: transform .22s, background .18s;
    }

    .var-card.expanded .vc-expand {
      transform: rotate(45deg);
      background: var(--vc-color);
      color: #fff;
    }

    .vc-preview {
      padding: 0 14px 12px;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── EXPANDED BODY ── */
    .vc-body {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      animation: fadeSlide .22s ease;
    }

    .var-card.expanded .vc-body {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(-6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .vc-desc {
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.7;
      padding-top: 12px;
      margin-bottom: 10px;
    }

    .vc-type-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .vc-tag {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--vc-color) 12%, transparent);
      color: var(--vc-color);
      border: 1px solid color-mix(in srgb, var(--vc-color) 22%, transparent);
    }

    /* ── MINI BAR ── */
    .vc-bar-wrap {
      margin-top: 10px;
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .vc-bar-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .vc-bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .vc-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--vc-color), color-mix(in srgb, var(--vc-color) 70%, #fff));
      width: 0%;
      transition: width .6s cubic-bezier(.34, 1.56, .64, 1);
    }

    .vc-range {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 9px;
      color: var(--muted);
    }

    /* sub-list for binary vars */
    .vc-sub-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .vc-sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      color: var(--text);
    }

    .vc-sub-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--vc-color);
    }

    /* ── MODAL OVERLAY for wider view ── */

    /* ── REF BAR ── */
    .ref-bar {
      background: var(--dark);
      padding: 9px 32px;
      flex-shrink: 0;
      font-size: 10px;
      color: rgba(255, 255, 255, .3);
      font-style: italic;
    }

    @media(max-width:600px) {
      body {
        padding: 0;
        background: var(--bg);
      }

      .canvas {
        width: 100%;
        max-width: 100%;
        max-height: none;
        border-radius: 0;
      }

      .h-inner,
      .filter-bar,
      .grid-area,
      .ref-bar {
        padding-left: 20px;
        padding-right: 20px;
      }

      .var-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(max-width:500px) {
      .var-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="canvas">

    <!-- HEADER -->
    <div class="header">
      <div class="h-stripe"></div>
      <div class="h-glow"></div>
      <div class="h-inner">
        <div class="h-embl">🚗</div>
        <div class="h-meta">
          <div class="h-course">Estadística para Análisis de Datos</div>
          <div class="h-title">Variables Numéricas del Mtcars</div>
          <div class="h-sub">Docente: <strong>Juan Carlos Torres Díaz</strong></div>
        </div>
        <div class="h-badge">
          <div class="h-badge-num">11</div>
          <div class="h-badge-lbl">Variables</div>
        </div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="filter-lbl">Filtrar:</div>
      <button class="fpill active" style="--pill-color:var(--c3)" data-filter="all"
        onclick="filterCards('all',this)">Todas</button>
      <button class="fpill" style="--pill-color:var(--c2)" data-filter="continua"
        onclick="filterCards('continua',this)">Continuas</button>
      <button class="fpill" style="--pill-color:var(--c4)" data-filter="discreta"
        onclick="filterCards('discreta',this)">Discretas</button>
      <button class="fpill" style="--pill-color:var(--c1)" data-filter="binaria"
        onclick="filterCards('binaria',this)">Binarias</button>
    </div>

    <!-- GRID -->
    <div class="grid-area">
      <div class="var-grid" id="varGrid"></div>
    </div>

    <!-- REF BAR -->
    <div class="ref-bar">Elaboración propia.</div>

  </div>

  <script>
    const VARS = [
      {
        code: 'mpg',
        name: 'Miles / (US) Gallon',
        icon: '⛽',
        color: 'var(--c3)',
        type: ['continua', 'rendimiento'],
        tags: ['Continua', 'Eficiencia'],
        desc: 'Millas por galón. Es la medida de eficiencia de combustible (a mayor mpg, el coche consume menos).',
        barLabel: 'Rango típico de valores',
        barPct: 65,
        barMin: '10.4 mpg', barMax: '33.9 mpg'
      },
      {
        code: 'cyl',
        name: 'Number of Cylinders',
        icon: '🔩',
        color: 'var(--c1)',
        type: ['discreta', 'motor'],
        tags: ['Discreta', 'Motor'],
        desc: 'Número de cilindros del motor (principalmente 4, 6 u 8).',
        barLabel: 'Valores posibles',
        barPct: 60,
        barMin: '4 cil.', barMax: '8 cil.'
      },
      {
        code: 'disp',
        name: 'Displacement',
        icon: '🏎️',
        color: 'var(--c2)',
        type: ['continua', 'motor'],
        tags: ['Continua', 'Cilindrada'],
        desc: 'Desplazamiento o cilindrada del motor en pulgadas cúbicas (in³). Mide el volumen total de los cilindros.',
        barLabel: 'Rango típico de valores',
        barPct: 78,
        barMin: '71.1 in³', barMax: '472 in³'
      },
      {
        code: 'hp',
        name: 'Gross Horsepower',
        icon: '⚡',
        color: 'var(--c1)',
        type: ['continua', 'motor'],
        tags: ['Continua', 'Potencia'],
        desc: 'Caballos de fuerza brutos. Indica la potencia del motor.',
        barLabel: 'Rango típico de valores',
        barPct: 72,
        barMin: '52 hp', barMax: '335 hp'
      },
      {
        code: 'drat',
        name: 'Rear Axle Ratio',
        icon: '⚙️',
        color: 'var(--c4)',
        type: ['continua', 'transmisión'],
        tags: ['Continua', 'Transmisión'],
        desc: 'Relación del eje trasero. Es la relación entre las revoluciones del eje de transmisión y las revoluciones de las ruedas.',
        barLabel: 'Rango típico de valores',
        barPct: 55,
        barMin: '2.76', barMax: '4.93'
      },
      {
        code: 'wt',
        name: 'Weight',
        icon: '⚖️',
        color: 'var(--c5)',
        type: ['continua', 'chasis'],
        tags: ['Continua', 'Peso'],
        desc: 'Peso del vehículo, expresado en unidades de 1000 libras (lb×1000).',
        barLabel: 'Rango típico de valores',
        barPct: 60,
        barMin: '1.513', barMax: '5.424'
      },
      {
        code: 'qsec',
        name: '1/4 Mile Time',
        icon: '🏁',
        color: 'var(--c6)',
        type: ['continua', 'rendimiento'],
        tags: ['Continua', 'Aceleración'],
        desc: 'Tiempo en segundos que tarda el coche en recorrer un cuarto de milla desde parado. Mide la aceleración.',
        barLabel: 'Rango típico de valores',
        barPct: 58,
        barMin: '14.5 s', barMax: '22.9 s'
      },
      {
        code: 'vs',
        name: 'Engine Type',
        icon: '🔧',
        color: 'var(--c7)',
        type: ['binaria', 'motor'],
        tags: ['Binaria', 'Motor'],
        desc: 'Tipo de motor. Variable binaria que indica la configuración del bloque motor.',
        barLabel: null,
        binary: [{ val: '0', lbl: 'Motor en V' }, { val: '1', lbl: 'Motor recto (en línea)' }]
      },
      {
        code: 'am',
        name: 'Transmission',
        icon: '🕹️',
        color: 'var(--c8)',
        type: ['binaria', 'transmisión'],
        tags: ['Binaria', 'Transmisión'],
        desc: 'Tipo de transmisión. Variable binaria que indica si el vehículo es automático o manual.',
        barLabel: null,
        binary: [{ val: '0', lbl: 'Automática' }, { val: '1', lbl: 'Manual' }]
      },
      {
        code: 'gear',
        name: 'Number of Forward Gears',
        icon: '🔄',
        color: 'var(--c4)',
        type: ['discreta', 'transmisión'],
        tags: ['Discreta', 'Marchas'],
        desc: 'Número de marchas o cambios hacia adelante (3, 4 o 5).',
        barLabel: 'Valores posibles',
        barPct: 50,
        barMin: '3 marchas', barMax: '5 marchas'
      },
      {
        code: 'carb',
        name: 'Number of Carburetors',
        icon: '🛢️',
        color: 'var(--c2)',
        type: ['discreta', 'motor'],
        tags: ['Discreta', 'Combustible'],
        desc: 'Número de carburadores asociados al sistema de combustible.',
        barLabel: 'Valores posibles',
        barPct: 55,
        barMin: '1 carb.', barMax: '8 carb.'
      }
    ];

    /* ── BUILD ── */
    function build() {
      const grid = document.getElementById('varGrid');
      grid.innerHTML = '';
      VARS.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'var-card';
        card.id = `vc-${v.code}`;
        card.style.setProperty('--vc-color', v.color);
        card.dataset.type = v.type.join(' ');

        const tagsHtml = v.tags.map(t => `<span class="vc-tag">${t}</span>`).join('');

        let expandedContent = `
      <div class="vc-desc">${v.desc}</div>
      <div class="vc-type-row">${tagsHtml}</div>`;

        if (v.binary) {
          expandedContent += `<div class="vc-sub-list">
        ${v.binary.map(b => `
          <div class="vc-sub-item">
            <div class="vc-sub-dot"></div>
            <span><strong>${b.val}:</strong> ${b.lbl}</span>
          </div>`).join('')}
      </div>`;
        } else if (v.barLabel) {
          expandedContent += `<div class="vc-bar-wrap">
        <div class="vc-bar-label">${v.barLabel}</div>
        <div class="vc-bar-track">
          <div class="vc-bar-fill" data-pct="${v.barPct}" style="width:0%"></div>
        </div>
        <div class="vc-range"><span>${v.barMin}</span><span>${v.barMax}</span></div>
      </div>`;
        }

        card.innerHTML = `
      <div class="vc-top" onclick="toggleCard('${v.code}')">
        <div class="vc-icon">${v.icon}</div>
        <div class="vc-head">
          <div class="vc-code">${v.code}</div>
          <div class="vc-name">${v.name}</div>
        </div>
        <div class="vc-expand">+</div>
      </div>
      <div class="vc-preview">${v.desc}</div>
      <div class="vc-body">${expandedContent}</div>`;

        grid.appendChild(card);
      });
    }

    /* ── TOGGLE ── */
    function toggleCard(code) {
      const card = document.getElementById(`vc-${code}`);
      const isOpen = card.classList.contains('expanded');
      card.classList.toggle('expanded', !isOpen);

      if (!isOpen) {
        // animate bar
        const fill = card.querySelector('.vc-bar-fill');
        if (fill) {
          fill.style.width = '0%';
          requestAnimationFrame(() => {
            setTimeout(() => { fill.style.width = fill.dataset.pct + '%'; }, 40);
          });
        }
      }
    }

    /* ── FILTER ── */
    function filterCards(filter, btn) {
      document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.var-card').forEach(card => {
        const types = card.dataset.type || '';
        card.classList.toggle('hidden', filter !== 'all' && !types.includes(filter));
      });
    }

    build();
  </script>
</body>

</html>
