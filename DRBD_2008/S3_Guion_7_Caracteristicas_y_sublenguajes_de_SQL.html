<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SQL Sublenguajes | Quiz Interactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1E4A3B;
            --primary-dark: #0A2F2A;
            --primary-light: #2C6E4F;
            --accent: #E67E22;
            --accent-light: #F39C12;
            --accent-soft: #FEF3E7;
            --success: #2E7D32;
            --success-bg: #E8F5E9;
            --error: #C62828;
            --error-bg: #FFEBEE;
            --neutral: #2C3E50;
            --neutral-light: #5D6E7E;
            --bg: #F8FAFE;
            --card: #FFFFFF;
            --border: #E9EDF2;
            --text-body: #1E2F3E;
            --font: 'Inter', sans-serif;
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: var(--font);
            background: linear-gradient(145deg, #F5F7FC 0%, #EDF2F9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* CONTENEDOR PRINCIPAL: 800px x 800px ESTRICTO */
        .quiz-container {
            width: 800px;
            height: 800px;
            background: var(--card);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        /* Scroll interno solo para contenido que no exceda */
        .quiz-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .quiz-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .quiz-scroll::-webkit-scrollbar-track {
            background: var(--border);
        }
        .quiz-scroll::-webkit-scrollbar-thumb {
            background: var(--primary);
        }

        /* HEADER con gradiente vibrante y emojis */
        .hero {
            background: linear-gradient(115deg, #0A2F2A 0%, #1E4A3B 45%, #2C5F8A 100%);
            padding: 20px 28px;
            flex-shrink: 0;
            position: relative;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-light);
            opacity: 0.6;
        }

        .hero h1 {
            font-size: 22px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        .hero h1 span {
            font-size: 32px;
        }

        .sub-header {
            color: rgba(255,255,255,0.88);
            font-size: 12px;
            font-weight: 500;
            margin-top: 10px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Área principal centrada */
        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px 32px;
        }

        /* Barra de progreso */
        .progress-section {
            margin-bottom: 24px;
        }
        .progress-bar-container {
            background: var(--border);
            height: 6px;
            border-radius: 0px;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--neutral-light);
            font-weight: 500;
        }

        /* Tarjeta de pregunta */
        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 28px 26px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .q-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            padding-left: 16px;
        }

        .q-title span {
            font-size: 28px;
        }

        .q-text {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-body);
            margin-bottom: 28px;
            font-weight: 500;
            background: #FBFCFE;
            padding: 14px 16px;
            border-left: 3px solid var(--accent-soft);
        }

        /* Opciones */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt-item {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 12px 16px;
            background: #FFFFFF;
            border: 1.5px solid var(--border);
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            min-height: 52px;
        }

        .opt-item:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Matching específico */
        .match-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            background: #FFFFFF;
            padding: 12px 16px;
            border: 1px solid var(--border);
        }

        .match-row span:first-child {
            font-weight: 700;
            min-width: 100px;
        }

        select {
            background: white;
            border: 1px solid var(--border);
            padding: 10px 14px;
            font-family: var(--font);
            font-weight: 500;
            color: var(--text-body);
            cursor: pointer;
            min-height: 44px;
            min-width: 200px;
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Feedback inmediato */
        .feedback-instant {
            margin-top: 20px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .feedback-instant.show {
            display: block;
        }
        .feedback-correct {
            background: var(--success-bg);
            color: var(--success);
            border-left: 4px solid var(--success);
        }
        .feedback-wrong {
            background: var(--error-bg);
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        /* Navegación */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        .nav-btn {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
        }

        .nav-btn.primary {
            background: var(--primary);
        }
        .nav-btn.primary:hover {
            background: var(--primary-light);
            transform: scale(0.98);
        }
        .nav-btn.secondary {
            background: var(--neutral-light);
        }
        .nav-btn.secondary:hover {
            background: var(--neutral);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal final */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 47, 42, 0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card);
            width: 460px;
            max-width: 90%;
            padding: 28px;
            border-top: 6px solid var(--accent);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .modal-header {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-modal {
            font-size: 30px;
            cursor: pointer;
            color: var(--neutral-light);
        }
        .close-modal:hover {
            color: var(--error);
        }
        .modal-body {
            font-size: 15px;
            color: var(--text-body);
            line-height: 1.55;
        }
        .modal-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }

        /* Tooltip */
        .tooltip-icon {
            border-bottom: 1.5px dashed var(--accent);
            cursor: help;
            position: relative;
            display: inline-block;
            margin-left: 6px;
        }
        .tooltip-icon .tooltip-text {
            visibility: hidden;
            background-color: var(--neutral);
            color: #fff;
            text-align: center;
            padding: 6px 12px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            width: max-content;
            max-width: 220px;
            white-space: normal;
        }
        .tooltip-icon:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        @media (max-width: 850px) {
            .quiz-container {
                width: 100%;
                height: 100vh;
            }
            .question-area {
                padding: 20px;
            }
            .match-row {
                flex-direction: column;
                align-items: stretch;
            }
            select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="hero">
        <h1>
            <span>🗄️</span>
            Sublenguajes de SQL
        </h1>
        <div class="sub-header">
            <span>📊 DDL · DML · DCL · TCL</span>
            <span>⚡ Quiz interactivo</span>
            <span class="tooltip-icon">💡<span class="tooltip-text">Responde cada pregunta. Recibirás retroalimentación inmediata.</span></span>
        </div>
    </div>

    <div class="quiz-scroll">
        <div class="question-area" id="questionArea">
            <!-- JS inyecta contenido dinámico -->
        </div>
    </div>
</div>

<!-- Modal final -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>📋 Resultados SQL</span>
            <span class="close-modal" id="closeResultModal">&times;</span>
        </div>
        <div class="modal-body" id="resultText"></div>
        <button class="modal-btn" id="restartQuiz">🔄 Reiniciar quiz</button>
    </div>
</div>

<script>
    // Definición de preguntas
    const questions = [
        {
            id: 1,
            title: "📊 SQL Declarativo",
            text: "SQL es un lenguaje declarativo porque el usuario especifica qué resultados desea sin indicar cómo obtenerlos.",
            type: "truefalse",
            options: ["✅ Verdadero", "❌ Falso"],
            values: ["true", "false"],
            correct: "true",
            explanation: "SQL es declarativo: describes el resultado deseado (SELECT...), el motor optimiza cómo obtenerlo."
        },
        {
            id: 2,
            title: "🛠️ Sublenguaje de Estructuras",
            text: "¿Qué sublenguaje de SQL se utiliza para crear y modificar estructuras de datos?",
            type: "multiple",
            options: ["a) DDL", "b) DML", "c) DCL"],
            values: ["DDL", "DML", "DCL"],
            correct: "DDL",
            explanation: "DDL (Data Definition Language): CREATE, ALTER, DROP definen la estructura de la base de datos."
        },
        {
            id: 3,
            title: "🔐 Gestión de Permisos",
            text: "El sublenguaje ______ permite gestionar permisos mediante comandos como GRANT y REVOKE.",
            type: "multiple",
            options: ["DDL", "DML", "DCL", "TCL"],
            values: ["DDL", "DML", "DCL", "TCL"],
            correct: "DCL",
            explanation: "DCL (Data Control Language): GRANT otorga permisos, REVOKE los revoca."
        },
        {
            id: 4,
            title: "🔗 Relacionar Sublenguajes",
            text: "Relacione cada sublenguaje con su función principal.",
            type: "matching",
            items: [
                { concept: "📝 DML", correct: "3", text: "Manipula registros" },
                { concept: "🏗️ DDL", correct: "2", text: "Define estructuras de datos" },
                { concept: "🔄 TCL", correct: "1", text: "Gestiona transacciones" }
            ],
            options: [
                "1) Gestiona transacciones",
                "2) Define estructuras de datos",
                "3) Manipula registros"
            ],
            explanation: "DML manipula datos (INSERT, UPDATE), DDL define estructuras (CREATE, ALTER), TCL gestiona transacciones (COMMIT, ROLLBACK)."
        },
        {
            id: 5,
            title: "💾 COMMIT vs ROLLBACK",
            text: "El comando COMMIT se utiliza para deshacer cambios realizados en una transacción.",
            type: "truefalse",
            options: ["✅ Verdadero", "❌ Falso"],
            values: ["true", "false"],
            correct: "false",
            explanation: "COMMIT confirma los cambios permanentemente. ROLLBACK es el comando que deshace cambios."
        }
    ];

    let currentIndex = 0;
    let userAnswers = [null, null, null, { dml: "", ddl: "", tcl: "" }, null];
    let answered = [false, false, false, false, false];
    let correctStatus = [false, false, false, false, false];

    const questionArea = document.getElementById('questionArea');

    function updateProgress() {
        const answeredCount = answered.filter(a => a === true).length;
        const percent = (answeredCount / 5) * 100;
        const progressFill = document.querySelector('.progress-fill');
        const progressCount = document.querySelector('.progress-stats span:last-child');
        if (progressFill) progressFill.style.width = `${percent}%`;
        if (progressCount) progressCount.innerText = `${answeredCount}/5 respondidas`;
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        let html = `
            <div class="progress-section">
                <div class="progress-bar-container">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-stats">
                    <span>📈 Progreso</span>
                    <span>${answered.filter(a => a === true).length}/5 respondidas</span>
                </div>
            </div>
            <div class="question-card">
                <div class="q-title">
                    <span>${q.title.split(' ')[0]}</span>
                    ${q.title}
                </div>
                <div class="q-text">${q.text}</div>
        `;

        if (q.type === "truefalse" || q.type === "multiple") {
            html += `<div class="options" id="optionsContainer">`;
            q.options.forEach((opt, idx) => {
                const isChecked = (userAnswers[currentIndex] === q.values[idx]);
                html += `
                    <label class="opt-item">
                        <input type="radio" name="question" value="${q.values[idx]}" ${isChecked ? 'checked' : ''}>
                        ${opt}
                    </label>
                `;
            });
            html += `</div>`;
        } 
        else if (q.type === "matching") {
            const saved = userAnswers[currentIndex] || { dml: "", ddl: "", tcl: "" };
            html += `<div class="match-container">`;
            q.items.forEach((item, idx) => {
                let selectId = `match-${idx}`;
                let currentVal = "";
                if (item.concept.includes("DML")) currentVal = saved.dml || "";
                else if (item.concept.includes("DDL")) currentVal = saved.ddl || "";
                else if (item.concept.includes("TCL")) currentVal = saved.tcl || "";
                
                html += `
                    <div class="match-row">
                        <span style="font-weight:700;">${item.concept}</span>
                        <select id="${selectId}" data-key="${item.concept}">
                            <option value="">⚡ seleccionar</option>
                            ${q.options.map(opt => `<option value="${opt.split(')')[0]}" ${currentVal === opt.split(')')[0] ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </div>
                `;
            });
            html += `</div>`;
        }

        // Mostrar feedback si ya fue respondida
        if (answered[currentIndex]) {
            const isCorrect = correctStatus[currentIndex];
            const explanation = q.explanation;
            html += `
                <div class="feedback-instant show">
                    <div class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                        ${isCorrect ? '✅ Correcto! ' : '❌ Incorrecto. '} ${explanation}
                    </div>
                </div>
            `;
        } else {
            html += `<div class="feedback-instant" id="feedbackArea"></div>`;
        }

        html += `</div>`;

        // Botones navegación
        html += `
            <div class="nav-buttons">
                <button class="nav-btn secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Anterior</button>
                <button class="nav-btn primary" id="nextBtn">${currentIndex === questions.length - 1 ? '🏁 Finalizar' : 'Siguiente ▶'}</button>
            </div>
        `;

        questionArea.innerHTML = html;
        
        // Actualizar barra de progreso después de renderizar
        updateProgress();

        // Event listeners para radio buttons
        if (q.type !== "matching") {
            const radios = document.querySelectorAll('input[name="question"]');
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const selectedVal = e.target.value;
                    userAnswers[currentIndex] = selectedVal;
                    const isCorrect = (selectedVal === q.correct);
                    correctStatus[currentIndex] = isCorrect;
                    answered[currentIndex] = true;
                    showFeedback(currentIndex, isCorrect, q.explanation);
                    updateProgress();
                });
            });
        } 
        else {
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.addEventListener('change', () => {
                    const dmlVal = document.querySelector('#match-0')?.value || "";
                    const ddlVal = document.querySelector('#match-1')?.value || "";
                    const tclVal = document.querySelector('#match-2')?.value || "";
                    userAnswers[currentIndex] = { dml: dmlVal, ddl: ddlVal, tcl: tclVal };
                    const isCorrect = (dmlVal === "3" && ddlVal === "2" && tclVal === "1");
                    correctStatus[currentIndex] = isCorrect;
                    answered[currentIndex] = true;
                    showFeedback(currentIndex, isCorrect, q.explanation);
                    updateProgress();
                });
            });
        }

        // Eventos botones
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });

        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentIndex === questions.length - 1) {
                showFinalResults();
            } else {
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    renderQuestion();
                }
            }
        });
    }

    function showFeedback(index, isCorrect, explanation) {
        const feedbackDiv = document.getElementById('feedbackArea');
        if (feedbackDiv) {
            feedbackDiv.innerHTML = `
                <div class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                    ${isCorrect ? '✅ Correcto! ' : '❌ Incorrecto. '} ${explanation}
                </div>
            `;
            feedbackDiv.classList.add('show');
        }
    }

    function showFinalResults() {
        const totalCorrect = correctStatus.filter(s => s === true).length;
        let resultMsg = `🎯 <strong>Puntaje final: ${totalCorrect}/5</strong><br><br>`;
        
        if (totalCorrect === 5) {
            resultMsg += `🏆 ¡Excelente! Dominas completamente los sublenguajes de SQL. 🚀<br><br>`;
        } else if (totalCorrect >= 3) {
            resultMsg += `📈 ¡Buen trabajo! Revisa los conceptos donde tuviste errores para seguir mejorando. 💪<br><br>`;
        } else {
            resultMsg += `📚 Te recomendamos repasar los sublenguajes DDL, DML, DCL y TCL. ¡Sigue practicando! 🌟<br><br>`;
        }
        
        resultMsg += `<strong>🔍 Resumen:</strong><br>`;
        questions.forEach((q, idx) => {
            const status = correctStatus[idx] ? '✅' : '❌';
            resultMsg += `${status} ${q.title}<br>`;
        });
        
        resultMsg += `<br><br>✨ SQL integra múltiples funciones que permiten definir, manipular, controlar y asegurar datos dentro de sistemas de bases de datos.`;
        
        document.getElementById('resultText').innerHTML = resultMsg;
        document.getElementById('resultModal').style.display = 'flex';
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers = [null, null, null, { dml: "", ddl: "", tcl: "" }, null];
        answered = [false, false, false, false, false];
        correctStatus = [false, false, false, false, false];
        renderQuestion();
        document.getElementById('resultModal').style.display = 'none';
    }

    // Cerrar modal
    document.getElementById('closeResultModal').addEventListener('click', () => {
        document.getElementById('resultModal').style.display = 'none';
    });
    document.getElementById('restartQuiz').addEventListener('click', resetQuiz);
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('resultModal');
        if (e.target === modal) modal.style.display = 'none';
    });

    // Inicializar
    renderQuestion();
</script>
</body>
</html>
