<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔗 Modelo Entidad-Relación ER | Quiz Interactivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Contenedor principal con vidrio esmerilado */
    .quiz-wrapper {
      width: 880px;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.3);
      overflow: hidden;
      transition: all 0.3s;
    }

    /* Header espectacular */
    .hero-modern {
      background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 50%, #3d7a4a 100%);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }

    .hero-modern::before {
      content: "🔗📊🗄️";
      position: absolute;
      font-size: 120px;
      opacity: 0.08;
      right: -20px;
      top: -30px;
      pointer-events: none;
    }

    .hero-modern::after {
      content: "✨🎯💡";
      position: absolute;
      font-size: 90px;
      opacity: 0.08;
      left: -15px;
      bottom: -25px;
    }

    .hero-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .hero-title-section h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #e8f5e9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .hero-title-section p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .hero-badge {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Stats bar */
    .stats-bar {
      background: #f8fafc;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .progress-container {
      flex: 1;
      height: 8px;
      background: #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
      margin-right: 20px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2e7d32, #4caf50, #66bb6a);
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .counter-badge {
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      color: white;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* Área principal */
    .quiz-main {
      padding: 32px;
      min-height: 480px;
    }

    /* Tarjetas de preguntas */
    .question-card {
      display: none;
      animation: fadeSlideUp 0.4s ease;
    }

    .question-card.active {
      display: block;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .question-header {
      margin-bottom: 28px;
    }

    .question-tag {
      display: inline-block;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #2e7d32;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a2c3e;
      line-height: 1.5;
    }

    /* Opciones */
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-card {
      background: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .option-card:hover {
      border-color: #4caf50;
      background: linear-gradient(135deg, #f1f8e9, #ffffff);
      transform: translateX(6px);
    }

    .option-card.selected {
      border-color: #4caf50;
      background: linear-gradient(135deg, #e8f5e9, #ffffff);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
    }

    .option-letter {
      width: 32px;
      height: 32px;
      background: #f1f5f9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #2e7d32;
    }

    .option-card.selected .option-letter {
      background: #4caf50;
      color: white;
    }

    .option-text {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
    }

    /* Input estilo moderno */
    .modern-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 0.95rem;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      font-family: 'Inter', monospace;
      transition: all 0.2s;
      background: #fafcff;
    }

    .modern-input:focus {
      outline: none;
      border-color: #4caf50;
      box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
    }

    /* Matching grid */
    .matching-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .matching-column {
      background: #f8fafc;
      border-radius: 24px;
      padding: 16px;
    }

    .matching-title {
      font-weight: 700;
      margin-bottom: 12px;
      color: #2e7d32;
      font-size: 0.8rem;
    }

    .matching-item {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .matching-item:hover {
      border-color: #ff9800;
      transform: translateX(4px);
    }

    .matching-item.selected {
      border-color: #ff9800;
      background: linear-gradient(135deg, #fff3e0, #ffffff);
    }

    .matching-item.matched {
      border-color: #4caf50;
      background: #e8f5e9;
      opacity: 0.7;
      cursor: default;
    }

    .pairs-container {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pair-badge {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #2e7d32;
    }

    /* Navegación */
    .nav-modern {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }

    .btn-nav {
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      color: white;
      box-shadow: 0 2px 8px rgba(46, 125, 50, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 125, 50, 0.4);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e2e8f0;
    }

    .btn-nav:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Modal moderno */
    .modal-glass {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s;
    }

    .modal-glass.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 48px;
      max-width: 450px;
      width: 90%;
      overflow: hidden;
      animation: slideUpModal 0.3s ease;
    }

    @keyframes slideUpModal {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      padding: 20px 24px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-close {
      background: rgba(255,255,255,0.2);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: #c62828;
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 28px;
      text-align: center;
    }

    .score-circle {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #2e7d32, #ff9800);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 16px 0;
    }

    .breakdown-list {
      text-align: left;
      background: #f8fafc;
      border-radius: 24px;
      padding: 16px;
      margin: 20px 0;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.85rem;
    }

    .breakdown-item:last-child {
      border-bottom: none;
    }

    .btn-restart {
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 12px;
      background: gold;
      pointer-events: none;
      z-index: 1001;
      animation: confettiFall 3s forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      .quiz-main { padding: 20px; }
      .matching-grid { grid-template-columns: 1fr; gap: 12px; }
      .hero-content { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<div class="quiz-wrapper">
  <div class="hero-modern">
    <div class="hero-content">
      <div class="hero-title-section">
        <h1>🔗 Modelo Entidad-Relación</h1>
        <p>Fundamentos de Bases de Datos • Quiz interactivo</p>
      </div>
      <div class="hero-badge">
        <span>🎯</span> 5 desafíos
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="progress-container">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="counter-badge" id="counterDisplay">1 / 5</div>
  </div>

  <div class="quiz-main" id="quizMain">
    <!-- Las preguntas se generarán dinámicamente con JS -->
  </div>

  <div style="padding: 0 32px 32px 32px;">
    <div class="nav-modern">
      <button class="btn-nav btn-secondary" id="prevBtn" disabled>
        ← Anterior
      </button>
      <button class="btn-nav btn-primary" id="nextBtn">
        Siguiente →
      </button>
      <button class="btn-nav btn-primary" id="submitBtn" style="display: none;">
        ✨ Finalizar Quiz ✨
      </button>
    </div>
  </div>
</div>

<!-- Modal Resultados -->
<div class="modal-glass" id="resultModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>🏆 Resultados</h3>
      <button class="modal-close" id="closeModalBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="score-circle" id="finalScoreDisplay">0/5</div>
      <p id="messageDisplay" style="color: #475569; margin-bottom: 16px;"></p>
      <div class="breakdown-list" id="breakdownList"></div>
      <button class="btn-restart" id="restartBtn">
        🔄 Reiniciar Quiz
      </button>
    </div>
  </div>
</div>

<script>
  // Datos del quiz
  const questions = [
    {
      id: 1,
      text: "Una entidad débil depende de una entidad fuerte para existir",
      type: "boolean",
      correct: "true"
    },
    {
      id: 2,
      text: "¿Cuál es la función principal de una clave primaria en una entidad?",
      type: "multiple",
      options: [
        "Identificar de forma única cada instancia de la entidad",
        "Almacenar múltiples valores en un solo campo",
        "Describir atributos derivados de otros campos"
      ],
      correctIndex: 0
    },
    {
      id: 3,
      text: "Completa: 'Una relación _____ define cuántas instancias de una entidad se asocian con otra'",
      type: "fill",
      correct: "cardinalidad"
    },
    {
      id: 4,
      text: "Un cliente contrata varios planes y un plan tiene varios clientes. ¿Qué tipo de relación es?",
      type: "multiple",
      options: [
        "Uno a uno (1:1)",
        "Uno a muchos (1:N)",
        "Muchos a muchos (M:N)"
      ],
      correctIndex: 2
    },
    {
      id: 5,
      text: "Relaciona cada tipo de atributo con su característica",
      type: "matching",
      terms: [
        { id: "A", text: "Simple" },
        { id: "B", text: "Compuesto" },
        { id: "C", text: "Derivado" }
      ],
      definitions: [
        { id: "1", text: "Se calcula desde otros atributos" },
        { id: "2", text: "No se divide en partes" },
        { id: "3", text: "Se descompone en subpartes" }
      ],
      correctMatches: { "A": "2", "B": "3", "C": "1" }
    }
  ];

  let currentIndex = 0;
  let userAnswers = {};
  let matchingPairs = {};

  // Mezclar opciones aleatoriamente
  function shuffleOptions() {
    questions.forEach(q => {
      if (q.type === "multiple" && q.options) {
        const shuffled = [...q.options];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        q.shuffledOptions = shuffled;
        q.correctIndex = shuffled.indexOf(q.options[q.correctIndex]);
      }
    });
  }

  // Renderizar pregunta actual
  function renderQuestion() {
    const q = questions[currentIndex];
    const container = document.getElementById('quizMain');
    
    let html = `<div class="question-card active">`;
    html += `<div class="question-header">`;
    html += `<div class="question-tag">📌 Pregunta ${currentIndex + 1} de 5</div>`;
    html += `<div class="question-text">${q.text}</div>`;
    html += `</div>`;
    
    if (q.type === "boolean") {
      html += `<div class="options-container">`;
      const selected = userAnswers[currentIndex];
      html += `<div class="option-card ${selected === 'true' ? 'selected' : ''}" data-value="true">
                <div class="option-letter">✓</div>
                <div class="option-text">✅ Verdadero</div>
              </div>`;
      html += `<div class="option-card ${selected === 'false' ? 'selected' : ''}" data-value="false">
                <div class="option-letter">✗</div>
                <div class="option-text">❌ Falso</div>
              </div>`;
      html += `</div>`;
    }
    else if (q.type === "multiple") {
      const options = q.shuffledOptions || q.options;
      html += `<div class="options-container">`;
      options.forEach((opt, idx) => {
        const selected = userAnswers[currentIndex] === idx;
        html += `<div class="option-card ${selected ? 'selected' : ''}" data-value="${idx}">
                  <div class="option-letter">${String.fromCharCode(65 + idx)}</div>
                  <div class="option-text">${opt}</div>
                </div>`;
      });
      html += `</div>`;
    }
    else if (q.type === "fill") {
      const saved = userAnswers[currentIndex] || '';
      html += `<input type="text" class="modern-input" id="fillInput" placeholder="Escribe tu respuesta..." value="${saved}">`;
    }
    else if (q.type === "matching") {
      html += `<div class="matching-grid">
                <div class="matching-column">
                  <div class="matching-title">📌 Términos</div>`;
      q.terms.forEach(term => {
        const matched = matchingPairs[term.id];
        html += `<div class="matching-item ${matched ? 'matched' : ''}" data-term="${term.id}" data-type="term">
                  ${term.text}
                </div>`;
      });
      html += `</div><div class="matching-column">
                <div class="matching-title">🎯 Definiciones</div>`;
      q.definitions.forEach(def => {
        const isMatched = Object.values(matchingPairs).includes(def.id);
        html += `<div class="matching-item ${isMatched ? 'matched' : ''}" data-def="${def.id}" data-type="def">
                  ${def.text}
                </div>`;
      });
      html += `</div></div>`;
      html += `<div class="pairs-container" id="pairsContainer"></div>`;
    }
    
    html += `</div>`;
    container.innerHTML = html;
    
    // Bind events
    attachEvents();
    updatePairsDisplay();
    updateProgress();
  }
  
  function attachEvents() {
    const q = questions[currentIndex];
    
    if (q.type === "boolean" || q.type === "multiple") {
      document.querySelectorAll('.option-card').forEach(card => {
        card.addEventListener('click', () => {
          const value = card.dataset.value;
          userAnswers[currentIndex] = q.type === "boolean" ? value : parseInt(value);
          renderQuestion();
        });
      });
    }
    else if (q.type === "fill") {
      const input = document.getElementById('fillInput');
      if (input) {
        input.addEventListener('input', (e) => {
          userAnswers[currentIndex] = e.target.value.toLowerCase().trim();
        });
      }
    }
    else if (q.type === "matching") {
      let selectedTerm = null;
      let selectedDef = null;
      
      document.querySelectorAll('.matching-item[data-type="term"]').forEach(el => {
        el.addEventListener('click', () => {
          if (el.classList.contains('matched')) return;
          document.querySelectorAll('.matching-item').forEach(i => i.classList.remove('selected'));
          el.classList.add('selected');
          selectedTerm = el.dataset.term;
          selectedDef = null;
        });
      });
      
      document.querySelectorAll('.matching-item[data-type="def"]').forEach(el => {
        el.addEventListener('click', () => {
          if (el.classList.contains('matched')) return;
          if (selectedTerm) {
            matchingPairs[selectedTerm] = el.dataset.def;
            userAnswers[currentIndex] = { ...matchingPairs };
            renderQuestion();
          }
        });
      });
    }
  }
  
  function updatePairsDisplay() {
    const q = questions[4];
    if (q && q.type === "matching") {
      const container = document.getElementById('pairsContainer');
      if (container) {
        container.innerHTML = '';
        Object.entries(matchingPairs).forEach(([termId, defId]) => {
          const term = q.terms.find(t => t.id === termId);
          const def = q.definitions.find(d => d.id === defId);
          if (term && def) {
            container.innerHTML += `<div class="pair-badge">${term.text} → ${def.text}</div>`;
          }
        });
      }
    }
  }
  
  function updateProgress() {
    const progress = ((currentIndex + 1) / 5) * 100;
    document.getElementById('progressFill').style.width = `${progress}%`;
    document.getElementById('counterDisplay').innerHTML = `${currentIndex + 1} / 5`;
    
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    
    prevBtn.disabled = currentIndex === 0;
    
    if (currentIndex === 4) {
      nextBtn.style.display = 'none';
      submitBtn.style.display = 'flex';
    } else {
      nextBtn.style.display = 'flex';
      submitBtn.style.display = 'none';
    }
  }
  
  function nextQuestion() {
    if (currentIndex < 4) {
      currentIndex++;
      renderQuestion();
    }
  }
  
  function prevQuestion() {
    if (currentIndex > 0) {
      currentIndex--;
      renderQuestion();
    }
  }
  
  function evaluateQuiz() {
    let score = 0;
    const details = [];
    
    // Q1
    if (userAnswers[0] === 'true') { score++; details.push({ name: "P1: Entidad débil", correct: true }); }
    else details.push({ name: "P1: Entidad débil", correct: false });
    
    // Q2
    const q2 = questions[1];
    if (userAnswers[1] === q2.correctIndex) { score++; details.push({ name: "P2: Clave primaria", correct: true }); }
    else details.push({ name: "P2: Clave primaria", correct: false });
    
    // Q3
    if (userAnswers[2] && userAnswers[2].includes('cardinalidad')) { score++; details.push({ name: "P3: Cardinalidad", correct: true }); }
    else details.push({ name: "P3: Cardinalidad", correct: false });
    
    // Q4
    const q4 = questions[3];
    if (userAnswers[3] === q4.correctIndex) { score++; details.push({ name: "P4: Relación M:N", correct: true }); }
    else details.push({ name: "P4: Relación M:N", correct: false });
    
    // Q5
    const q5 = questions[4];
    let matchCount = 0;
    if (matchingPairs && Object.keys(matchingPairs).length === 3) {
      for (let [term, def] of Object.entries(matchingPairs)) {
        if (q5.correctMatches[term] === def) matchCount++;
      }
    }
    const q5Correct = matchCount === 3;
    if (q5Correct) { score++; details.push({ name: "P5: Atributos", correct: true }); }
    else details.push({ name: "P5: Atributos", correct: false });
    
    showResults(score, details);
  }
  
  function showResults(score, details) {
    document.getElementById('finalScoreDisplay').innerHTML = `${score}/5`;
    
    const messages = {
      5: "🏆 ¡Excelente! Dominas perfectamente el modelo Entidad-Relación",
      4: "👏 ¡Muy bien! Casi perfecto, sigue así",
      3: "👍 Bien hecho, repasa algunos conceptos",
      2: "📚 Sigue practicando, vas por buen camino",
      1: "💪 ¡Ánimo! Repasa y vuelve a intentarlo",
      0: "🔄 Reinicia y dale otra oportunidad"
    };
    document.getElementById('messageDisplay').innerHTML = messages[Math.min(score, 5)];
    
    const breakdownHtml = details.map(d => `
      <div class="breakdown-item">
        <span>${d.name}</span>
        <strong style="color: ${d.correct ? '#2e7d32' : '#c62828'}">${d.correct ? '✅ Correcto' : '❌ Incorrecto'}</strong>
      </div>
    `).join('');
    document.getElementById('breakdownList').innerHTML = breakdownHtml;
    
    document.getElementById('resultModal').classList.add('show');
    
    if (score >= 4) createConfetti();
  }
  
  function createConfetti() {
    for (let i = 0; i < 60; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti-piece';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-20px';
      confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
      confetti.style.width = Math.random() * 8 + 4 + 'px';
      confetti.style.height = Math.random() * 12 + 6 + 'px';
      confetti.style.animationDelay = Math.random() * 1.5 + 's';
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
  }
  
  function resetQuiz() {
    currentIndex = 0;
    userAnswers = {};
    matchingPairs = {};
    shuffleOptions();
    renderQuestion();
    document.getElementById('resultModal').classList.remove('show');
  }
  
  // Event listeners
  document.getElementById('prevBtn').addEventListener('click', prevQuestion);
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  document.getElementById('submitBtn').addEventListener('click', evaluateQuiz);
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('resultModal').classList.remove('show');
  });
  document.getElementById('restartBtn').addEventListener('click', resetQuiz);
  
  // Inicializar
  shuffleOptions();
  renderQuestion();
</script>
</body>
</html>
