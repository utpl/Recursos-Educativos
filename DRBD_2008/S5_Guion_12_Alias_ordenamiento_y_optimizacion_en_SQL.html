<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SQL Quiz | Alias · Sorting · Optimization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1E4A3B;
            --primary-dark: #0A2F2A;
            --primary-light: #2C6E4F;
            --accent: #E67E22;
            --accent-light: #F39C12;
            --accent-soft: #FEF3E7;
            --success: #2E7D32;
            --success-bg: #E8F5E9;
            --error: #C62828;
            --error-bg: #FFEBEE;
            --neutral: #2C3E50;
            --neutral-light: #5D6E7E;
            --bg: #F8FAFE;
            --card: #FFFFFF;
            --border: #E9EDF2;
            --text-body: #1E2F3E;
            --tag-bg: #F0F4F9;
            --font: 'Inter', sans-serif;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #F5F7FC 0%, #EDF2F9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal: estricto 800x800 */
        .quiz-container {
            width: 800px;
            height: 800px;
            background: transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .quiz-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 0;
            scrollbar-width: thin;
        }

        .quiz-content::-webkit-scrollbar {
            width: 5px;
        }
        .quiz-content::-webkit-scrollbar-track {
            background: var(--border);
        }
        .quiz-content::-webkit-scrollbar-thumb {
            background: var(--primary);
        }

        /* Header moderno */
        .hero {
            background: linear-gradient(115deg, #0A2F2A 0%, #1E4A3B 45%, #1F6392 100%);
            padding: 24px 28px 28px 28px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }

        .hero h1 {
            font-size: 24px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .hero h1 span {
            font-size: 32px;
        }

        .sub-header {
            color: rgba(255,255,255,0.88);
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Tarjeta de pregunta principal */
        .question-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 28px;
        }

        .progress-indicator {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .question-counter {
            font-size: 13px;
            font-weight: 600;
            color: var(--neutral-light);
            background: var(--tag-bg);
            padding: 6px 14px;
            border-left: 3px solid var(--accent);
        }

        .score-preview {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            background: var(--accent-soft);
            padding: 6px 14px;
        }

        /* Tarjeta pregunta */
        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 28px 26px;
            box-shadow: var(--shadow-md);
            margin-bottom: 24px;
        }

        .q-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            padding-left: 18px;
        }

        .q-title span {
            font-size: 28px;
        }

        .q-text {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-body);
            margin-bottom: 28px;
            font-weight: 500;
            background: #FBFCFE;
            padding: 14px 16px;
            border-left: 3px solid var(--accent-soft);
        }

        /* Opciones */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt-item {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 12px 16px;
            background: #FFFFFF;
            border: 1.5px solid var(--border);
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            min-height: 52px;
        }

        .opt-item:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Matching específico */
        .match-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 8px;
        }

        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            background: #FFFFFF;
            padding: 12px 16px;
            border: 1px solid var(--border);
        }

        .match-row span:first-child {
            font-weight: 700;
            min-width: 140px;
        }

        select {
            background: white;
            border: 1px solid var(--border);
            padding: 10px 14px;
            font-family: var(--font);
            font-weight: 500;
            color: var(--text-body);
            cursor: pointer;
            min-height: 44px;
            min-width: 200px;
            transition: 0.1s;
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Feedback */
        .feedback-area {
            margin-top: 20px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .feedback-area.show {
            display: block;
        }
        .feedback-correct {
            background: var(--success-bg);
            color: var(--success);
            border-left: 4px solid var(--success);
            padding: 12px 16px;
        }
        .feedback-wrong {
            background: var(--error-bg);
            color: var(--error);
            border-left: 4px solid var(--error);
            padding: 12px 16px;
        }

        /* Navegación */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 8px;
        }

        .nav-btn {
            flex: 1;
            background: var(--neutral);
            border: none;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.primary {
            background: var(--primary);
        }
        .nav-btn.primary:hover {
            background: var(--primary-light);
            transform: scale(0.98);
        }
        .nav-btn.secondary {
            background: var(--neutral-light);
        }
        .nav-btn.secondary:hover {
            background: var(--neutral);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal final */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 47, 42, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card);
            width: 460px;
            max-width: 90%;
            padding: 28px;
            border-top: 6px solid var(--accent);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .modal-header {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-modal {
            font-size: 30px;
            cursor: pointer;
            color: var(--neutral-light);
        }
        .close-modal:hover {
            color: var(--error);
        }
        .modal-body {
            font-size: 15px;
            color: var(--text-body);
            line-height: 1.5;
        }
        .modal-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }

        @media (max-width: 800px) {
            .quiz-container {
                width: 100%;
                height: 100vh;
            }
            .question-stage {
                padding: 16px 20px;
            }
            .match-row {
                flex-direction: column;
                align-items: stretch;
            }
            .match-row span:first-child {
                min-width: auto;
            }
            select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-content">
        <!-- Header con emojis puros -->
        <div class="hero">
            <h1>
                <span>🗄️</span>
                SQL · Alias, Sorting & Optimization
            </h1>
            <div class="sub-header">
                <span>📌 Query Essentials</span>
                <span>⚡ Interactive Quiz</span>
                <span>💡 1 pregunta por paso</span>
            </div>
        </div>

        <!-- Contenedor dinámico de preguntas -->
        <div class="question-stage" id="questionStage">
            <!-- JS inyecta contenido aquí -->
        </div>
    </div>
</div>

<!-- Modal final -->
<div id="feedbackModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>📋 Resultados SQL</span>
            <span class="close-modal" id="closeModalBtn">&times;</span>
        </div>
        <div class="modal-body" id="modalFeedbackText"></div>
        <button class="modal-btn" id="restartQuizBtn">🔄 Reiniciar quiz</button>
    </div>
</div>

<script>
    // Definición de preguntas
    const questions = [
        {
            id: 1,
            title: "🔖 Alias en SQL",
            text: "El uso de alias en SQL permite renombrar columnas o tablas para facilitar la lectura de los resultados.",
            type: "truefalse",
            options: ["✅ Verdadero", "❌ Falso"],
            values: ["true", "false"],
            correct: "true",
            explanation: "Los alias (AS) renombran temporalmente columnas o tablas, mejorando la legibilidad de las consultas."
        },
        {
            id: 2,
            title: "🔄 Eliminar duplicados",
            text: "¿Qué cláusula permite eliminar registros duplicados en una consulta?",
            type: "multiple",
            options: ["a) ORDER BY", "b) LIMIT", "c) DISTINCT ✨"],
            values: ["ORDER BY", "LIMIT", "DISTINCT"],
            correct: "DISTINCT",
            explanation: "DISTINCT elimina filas duplicadas del conjunto de resultados."
        },
        {
            id: 3,
            title: "📊 Ordenamiento",
            text: "La cláusula _________ permite ordenar los resultados de una consulta en forma ascendente o descendente.",
            type: "multiple",
            options: ["WHERE", "ORDER BY ⬆️⬇️", "GROUP BY", "HAVING"],
            values: ["WHERE", "ORDER BY", "GROUP BY", "HAVING"],
            correct: "ORDER BY",
            explanation: "ORDER BY ordena los resultados ASC (ascendente) o DESC (descendente)."
        },
        {
            id: 4,
            title: "🔗 Relacionar conceptos",
            text: "Relacione cada concepto con su función principal.",
            type: "matching",
            items: [
                { concept: "📛 Alias", correct: "3", text: "Renombra elementos en la consulta" },
                { concept: "🧮 Columnas calculadas", correct: "2", text: "Permite operaciones sobre datos en SELECT" },
                { concept: "✋ LIMIT", correct: "1", text: "Restringe el número de resultados" }
            ],
            options: [
                "1) Restringe el número de resultados",
                "2) Permite operaciones sobre datos en SELECT",
                "3) Renombra elementos en la consulta"
            ],
            explanation: "Alias renombra (3), columnas calculadas realizan operaciones (2), LIMIT restringe filas (1)."
        },
        {
            id: 5,
            title: "⛔ LIMIT vs ORDER BY",
            text: "La cláusula LIMIT permite ordenar los resultados de una consulta.",
            type: "truefalse",
            options: ["✅ Verdadero", "❌ Falso"],
            values: ["true", "false"],
            correct: "false",
            explanation: "LIMIT solo restringe el número de filas, no ordena. ORDER BY se usa para ordenar."
        }
    ];

    let currentIndex = 0;
    let userAnswers = [
        null,   // q1
        null,   // q2
        null,   // q3
        { alias: "", colCalc: "", limit: "" }, // q4 matching
        null    // q5
    ];
    let scores = [false, false, false, false, false];
    let answeredFlags = [false, false, false, false, false];

    const stage = document.getElementById('questionStage');

    // Render pregunta actual
    function renderQuestion() {
        const q = questions[currentIndex];
        let html = `
            <div class="progress-indicator">
                <div class="question-counter">📌 Pregunta ${currentIndex + 1} de ${questions.length}</div>
                <div class="score-preview">⭐ Respondidas: ${answeredFlags.filter(a => a === true).length}/${questions.length}</div>
            </div>
            <div class="question-card">
                <div class="q-title">
                    <span>${q.title.split(' ')[0]}</span>
                    ${q.title}
                </div>
                <div class="q-text">${q.text}</div>
        `;

        if (q.type === "truefalse" || q.type === "multiple") {
            html += `<div class="options" id="optionsContainer">`;
            q.options.forEach((opt, idx) => {
                const isChecked = (userAnswers[currentIndex] === q.values[idx]);
                html += `
                    <label class="opt-item">
                        <input type="radio" name="question" value="${q.values[idx]}" ${isChecked ? 'checked' : ''}>
                        ${opt}
                    </label>
                `;
            });
            html += `</div>`;
        } 
        else if (q.type === "matching") {
            const saved = userAnswers[currentIndex] || { alias: "", colCalc: "", limit: "" };
            html += `<div class="match-container">`;
            q.items.forEach((item, idx) => {
                let selectId = `match-${idx}`;
                let currentVal = "";
                if (item.concept.includes("Alias")) currentVal = saved.alias || "";
                else if (item.concept.includes("Columnas")) currentVal = saved.colCalc || "";
                else if (item.concept.includes("LIMIT")) currentVal = saved.limit || "";
                
                html += `
                    <div class="match-row">
                        <span style="font-weight:700;">${item.concept}</span>
                        <select id="${selectId}" data-key="${item.concept}">
                            <option value="">⚡ seleccionar</option>
                            ${q.options.map(opt => `<option value="${opt.split(')')[0]}" ${currentVal === opt.split(')')[0] ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </div>
                `;
            });
            html += `</div>`;
        }

        // Feedback si ya fue respondida
        if (answeredFlags[currentIndex]) {
            const isCorrect = scores[currentIndex];
            const explanation = q.explanation;
            html += `
                <div class="feedback-area show">
                    <div class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                        ${isCorrect ? '✅ Correcto! ' : '❌ Incorrecto. '} ${explanation}
                    </div>
                </div>
            `;
        } else {
            html += `<div class="feedback-area" id="feedbackArea"></div>`;
        }

        html += `</div>`;

        // Botones navegación
        html += `
            <div class="nav-buttons">
                <button class="nav-btn secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Anterior</button>
                <button class="nav-btn primary" id="nextBtn">${currentIndex === questions.length - 1 ? '🏁 Finalizar' : 'Siguiente ▶'}</button>
            </div>
        `;

        stage.innerHTML = html;

        // Event listeners para radio buttons
        if (q.type !== "matching") {
            const radios = document.querySelectorAll('input[name="question"]');
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const selectedVal = e.target.value;
                    userAnswers[currentIndex] = selectedVal;
                    const isCorrect = (selectedVal === q.correct);
                    scores[currentIndex] = isCorrect;
                    answeredFlags[currentIndex] = true;
                    showFeedback(currentIndex, isCorrect, q.explanation);
                    updateProgressDisplay();
                });
            });
        } 
        else {
            // Matching: guardar respuestas
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.addEventListener('change', () => {
                    const aliasVal = document.querySelector('#match-0')?.value || "";
                    const colVal = document.querySelector('#match-1')?.value || "";
                    const limitVal = document.querySelector('#match-2')?.value || "";
                    userAnswers[currentIndex] = { alias: aliasVal, colCalc: colVal, limit: limitVal };
                    const isCorrect = (aliasVal === "3" && colVal === "2" && limitVal === "1");
                    scores[currentIndex] = isCorrect;
                    answeredFlags[currentIndex] = true;
                    showFeedback(currentIndex, isCorrect, q.explanation);
                    updateProgressDisplay();
                });
            });
        }

        // Eventos botones
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });

        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentIndex === questions.length - 1) {
                showFinalResults();
            } else {
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    renderQuestion();
                }
            }
        });
    }

    function showFeedback(index, isCorrect, explanation) {
        const feedbackDiv = document.getElementById('feedbackArea');
        if (feedbackDiv) {
            feedbackDiv.innerHTML = `
                <div class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                    ${isCorrect ? '✅ Correcto! ' : '❌ Incorrecto. '} ${explanation}
                </div>
            `;
            feedbackDiv.classList.add('show');
        }
    }

    function updateProgressDisplay() {
        const previewSpan = document.querySelector('.score-preview');
        if (previewSpan) {
            previewSpan.innerHTML = `⭐ Respondidas: ${answeredFlags.filter(a => a === true).length}/${questions.length}`;
        }
    }

    function showFinalResults() {
        const totalCorrect = scores.filter(s => s === true).length;
        const totalQuestions = questions.length;
        let feedbackMsg = `🎯 **Puntaje final: ${totalCorrect}/${totalQuestions}**\n\n`;
        
        if (totalCorrect === totalQuestions) {
            feedbackMsg += `🏆 ¡Excelente! Dominas completamente los conceptos de alias, ordenamiento y optimización en SQL. 🚀\n\n`;
        } else if (totalCorrect >= 3) {
            feedbackMsg += `📈 ¡Buen trabajo! Revisa los conceptos donde tuviste errores para seguir mejorando. 💪\n\n`;
        } else {
            feedbackMsg += `📚 Te recomendamos repasar los temas de ALIAS, ORDER BY, DISTINCT y LIMIT. ¡Sigue practicando! 🌟\n\n`;
        }
        
        feedbackMsg += `🔍 **Resumen por pregunta:**<br>`;
        questions.forEach((q, idx) => {
            const status = scores[idx] ? '✅' : '❌';
            feedbackMsg += `${status} ${q.title}<br>`;
        });
        
        document.getElementById('modalFeedbackText').innerHTML = feedbackMsg.replace(/\n/g, '<br>');
        document.getElementById('feedbackModal').style.display = 'flex';
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers = [
            null, null, null,
            { alias: "", colCalc: "", limit: "" },
            null
        ];
        scores = [false, false, false, false, false];
        answeredFlags = [false, false, false, false, false];
        renderQuestion();
        document.getElementById('feedbackModal').style.display = 'none';
    }

    // Cerrar modal
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('feedbackModal').style.display = 'none';
    });
    document.getElementById('restartQuizBtn').addEventListener('click', resetQuiz);
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('feedbackModal');
        if (e.target === modal) modal.style.display = 'none';
    });

    // Inicializar
    renderQuestion();
</script>
</body>
</html>
