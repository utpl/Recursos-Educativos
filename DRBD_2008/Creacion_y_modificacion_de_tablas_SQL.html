<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SQL DDL | Creación y modificación de tablas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1E4A3B;
            --primary-dark: #0A2F2A;
            --primary-light: #2C6E4F;
            --accent: #E67E22;
            --accent-light: #F39C12;
            --accent-soft: #FEF3E7;
            --success: #2E7D32;
            --success-bg: #E8F5E9;
            --error: #C62828;
            --error-bg: #FFEBEE;
            --neutral: #2C3E50;
            --neutral-light: #5D6E7E;
            --bg: #F8FAFE;
            --card: #FFFFFF;
            --border: #E9EDF2;
            --text-body: #1E2F3E;
            --font: 'Inter', sans-serif;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: var(--font);
            background: linear-gradient(145deg, #F5F7FC 0%, #EDF2F9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
   
        }

        /* CONTENEDOR PRINCIPAL: 800px x 800px ESTRICTO */
        .container {
            width: 800px;
            height: 800px;
            background: var(--card);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        /* Scroll interno controlado */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .scroll-area::-webkit-scrollbar {
            width: 5px;
        }
        .scroll-area::-webkit-scrollbar-track {
            background: var(--border);
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--primary);
        }

        /* HEADER con gradiente vibrante */
        .header {
            background: linear-gradient(115deg, #0A2F2A 0%, #1E4A3B 45%, #2C5F8A 100%);
            padding: 20px 28px;
            flex-shrink: 0;
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-light);
            opacity: 0.6;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 1;
        }
        .header h1 span {
            font-size: 32px;
        }
        .header p {
            color: rgba(255,255,255,0.88);
            font-size: 13px;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        /* Barra de progreso mejorada */
        .progress-section {
            padding: 12px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .progress-bar-container {
            background: var(--border);
            height: 6px;
            border-radius: 0px;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--neutral-light);
            font-weight: 500;
        }

        /* Layout principal */
        .main-layout {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex: 1;
            min-height: 0;
        }

        /* Panel izquierdo */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .right-panel {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }

        /* Tarjetas */
        .card-header {
            background: var(--primary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .card-header span {
            font-size: 20px;
        }
        .card-header h3 {
            color: white;
            font-size: 14px;
            font-weight: 700;
        }
        .card-content {
            background: var(--card);
            border: 1px solid var(--border);
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* Items arrastrables */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .draggable-item {
            background: white;
            border: 1.5px solid var(--border);
            padding: 12px 14px;
            cursor: grab;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }
        .draggable-item:active {
            cursor: grabbing;
        }
        .draggable-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }
        .draggable-item.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }
        .draggable-item.matched {
            opacity: 0.4;
            background: var(--success-bg);
            border-color: var(--success);
            cursor: default;
            pointer-events: none;
            text-decoration: line-through;
        }
        .item-number {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .item-command {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* Zonas de destino */
        .targets-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .target-zone {
            background: var(--bg);
            border: 2px dashed var(--border);
            padding: 12px;
            transition: all 0.2s ease;
        }
        .target-zone.drag-over {
            background: var(--accent-soft);
            border-color: var(--accent);
            border-style: solid;
        }
        .target-zone.matched {
            background: var(--success-bg);
            border-color: var(--success);
            border-style: solid;
        }
        .target-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .target-command {
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            background: var(--tag-bg);
            padding: 4px 10px;
        }
        .target-desc {
            font-size: 12px;
            line-height: 1.45;
            color: var(--text-body);
            margin-bottom: 10px;
        }
        .target-feedback {
            font-size: 11px;
            color: var(--success);
            display: none;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .target-zone.matched .target-feedback {
            display: block;
        }
        .feedback-text {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        /* Botón reiniciar */
        .reset-btn-container {
            margin-top: auto;
        }
        .reset-btn {
            width: 100%;
            background: var(--neutral-light);
            border: none;
            padding: 12px;
            font-weight: 700;
            font-size: 13px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: var(--neutral);
            transform: scale(0.98);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 47, 42, 0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card);
            width: 460px;
            max-width: 90%;
            padding: 28px;
            text-align: center;
            border-top: 6px solid var(--accent);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .modal-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .modal-text {
            font-size: 14px;
            line-height: 1.55;
            color: var(--text-body);
            margin-bottom: 20px;
        }
        .modal-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .modal-btn:hover {
            background: var(--primary-light);
        }

        @media (max-width: 690px) {
            .container {
                width: 100%;
                height: 100vh;
            }
            .main-layout {
                flex-direction: column;
            }
            .right-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span>🗃️</span>
            Creación y modificación de tablas SQL
        </h1>
        <p>📌 DDL · Restricciones · Integridad referencial</p>
    </div>

    <div class="progress-section">
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-stats">
            <span>📊 Progreso</span>
            <span id="progressCount">0/7 emparejados</span>
        </div>
    </div>

    <div class="scroll-area">
        <div class="main-layout">
            <!-- Panel izquierdo: elementos arrastrables -->
            <div class="left-panel">
                <div class="card-header">
                    <span>📋</span>
                    <h3>Comandos y conceptos</h3>
                </div>
                <div class="card-content" id="itemsContainer">
                    <div class="items-list" id="itemsList"></div>
                </div>
            </div>

            <!-- Panel derecho: zonas de destino -->
            <div class="right-panel">
                <div class="card-header">
                    <span>📝</span>
                    <h3>Descripciones</h3>
                </div>
                <div class="card-content" id="targetsContainer">
                    <div class="targets-list" id="targetsList"></div>
                </div>
                <div class="reset-btn-container">
                    <button class="reset-btn" id="resetBtn">🔄 Reiniciar actividad</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de retroalimentación -->
<div class="modal" id="feedbackModal">
    <div class="modal-content">
        <span class="modal-emoji" id="modalEmoji">🏆</span>
        <h3 class="modal-title" id="modalTitle">¡Excelente!</h3>
        <p class="modal-text" id="modalText"></p>
        <button class="modal-btn" id="closeModalBtn">Continuar</button>
    </div>
</div>

<!-- Modal de confirmación de reinicio -->
<div class="modal" id="resetConfirmModal">
    <div class="modal-content">
        <span class="modal-emoji">🔄</span>
        <h3 class="modal-title">Reiniciar actividad</h3>
        <p class="modal-text">¿Estás seguro? Se perderá todo el progreso actual.</p>
        <div style="display: flex; gap: 12px;">
            <button class="modal-btn" id="cancelResetBtn" style="background: var(--neutral-light);">Cancelar</button>
            <button class="modal-btn" id="confirmResetBtn">Reiniciar</button>
        </div>
    </div>
</div>

<script>
    // Datos del recurso
    const elements = [
        { id: 1, command: "CREATE TABLE", description: "Permite definir la estructura inicial de una tabla con columnas, tipos de datos y restricciones", feedback: "Crea la estructura lógica de una tabla, materializando el diseño conceptual en almacenamiento físico." },
        { id: 2, command: "ALTER TABLE", description: "Modifica la estructura de una tabla existente sin eliminar los datos almacenados", feedback: "Facilita cambios estructurales en tablas existentes sin pérdida de datos, permitiendo adaptabilidad del sistema." },
        { id: 3, command: "DROP TABLE", description: "Elimina completamente una tabla junto con todos sus datos almacenados", feedback: "Operación irreversible que elimina tabla y contenido. Requiere precaución extrema." },
        { id: 4, command: "TRUNCATE TABLE", description: "Elimina todos los registros de una tabla manteniendo su estructura", feedback: "Borra todos los registros de forma eficiente, manteniendo intacta la estructura de la tabla." },
        { id: 5, command: "PRIMARY KEY", description: "Identifica de manera única cada registro dentro de una tabla", feedback: "Garantiza unicidad e identificación de registros, evitando duplicados y valores nulos." },
        { id: 6, command: "FOREIGN KEY", description: "Establece relaciones entre tablas garantizando integridad referencial", feedback: "Asegura coherencia entre tablas al exigir que los valores existan en la tabla referenciada." },
        { id: 7, command: "CHECK", description: "Define condiciones que deben cumplir los valores de una columna", feedback: "Permite validar datos mediante reglas personalizadas, reforzando integridad a nivel de columna." }
    ];

    let matches = {};      // { targetId: itemId }
    let matchedItems = new Set();
    let draggedItemId = null;
    let draggedElement = null;

    // Barajar elementos
    function shuffle(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    // Renderizar items arrastrables
    function renderItems() {
        const container = document.getElementById('itemsList');
        const shuffled = shuffle(elements);
        
        container.innerHTML = shuffled.map(item => `
            <div class="draggable-item" data-id="${item.id}" draggable="${!matchedItems.has(item.id)}">
                <span class="item-number">${item.id}</span>
                <span class="item-command">${item.command}</span>
            </div>
        `).join('');
        
        // Inicializar eventos drag
        document.querySelectorAll('.draggable-item').forEach(el => {
            if (el.getAttribute('draggable') === 'true') {
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
            }
        });
    }

    // Renderizar zonas de destino
    function renderTargets() {
        const container = document.getElementById('targetsList');
        
        container.innerHTML = elements.map(item => `
            <div class="target-zone" data-id="${item.id}" data-command="${item.command}">
                <div class="target-header">
                    <span class="target-command">${item.command}</span>
                </div>
                <div class="target-desc">${item.description}</div>
                <div class="target-feedback" id="feedback-${item.id}">
                    <div class="feedback-text">
                        <span>💡</span>
                        <span>${item.feedback}</span>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Inicializar eventos drop
        document.querySelectorAll('.target-zone').forEach(zone => {
            zone.addEventListener('dragover', handleDragOver);
            zone.addEventListener('dragleave', handleDragLeave);
            zone.addEventListener('drop', handleDrop);
        });
        
        // Marcar zonas ya emparejadas
        Object.entries(matches).forEach(([targetId, itemId]) => {
            const zone = document.querySelector(`.target-zone[data-id="${targetId}"]`);
            if (zone) {
                zone.classList.add('matched');
                const itemEl = document.querySelector(`.draggable-item[data-id="${itemId}"]`);
                if (itemEl) itemEl.classList.add('matched');
            }
        });
    }

    function handleDragStart(e) {
        draggedElement = e.target.closest('.draggable-item');
        if (!draggedElement || draggedElement.classList.contains('matched')) {
            e.preventDefault();
            return false;
        }
        draggedItemId = draggedElement.getAttribute('data-id');
        e.dataTransfer.effectAllowed = 'move';
        draggedElement.classList.add('dragging');
    }

    function handleDragEnd(e) {
        if (draggedElement) {
            draggedElement.classList.remove('dragging');
        }
        draggedItemId = null;
        draggedElement = null;
        
        // Limpiar estilos drag-over
        document.querySelectorAll('.target-zone').forEach(zone => {
            zone.classList.remove('drag-over');
        });
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const zone = e.target.closest('.target-zone');
        if (zone && !zone.classList.contains('matched')) {
            zone.classList.add('drag-over');
        }
    }

    function handleDragLeave(e) {
        const zone = e.target.closest('.target-zone');
        if (zone) {
            zone.classList.remove('drag-over');
        }
    }

    function handleDrop(e) {
        e.preventDefault();
        const targetZone = e.target.closest('.target-zone');
        
        if (!targetZone || !draggedItemId) return;
        
        targetZone.classList.remove('drag-over');
        
        const targetId = targetZone.getAttribute('data-id');
        const expectedCommand = targetZone.getAttribute('data-command');
        const draggedItem = document.querySelector(`.draggable-item[data-id="${draggedItemId}"]`);
        const draggedCommand = draggedItem?.querySelector('.item-command')?.innerText;
        
        // Verificar si ya está emparejado
        if (targetZone.classList.contains('matched')) {
            showFeedback('⚠️ Ya emparejado', 'Esta descripción ya tiene un comando asignado.', 'warning');
            return;
        }
        
        // Verificar si el item ya fue usado
        if (matchedItems.has(parseInt(draggedItemId))) {
            showFeedback('⚠️ Comando ya usado', 'Este comando ya ha sido emparejado con otra descripción.', 'warning');
            return;
        }
        
        // Verificar correspondencia correcta
        const expectedId = elements.find(el => el.command === expectedCommand)?.id;
        
        if (parseInt(draggedItemId) === expectedId) {
            // Match correcto
            matches[targetId] = draggedItemId;
            matchedItems.add(parseInt(draggedItemId));
            
            targetZone.classList.add('matched');
            draggedItem.classList.add('matched');
            draggedItem.setAttribute('draggable', 'false');
            
            updateProgress();
            
            // Mostrar feedback específico del concepto
            const element = elements.find(el => el.id === parseInt(draggedItemId));
            showFeedback('✅ Correcto', element.feedback, 'success');
            
            // Verificar si completó
            if (Object.keys(matches).length === elements.length) {
                setTimeout(() => {
                    showCompletionModal();
                }, 800);
            }
        } else {
            // Match incorrecto
            showFeedback('❌ Incorrecto', `"${draggedCommand}" no corresponde con "${expectedCommand}". Revisa la función de cada comando DDL y restricción.`, 'error');
        }
    }

    function updateProgress() {
        const matchedCount = Object.keys(matches).length;
        const percent = (matchedCount / elements.length) * 100;
        document.getElementById('progressFill').style.width = `${percent}%`;
        document.getElementById('progressCount').innerText = `${matchedCount}/${elements.length} emparejados`;
    }

    function showFeedback(title, message, type) {
        const modal = document.getElementById('feedbackModal');
        const emoji = document.getElementById('modalEmoji');
        const titleEl = document.getElementById('modalTitle');
        const textEl = document.getElementById('modalText');
        
        if (type === 'success') {
            emoji.textContent = '✅';
            titleEl.textContent = title;
            titleEl.style.color = 'var(--success)';
        } else if (type === 'error') {
            emoji.textContent = '❌';
            titleEl.textContent = title;
            titleEl.style.color = 'var(--error)';
        } else {
            emoji.textContent = '⚠️';
            titleEl.textContent = title;
            titleEl.style.color = 'var(--accent)';
        }
        
        textEl.innerHTML = message;
        modal.style.display = 'flex';
    }
    
    function showCompletionModal() {
        const modal = document.getElementById('feedbackModal');
        document.getElementById('modalEmoji').textContent = '🏆';
        document.getElementById('modalTitle').textContent = '¡Enhorabuena!';
        document.getElementById('modalTitle').style.color = 'var(--success)';
        document.getElementById('modalText').innerHTML = '¡Has emparejado correctamente todos los comandos y conceptos!<br><br>🎯 El dominio de los comandos DDL y restricciones permite gestionar de forma estructurada, coherente y segura las tablas en una base de datos.';
        modal.style.display = 'flex';
    }

    function resetActivity() {
        matches = {};
        matchedItems.clear();
        draggedItemId = null;
        
        renderItems();
        renderTargets();
        updateProgress();
        document.getElementById('resetConfirmModal').style.display = 'none';
    }

    function openResetConfirm() {
        document.getElementById('resetConfirmModal').style.display = 'flex';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    // Event listeners
    document.getElementById('resetBtn').addEventListener('click', openResetConfirm);
    document.getElementById('confirmResetBtn').addEventListener('click', resetActivity);
    document.getElementById('cancelResetBtn').addEventListener('click', () => closeModal('resetConfirmModal'));
    document.getElementById('closeModalBtn').addEventListener('click', () => closeModal('feedbackModal'));
    
    window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
        }
    });

    // Inicializar
    renderItems();
    renderTargets();
    updateProgress();
</script>
</body>
</html>
