<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organización de archivos e índices</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        :root {
            --primary: #1565C0;
            --primary-light: #1976D2;
            --accent: #F57C00;
            --accent-light: #FF9800;
            --success: #2E7D32;
            --success-bg: #E8F5E9;
            --error: #C62828;
            --error-bg: #FFEBEE;
            --neutral: #37474F;
            --neutral-light: #546E7A;
            --bg: #F4F7FB;
            --card: #FFFFFF;
            --border: #CFD8DC;
            --text: #1A237E;
            --text-body: #263238;
            --tag-bg: #E3F2FD;
            --tag-border: #90CAF9;
            --header-bg: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
            --font: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-body);
            width: 800px;
            min-height: 600px;
            max-height: 800px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .header {
            background: var(--header-bg);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
        }

        .main-container {
            padding: 20px;
            height: calc(100% - 110px);
            display: flex;
            gap: 20px;
        }

        .left-panel, .right-panel {
            background: var(--card);
            border: 2px solid var(--border);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            padding: 20px;
            border-radius: 0;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
        }

        .title {
            color: var(--primary);
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .instruction {
            background: var(--tag-bg);
            border: 2px solid var(--tag-border);
            padding: 16px 20px;
            font-size: 15.5px;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 20px;
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            overflow-y: auto;
        }

        .item {
            background: white;
            border: 3px solid var(--accent);
            padding: 14px 18px;
            cursor: grab;
            user-select: none;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(245,124,0,0.15);
        }

        .item:hover {
            border-color: var(--accent-light);
            transform: translateX(6px);
        }

        .item .emoji {
            font-size: 26px;
            flex-shrink: 0;
        }

        .targets-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            overflow-y: auto;
        }

        .target {
            background: white;
            border: 3px dashed var(--border);
            padding: 18px 20px;
            min-height: 82px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .target:hover {
            border-color: var(--accent);
            background: var(--drop-hover);
        }

        .target.matched {
            border-style: solid;
            border-color: var(--success);
            background: var(--success-bg);
        }

        .target .label {
            font-weight: 600;
            color: var(--neutral);
            min-width: 110px;
            flex-shrink: 0;
        }

        .progress {
            height: 8px;
            background: linear-gradient(to right, var(--accent), var(--primary));
            margin-top: 12px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary-light);
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 92%;
            max-width: 420px;
            padding: 32px 24px;
            text-align: center;
            border: 5px solid var(--success);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 600px) {
            body {
                width: 100%;
                max-height: none;
                overflow-y: auto;
            }

            .main-container {
                flex-direction: column;
                padding: 16px;
                height: auto;
                gap: 16px;
            }

            .right-panel {
                width: 100%;
            }

            .left-panel, .right-panel {
                padding: 16px;
            }

            .item, .target {
                padding: 14px 16px;
                font-size: 15px;
            }

            .title {
                font-size: 18px;
            }

            button {
                width: 100%;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📁 Organización de archivos e índices</h1>
    </div>

    <div class="main-container">

        <!-- Panel izquierdo -->
        <div class="left-panel">
            <div class="title">
                <span style="font-size:28px;">🗃️</span> Conceptos para arrastrar
            </div>
            <div class="instruction">
                👆 Arrastra cada concepto hacia el enunciado correcto en el panel derecho.
            </div>
            <div class="items-container" id="items-container"></div>
        </div>

        <!-- Panel derecho -->
        <div class="right-panel">
            <div class="title">
                <span style="font-size:28px;">📋</span> Completa los enunciados
            </div>
            <div class="targets-container" id="targets-container"></div>
            
            <div style="margin-top: auto;">
                <button onclick="resetActivity()">🔄 Reiniciar actividad</button>
            </div>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal" id="feedback-modal">
        <div class="modal-content">
            <span style="font-size:52px; display:block; margin-bottom:16px;" id="modal-emoji">🏆</span>
            <h2 id="modal-title">¡Felicitaciones!</h2>
            <p id="modal-text" style="font-size:16px; line-height:1.7; margin:20px 0;"></p>
            <button onclick="closeModal()" style="width:100%;">Cerrar</button>
        </div>
    </div>

    <script>
        const concepts = [
            { id: 1, term: "Heap", emoji: "📚", sentence: "Los archivos de tipo _____ almacenan registros sin orden y permiten inserciones rápidas al final" },
            { id: 2, term: "Sorted", emoji: "📊", sentence: "Los archivos _____ mantienen los registros ordenados por una clave, facilitando búsquedas eficientes" },
            { id: 3, term: "Hash", emoji: "🔑", sentence: "Los archivos _____ utilizan una función para ubicar registros con acceso directo por clave" },
            { id: 4, term: "Índice", emoji: "⚡", sentence: "Un _____ permite acceder rápidamente a los datos sin recorrer toda la tabla" },
            { id: 5, term: "B+ Tree", emoji: "🌳", sentence: "El _____ permite búsquedas logarítmicas y soporta consultas por rango" },
            { id: 6, term: "Hash index", emoji: "🔍", sentence: "El _____ permite búsquedas exactas en tiempo constante" },
            { id: 7, term: "Página", emoji: "📄", sentence: "Una _____ es la unidad básica de transferencia entre disco y memoria" },
            { id: 8, term: "Buffer", emoji: "💾", sentence: "El _____ mantiene datos en memoria principal para acelerar el acceso" }
        ];

        const feedbacks = {
            1: "Este tipo de archivo prioriza la rapidez en inserción, pero no optimiza la búsqueda.",
            2: "La organización ordenada permite aplicar búsqueda binaria y mejora el acceso.",
            3: "El uso de funciones hash permite acceso directo, aunque limita consultas por rango.",
            4: "El índice actúa como estructura auxiliar que optimiza el acceso a los datos.",
            5: "Esta estructura balanceada permite búsquedas eficientes en grandes volúmenes.",
            6: "Este índice es eficiente para búsquedas exactas en tiempo constante.",
            7: "Las páginas son la unidad básica de transferencia entre disco y memoria.",
            8: "El buffer reduce accesos a disco manteniendo datos frecuentes en memoria."
        };

        let draggedItem = null;
        let matches = {};
        let isCompleted = false;

        function shuffle(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function createItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            const shuffled = shuffle(concepts);
            
            shuffled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.draggable = true;
                div.dataset.id = item.id;
                div.innerHTML = `<span class="emoji">${item.emoji}</span><span>${item.term}</span>`;
                
                div.addEventListener('dragstart', (e) => {
                    draggedItem = div;
                    setTimeout(() => div.style.opacity = '0.4', 10);
                });
                
                div.addEventListener('dragend', () => {
                    div.style.opacity = '1';
                    draggedItem = null;
                });
                
                container.appendChild(div);
            });
        }

        function createTargets() {
            const container = document.getElementById('targets-container');
            container.innerHTML = '';
            
            concepts.forEach(item => {
                const target = document.createElement('div');
                target.className = 'target';
                target.dataset.id = item.id;
                target.innerHTML = `
                    <span class="label">${item.term}</span>
                    <span style="color:#546E7A; flex:1;">${item.sentence}</span>
                `;
                
                target.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    target.style.borderColor = 'var(--accent)';
                });
                
                target.addEventListener('dragleave', () => {
                    if (!target.classList.contains('matched')) target.style.borderColor = '';
                });
                
                target.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedItem && parseInt(draggedItem.dataset.id) === parseInt(target.dataset.id)) {
                        handleCorrectDrop(draggedItem, target);
                    } else if (draggedItem) {
                        showError();
                    }
                });
                
                container.appendChild(target);
            });
        }

        function handleCorrectDrop(item, target) {
            target.classList.add('matched');
            item.style.opacity = '0.35';
            item.style.pointerEvents = 'none';
            matches[item.dataset.id] = true;

            const progress = Math.round((Object.keys(matches).length / concepts.length) * 100);
            const progressBar = document.querySelector('.progress') || createProgressBar();
            progressBar.style.width = `${progress}%`;

            if (Object.keys(matches).length === concepts.length && !isCompleted) {
                isCompleted = true;
                setTimeout(showFinalFeedback, 600);
            }
        }

        function createProgressBar() {
            const bar = document.createElement('div');
            bar.className = 'progress';
            bar.style.width = '0%';
            document.querySelector('.right-panel').appendChild(bar);
            return bar;
        }

        function showError() {
            const modal = document.getElementById('feedback-modal');
            document.getElementById('modal-emoji').textContent = '❌';
            document.getElementById('modal-title').textContent = '¡Inténtalo de nuevo!';
            document.getElementById('modal-title').style.color = 'var(--error)';
            document.getElementById('modal-text').innerHTML = 'El concepto no corresponde con este enunciado.<br><br>Revisa las características de cada tipo de archivo e índice.';
            modal.style.display = 'flex';
        }

        function showFinalFeedback() {
            const modal = document.getElementById('feedback-modal');
            document.getElementById('modal-emoji').textContent = '🎉';
            document.getElementById('modal-title').textContent = '¡Felicitaciones!';
            document.getElementById('modal-title').style.color = 'var(--success)';
            document.getElementById('modal-text').innerHTML = 
                '¡Has completado correctamente la actividad!<br><br>' +
                'La organización de archivos e índices permite optimizar el acceso y almacenamiento de datos en sistemas de bases de datos.';
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('feedback-modal').style.display = 'none';
        }

        function resetActivity() {
            if (confirm('¿Deseas reiniciar la actividad?')) {
                matches = {};
                isCompleted = false;
                createItems();
                createTargets();
                closeModal();
                const progress = document.querySelector('.progress');
                if (progress) progress.style.width = '0%';
            }
        }

        // Inicializar
        window.onload = () => {
            createItems();
            createTargets();
        };
    </script>
</body>
</html>
